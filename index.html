<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sailor's Game Lab</title>
<!-- 命名约定: 20260630_Sailor游戏占位页_v0.1 -->
<!-- 注意: 部署到 GitHub Pages 时,首页文件名必须是 index.html(GitHub 的硬性要求),所以这个文件保持 index.html。日期/版本写在页面里和本注释里。 -->
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    min-height:100vh;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    font-family: "Trebuchet MS", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: radial-gradient(circle at 50% 28%, #1b2a4a, #070b18);
    color:#eaf2ff; text-align:center; padding:24px; overflow:hidden;
  }
  .badge {
    font-size:14px; letter-spacing:2px; color:#7ee0a0;
    border:1px solid #2e7d52; padding:5px 14px; border-radius:999px;
    margin-bottom:24px;
  }
  h1 {
    font-size: clamp(34px, 9vw, 66px); line-height:1.1;
    background: linear-gradient(90deg,#5ad1ff,#a78bfa,#7ee0a0);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    margin-bottom:10px;
  }
  .sub { font-size: clamp(16px,4vw,22px); color:#9fb3d1; margin-bottom:34px; }
  .msg { font-size:19px; color:#ffd66b; margin-bottom:26px; min-height:28px; }
  button {
    font-size:19px; font-weight:bold; color:#070b18;
    background: linear-gradient(90deg,#5ad1ff,#7ee0a0);
    border:none; padding:15px 30px; border-radius:14px; cursor:pointer;
    transition: transform .08s ease; box-shadow:0 6px 20px rgba(90,209,255,.25);
  }
  button:active { transform: scale(0.94); }
  .score { margin-top:24px; font-size:17px; color:#9fb3d1; }
  .ver { position:fixed; bottom:14px; right:16px; font-size:12px; color:#5a6a85; }
  .star { position:fixed; font-size:22px; pointer-events:none; animation: fall 1.2s linear forwards; }
  @keyframes fall { to { transform: translateY(62vh) rotate(360deg); opacity:0; } }
</style>
</head>
<body>
  <div class="badge">🥋 GREEN BELT · SAILOR</div>
  <h1>Sailor's Game Lab</h1>
  <div class="sub">Sailor 的游戏正在制作中 · Coming Soon</div>
  <div class="msg" id="msg">点一下按钮试试 👇</div>
  <button id="go">开始充能 / Power Up</button>
  <div class="score" id="score">充能值 Power: 0</div>
  <div class="ver">v0.1 占位页 · 20260630</div>
<script>
  const msgs = ["充能中… 🔋","Sailor 出招! 🥋","再来一下! ⚡","新游戏马上来! 🎮","你超棒的! ⭐","Keep going! 🚀"];
  let n = 0;
  const msg = document.getElementById('msg');
  const score = document.getElementById('score');
  document.getElementById('go').addEventListener('click', () => {
    n++;
    msg.textContent = msgs[Math.floor(Math.random()*msgs.length)];
    score.textContent = "充能值 Power: " + (n*10);
    const s = document.createElement('div');
    s.className = 'star'; s.textContent = '⭐';
    s.style.left = (Math.random()*90+5) + 'vw';
    s.style.top = '18vh';
    document.body.appendChild(s);
    setTimeout(()=>s.remove(), 1200);
  });
</script>
</body>
</html>
