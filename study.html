<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sailor 航海学堂 · v13.2</title>
<style>
  :root{
    --bg1:#06192e; --bg2:#0b3a4f; --bg3:#0f5163;
    --ink:#0c1230; --paper:#ffffff; --paper2:#f4f7ff; --muted:#6b7396; --line:#e3e9f7;
    --cn:#ff5d5d; --math:#23a7ff; --sci:#a855f7; --en:#22c55e; --fr:#14b8a6;
    --cn-d:#e23c3c; --math-d:#0d86df;
    --xp:#ffb020; --xp-d:#f59e0b; --gold:#ffd24a;
    --ok:#16a34a; --okbg:#e7f9ee; --no:#e23c3c; --nobg:#fdecec;
    --t1:#22c55e; --t2:#23a7ff; --t3:#a855f7;
    --r:22px; --r2:16px;
    --shadow:0 12px 34px rgba(8,12,40,.2); --shadow2:0 6px 18px rgba(8,12,40,.12);
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",Roboto,sans-serif;
    --cjk:"PingFang SC","Hiragino Sans GB","Microsoft YaHei","Heiti SC","WenQuanYi Micro Hei",sans-serif;
    --fs:20px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:var(--font);color:var(--ink);font-size:var(--fs);
    background:radial-gradient(1200px 600px at 80% -10%,#0e6178 0%,transparent 55%),radial-gradient(900px 500px at -10% 10%,#0a4a60 0%,transparent 50%),linear-gradient(160deg,var(--bg1),var(--bg2) 60%,var(--bg3));
    background-attachment:fixed;min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.55}
  .wrap{max-width:800px;margin:0 auto;padding:18px 16px 64px}

  .hero{background:linear-gradient(135deg,#171f48,#202c63);border:1px solid rgba(255,255,255,.08);border-radius:var(--r);padding:20px;color:#fff;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .hero::after{content:"";position:absolute;right:-40px;top:-40px;width:180px;height:180px;background:radial-gradient(circle,rgba(255,178,32,.28),transparent 70%)}
  .hero-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .brand{display:flex;align-items:center;gap:12px}
  .logo{width:54px;height:54px;border-radius:50%;padding:2.5px;background:linear-gradient(135deg,#d8a93a,#b8860b);box-shadow:0 6px 16px rgba(184,134,11,.45);flex:0 0 auto;box-sizing:border-box}.logo img{width:100%;height:100%;border-radius:50%;object-fit:cover;display:block;border:2px solid #0b3a52}
  .brand h1{font-size:22px;margin:0;font-weight:800;letter-spacing:.3px}
  .brand .sub{font-size:13px;color:#aeb6e0;margin-top:1px}
  .ver{font-size:13px;font-weight:800;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18);padding:6px 13px;border-radius:999px;white-space:nowrap}
  .belt-row{display:flex;align-items:center;gap:15px;margin-top:18px;position:relative;z-index:1}
  .belt-emblem{flex:none;width:70px;height:70px;border-radius:17px;display:grid;place-items:center;position:relative;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12)}
  .belt-bar{width:46px;height:15px;border-radius:3px;box-shadow:inset 0 -2px 0 rgba(0,0,0,.25)}
  .belt-knot{position:absolute;width:10px;height:21px;border-radius:2px;transform:rotate(18deg);right:13px;bottom:15px}
  .belt-info{flex:1;min-width:0}
  .belt-name{font-size:17px;font-weight:800}
  .belt-name .next{font-weight:600;color:#aeb6e0;font-size:13px;margin-left:6px}
  .xpbar{height:15px;background:rgba(255,255,255,.12);border-radius:999px;margin-top:9px;overflow:hidden}
  .xpfill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--xp),var(--gold));width:0;transition:width 1.1s cubic-bezier(.2,.8,.2,1);box-shadow:0 0 12px rgba(255,178,32,.6)}
  .xpline{display:flex;justify-content:space-between;font-size:13px;color:#c7cdf0;margin-top:6px}
  .xpnow{font-weight:800;color:#ffd86b}

  .box-card{margin-top:16px;width:100%;border:none;border-radius:var(--r2);padding:15px 18px;font-family:inherit;cursor:pointer;
    display:flex;align-items:center;gap:13px;box-shadow:var(--shadow2);color:#fff;background:linear-gradient(135deg,#ff7a59,#ff5d5d)}
  .box-card.empty{background:rgba(255,255,255,.08);color:#c7cdf0;border:1px solid rgba(255,255,255,.14)}
  .box-card:active{transform:scale(.99)}
  .box-card .bi{font-size:26px}
  .box-card .bt{font-weight:800;font-size:16px} .box-card .bs{font-size:12.5px;opacity:.92;margin-top:1px}
  .box-card .bn{margin-left:auto;font-weight:900;font-size:20px;background:rgba(255,255,255,.22);border-radius:999px;padding:4px 13px}
  .box-card.empty .bn{background:rgba(255,255,255,.12)}

  .sec{margin-top:24px}
  .sec-h{display:flex;align-items:center;gap:9px;margin:0 4px 13px}
  .dot{width:12px;height:12px;border-radius:3px}
  .sec-h h2{font-size:17.5px;margin:0;color:#fff;font-weight:800}
  .sec-h .pct{margin-left:auto;font-size:13px;color:#aeb6e0;font-weight:700}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:520px){.grid{grid-template-columns:1fr}}
  .card{background:var(--paper);border-radius:var(--r2);padding:15px;cursor:pointer;box-shadow:var(--shadow2);border:1px solid var(--line);transition:transform .12s ease;display:flex;flex-direction:column;gap:9px;position:relative;overflow:hidden}
  .card:active{transform:scale(.975)}
  .card .stripe{position:absolute;left:0;top:0;bottom:0;width:6px}
  .card-top{display:flex;align-items:center;gap:11px;padding-left:5px}
  .card .ic{font-size:28px;flex:none}
  .card .t{font-weight:800;font-size:15.5px;line-height:1.25}
  .card .en{font-size:12px;color:var(--muted);font-weight:600}
  .card-bot{display:flex;align-items:center;gap:8px;padding-left:5px;flex-wrap:wrap}
  .tag{font-size:11px;font-weight:800;padding:3px 9px;border-radius:999px}
  .tag.fix{background:#fff0e6;color:#d2691e} .tag.level{background:#e7f3ff;color:#0d86df}
  .tag.trip{background:#f0e9ff;color:#7c3aed} .tag.core{background:#eef1ff;color:#4f5bd5}
  .tag.new{background:#ecfeff;color:#0891b2}
  .best{margin-left:auto;font-size:12.5px;font-weight:800;color:var(--muted)} .best.done{color:var(--ok)}

  .actions{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:26px}
  .abtn{border:none;border-radius:var(--r2);padding:15px;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer;color:#fff;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:var(--shadow2)}
  .abtn:active{transform:scale(.97)}
  .abtn.report{background:linear-gradient(135deg,#5b67e8,#7c3aed)} .abtn.export{background:linear-gradient(135deg,#0d86df,#23a7ff)}
  .reset{grid-column:1/-1;background:rgba(255,255,255,.08);color:#c7cdf0;border:1px solid rgba(255,255,255,.14);border-radius:var(--r2);padding:12px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer}
  .foot-note{text-align:center;color:#7782b8;font-size:12px;margin-top:20px}

  .stage{background:var(--paper);border-radius:var(--r);padding:20px;box-shadow:var(--shadow);min-height:62vh;display:flex;flex-direction:column}
  .st-head{display:flex;align-items:center;gap:11px;margin-bottom:14px}
  .st-back{background:var(--paper2);border:1px solid var(--line);border-radius:11px;width:42px;height:42px;font-size:20px;cursor:pointer;flex:none}
  .st-title{font-weight:800;font-size:16px;line-height:1.2}
  .st-title .en{font-size:12px;color:var(--muted);font-weight:600;display:block}
  .phase-pill{margin-left:auto;font-size:12px;font-weight:800;padding:5px 12px;border-radius:999px}
  .phase-pill.learn{background:#eef1ff;color:#4f5bd5} .phase-pill.box{background:#fff0e6;color:#d2691e}

  .concept{background:linear-gradient(135deg,var(--paper2),#eaf0ff);border:1px solid #d4ddf6;border-radius:var(--r2);padding:18px;margin-bottom:14px}
  .concept .ch{display:flex;align-items:center;gap:9px;font-weight:800;font-size:17px;color:#2a3360;margin-bottom:9px}
  .concept .cb{font-size:18.5px;line-height:1.85;color:#2a3360;white-space:pre-line}
  .spk{flex:none;border:none;background:#fff;border:1px solid var(--line);border-radius:10px;width:40px;height:40px;font-size:19px;cursor:pointer;color:var(--math-d);box-shadow:var(--shadow2)}
  .spk:active{transform:scale(.92)} .spk.sm{width:34px;height:34px;font-size:16px;border-radius:9px}

  .example{background:#fffdf5;border:1px dashed #f0d28a;border-radius:var(--r2);padding:18px;margin-bottom:14px}
  .example .eh{font-weight:800;font-size:17px;color:#9a6b00;margin-bottom:6px;display:flex;align-items:center;gap:8px}
  .example .prob{font-size:18px;font-weight:700;color:#2a3360;background:#fff;border:1px solid #f0e6c8;border-radius:12px;padding:12px 14px;margin-bottom:12px}
  .steps{display:flex;flex-direction:column;gap:10px}
  .step{background:#fff;border:1px solid #f0e6c8;border-radius:12px;padding:13px 15px;font-size:17px;line-height:1.7;color:#2a3360;display:flex;gap:11px;align-items:flex-start;animation:slidein .35s ease}
  @keyframes slidein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .step .sn{flex:none;width:28px;height:28px;border-radius:8px;background:var(--xp);color:#fff;font-weight:800;display:grid;place-items:center;font-size:14px}
  .reveal-btn{margin-top:12px;width:100%;border:none;border-radius:12px;padding:13px;font-family:inherit;font-size:16px;font-weight:800;color:#9a6b00;background:#fdeec2;cursor:pointer}
  .reveal-btn:active{transform:scale(.98)}

  /* 多媒体交互组件 */
  .media-wrap{background:linear-gradient(135deg,#f4f7ff,#eef2ff);border:1px solid #d4ddf6;border-radius:var(--r2);padding:16px;margin-bottom:14px}
  .media-h{font-weight:800;font-size:16.5px;color:#2a3360;margin-bottom:4px;display:flex;align-items:center;gap:8px}
  .media-cap{font-size:14px;color:var(--muted);text-align:center;margin-top:9px;line-height:1.5}
  .open-ta{width:100%;min-height:130px;border:2px solid var(--line);border-radius:14px;padding:13px;font-family:inherit;font-size:17px;line-height:1.6;color:var(--ink);background:#fbfcff;resize:vertical;margin:6px 0}
  .open-ta:focus{outline:none;border-color:var(--math)}
  .chain-row{display:flex;align-items:center;justify-content:center;gap:4px;flex-wrap:wrap;margin:6px 0}
  .chain-card{background:#fff;border:2px solid var(--line);border-radius:12px;padding:8px 6px;text-align:center;min-width:62px;transition:all .15s}
  .chain-card.on{border-color:var(--sci);background:#faf5ff;transform:translateY(-3px);box-shadow:0 6px 14px rgba(168,85,247,.25)}
  .chain-card .ce{font-size:28px} .chain-card .cn{font-size:11.5px;font-weight:800;color:#2a3360;margin-top:2px}
  .chain-arrow{font-size:14px;opacity:.65}
  .mreadout{text-align:center;font-weight:800;font-size:19px;color:#2a3360;margin-top:10px}
  .mctrl{display:flex;gap:10px;justify-content:center;align-items:center;margin-top:11px;flex-wrap:wrap}
  .mbtn{border:1px solid var(--line);background:#fff;border-radius:11px;padding:9px 15px;font-family:inherit;font-size:14.5px;font-weight:700;cursor:pointer;color:#2a3360}
  .mbtn.on{background:var(--math);color:#fff;border-color:var(--math)}
  .mbtn:active{transform:scale(.96)}
  input[type=range]{width:200px;accent-color:var(--math)}
  .fbar{display:flex;gap:4px;height:66px;margin:12px 0}
  .fseg{flex:1;border:2px solid #c9d4f0;border-radius:9px;background:#fff;cursor:pointer;transition:background .1s}
  .fseg.on{background:var(--math);border-color:var(--math)}
  .dgrid{display:grid;grid-template-columns:repeat(10,1fr);gap:2px;max-width:230px;margin:10px auto}
  .dcell{aspect-ratio:1;border:1px solid #d4ddf6;background:#fff;cursor:pointer;border-radius:2px}
  .dcell.on{background:var(--math);border-color:var(--math)}
  .fpics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:6px}
  @media(max-width:420px){.fpics{grid-template-columns:repeat(2,1fr)}}
  .fpic{background:#fff;border:2px solid var(--line);border-radius:14px;padding:12px 8px;text-align:center;cursor:pointer}
  .fpic:active{transform:scale(.97)} .fpic.on{border-color:var(--fr);background:#effdfa}
  .fpic .e{font-size:36px} .fpic .w{font-weight:800;color:var(--fr);margin-top:4px;font-size:15px} .fpic .m{font-size:12px;color:var(--muted)}
  .msvg{display:block;margin:4px auto;max-width:100%}
  .gear{transform-box:fill-box;transform-origin:center}
  .gear.spin1{animation:gspin 3.2s linear infinite} .gear.spin2{animation:gspinr 3.2s linear infinite}
  @keyframes gspin{to{transform:rotate(360deg)}} @keyframes gspinr{to{transform:rotate(-360deg)}}

  .checkblock{background:#fff;border:2px solid var(--line);border-radius:var(--r2);padding:16px;margin-bottom:13px}
  .checkblock .cl{font-size:13px;font-weight:800;color:var(--xp-d);margin-bottom:8px;display:flex;align-items:center;gap:7px}

  .qwrap{flex:1;display:flex;flex-direction:column}
  .tierbadge{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:800;padding:4px 11px;border-radius:999px;margin-bottom:8px;width:fit-content}
  .tierbadge.t1{background:#e7f9ee;color:var(--t1)} .tierbadge.t2{background:#e7f3ff;color:var(--t2)} .tierbadge.t3{background:#f6edff;color:var(--t3)}
  .qrow{display:flex;align-items:flex-start;gap:10px;margin:6px 0 4px}
  .q-prompt{font-size:23px;font-weight:800;line-height:1.45;color:var(--ink);flex:1}
  .q-prompt.big{font-size:50px;text-align:center;margin:8px 0;font-family:var(--cjk)}
  .passage{background:var(--paper2);border:1px solid var(--line);border-radius:var(--r2);padding:16px;font-size:17px;line-height:1.8;margin-bottom:14px;color:#2a3360;position:relative}
  .passage .pspk{position:absolute;right:12px;top:12px}
  .audio-row{display:flex;flex-direction:column;align-items:center;gap:9px;margin:8px 0 14px}
  .play{background:linear-gradient(135deg,#23a7ff,#5b67e8);color:#fff;border:none;border-radius:999px;padding:16px 30px;font-size:19px;font-weight:800;cursor:pointer;font-family:inherit;box-shadow:0 8px 20px rgba(35,167,255,.4);display:flex;align-items:center;gap:10px}
  .play:active{transform:scale(.96)}
  .pinyin{font-size:14px;color:var(--muted);font-weight:700;letter-spacing:.5px}
  .opts{display:flex;flex-direction:column;gap:11px;margin-top:10px}
  .opt{background:var(--paper);border:2px solid var(--line);border-radius:var(--r2);padding:16px 17px;font-size:19px;font-weight:700;cursor:pointer;text-align:left;font-family:inherit;color:var(--ink);transition:border-color .12s,background .12s,transform .08s;display:flex;align-items:center;gap:12px}
  .opt:active{transform:scale(.99)}
  .opt .k{width:28px;height:28px;border-radius:9px;background:var(--paper2);display:grid;place-items:center;font-size:14px;font-weight:800;color:var(--muted);flex:none;border:1px solid var(--line)}
  .opt .otext{flex:1}
  .opt .ospk{flex:none;width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:#fff;font-size:15px;color:var(--math-d);cursor:pointer;display:grid;place-items:center}
  .opt.ok{border-color:var(--ok);background:var(--okbg)} .opt.ok .k{background:var(--ok);color:#fff;border-color:var(--ok)}
  .opt.no{border-color:var(--no);background:var(--nobg)} .opt.no .k{background:var(--no);color:#fff;border-color:var(--no)}
  .opt.dim{opacity:.55} .opt[disabled]{cursor:default}
  .explain{margin-top:14px;background:var(--paper2);border-left:5px solid var(--math);border-radius:11px;padding:13px 15px;font-size:16px;line-height:1.65;color:#2a3360}
  .explain.ok{border-left-color:var(--ok)} .explain.no{border-left-color:var(--no)} .explain b{color:var(--ink)}
  .dots{display:flex;gap:5px;flex-wrap:wrap;max-width:150px;justify-content:flex-end}
  .pd{width:9px;height:9px;border-radius:999px;background:var(--line)}
  .pd.on{background:var(--xp)} .pd.ok{background:var(--ok)} .pd.no{background:var(--no)}
  .st-foot{margin-top:16px}
  .bigbtn{width:100%;border:none;border-radius:var(--r2);padding:16px;font-family:inherit;font-size:16.5px;font-weight:800;color:#fff;cursor:pointer}
  .bigbtn:active{transform:scale(.98)}
  .bigbtn.next{background:linear-gradient(135deg,var(--xp),var(--xp-d));box-shadow:0 8px 20px rgba(245,158,11,.35)}
  .bigbtn.go{background:linear-gradient(135deg,var(--ok),var(--en-d,#16a34a));box-shadow:0 8px 20px rgba(22,163,74,.35)}
  .bigbtn.train{background:linear-gradient(135deg,#ff7a59,#ff5d5d);box-shadow:0 8px 20px rgba(255,93,93,.35)}
  .bigbtn.retry{background:linear-gradient(135deg,#8b93f0,#5b67e8);box-shadow:0 8px 20px rgba(91,103,232,.3)}
  .foot2{display:flex;gap:10px} .foot2 .bigbtn{flex:1}

  .trace-wrap{background:var(--paper2);border:1px solid var(--line);border-radius:var(--r2);padding:16px;margin-bottom:14px;text-align:center}
  .trace-h{font-weight:800;font-size:16px;color:#2a3360;margin-bottom:10px;display:flex;align-items:center;gap:8px;justify-content:center}
  .trace-chips{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:12px}
  .tchip{width:48px;height:48px;border-radius:11px;border:2px solid var(--line);background:#fff;font-size:25px;font-weight:700;cursor:pointer;color:var(--ink);font-family:var(--cjk)}
  .tchip.on{border-color:var(--cn);background:#fff0f0;color:var(--cn-d)}
  #traceCanvas{border-radius:14px;background:#fff;border:2px solid var(--line);touch-action:none;display:block;margin:0 auto;max-width:88%}
  .trace-tools{display:flex;gap:10px;justify-content:center;margin-top:11px}
  .ttbtn{border:1px solid var(--line);background:#fff;border-radius:10px;padding:9px 16px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;color:#2a3360}
  .ttbtn.hear{color:var(--math-d)}

  .result{background:var(--paper);border-radius:var(--r);padding:28px 20px;box-shadow:var(--shadow);text-align:center}
  .result .emoji{font-size:72px;animation:pop .5s cubic-bezier(.2,1.4,.4,1)}
  @keyframes pop{0%{transform:scale(0)}100%{transform:scale(1)}}
  .result h2{margin:10px 0 4px;font-size:25px}
  .result .score{font-size:52px;font-weight:900;color:var(--math);margin:6px 0}
  .tierline{display:flex;gap:8px;justify-content:center;margin:6px 0 12px;flex-wrap:wrap}
  .tierscore{font-size:13px;font-weight:800;padding:5px 12px;border-radius:999px}
  .ts1{background:#e7f9ee;color:var(--t1)} .ts2{background:#e7f3ff;color:var(--t2)} .ts3{background:#f6edff;color:var(--t3)}
  .result .xpgain{display:inline-flex;align-items:center;gap:8px;background:var(--paper2);border:1px solid var(--line);border-radius:999px;padding:10px 20px;font-weight:800;font-size:17px;color:var(--xp-d);margin:6px 0 18px}
  .result .home-btn{width:100%;border:none;border-radius:var(--r2);padding:16px;font-family:inherit;font-size:16.5px;font-weight:800;color:#fff;cursor:pointer;background:linear-gradient(135deg,#5b67e8,#7c3aed)}
  .redo-btn{background:linear-gradient(135deg,#ff7a59,#ff5d5d)!important;margin-bottom:11px}

  .panel{background:var(--paper);border-radius:var(--r);padding:22px;box-shadow:var(--shadow)}
  .panel-h{display:flex;align-items:center;gap:11px;margin-bottom:6px}
  .panel-h h2{margin:0;font-size:19px;font-weight:800}
  .rep-ver{display:inline-block;font-size:13px;font-weight:800;color:#fff;background:linear-gradient(135deg,#5b67e8,#7c3aed);padding:5px 12px;border-radius:999px;margin:2px 0 14px}
  .rep-meta{font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.6}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;margin-bottom:18px}
  .stat{background:var(--paper2);border:1px solid var(--line);border-radius:var(--r2);padding:14px;text-align:center}
  .stat .n{font-size:25px;font-weight:900} .stat .l{font-size:12px;color:var(--muted);font-weight:700;margin-top:2px}
  .rep-sec{margin-top:18px}
  .rep-sec h3{font-size:15px;margin:0 0 9px;font-weight:800;display:flex;align-items:center;gap:7px}

{id:"ZH23", subj:"cn", icon:"🔔", title:"阅读理解·掩耳盗铃", en:"Reading: Fable", tag:"core",
 lesson:{ cards:[
   {t:"读故事的三步", b:"① 谁？做了什么？\n② 他心里是怎么想的？（找「心想」）\n③ 结果怎样？说明了什么道理？"},
   {t:"什么叫「自欺欺人」", b:"明明骗不了别人，只能骗自己，还以为别人也被骗了。\n读完故事想一想：捂住耳朵，钟声就消失了吗？"}],
  example:{t:"抓住人物想法", prob:"故事里的人捂住耳朵时，心里是怎么想的？", steps:[
   "回到原文找「心想」：「我听不见，别人一定也听不见。」",
   "这就是他的想法——也是全文最可笑、最关键的一句。"]},
  check:[{q:"这个人想偷的是——", o:["一口大钟","一袋米","一匹马","一幅画"], a:0, e:"开头写「看见……一口漂亮的大钟」。"}] },
 training:[
  {q:"他为什么要把钟敲碎？", o:["钟又大又重，背不动","钟是坏的","他讨厌这口钟","想听钟声"], a:0, tier:1, e:"原文：「钟又大又重，怎么也背不动。」", passage:P_YANER},
  {q:"他刚敲了一下，发生了什么？", o:["钟「当」的一声响了","钟碎成了两半","邻居开门了","下起了大雨"], a:0, tier:1, e:"钟马上响了起来，把他吓了一跳。", passage:P_YANER},
  {q:"他捂住耳朵时心里想——", o:["我听不见，别人一定也听不见","钟声真好听","我力气真大","别人不会来的"], a:0, tier:2, e:"原文「心想」后面的那句话。", passage:P_YANER},
  {q:"他的这个想法错在哪里？", o:["捂住自己的耳朵，挡不住钟声传出去","钟其实不会响","别人都睡着了","耳朵捂不严"], a:0, tier:3, e:"他只骗过了自己——钟声照样传遍整条街。", passage:P_YANER},
  {q:"故事的结局是——", o:["人们跑来，当场抓住了他","他把钟搬回了家","钟不响了","他把耳朵捂得更紧"], a:0, tier:1, e:"结尾：「人们跑了过来，当场抓住了他。」", passage:P_YANER},
  {q:"「当场」的意思是——", o:["就在那个地方、那个时候","第二天","在广场上","当着钟的面"], a:0, tier:2, e:"当场＝就在现场、立刻。", passage:P_YANER},
  {q:"下面哪件事最先发生？", o:["他发现背不动钟","他捂住耳朵","钟响了起来","人们抓住了他"], a:0, tier:2, e:"顺序：背不动→敲钟→钟响→捂耳→被抓。", passage:P_YANER},
  {q:"他为什么能「放心地」砸钟？", o:["他以为捂住耳朵别人就听不见了","钟真的不响了","邻居出远门了","他跑得很快"], a:0, tier:3, e:"这是推断题：「放心」来自他那个自欺欺人的想法。", passage:P_YANER},
  {q:"「掩耳盗铃」这个成语比喻——", o:["自己骗自己","偷东西很难","铃铛声音大","做事要小心"], a:0, tier:3, e:"掩＝捂住；明明瞒不住，偏要自己骗自己。", passage:P_YANER},
  {q:"如果给这个故事换个题目，最合适的是——", o:["《骗得了自己，骗不了别人》","《一口漂亮的大钟》","《聪明的邻居》","《搬家的办法》"], a:0, tier:3, e:"题目要点出道理，而不是只说事物。", passage:P_YANER},
  {q:"下面哪些说法与故事相符？（多选）", t:"multi", o:["他嫌钟太重才想敲碎","钟声传遍了整条街","捂住耳朵后别人真的听不见了","他最后被人们抓住了"], a:[0,1,3], tier:3, e:"第三项正是他错误的想法。", passage:P_YANER},
  {q:"这个故事告诉我们——（多选）", t:"multi", o:["骗自己解决不了问题","事实不会因为你不看不听就消失","偷东西只要够快就行","做错事早晚会被发现"], a:[0,1,3], tier:3, e:"第三项与故事道理相反。", passage:P_YANER},
  {q:"文中「当——」的破折号，作用是——", o:["表示钟声拖得很长","表示说话被打断","表示解释说明","表示列举"], a:0, tier:3, e:"破折号在拟声词后，表示声音延长。", passage:P_YANER}
 ]},

{id:"ZH24", subj:"cn", icon:"🖌️", title:"病句·近义词 II + 识字 Day 24", en:"Sentence Clinic II", tag:"level",
 traceDay:24, trace:["椅","灯","纸","笔","画","字"],
 lesson:{ cards:[
   {t:"病句三种老毛病", b:"重复啰嗦：他大约估计有五十人。（「大约」和「估计」留一个）\n搭配不当：他的写字水平很美丽。（水平→高；字→漂亮）\n前后矛盾：我肯定他大概会来。（「肯定」和「大概」打架）"},
   {t:"多音字两组", b:"乐：快乐 lè ／ 音乐 yuè\n行：行走 xíng ／ 银行 háng\n先想词的意思，再定读音。"}],
  example:{t:"找出病因", prob:"「教室里安静得一点儿声音都没有，只听见翻书的沙沙声。」病在哪？", steps:[
   "前半句说「一点儿声音都没有」，后半句又说「听见沙沙声」。",
   "前后矛盾——把「一点儿声音都没有」改成「非常安静」就通了。"]},
  check:[{q:"「他快乐地听着音乐。」两个「乐」的读音是——", o:["lè、yuè","yuè、lè","都读 lè","都读 yuè"], a:0, e:"快乐 lè；音乐 yuè。"}] },
 training:[
  {q:"下面哪句是病句？", o:["我肯定他大概会来参加比赛。","窗外下着小雨。","他把教室打扫得干干净净。","我们一起去图书馆看书。"], a:0, tier:3, e:"「肯定」和「大概」前后矛盾，删掉一个。"},
  {q:"选出所有的病句。（多选）", t:"multi", o:["他大约估计有五十人。","这道题的难度水平很高又很难。","轮船慢慢驶出了港口。","我的家乡是广东人。"], a:[0,1,3], tier:3, e:"①重复啰嗦②「难度水平…又很难」啰嗦③正确④「家乡」不能「是…人」，搭配不当。"},
  {q:"「银行门口的自行车排成了一行。」两个「行」读——", o:["háng、xíng… 不对，是 háng、háng","háng、xíng","xíng、háng","都读 xíng"], a:1, tier:3, e:"银行 háng；自行车 xíng。注意最后「一行」也读 háng，但题目问的是前两个。"},
  {q:"下面哪些句子的标点使用正确？（多选）", t:"multi", o:["今天星期几？","轮船、帆船和渔船都停在港口。","他说：「我们出发吧。」","你去过大海吗。"], a:[0,1,2], tier:3, e:"问句要用问号，第四句错。"},
  {q:"「我用铅________写字。」点选一个字。", t:"fill", kind:"zi", a:"笔", tiles:"笔比必币毕鼻", tier:2, e:"写字的工具是「笔」。", hint:"点字块作答"},
  {q:"「他在________上画了一只猫。」点选一个字。", t:"fill", kind:"zi", a:"纸", tiles:"纸低底指织只", tier:2, e:"画画用「纸」。"},
  {q:"「天黑了，把________打开吧。」点选一个字。", t:"fill", kind:"zi", a:"灯", tiles:"灯等登打订丁", tier:2, e:"照明用「灯」。注意别选「等」——它是等待的等。"},
  {q:"「请坐在自己的________子上。」点选一个字。", t:"fill", kind:"zi", a:"椅", tiles:"椅奇骑倚寄其", tier:2, e:"坐的是「椅子」。"},
  {q:"「弟弟画了一幅________，画的是大海。」点选一个字。", t:"fill", kind:"zi", a:"画", tiles:"画图书写话田", tier:2, e:"一幅画的「画」。"},
  {q:"「这个________怎么念？」点选一个字。", t:"fill", kind:"zi", a:"字", tiles:"字子学写安定", tier:2, e:"汉字的「字」。"},
  {q:"「我________得这个办法很好。」点选一个字。", t:"fill", kind:"zi", a:"觉", tiles:"觉学见常赏堂", tier:3, e:"「觉得」＝心里认为。上次的易错字！"},
  {q:"「天上的云很________一条大鱼。」点选一个字（表示相似）。", t:"fill", kind:"zi", a:"像", tiles:"像象相想向橡", tier:3, e:"表示「相似」用单人旁的「像」；大象才用「象」。"},
  {q:"「大________的鼻子像水管一样长。」点选一个字。", t:"fill", kind:"zi", a:"象", tiles:"象像相香乡想", tier:3, e:"动物「大象」用没有单人旁的「象」。和上一题对比记忆！"}

{id:"MA21", subj:"math", icon:"🧩", title:"Fractions IV", en:"分数再巩固", tag:"core",
 lesson:{ media:[{type:"fractionbar", title:"Fraction bars", cap:"Same-size wholes make fractions easy to compare."}],
  cards:[
   {t:"Unlike denominators", b:"Find a common denominator FIRST.\n1/3 + 1/6 → 2/6 + 1/6 = 3/6 = 1/2.\n3/4 − 1/8 → 6/8 − 1/8 = 5/8."},
   {t:"Fraction OF a number", b:"'2/3 of 18' → 18 ÷ 3 × 2 = 12.\nDivide by the bottom, multiply by the top.\nFraction × whole: 2/7 × 3 = 6/7."}],
  example:{t:"Fraction of a quantity", prob:"What is 3/5 of 25?", steps:[
   "Step 1 — Divide by the bottom: 25 ÷ 5 = 5.",
   "Step 2 — Multiply by the top: 5 × 3 = 15.",
   "So 3/5 of 25 = 15."]},
  check:[{q:"1/3 + 1/6 = ?", o:["1/2","2/9","1/9","2/6 exactly"], a:0, e:"2/6 + 1/6 = 3/6 = 1/2."}] },
 training:[
  {q:"1/4 + 1/2 = ? (simplest form)", t:"fill", kind:"num", a:["3/4"], tier:3, e:"1/4 + 2/4 = 3/4.", hint:"type like a/b"},
  {q:"3/4 − 1/8 = ? (simplest form)", t:"fill", kind:"num", a:["5/8"], tier:3, e:"6/8 − 1/8 = 5/8.", hint:"common denominator 8"},
  {q:"2/5 + 1/2 = ? (simplest form)", t:"fill", kind:"num", a:["9/10"], tier:3, e:"4/10 + 5/10 = 9/10."},
  {q:"What is 2/3 of 18?", t:"fill", kind:"num", a:["12"], tier:3, e:"18 ÷ 3 × 2 = 12."},
  {q:"What is 3/5 of 35?", t:"fill", kind:"num", a:["21"], tier:3, e:"35 ÷ 5 × 3 = 21."},
  {q:"What is 5/6 of 12?", t:"fill", kind:"num", a:["10"], tier:3, e:"12 ÷ 6 × 5 = 10."},
  {q:"2/7 × 3 = ? (fraction)", t:"fill", kind:"num", a:["6/7"], tier:3, e:"Multiply the top: 2×3 = 6. Bottom stays 7.", hint:"like a/b"},
  {q:"Which is larger: 7/10 or 3/4?", o:["3/4","7/10","they are equal","cannot tell"], a:0, tier:3, e:"3/4 = 15/20, 7/10 = 14/20."},
  {q:"Write 11/4 as a mixed number.", o:["2 3/4","2 1/4","3 1/4","1 3/4"], a:0, tier:2, e:"11 ÷ 4 = 2 remainder 3."},
  {q:"1 2/3 + 1/3 = ?", o:["2","1 3/6","2 1/3","1 1/3"], a:0, tier:3, e:"2/3 + 1/3 makes one more whole."},
  {q:"A pizza is cut into 8 slices. Ben eats 3/8 and Mia eats 2/8. What fraction is EATEN?", o:["5/8","1/8","6/8","5/16"], a:0, tier:2, e:"3/8 + 2/8 = 5/8. Same denominator — just add tops."},
  {q:"Which fractions are EQUAL to 2/3? (select all)", t:"multi", o:["4/6","6/9","8/12","3/5"], a:[0,1,2], tier:3, e:"Multiply top and bottom by the same number."},
  {q:"Which fractions are LESS than 1/2? (select all)", t:"multi", o:["2/5","3/8","5/8","4/10"], a:[0,1,3], tier:3, e:"Compare with 0.5: 0.4, 0.375, 0.625, 0.4."}
 ]},

{id:"MA22", subj:"math", icon:"🪙", title:"Decimals & Percent III", en:"小数·百分数再巩固", tag:"core",
 lesson:{ media:[{type:"decimalgrid", title:"Hundred grid", cap:"One small square = 0.01 = 1%."}],
  cards:[
   {t:"Line up the decimal point", b:"6.2 − 3.45 → write 6.20 − 3.45.\nBorrow just like whole numbers: 6.20 − 3.45 = 2.75.\nAdding: 3.08 + 2.9 = 3.08 + 2.90 = 5.98."},
   {t:"Percent of a number", b:"30% of 90 → 90 × 30 ÷ 100 = 27.\nDiscount: SAVE = the % part. SALE price = price − save.\n$60 at 20% off → save $12, pay $48."}],
  example:{t:"Save vs Sale price", prob:"A $60 book is 20% off. How much do you SAVE, and what do you PAY?", steps:[
   "Save = 60 × 20 ÷ 100 = 12 dollars.",
   "Sale price = 60 − 12 = 48 dollars.",
   "Two different questions — read carefully which one is asked!"]},
  check:[{q:"5.0 − 1.25 = ?", o:["3.75","4.25","3.25","4.75"], a:0, e:"5.00 − 1.25 = 3.75."}] },
 training:[
  {q:"6.2 − 3.45 = ?", t:"fill", kind:"num", a:["2.75"], tier:3, e:"6.20 − 3.45 = 2.75. Borrow across the decimal point.", hint:"line up the points"},
  {q:"3.08 + 2.9 = ?", t:"fill", kind:"num", a:["5.98"], tier:3, e:"3.08 + 2.90 = 5.98."},
  {q:"0.6 × 0.3 = ?", t:"fill", kind:"num", a:["0.18"], tier:3, e:"6×3=18, two decimal places → 0.18."},
  {q:"7.2 ÷ 9 = ?", t:"fill", kind:"num", a:["0.8"], tier:3, e:"72 ÷ 9 = 8, so 7.2 ÷ 9 = 0.8."},
  {q:"4.35 × 10 = ?", t:"fill", kind:"num", a:["43.5"], tier:2, e:"×10 moves the point one place right."},
  {q:"Round 6.278 to the nearest hundredth.", t:"fill", kind:"num", a:["6.28"], tier:3, e:"Look at the thousandths digit (8) → round up.", hint:"two decimal places"},
  {q:"Write 2/5 as a percent. (number only)", t:"fill", kind:"num", a:["40"], tier:3, e:"2/5 = 0.4 = 40%."},
  {q:"What is 30% of 90?", t:"fill", kind:"num", a:["27"], tier:3, e:"90 × 30 ÷ 100 = 27."},
  {q:"A $60 book is 20% off. How much do you SAVE?", o:["$12","$48","$20","$40"], a:0, tier:3, e:"Save = 20% of 60 = 12."},
  {q:"The same $60 book, 20% off. What is the SALE price?", o:["$48","$12","$40","$58"], a:0, tier:3, e:"60 − 12 = 48. Compare with the last question!"},
  {q:"Which number is the LARGEST?", o:["0.9","0.72","0.185","0.58"], a:0, tier:2, e:"Compare tenths first: 9 beats 7, 5, 1."},
  {q:"Which values EQUAL 0.25? (select all)", t:"multi", o:["1/4","25%","2/8","0.205"], a:[0,1,2], tier:3, e:"1/4 = 2/8 = 25% = 0.25; 0.205 is different."},
  {q:"0.07 × 100 = ?", o:["7","0.7","70","0.007"], a:0, tier:2, e:"×100 moves the point two places right."}
 ]},

{id:"MA23", subj:"math", icon:"📏", title:"Geometry & Measurement III", en:"周长·面积·体积分清楚", tag:"core",
 lesson:{ media:[{type:"angleline", title:"Angles", cap:"Complementary = 90° together. Supplementary = 180° together."}],
  cards:[
   {t:"Three different questions!", b:"PERIMETER = distance AROUND = add all sides.\nAREA = space INSIDE = length × width.\nVOLUME = space it HOLDS = length × width × height.\nRectangle 9 by 4 → P = 26, A = 36. Not the same!"},
   {t:"Triangles & angles", b:"Triangle area = base × height ÷ 2.\nAngles inside a triangle add to 180°.\nComplementary pair → 90°. Supplementary pair → 180°."}],
  example:{t:"Perimeter vs Area", prob:"A rectangle is 9 by 4. Find its PERIMETER and its AREA.", steps:[
   "Perimeter = around the edge: (9 + 4) × 2 = 26.",
   "Area = inside: 9 × 4 = 36.",
   "Different formulas, different meanings — check which word the question uses."]},
  check:[{q:"A triangle has base 8 and height 5. Its AREA is —", o:["20","40","13","80"], a:0, e:"8 × 5 ÷ 2 = 20."}] },
 training:[
  {q:"A rectangle is 9 by 4. What is its AREA?", t:"fill", kind:"num", a:["36"], tier:2, e:"9 × 4 = 36."},
  {q:"The SAME rectangle, 9 by 4. What is its PERIMETER?", t:"fill", kind:"num", a:["26"], tier:3, e:"(9+4) × 2 = 26. Around, not inside!", hint:"add all four sides"},
  {q:"A square has side 7. What is its PERIMETER?", t:"fill", kind:"num", a:["28"], tier:2, e:"7 × 4 = 28."},
  {q:"A square has AREA 64. What is its side length?", t:"fill", kind:"num", a:["8"], tier:3, e:"8 × 8 = 64."},
  {q:"A triangle has base 10 and height 6. What is its AREA?", t:"fill", kind:"num", a:["30"], tier:3, e:"10 × 6 ÷ 2 = 30. Don't forget ÷ 2."},
  {q:"A cube has side 5. What is its VOLUME?", t:"fill", kind:"num", a:["125"], tier:3, e:"5 × 5 × 5 = 125."},
  {q:"A box is 2 by 5 by 6. What is its VOLUME?", t:"fill", kind:"num", a:["60"], tier:3, e:"2 × 5 × 6 = 60."},
  {q:"Two angles of a triangle are 45° and 65°. The third angle is — (number only)", t:"fill", kind:"num", a:["70"], tier:3, e:"180 − 45 − 65 = 70."},
  {q:"What angle is COMPLEMENTARY to 35°? (number only)", t:"fill", kind:"num", a:["55"], tier:3, e:"90 − 35 = 55."},
  {q:"What angle is SUPPLEMENTARY to 120°?", o:["60°","240°","30°","80°"], a:0, tier:3, e:"180 − 120 = 60. Supplementary = 180° together."},
  {q:"The point (3, 6) on a grid means —", o:["right 3, up 6","up 3, right 6","right 3, right 6","left 3, up 6"], a:0, tier:2, e:"Across first, then up: (x, y)."},
  {q:"Which jobs need AREA? (select all)", t:"multi", o:["covering a floor with tiles","building a fence around a yard","painting a wall","filling a pool with water"], a:[0,2], tier:3, e:"Fence = perimeter. Filling a pool = volume. Tiles and paint cover a SURFACE = area."},
  {q:"Which units measure VOLUME? (select all)", t:"multi", o:["cm³","m³","cm²","km"], a:[0,1], tier:3, e:"Cubed units (³) are volume; cm² is area; km is length."}
 ]},

{id:"MA24", subj:"math", icon:"🎯", title:"Order of Ops II · Equations II", en:"运算顺序·方程·应用题 II", tag:"core",
 lesson:{ cards:[
   {t:"BEDMAS order", b:"Brackets → Exponents → ×÷ → +−.\n3² means 3 × 3 = 9 (not 3 × 2!).\n5 + 3 × 4 = 5 + 12 = 17. Multiply FIRST."},
   {t:"Solve for x, step by step", b:"2x + 3 = 11 → take away 3: 2x = 8 → divide by 2: x = 4.\nWord problems: read → write the number sentence → solve → CHECK 'what is asked'."}],
  example:{t:"Two-step word problem", prob:"5 boxes hold 6 books each. 7 books get damaged. How many good books are left?", steps:[
   "Step 1 — Total: 5 × 6 = 30 books.",
   "Step 2 — Take away damaged: 30 − 7 = 23.",
   "Answer the question asked: 23 good books."]},
  check:[{q:"4 + 2 × 5 = ?", o:["14","30","11","40"], a:0, e:"Multiply first: 4 + 10 = 14."}] },
 training:[
  {q:"2³ = ?", t:"fill", kind:"num", a:["8"], tier:3, e:"2 × 2 × 2 = 8. The small 3 means multiply three times.", hint:"not 2 × 3"},
  {q:"4² − 6 = ?", t:"fill", kind:"num", a:["10"], tier:3, e:"16 − 6 = 10."},
  {q:"5 + 3 × 4 = ?", t:"fill", kind:"num", a:["17"], tier:2, e:"Multiply first: 5 + 12 = 17."},
  {q:"20 − 12 ÷ 4 = ?", t:"fill", kind:"num", a:["17"], tier:3, e:"Divide first: 20 − 3 = 17."},
  {q:"(6 + 2) × 3 = ?", t:"fill", kind:"num", a:["24"], tier:2, e:"Brackets first: 8 × 3 = 24."},
  {q:"Solve: 2x + 3 = 11. x = ?", t:"fill", kind:"num", a:["4"], tier:3, e:"2x = 8, so x = 4.", hint:"undo +3 first"},
  {q:"Solve: x − 9 = 16. x = ?", t:"fill", kind:"num", a:["25"], tier:2, e:"x = 16 + 9 = 25."},
  {q:"Solve: 4x = 36. x = ?", t:"fill", kind:"num", a:["9"], tier:3, e:"36 ÷ 4 = 9."},
  {q:"5 boxes hold 6 books each. 7 books get damaged. How many good books are left?", o:["23","30","37","11"], a:0, tier:3, e:"5×6 = 30, then 30 − 7 = 23. Two steps!"},
  {q:"36 candies are shared equally among 4 kids. Then each kid eats 5. How many does EACH kid have left?", o:["4","9","31","16"], a:0, tier:3, e:"36÷4 = 9 each, then 9 − 5 = 4."},
  {q:"Which expression matches: '3 bags of 8 apples, plus 2 more apples'?", o:["3 × 8 + 2","3 + 8 × 2","(3 + 8) × 2","3 × (8 + 2)"], a:0, tier:3, e:"3 bags of 8 = 3×8, then add 2."},
  {q:"Which equations are TRUE? (select all)", t:"multi", o:["2 + 3 × 4 = 14","(2 + 3) × 4 = 20","10 − 4 ÷ 2 = 8","3² = 6"], a:[0,1,2], tier:3, e:"3² = 9, not 6 — exponents mean repeated multiplication."}
 ]},

/* ========================= 科学 Science (English · 两个新主题) ========================= */
{id:"SC11", subj:"sci", icon:"🧊", title:"Matter & Its States", en:"物质与三态变化", tag:"new",
 lesson:{ media:[{type:"statesmatter", title:"Solid · Liquid · Gas", cap:"Particles: packed tight → sliding → flying free."}],
  cards:[
   {t:"Three states", b:"SOLID keeps its own shape (ice, rock).\nLIQUID takes the shape of its container but keeps its volume (water, juice).\nGAS spreads out to fill the whole container (air, steam)."},
   {t:"Changing state (watch the names!)", b:"melting = solid → liquid.  freezing = liquid → solid.\nevaporation = liquid → gas.  condensation = gas → liquid drops.\nHeating usually speeds these changes up."}],
  example:{t:"Name the change", prob:"A cold glass of juice gets wet on the OUTSIDE on a hot day. Why?", steps:[
   "Water vapour in the air touches the cold glass.",
   "The gas cools and turns into liquid drops.",
   "Gas → liquid = CONDENSATION (not evaporation)."]},
  check:[{q:"Ice turning into water is called —", o:["melting","freezing","condensation","evaporation"], a:0, e:"Solid → liquid = melting."}] },
 training:[
  {q:"Which state of matter keeps its OWN shape?", o:["solid","liquid","gas","all of them"], a:0, tier:1, e:"Solids keep their shape; liquids and gases don't."},
  {q:"A liquid poured into a cup will —", o:["take the shape of the cup","keep its old shape","disappear","become a solid"], a:0, tier:1, e:"Liquids take the container's shape but keep their volume."},
  {q:"A gas in a closed box will —", o:["spread out and fill the whole box","sink to the bottom only","keep a ball shape","turn solid"], a:0, tier:2, e:"Gas particles fly freely and fill all the space."},
  {q:"In a SOLID, the particles are —", o:["packed tightly together","far apart and flying","all liquid","invisible only in water"], a:0, tier:2, e:"Tightly packed particles give solids a fixed shape."},
  {q:"Water turning into water vapour is called —", o:["evaporation","condensation","freezing","melting"], a:0, tier:2, e:"Liquid → gas = evaporation. (You saw this in the water cycle!)"},
  {q:"Water vapour turning into liquid drops is called —", o:["condensation","evaporation","melting","boiling"], a:0, tier:2, e:"Gas → liquid = condensation. The opposite of evaporation."},
  {q:"Liquid water turning into ice is called —", o:["freezing","melting","condensation","evaporation"], a:0, tier:1, e:"Liquid → solid = freezing."},
  {q:"At what temperature does water freeze?", o:["0°C","100°C","50°C","−100°C"], a:0, tier:2, e:"Water freezes at 0°C and boils at 100°C."},
  {q:"At what temperature does water boil?", o:["100°C","0°C","37°C","1000°C"], a:0, tier:2, e:"100°C at sea level."},
  {q:"Which change is IRREVERSIBLE (cannot be undone)?", o:["burning a piece of paper","melting an ice cube","freezing juice into a popsicle","water evaporating from a puddle"], a:0, tier:3, e:"Burning makes new materials — you can't un-burn paper. Melting/freezing/evaporating can be reversed."},
  {q:"Heating a wet towel makes the water in it —", o:["evaporate faster","freeze","condense","turn solid"], a:0, tier:2, e:"Heat speeds up evaporation."},
  {q:"Which of these are GASES? (select all)", t:"multi", o:["air","steam","ice","milk"], a:[0,1], tier:3, e:"Ice is solid, milk is liquid."},
  {q:"Which changes are REVERSIBLE? (select all)", t:"multi", o:["melting chocolate","freezing water","burning wood","water evaporating"], a:[0,1,3], tier:3, e:"Burning cannot be undone; the others can go back."},
  {q:"Which of these are SOLIDS at room temperature? (select all)", t:"multi", o:["a rock","a wooden spoon","orange juice","air"], a:[0,1], tier:2, e:"Juice is liquid; air is gas."},
  {q:"Which statements about MATTER are TRUE? (select all)", t:"multi", o:["Melting and freezing are opposites.","Evaporation and condensation are opposites.","A gas keeps its own shape.","Heating usually speeds up melting."], a:[0,1,3], tier:3, e:"Gases never keep their own shape."},
  {q:"Steam from a hot pot touching a cold window turns into water drops. This is —", o:["condensation","evaporation","freezing","melting"], a:0, tier:3, e:"Gas cooled on a cold surface → liquid = condensation."}
 ]},

{id:"SC12", subj:"sci", icon:"⚙️", title:"Forces & Simple Machines", en:"力与简单机械", tag:"new",
 lesson:{ media:[{type:"gears", title:"Machines at work", cap:"Simple machines change the force you need."}],
  cards:[
   {t:"What is a force?", b:"A force is a PUSH or a PULL.\nGravity pulls everything toward Earth.\nFriction is a force that slows sliding things — rough surfaces make MORE friction."},
   {t:"Six simple machines", b:"inclined plane (ramp) · lever (seesaw) · pulley (flag rope)\nwheel & axle (doorknob) · wedge (axe blade) · screw (jar lid)\nThey make work easier by changing the force you need."}],
  example:{t:"Why use a ramp?", prob:"Lifting a heavy box straight up is hard. Pushing it up a ramp feels easier. Why?", steps:[
   "A ramp is an inclined plane.",
   "You push with LESS force, but over a LONGER distance.",
   "Same job, easier push — that is what simple machines do."]},
  check:[{q:"A force is —", o:["a push or a pull","only a pull","only gravity","a kind of energy drink"], a:0, e:"Push or pull — both are forces."}] },
 training:[
  {q:"Gravity pulls objects —", o:["toward the Earth","away from the Earth","only sideways","only in space"], a:0, tier:1, e:"That's why dropped things fall down."},
  {q:"Friction is a force that —", o:["slows down sliding objects","makes things float","pulls things to the Moon","only works on ice"], a:0, tier:2, e:"Friction acts against sliding motion."},
  {q:"Which surface makes MORE friction?", o:["rough sandpaper","smooth ice","wet glass","polished metal"], a:0, tier:2, e:"Rougher surface → more friction."},
  {q:"A ramp is which simple machine?", o:["inclined plane","pulley","lever","screw"], a:0, tier:2, e:"An inclined plane is a slope for raising things."},
  {q:"A seesaw is which simple machine?", o:["lever","wedge","pulley","wheel and axle"], a:0, tier:2, e:"A lever turns on a fixed point."},
  {q:"The fixed point a lever turns on is called the —", o:["fulcrum","axle","ramp","handle"], a:0, tier:3, e:"Fulcrum — like the middle of a seesaw."},
  {q:"The rope-and-wheel that raises a flag up a pole is a —", o:["pulley","wedge","screw","inclined plane"], a:0, tier:2, e:"A pulley changes the direction of your pull."},
  {q:"A doorknob is an example of a —", o:["wheel and axle","pulley","wedge","lever only"], a:0, tier:3, e:"The knob (wheel) turns a rod (axle)."},
  {q:"An axe blade that splits wood is a —", o:["wedge","screw","pulley","fulcrum"], a:0, tier:2, e:"A wedge pushes things apart."},
  {q:"Pushing a box up a ramp instead of lifting it straight up needs —", o:["less force over a longer distance","more force over a shorter distance","no force at all","the same force and distance"], a:0, tier:3, e:"That's the trade of an inclined plane."},
  {q:"Simple machines make work easier by —", o:["changing the force you need","doing the work with no force","removing gravity","making objects lighter forever"], a:0, tier:3, e:"They change how much force, or its direction — the work still happens."},
  {q:"Which of these are simple machines? (select all)", t:"multi", o:["a ramp","scissors","a phone","a wheelbarrow"], a:[0,1,3], tier:3, e:"Scissors = levers + wedges; wheelbarrow = lever + wheel. A phone is a complex device."},
  {q:"When is friction HELPFUL? (select all)", t:"multi", o:["bike brakes stopping the wheel","shoes gripping the floor","a rusty door hinge squeaking","machine parts wearing out"], a:[0,1], tier:3, e:"Brakes and grip need friction; squeaky hinges and worn parts are friction being a problem."},
  {q:"Which are examples of a LEVER? (select all)", t:"multi", o:["a seesaw","a crowbar","a flag rope on a wheel","a jar lid"], a:[0,1], tier:3, e:"Flag rope = pulley; jar lid = screw."},
  {q:"Which statements about FORCES are TRUE? (select all)", t:"multi", o:["Gravity pulls things toward Earth.","Friction can slow a sliding box.","A pulley can change the direction of a pull.","Smooth ice has more friction than sandpaper."], a:[0,1,2], tier:3, e:"Ice is smoother → LESS friction."},
  {q:"Kicking a ball is an example of —", o:["a push","a pull","gravity","friction only"], a:0, tier:1, e:"Your foot pushes the ball away."}
 ]},

/* ========================= 英文 English ========================= */
{id:"EN20", subj:"en", icon:"🍾", title:"Reading: Literary III", en:"文学阅读·瓶中信", tag:"core",
 lesson:{ cards:[
   {t:"Reading a story", b:"Find: WHO (character), WHERE (setting), WHAT problem, HOW it ends.\nAn INFERENCE is something the story shows but does not say directly."},
   {t:"Theme = the message", b:"Ask: what does the character learn?\nWhat does the story want US to remember?\nA theme is a lesson, not just an event."}],
  example:{t:"Making an inference", prob:"'The paper was soft and yellow with age.' What can we infer?", steps:[
   "The text does not say 'the note is old' directly.",
   "But 'yellow with age' shows time has passed.",
   "Inference: the note was written long ago."]},
  check:[{q:"Where does Kai find the bottle?", o:["on the beach near the rocks","in the school","under the pine tree","in a shop"], a:0, e:"He was walking along the beach."}] },
 training:[
  {q:"What was Kai doing at the start of the story?", o:["looking for shells","fishing","swimming","flying a kite"], a:0, tier:1, e:"'Kai walked along the beach looking for shells.'", passage:P_BOTTLE},
  {q:"What was inside the bottle?", o:["a rolled-up note","a tiny ship","sand and water","a map of the sea"], a:0, tier:1, e:"An old bottle with a note inside.", passage:P_BOTTLE},
  {q:"'The paper was soft and yellow with age.' This tells us the note was —", o:["very old","brand new","painted yellow","wet from the sea"], a:0, tier:2, e:"Yellow with AGE = old. This is an inference.", passage:P_BOTTLE},
  {q:"What did Lena's note ask the finder to do?", o:["make sure the birds in the nest are safe","find her lost dog","write back a letter","plant a new pine tree"], a:0, tier:2, e:"'Please make sure the birds are safe.'", passage:P_BOTTLE},
  {q:"How old was the note?", o:["ten years old","ten days old","one hundred years old","brand new"], a:0, tier:1, e:"'The note was ten years old!'", passage:P_BOTTLE},
  {q:"What did Kai find in the old pine tree?", o:["a new nest with three chicks","Lena's empty nest","a second bottle","nothing at all"], a:0, tier:2, e:"A NEW nest with three noisy chicks.", passage:P_BOTTLE},
  {q:"Which sentence from the story is a SIMILE?", o:["The sea was as flat as glass.","Kai walked along the beach.","The note was ten years old.","He ran to the school."], a:0, tier:3, e:"'as flat as glass' compares using 'as ... as'.", passage:P_BOTTLE},
  {q:"In this story, 'glinted' means —", o:["flashed or shone in the light","broke into pieces","made a loud sound","sank into the sand"], a:0, tier:2, e:"Something green GLINTED = caught the light.", passage:P_BOTTLE},
  {q:"Why did Kai run to the school even though the note was ten years old?", o:["he still wanted to check on the birds","he was late for class","he wanted to return the bottle","Lena was waiting for him"], a:0, tier:3, e:"Inference: he cared about the promise, even an old one.", passage:P_BOTTLE},
  {q:"The BEST theme (message) of this story is —", o:["kindness can be passed on, like the tide","bottles float very well","school trees grow slowly","never walk on the beach alone"], a:0, tier:3, e:"The last line says promises are 'passed on like the tide'.", passage:P_BOTTLE},
  {q:"How did Kai most likely feel at the end?", o:["glad and peaceful","angry at Lena","scared of the birds","bored"], a:0, tier:2, e:"'Kai smiled' shows a warm, glad feeling.", passage:P_BOTTLE},
  {q:"Which of these are INFERENCES (not stated directly)? (select all)", t:"multi", o:["Lena loved watching the birds.","Kai will probably visit the nest again.","The note was ten years old.","Kai found a bottle."], a:[0,1], tier:3, e:"The last two are stated directly in the text.", passage:P_BOTTLE},
  {q:"Which statements about the STORY are TRUE? (select all)", t:"multi", o:["Kai found the bottle near the rocks.","The old pine tree was still there.","Lena still lived beside the school.","The chicks were noisy."], a:[0,1,3], tier:3, e:"Lena moved far away ten years ago.", passage:P_BOTTLE},
  {q:"What will Kai MOST LIKELY do next?", o:["keep watching over the new nest","throw the bottle back into the sea","cut down the pine tree","forget about the birds"], a:0, tier:3, e:"'He could watch over these' — prediction from the text.", passage:P_BOTTLE}
 ]},

{id:"EN21", subj:"en", icon:"🐢", title:"Reading: Informational III", en:"说明文阅读·海龟", tag:"core",
 lesson:{ cards:[
   {t:"Main idea vs detail", b:"MAIN IDEA = what the WHOLE text is mostly about.\nDETAIL = one small fact that supports it.\n'She lays about 100 eggs' is a detail, not the main idea."},
   {t:"Why did the author write it?", b:"To INFORM = teach facts.\nTo ENTERTAIN = tell a fun story.\nTo PERSUADE = change your mind.\nThis text teaches facts → to inform."}],
  example:{t:"Spot the main idea", prob:"Which is the main idea: 'Sea turtles are amazing ocean travellers' or 'Turtles dig nests at night'?", steps:[
   "Ask: which one covers the WHOLE text?",
   "'Dig nests at night' is just one paragraph — a detail.",
   "'Amazing ocean travellers' covers everything → main idea."]},
  check:[{q:"This text was written mainly to —", o:["inform","entertain","persuade","sell turtles"], a:0, e:"It teaches facts about sea turtles."}] },
 training:[
  {q:"The MAIN IDEA of this text is —", o:["sea turtles are great ocean travellers and need protection","turtles lay about a hundred eggs","city lights are bright","crabs live on beaches"], a:0, tier:3, e:"The other choices are single details.", passage:P_TURTLE},
  {q:"Which is a DETAIL, not the main idea?", o:["She lays about a hundred eggs.","Sea turtles are great travellers of the ocean.","Sea turtles matter and people protect them.","The text is about sea turtles' lives."], a:0, tier:3, e:"One small fact = a detail.", passage:P_TURTLE},
  {q:"How do scientists think turtles find their way?", o:["by sensing Earth's magnetic field","by following boats","by asking other turtles","by watching the city lights"], a:0, tier:2, e:"'like a built-in compass'.", passage:P_TURTLE},
  {q:"Where does a female turtle often return to lay eggs?", o:["the very beach where she was born","the deepest part of the sea","a new beach every year","a river far inland"], a:0, tier:2, e:"'often to the very same beach where she was born'.", passage:P_TURTLE},
  {q:"When does the female dig her nest?", o:["at night","at noon","in winter only","while swimming"], a:0, tier:1, e:"'She digs a nest in the sand at night.'", passage:P_TURTLE},
  {q:"About how many eggs does she lay?", o:["about a hundred","about ten","exactly three","about a thousand"], a:0, tier:1, e:"'lays about a hundred eggs'.", passage:P_TURTLE},
  {q:"In this text, 'hatchlings' means —", o:["baby turtles just out of the egg","fishing boats","kinds of seaweed","old turtles"], a:0, tier:2, e:"The tiny ones that hatch from eggs.", passage:P_TURTLE},
  {q:"Why are bright city lights a danger to hatchlings?", o:["the lights can lead them the wrong way","the lights burn the sand","the lights wake the crabs","the lights make eggs hatch late"], a:0, tier:3, e:"Cause → effect stated in the text.", passage:P_TURTLE},
  {q:"How do people help sea turtles today?", o:["keeping nesting beaches dark and clean","building more hotels on beaches","catching the crabs","turning on more lights"], a:0, tier:2, e:"'keeping nesting beaches dark and clean'.", passage:P_TURTLE},
  {q:"Sea turtles have been crossing the oceans since —", o:["the time of the dinosaurs","last summer","the year 2000","people built ships"], a:0, tier:2, e:"The last sentence says so.", passage:P_TURTLE},
  {q:"The best HEADING for the part about laying eggs would be —", o:["A Nest in the Sand","Turtle Food","City Lights","Kinds of Crabs"], a:0, tier:3, e:"A heading should match that paragraph's topic.", passage:P_TURTLE},
  {q:"Which dangers do hatchlings face? (select all)", t:"multi", o:["hungry birds","crabs","bright city lights","magnetic fields"], a:[0,1,2], tier:3, e:"The magnetic field HELPS turtles navigate.", passage:P_TURTLE},
  {q:"Which statements about SEA TURTLES are TRUE? (select all)", t:"multi", o:["A green sea turtle may swim thousands of kilometres.","The mother covers the eggs with sand.","The mother stays to guard the nest.","People can help by keeping beaches clean."], a:[0,1,3], tier:3, e:"She crawls back to the sea — she does not stay.", passage:P_TURTLE},
  {q:"'Like a built-in compass' — the author uses these words to —", o:["help us picture how turtles find their way","prove turtles carry real compasses","describe a ship's tools","explain how eggs hatch"], a:0, tier:3, e:"A comparison that makes the idea easy to picture.", passage:P_TURTLE}
 ]},

{id:"EN22", subj:"en", icon:"✏️", title:"Grammar & Conventions IV", en:"明喻vs暗喻·完整句·标点", tag:"level",
 lesson:{ cards:[
   {t:"Simile vs metaphor (the tricky pair!)", b:"SIMILE uses 'like' or 'as ... as': as busy as a bee.\nMETAPHOR says something IS another thing: the classroom was a zoo.\nSpot the words 'like/as' → simile. No 'like/as' → metaphor."},
   {t:"Complete sentence check", b:"A complete sentence needs: WHO + DOES WHAT + end mark.\nFragment: 'Running across the field.' (who?)\nRun-on fix: add a period, or a comma + and/but/so."}],
  example:{t:"Fix the run-on", prob:"'I like tea I do not like coffee.' What is the BEST fix?", steps:[
   "Two complete ideas are stuck together.",
   "Join with a comma + 'but': 'I like tea, but I do not like coffee.'",
   "The comma goes BEFORE the joining word."]},
  check:[{q:"'Her smile is sunshine.' This is a —", o:["metaphor","simile","fragment","question"], a:0, e:"No 'like' or 'as' — it says her smile IS sunshine."}] },
 training:[
  {q:"'The waves were as tall as houses.' This is a —", o:["simile","metaphor","fragment","command"], a:0, tier:2, e:"'as ... as' → simile."},
  {q:"'The sea was a sleeping giant.' This is a —", o:["metaphor","simile","run-on","question"], a:0, tier:3, e:"It says the sea IS a giant — no like/as → metaphor."},
  {q:"'He swims like a fish.' This is a —", o:["simile","metaphor","fragment","exclamation"], a:0, tier:2, e:"'like' → simile."},
  {q:"Which one is a METAPHOR?", o:["The classroom was a zoo.","as quiet as a mouse","He runs like the wind.","as busy as a bee"], a:0, tier:3, e:"The others all use like/as (similes)."},
  {q:"Which is a FRAGMENT (not a complete sentence)?", o:["Sailing across the bay in the morning.","The boat left the harbour.","We watched the waves.","Gulls flew overhead."], a:0, tier:3, e:"No WHO + main verb — it's only a piece."},
  {q:"Best fix for: 'The wind blew hard the boat rocked.'", o:["The wind blew hard, and the boat rocked.","The wind blew, hard the boat rocked.","The wind blew hard and, the boat rocked.","The wind, blew hard the boat rocked."], a:0, tier:3, e:"Comma + 'and' between the two ideas."},
  {q:"Which sentence uses the comma CORRECTLY?", o:["I wanted to swim, but the water was too cold.","I wanted to swim but, the water was too cold.","I wanted, to swim but the water was too cold.","I wanted to swim but the water, was too cold."], a:0, tier:3, e:"Comma goes before 'but'."},
  {q:"Choose the joining word: 'It rained all day, ____ the match was cancelled.'", o:["so","but","or","because?"], a:0, tier:2, e:"Rain → result: 'so'."},
  {q:"Which end mark fits: 'How deep is the ocean___'", o:["?",".","!",","], a:0, tier:1, e:"A question needs a question mark."},
  {q:"The BEST way to combine: 'Kai found a bottle. The bottle held a note.'", o:["Kai found a bottle that held a note.","Kai found a bottle the bottle held a note.","Kai found, a bottle held a note.","Kai found a bottle held."], a:0, tier:3, e:"Use 'that' to join smoothly."},
  {q:"Which are SIMILES? (select all)", t:"multi", o:["as brave as a lion","like a shooting star","Her voice is music.","as cold as ice"], a:[0,1,3], tier:3, e:"'Her voice is music' has no like/as → metaphor."},
  {q:"Which are COMPLETE sentences? (select all)", t:"multi", o:["The lighthouse keeper lit the lamp.","Waves crashed on the rocks.","Under the old pine tree.","We sailed home before dark."], a:[0,1,3], tier:3, e:"'Under the old pine tree' has no who + verb."},
  {q:"Which words need a CAPITAL letter? (select all)", t:"multi", o:["tuesday","london","kai","ocean"], a:[0,1,2], tier:3, e:"Days, places, names get capitals; 'ocean' is a common noun."},
  {q:"Which sentences are punctuated CORRECTLY? (select all)", t:"multi", o:["After the storm, we cleaned the deck.","Do sea turtles sleep?","what a huge wave that was","We packed food, water, and maps."], a:[0,1,3], tier:3, e:"The third needs a capital W and an exclamation mark."}
 ]},

{id:"EN23", subj:"en", icon:"📝", title:"Writing Studio V", en:"写作工坊 V（词库+守题）", tag:"core",
 lesson:{ cards:[

/* ---- 状态与存储 ---- */
const KEY="sailor_pack_v13", PASS=0.6;
function fresh(){ return {xp:SEED.xp, v13Best:{}, v13Done:[], mistakes:[], box:[], writing:{}, traceDays:[], started:SEED.xp}; }
let state=load()||fresh();
if(!state.box) state.box=[];
if(!state.writing) state.writing={};
if(!state.traceDays) state.traceDays=[];
function load(){ try{ return JSON.parse(localStorage.getItem(KEY)); }catch(e){ return null; } }
function save(){ try{ localStorage.setItem(KEY,JSON.stringify(state)); }catch(e){} if(typeof SYNC!=="undefined"&&SYNC.schedule)SYNC.schedule(); }

function beltFor(xp){ let b=BELTS[0]; for(const x of BELTS){ if(xp>=x.min) b=x; } return b; }
function nextBelt(xp){ return BELTS.find(x=>x.min>xp)||null; }
function trainCount(u){ return (u.training||[]).length; }
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function jsq(s){ return String(s).replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/\r?\n/g," "); }
function lang(s){ return s==="cn"?"zh-CN":s==="fr"?"fr-FR":"en-US"; }
function qByRef(ref){ const p=ref.split("#"); const u=UNITS.find(x=>x.id===p[0]); return u?{unit:u,item:u.training[+p[1]]}:null; }
function boxAdd(ref){ if(state.box.indexOf(ref)<0) state.box.push(ref); }
function boxDel(ref){ const i=state.box.indexOf(ref); if(i>=0) state.box.splice(i,1); }

/* ---- 多语朗读（离线优先） ---- */
let VOICES=[];
function loadVoices(){ try{ VOICES=window.speechSynthesis?window.speechSynthesis.getVoices():[]; }catch(e){ VOICES=[]; } }
if(window.speechSynthesis){ loadVoices(); window.speechSynthesis.onvoiceschanged=loadVoices; }
function spk(text, lg){
  lg=lg||"zh-CN";
  try{
    if(!('speechSynthesis' in window)){ toast("此设备无语音，看文字也可以"); return; }
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang=lg; u.rate=lg.indexOf("zh")===0?0.82:lg.indexOf("fr")===0?0.85:0.9; u.pitch=1.04;
    const re=lg.indexOf("zh")===0?/zh|chinese|中文|普通话|mandarin/i:lg.indexOf("fr")===0?/fr|french|français/i:/en|english/i;
    const v=VOICES.find(x=>re.test((x.lang||"")+(x.name||""))); if(v) u.voice=v;
    window.speechSynthesis.speak(u);
  }catch(e){ toast("看文字也可以哦"); }
}
function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),2300); }

/* ----- 题目内层（小测/训练/错题本共用） ----- */
function qInner(item, qid, subj){

    h+=`<div class="qrow"><div class="q-prompt" style="font-size:19px;line-height:1.55;white-space:pre-line">${esc(item.q)}</div></div>`;
    if(item.hint) h+=`<div style="font-size:14.5px;color:var(--muted);margin:-2px 0 8px">💡 ${esc(item.hint)}</div>`;
    h+=`<textarea class="open-ta" id="open_${qid}" placeholder="在这里写… write here…"></textarea>`;
    h+=`<div id="exp_${qid}"></div>`;

  }
  if(item.passage){ h+=`<div class="passage"><button class="spk sm pspk" onclick="spk('${jsq(item.passage)}','${lg}')">🔊</button>${esc(item.passage)}</div>`; }
  if(item.audio){ h+=`<div class="audio-row"><button class="play" onclick="spk('${jsq(item.audio)}','${lg}')">🔊 播放 Listen</button>${item.py?`<div class="pinyin">提示：${esc(item.py)}</div>`:""}</div>`; }
  const big = item.q && [...item.q].length<=6 && /[\u4e00-\u9fa5]/.test(item.q) && item.q.indexOf("　")<0 && !item.audio && !item.passage && item.t!=="fill";
  const readBtn = (subj==="cn" && !item.audio) ? `<button class="spk sm" onclick="spk('${jsq(item.q)}','zh-CN')">🔊</button>` : "";
  h+=`<div class="qrow">${readBtn}<div class="q-prompt ${big?'big':''}">${esc(item.q)}</div></div>`;
  /* ----- 填空题 ----- */
  if(item.t==="fill"){
    if(item.hint) h+=`<div style="font-size:14.5px;color:var(--muted);margin:2px 0 8px">💡 ${esc(item.hint)}</div>`;
    if(item.kind==="num"){
      h+=`<input class="fill-in numfield" id="fill_${qid}" readonly placeholder="0" inputmode="none">`;
      const keys=["1","2","3","4","5","6","7","8","9",".","0","/"];
      h+=`<div class="numpad">`+keys.map(c=>`<button type="button" class="npk" onclick="npKey('${qid}','${c}')">${c}</button>`).join("")+`<button type="button" class="npk npfn" onclick="npKey('${qid}','-')">−</button>`+`<button type="button" class="npk npfn" onclick="npKey('${qid}','back')">⌫</button>`+`<button type="button" class="npk npgo" onclick="submitFill('${qid}')">✓ 提交</button>`+`</div>`;
    } else if(item.kind==="zi"){

      h+=`<div class="zipad">`+zp.map(i=>`<button type="button" class="npk zpk" onclick="npKey('${qid}','${zt[i]}')">${zt[i]}</button>`).join("")+`</div>`;
      h+=`<div class="zipad zctl"><button type="button" class="npk npfn" onclick="npKey('${qid}','back')">⌫ 删除</button><button type="button" class="npk npgo zgo" onclick="submitFill('${qid}')">✓ 提交</button></div>`;
    } else {
      h+=`<div class="fillrow"><input class="fill-in" id="fill_${qid}" type="text" autocomplete="off" spellcheck="false" placeholder="输入答案 type answer" onkeydown="if(event.key==='Enter'){event.preventDefault();submitFill('${qid}');}"><button class="fill-go" onclick="submitFill('${qid}')">提交 ✓</button></div>`;
    }
    h+=`<div id="exp_${qid}"></div>`;
    return h;
  }
  /* ----- 单选 / 多选（确定性洗牌） ----- */
  const LET=["A","B","C","D","E"];
  const n=item.o.length, perm=permFor((item.q||"")+"|v11", n);
  const optSpk=(subj==="cn"||subj==="fr");

  perm.forEach((oi,disp)=>{
    const op=item.o[oi];
    const a = optSpk ? `<span class="ospk" onclick="event.stopPropagation();spk('${jsq(op)}','${lg}')">🔊</span>` : "";
    const click = multi ? `toggleMulti('${qid}',${oi},this)` : `pick('${qid}',${oi})`;
    h+=`<button class="opt" data-i="${oi}" onclick="${click}"><span class="k">${LET[disp]}</span><span class="otext">${esc(op)}</span>${a}</button>`;
  });
  h+=`</div>`;
  if(multi){ h+=`<div class="multi-go-row"><button class="fill-go" id="mgo_${qid}" onclick="submitMulti('${qid}')">提交多选 ✓</button><span class="multi-tip">可选多个 · 全对才得分</span></div>`; }
  h+=`<div id="exp_${qid}"></div>`;

/* ----- 确定性洗牌：按题面，稳定；训练/重做/错题本一致 ----- */
function hashStr(s){ let h=2166136261>>>0; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619); } return h>>>0; }
function permFor(key,n){ const a=[]; for(let i=0;i<n;i++) a.push(i); let h=hashStr(key)||1; for(let i=n-1;i>0;i--){ h=(Math.imul(h,9301)+49297)>>>0; const j=h%(i+1); const t=a[i]; a[i]=a[j]; a[j]=t; } return a; }
function markOpts(qid, chosen, correct){
  document.querySelectorAll("#opts_"+qid+" .opt").forEach(o=>{ o.setAttribute("disabled",""); const idx=+o.getAttribute("data-i");
    if(idx===correct) o.classList.add("ok"); else if(idx===chosen) o.classList.add("no"); else o.classList.add("dim"); });
}
/* ----- 多选 ----- */
function toggleMulti(qid,oi,btn){

}
function selectedSet(qid){ const s=[]; document.querySelectorAll("#opts_"+qid+" .opt.sel").forEach(o=>s.push(+o.getAttribute("data-i"))); return s; }
function setEq(a,b){ if(a.length!==b.length) return false; const s=new Set(a); for(const x of b){ if(!s.has(x)) return false; } return true; }
function markMulti(qid, chosen, correct){
  const cset=new Set(correct), chset=new Set(chosen);
  document.querySelectorAll("#opts_"+qid+" .opt").forEach(o=>{ o.setAttribute("disabled",""); const idx=+o.getAttribute("data-i"); o.classList.remove("sel");
    if(cset.has(idx)) o.classList.add("ok"); else if(chset.has(idx)) o.classList.add("no"); else o.classList.add("dim"); });

function submitMulti(qid){

/* ----- 填空判分（规范化：大小写/空格/句号；数值与分数等价） ----- */
function normAns(s){ return (""+s).trim().toLowerCase().replace(/\s+/g,"").replace(/[。．.]+$/,""); }
function asNum(s){ if(/^-?(\d+(\.\d+)?|\.\d+)$/.test(s)) return parseFloat(s); const m=s.match(/^(-?\d+)\/(\d+)$/); if(m){ const dd=+m[2]; if(dd!==0) return (+m[1])/dd; } return null; }
function fillOk(input, ans){
  const accepts = Array.isArray(ans)?ans:[ans];
  const ni=normAns(input), vi=asNum(ni);
  for(const a of accepts){ const na=normAns(a); if(ni===na) return true; const va=asNum(na); if(vi!==null && va!==null && Math.abs(vi-va)<1e-9) return true; }
  return false;
}
function npKey(qid,ch){ const inp=document.getElementById("fill_"+qid); if(!inp||inp.disabled)return; if(ch==="back"){ inp.value=inp.value.slice(0,-1); } else { if(inp.value.length<12) inp.value+=ch; } inp.classList.remove("npin"); void inp.offsetWidth; inp.classList.add("npin"); }
function submitFill(qid){
  const item = (qid==="bx") ? qByRef(bx.queue[bx.pos]).item : st.unit.training[st.order[st.pos]];
  if(qid==="bx"){ if(bx.answered) return; } else if(st.answered) return;

  if(!val.trim()){ toast("请先输入答案 ✍️"); if(inp){ inp.classList.remove("shake"); void inp.offsetWidth; inp.classList.add("shake"); } return; }
  const ok = fillOk(val, item.a);
  if(inp){ inp.setAttribute("disabled",""); inp.classList.add(ok?"ok":"no"); }
  const go=inp&&inp.parentNode?inp.parentNode.querySelector(".fill-go"):null; if(go) go.style.display="none";
  finishQ(qid, ok, item, val.trim(), Array.isArray(item.a)?item.a[0]:(""+item.a));

/* ----- 多选/填空 统一评分（训练 + 错题本，复用真实路径） ----- */
function finishQ(qid, ok, item, xLabel, rLabel){

  else { st.qstate[qi]="w"; boxAdd(ref); if(first){ state.xp+=3; state.mistakes.push({u:st.unit.title,q:(item.q||"").replace(/　/g,"__"),x:xLabel,r:rLabel,tier:tier}); } }

  const last=(st.pos>=st.order.length-1), foot=document.getElementById("trainFoot");
  if(ok){ foot.innerHTML=`<button class="bigbtn next" onclick="advance()">${last?'完成 Finish ›':'下一题 Next ›'}</button>`; }
  else { foot.innerHTML=`<div class="foot2"><button class="bigbtn retry" onclick="retry()">🔁 再试一次</button><button class="bigbtn next" onclick="advance()">${last?'完成 ›':'跳过 Skip ›'}</button></div>`; }

/* ----- 作答 ----- */
function pick(qid, i){
  if(qid==="bx"){ return boxAnswer(qid, i); }   // 错题本走专用处理
  if(qid.indexOf("chk")===0){
    if(st.checkState[qid]) return; st.checkState[qid]=true;
    const item=st.unit.lesson.check[parseInt(qid.slice(3))];
    markOpts(qid,i,item.a); const ok=(i===item.a); if(ok){ state.xp+=6; } save();
    document.getElementById("exp_"+qid).innerHTML=`<div class="explain ${ok?'ok':'no'}">${ok?'<b>答对了！✅</b><br>':'<b>再看看 ❌</b><br>'}${esc(item.e||"")}</div>`;
    return;
  }
  if(st.answered) return; st.answered=true;
  const qi=st.order[st.pos], item=st.unit.training[qi], ref=st.unit.id+"#"+qi;
  markOpts(qid,i,item.a);
  const ok=(i===item.a), tier=item.tier||1, first=(st.qstate[qi]==="u");
  if(first) st.tier[tier][1]++;
  if(ok){ if(st.qstate[qi]!=="c"){ st.tier[tier][0]++; state.xp+=(tier===3?20:tier===2?14:10); } st.qstate[qi]="c"; boxDel(ref); }
  else { st.qstate[qi]="w"; boxAdd(ref); if(first){ state.xp+=3; state.mistakes.push({u:st.unit.title,q:item.q.replace(/　/g,"__"),x:item.o[i],r:item.o[item.a],tier:tier}); } }
  save();
  document.getElementById("exp_"+qid).innerHTML=`<div class="explain ${ok?'ok':'no'}">${ok?'<b>答对了！✅ Correct</b><br>':'<b>再想想 ❌ Not quite</b><br>'}${esc(item.e||"")}</div>`;
  const last=(st.pos>=st.order.length-1), foot=document.getElementById("trainFoot");
  if(ok){ foot.innerHTML=`<button class="bigbtn next" onclick="advance()">${last?'完成 Finish ›':'下一题 Next ›'}</button>`; }
  else { foot.innerHTML=`<div class="foot2"><button class="bigbtn retry" onclick="retry()">🔁 再试一次</button><button class="bigbtn next" onclick="advance()">${last?'完成 ›':'跳过 Skip ›'}</button></div>`; }
}
function retry(){ st.answered=false; renderTraining(); }
function enterTraining(){ st.phase="train"; st.redoRound=false; st.order=st.qstate.map((_,i)=>i); st.pos=0; st.answered=false; renderTraining(); }
function renderTraining(){

function advance(){ st.answered=false; st.pos++; if(st.pos>=st.order.length){ showResult(); return; } renderTraining(); }
function showResult(){

let bx=null;
function renderBox(){

function renderBoxQ(){

  const u=pair.unit, item=pair.item, tier=item.tier||1, stars="★".repeat(tier);
  let dots=""; for(let k=0;k<bx.queue.length;k++){ let c="pd"; if(k<bx.pos) c+=" ok"; else if(k===bx.pos) c+=" on"; dots+=`<span class="${c}"></span>`; }

function boxAnswer(qid,i){

const TRACE={chars:[],cur:"",draw:false,ctx:null,last:null};
function initTrace(chars){
  TRACE.chars=chars; TRACE.cur=chars[0];
  const cv=document.getElementById("traceCanvas"); if(!cv) return;
  cv.style.touchAction="none"; TRACE.ctx=cv.getContext("2d"); drawTrace();
  const pos=(e)=>{ const r=cv.getBoundingClientRect(); return {x:(e.clientX-r.left)*(cv.width/r.width), y:(e.clientY-r.top)*(cv.height/r.height)}; };
  const dot=(p)=>{ const c=TRACE.ctx; c.fillStyle="#ff5d5d"; c.beginPath(); c.arc(p.x,p.y,6,0,Math.PI*2); c.fill(); };
  const line=(p)=>{ const c=TRACE.ctx; c.strokeStyle="#ff5d5d"; c.lineWidth=13; c.lineCap="round"; c.lineJoin="round"; c.beginPath(); c.moveTo(TRACE.last.x,TRACE.last.y); c.lineTo(p.x,p.y); c.stroke(); TRACE.last=p; };
  if('PointerEvent' in window){
    cv.onpointerdown=(e)=>{ e.preventDefault(); try{cv.setPointerCapture(e.pointerId);}catch(_){} TRACE.draw=true; TRACE.last=pos(e); dot(TRACE.last); };
    cv.onpointermove=(e)=>{ if(!TRACE.draw) return; e.preventDefault(); line(pos(e)); };
    const stop=(e)=>{ if(TRACE.draw){ TRACE.draw=false; try{cv.releasePointerCapture(e.pointerId);}catch(_){} } };
    cv.onpointerup=stop; cv.onpointercancel=stop; cv.onpointerleave=stop;
  } else {
    cv.onmousedown=(e)=>{ TRACE.draw=true; TRACE.last=pos(e); dot(TRACE.last); };
    cv.onmousemove=(e)=>{ if(!TRACE.draw) return; line(pos(e)); };
    window.addEventListener("mouseup",()=>{ TRACE.draw=false; });
    cv.ontouchstart=(e)=>{ e.preventDefault(); TRACE.draw=true; TRACE.last=pos(e.touches[0]); dot(TRACE.last); };
    cv.ontouchmove=(e)=>{ e.preventDefault(); if(!TRACE.draw) return; line(pos(e.touches[0])); };
    cv.ontouchend=()=>{ TRACE.draw=false; };
  }
}
function drawTrace(){
  const c=TRACE.ctx; if(!c) return; const W=260;
  c.clearRect(0,0,W,W); c.fillStyle="#fff"; c.fillRect(0,0,W,W);
  c.strokeStyle="#f0c8c8"; c.lineWidth=1; c.setLineDash([6,5]);
  c.beginPath(); c.moveTo(W/2,0); c.lineTo(W/2,W); c.moveTo(0,W/2); c.lineTo(W,W/2); c.moveTo(0,0); c.lineTo(W,W); c.moveTo(W,0); c.lineTo(0,W); c.stroke(); c.setLineDash([]);
  c.strokeStyle="#e3a9a9"; c.strokeRect(4,4,W-8,W-8);
  c.fillStyle="rgba(40,50,90,.16)"; c.textAlign="center"; c.textBaseline="middle";
  c.font='190px "PingFang SC","Hiragino Sans GB","Microsoft YaHei","Heiti SC","WenQuanYi Micro Hei",sans-serif';
  c.fillText(TRACE.cur, W/2, W/2+8);
}

function buildPacket(){
  const lessonsDone=SEED.lessonsDone.concat(state.v13Done.filter(id=>SEED.lessonsDone.indexOf(id)<0));
  const unitBest=Object.assign({}, SEED.unitBest, state.v13Best);
  let ziDaysDone=SEED.ziDaysDone.slice(), ziLearned=SEED.ziLearned, ziChars=SEED.ziChars;
  for(const u of UNITS){ if(u.trace && u.traceDay && state.traceDays.indexOf(u.traceDay)>=0){ if(ziDaysDone.indexOf(u.traceDay)<0) ziDaysDone.push(u.traceDay); ziLearned+=[...u.trace].length; ziChars+=u.trace.join(""); } }
  const w=weakChars(); const ziWeak=w.length?w.map(([c,n])=>c+":"+n):SEED.ziWeak;
  return {ver:"13.2", date:"2026-07-08", xp:state.xp, diag:SEED.diag, lessonsDone, unitBest, ziDaysDone, ziLearned, ziChars, ziWeak, boxRemaining:state.box.length, writingCount:Object.keys(state.writing).length, writing:state.writing, mistakes:state.mistakes};
}

/* ============================================================
   v13.2 云同步：把仓库当数据库（与 Simon 同款）
   - 每次 save() 后 ~90s 自动把完整学习档案写回 data/progress.json
   - 令牌只存本机 localStorage（绝不写入任何仓库文件）
   - 合并写入：只更新 study 段，不覆盖 game 段；无变化不提交
   ============================================================ */
function b64(str){ return btoa(unescape(encodeURIComponent(str))); }
function ub64(str){ try{ return decodeURIComponent(escape(atob(String(str).replace(/\s+/g,"")))); }catch(e){ return ""; } }
function hashStr(s){ let h=0x811c9dc5>>>0; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,0x01000193)>>>0; } return (h>>>0).toString(36); }
function hhmm(iso){ try{ var d=new Date(iso); return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); }catch(e){ return ""; } }

function buildSyncPayload(){
  var belt=beltFor(state.xp);
  var units=UNITS.map(function(u){
    var best=state.v13Best[u.id]||null, ratio=null, status="todo";
    if(best){ var p=best.split("/").map(Number), c=p[0], t=p[1]; ratio=t?c/t:1;
      status = ratio>=0.8 ? "mastered" : (ratio>=PASS ? "pass" : "review"); }
    return {id:u.id, subj:u.subj, title:u.title, en:u.en, icon:u.icon, best:best, ratio:ratio, status:status, total:trainCount(u)};
  });
  var byUnit={}; for(var i=0;i<state.mistakes.length;i++){ var m=state.mistakes[i]; (byUnit[m.u]=byUnit[m.u]||[]).push({q:m.q,x:m.x,r:m.r,tier:m.tier||0}); }
  return {
    version:"13.1", student:"Sailor", syncedAt:new Date().toISOString(),
    xp:state.xp,
    rank:{cn:belt.cn, en:belt.en, min:belt.min, color:belt.color},
    coverage:{done:state.v13Done.length, total:UNITS.length},
    units:units,
    mistakesByUnit:byUnit,
    reviewQueue:weakChars().map(function(e){ return {c:e[0], n:e[1]}; }),
    boxRemaining:state.box.length,
    writing:state.writing,
    packet:buildPacket()
  };
}

var SYNC={
  owner:"lilisun536-sudo", repo:"sailor-game", branch:"main", path:"data/progress.json", section:"study",
  tKey:"sailor_sync_token", hKey:"sailor_sync_hash", tsKey:"sailor_sync_ts", stKey:"sailor_sync_state",
  timer:null, busy:false,
  token:function(){ try{ return (localStorage.getItem(this.tKey)||"").trim(); }catch(e){ return ""; } },
  setToken:function(t){ try{ localStorage.setItem(this.tKey,(t||"").trim()); }catch(e){} },
  lget:function(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } },
  lset:function(k,v){ try{ localStorage.setItem(k,v); }catch(e){} },
  api:function(){ return "https://api.github.com/repos/"+this.owner+"/"+this.repo+"/contents/"+this.path; },
  badgeText:function(){
    if(!this.token()) return "🔌 未开启同步（点 ⚙ 同步设置）";
    var ts=this.lget(this.tsKey), stt=this.lget(this.stKey);
    if(stt==="fail") return "⚠️ 上次同步失败（下次自动重试）";
    if(ts) return "☁️ 已同步 "+hhmm(ts)+" · 家长可在看板刷新查看";
    return "☁️ 已开启，等待首次同步…";
  },
  setBadge:function(txt){ var el=document.getElementById("syncBadge"); if(el) el.textContent=(txt!==undefined?txt:this.badgeText()); },
  schedule:function(){ if(this.timer||!this.token()) return; var self=this;
    this.timer=setTimeout(function(){ self.timer=null; self.push(false); }, 90000); },
  push:async function(manual){
    var tok=this.token();
    if(!tok){ if(manual) toast("请先在 ⚙ 里粘贴同步令牌"); return false; }
    if(this.busy){ return false; }
    var payload=buildSyncPayload(), body=JSON.stringify(payload);
    var h=hashStr(body.replace(/"syncedAt":"[^"]*"/,'"syncedAt":""'));
    if(!manual && this.lget(this.hKey)===h){ return false; } // 无变化，不刷屏
    this.busy=true; this.setBadge("☁️ 同步中…");
    var api=this.api(), sec=this.section, br=this.branch, self=this;
    async function getFile(){
      var r=await fetch(api+"?ref="+br,{headers:{Authorization:"Bearer "+tok,Accept:"application/vnd.github+json"}});
      if(r.status===200){ var j=await r.json(); var full={}; try{ full=JSON.parse(ub64(j.content)); }catch(e){ full={}; }
        if(typeof full!=="object"||!full) full={}; return {full:full, sha:j.sha}; }
      if(r.status===404){ return {full:{}, sha:null}; }
      throw new Error("GET "+r.status);
    }
    async function putFile(full,sha){
      full[sec]=payload; full._meta={updatedAt:payload.syncedAt, updatedBy:sec};
      var r=await fetch(api,{method:"PUT",headers:{Authorization:"Bearer "+tok,Accept:"application/vnd.github+json","Content-Type":"application/json"},
        body:JSON.stringify({message:"sync "+sec+" "+payload.syncedAt, branch:br, sha:sha||undefined, content:b64(JSON.stringify(full,null,2))})});
      return r;
    }
    try{
      var g=await getFile();
      var r=await putFile(g.full, g.sha);
      if(r.status===409||r.status===422){ var g2=await getFile(); r=await putFile(g2.full, g2.sha); } // sha 竞争，重试一次
      if(!r.ok) throw new Error("PUT "+r.status);
      this.lset(this.hKey,h); this.lset(this.tsKey,payload.syncedAt); this.lset(this.stKey,"ok");
      this.setBadge(); if(manual) toast("同步成功 ✓ 家长看板刷新即可见");
      this.busy=false; return true;
    }catch(e){
      this.lset(this.stKey,"fail"); this.setBadge();
      if(manual) toast("同步失败："+(e&&e.message||e));
      this.busy=false; return false;
    }
  }
};

  var dash="https://"+SYNC.owner+".github.io/"+SYNC.repo+"/report/";

    <div class="exp-note">开启后，Sailor 每次做完题约 <b>1 分半</b>会自动把进度写回云端；家长在<b>看板页</b>刷新即可看到最新学习情况，无需 Sailor 做任何操作。<br>

    <div class="exp-note" style="border-left-color:var(--xp)"><b>令牌（由家长在 GitHub 生成后，粘贴到这里一次即可）：</b><br>
      从家长的 GitHub → Settings → Developer settings → Fine-grained tokens 生成，仅授权 <b>${SYNC.repo}</b> 仓库的 Contents 读写。<br>
      <b style="color:var(--no)">令牌只保存在本机，切勿贴进任何仓库文件或公开发出去。</b></div>
    <textarea class="exp-ta" id="syncTok" placeholder="在此粘贴 github_pat_ 开头的令牌…" spellcheck="false">${esc(SYNC.token())}</textarea>
    <button class="copy-btn" onclick="syncTestSave()">✓ 测试并保存</button>
    <div class="actions" style="margin-top:10px">
      <button class="abtn" onclick="syncNow()">☁️ 立即同步一次</button>
      <button class="abtn" onclick="syncClear()">🗑 清除令牌</button>
    </div>
    <div class="exp-note" style="margin-top:12px">家长看板网址（收藏它，随时刷新）：<br><b style="word-break:break-all">${dash}</b><br>
      网络不好时，可在此页「导出数据包」，把 JSON 发给家长，用看板的「导入本地报告」照样看全量。</div>
  </div>`;
  window.scrollTo(0,0);
}

if(SYNC.token())SYNC.schedule();
