function beltFor(xp){ let b=BELTS[0]; for(const x of BELTS){ if(xp>=x.min) b=x; } return b; }
function nextBelt(xp){ return BELTS.find(x=>x.min>xp)||null; }
function trainCount(u){ return (u.training||[]).length; }
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function jsq(s){ return String(s).replace(/\\/g,"\\\\").replace(/&/g,"&amp;").replace(/'/g,"\\'").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\r?\n/g," "); }
function lang(s){ return s==="cn"?"zh-CN":s==="fr"?"fr-FR":"en-US"; }
function qByRef(ref){ const p=ref.split("#"); const u=UNITS.find(x=>x.id===p[0]); return u?{unit:u,item:u.training[+p[1]]}:null; }
function boxAdd(ref){ if(state.box.indexOf(ref)<0) state.box.push(ref); }
function boxDel(ref){ const i=state.box.indexOf(ref); if(i>=0) state.box.splice(i,1); }

let VOICES=[];
function loadVoices(){ try{ VOICES=window.speechSynthesis?window.speechSynthesis.getVoices():[]; }catch(e){ VOICES=[]; } }
if(window.speechSynthesis){ loadVoices(); window.speechSynthesis.onvoiceschanged=loadVoices; }
function spk(text, lg){
  lg=lg||"zh-CN";
  try{
    if(!('speechSynthesis' in window)){ toast("此设备无语音，看文字也可以"); return; }
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang=lg; u.rate=lg.indexOf("zh")===0?0.82:lg.indexOf("fr")===0?0.85:0.9; u.pitch=1.04;
    const re=lg.indexOf("zh")===0?/zh|chinese|中文|普通话|mandarin/i:lg.indexOf("fr")===0?/fr|french|français/i:/en|english/i;
    const v=VOICES.find(x=>re.test((x.lang||"")+(x.name||""))); if(v) u.voice=v;
    setTimeout(function(){ try{ window.speechSynthesis.speak(u); }catch(e){} }, 60);
  }catch(e){ toast("看文字也可以哦"); }
}
function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),2300); }

/* ----- 题目内层（小测/训练/错题本共用） ----- */

/* ----- 确定性洗牌：按题面，稳定；训练/重做/错题本一致 ----- */
function hashStr(s){ let h=2166136261>>>0; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619); } return h>>>0; }

function markOpts(qid, chosen, correct){

    if(idx===correct) o.classList.add("ok"); else if(idx===chosen) o.classList.add("no"); else o.classList.add("dim"); });
}

function submitMulti(qid){

/* ----- 填空判分（规范化：大小写/空格/句号；数值与分数等价） ----- */
function normAns(s){ return (""+s).trim().toLowerCase().replace(/\s+/g,"").replace(/[。．.]+$/,""); }
function asNum(s){ if(/^-?(\d+(\.\d+)?|\.\d+)$/.test(s)) return parseFloat(s); const m=s.match(/^(-?\d+)\/(\d+)$/); if(m){ const dd=+m[2]; if(dd!==0) return (+m[1])/dd; } return null; }
function fillOk(input, ans){
  const accepts = Array.isArray(ans)?ans:[ans];
  const ni=normAns(input), vi=asNum(ni);
  for(const a of accepts){ const na=normAns(a); if(ni===na) return true; const va=asNum(na); if(vi!==null && va!==null && Math.abs(vi-va)<1e-9) return true; }
  return false;
}
function npKey(qid,ch){ const inp=document.getElementById("fill_"+qid); if(!inp||inp.disabled)return; if(ch==="back"){ inp.value=inp.value.slice(0,-1); } else { if(inp.value.length<12) inp.value+=ch; } inp.classList.remove("npin"); void inp.offsetWidth; inp.classList.add("npin"); }

/* ----- 多选/填空 统一评分（训练 + 错题本，复用真实路径） ----- */

/* ----- 作答 ----- */
function pick(qid, i){
  if(qid==="bx"){ return boxAnswer(qid, i); }   // 错题本走专用处理
  if(qid.indexOf("chk")===0){
    if(st.checkState[qid]) return; st.checkState[qid]=true;
    const item=st.unit.lesson.check[parseInt(qid.slice(3))];
    markOpts(qid,i,item.a); const ok=(i===item.a); if(ok){ state.xp+=6; } save();
    document.getElementById("exp_"+qid).innerHTML=`<div class="explain ${ok?'ok':'no'}">${ok?'<b>答对了！✅</b><br>':'<b>再看看 ❌</b><br>'}${esc(item.e||"")}</div>`;
    return;
  }
  if(st.answered) return; st.answered=true;
  const qi=st.order[st.pos], item=st.unit.training[qi], ref=st.unit.id+"#"+qi;
  markOpts(qid,i,item.a);
  const ok=(i===item.a), tier=item.tier||1, first=(st.qstate[qi]==="u");
  if(first) st.tier[tier][1]++;
  if(ok){ if(st.qstate[qi]!=="c"){ st.tier[tier][0]++; state.xp+=(tier===3?20:tier===2?14:10); } st.qstate[qi]="c"; boxDel(ref); }
  else { st.qstate[qi]="w"; boxAdd(ref); if(first){ state.xp+=3; state.mistakes.push({u:st.unit.title,q:item.q.replace(/　/g,"__"),x:item.o[i],r:item.o[item.a],tier:tier}); } }
  save();
  document.getElementById("exp_"+qid).innerHTML=`<div class="explain ${ok?'ok':'no'}">${ok?'<b>答对了！✅ Correct</b><br>':'<b>再想想 ❌ Not quite</b><br>'}${esc(item.e||"")}</div>`;
  const last=(st.pos>=st.order.length-1), foot=document.getElementById("trainFoot");
  if(ok){ foot.innerHTML=`<button class="bigbtn next" onclick="advance()">${last?'完成 Finish ›':'下一题 Next ›'}</button>`; }
  else { foot.innerHTML=`<div class="foot2"><button class="bigbtn retry" onclick="retry()">🔁 再试一次</button><button class="bigbtn next" onclick="advance()">${last?'完成 ›':'跳过 Skip ›'}</button></div>`; }
}

let bx=null;
function renderBox(){

    <div style="font-size:15px;color:var(--muted);margin:8px 0 18px">太棒了，所有题都掌握啦。</div>
    <button class="home-btn" onclick="renderHome()">回到主页 Home ›</button></div>`; window.scrollTo(0,0); return; }
  bx={queue:state.box.slice(), pos:0, answered:false, fixed:0}; renderBoxQ();
}
function renderBoxQ(){
  const ref=bx.queue[bx.pos], pair=qByRef(ref);
  if(!pair){ bx.pos++; if(bx.pos>=bx.queue.length){ boxDone(); return; } return renderBoxQ(); }
  const u=pair.unit, item=pair.item, tier=item.tier||1, stars="★".repeat(tier);
  let dots=""; for(let k=0;k<bx.queue.length;k++){ let c="pd"; if(k<bx.pos) c+=" ok"; else if(k===bx.pos) c+=" on"; dots+=`<span class="${c}"></span>`; }
  document.getElementById("app").innerHTML=`<div class="stage">

}
function boxAnswer(qid,i){
  if(bx.answered) return; bx.answered=true;
  const ref=bx.queue[bx.pos], pair=qByRef(ref), item=pair.item;
  markOpts(qid,i,item.a); const ok=(i===item.a);
  if(ok){ boxDel(ref); bx.fixed++; state.xp+=5; } save();
  document.getElementById("exp_"+qid).innerHTML=`<div class="explain ${ok?'ok':'no'}">${ok?'<b>答对了！✅ 从错题本清掉</b><br>':'<b>再想想 ❌ 仍留在错题本</b><br>'}${esc(item.e||"")}</div>`;

  else { foot.innerHTML=`<div class="foot2"><button class="bigbtn retry" onclick="boxRetry()">🔁 再试一次</button><button class="bigbtn next" onclick="boxNext()">${last?'完成 ›':'跳过 ›'}</button></div>`; }
}

const TRACE={chars:[],cur:"",draw:false,ctx:null,last:null};
function initTrace(chars){
  TRACE.chars=chars; TRACE.cur=chars[0];
  const cv=document.getElementById("traceCanvas"); if(!cv) return;
  cv.style.touchAction="none"; TRACE.ctx=cv.getContext("2d"); drawTrace();
  const pos=(e)=>{ const r=cv.getBoundingClientRect(); return {x:(e.clientX-r.left)*(cv.width/r.width), y:(e.clientY-r.top)*(cv.height/r.height)}; };
  const dot=(p)=>{ const c=TRACE.ctx; c.fillStyle="#ff5d5d"; c.beginPath(); c.arc(p.x,p.y,6,0,Math.PI*2); c.fill(); };
  const line=(p)=>{ const c=TRACE.ctx; c.strokeStyle="#ff5d5d"; c.lineWidth=13; c.lineCap="round"; c.lineJoin="round"; c.beginPath(); c.moveTo(TRACE.last.x,TRACE.last.y); c.lineTo(p.x,p.y); c.stroke(); TRACE.last=p; };
  if('PointerEvent' in window){
    cv.onpointerdown=(e)=>{ e.preventDefault(); try{cv.setPointerCapture(e.pointerId);}catch(_){} TRACE.draw=true; TRACE.last=pos(e); dot(TRACE.last); };
    cv.onpointermove=(e)=>{ if(!TRACE.draw) return; e.preventDefault(); line(pos(e)); };
    const stop=(e)=>{ if(TRACE.draw){ TRACE.draw=false; try{cv.releasePointerCapture(e.pointerId);}catch(_){} } };
    cv.onpointerup=stop; cv.onpointercancel=stop; cv.onpointerleave=stop;
  } else {
    cv.onmousedown=(e)=>{ TRACE.draw=true; TRACE.last=pos(e); dot(TRACE.last); };
    cv.onmousemove=(e)=>{ if(!TRACE.draw) return; line(pos(e)); };
    window.addEventListener("mouseup",()=>{ TRACE.draw=false; });
    cv.ontouchstart=(e)=>{ e.preventDefault(); TRACE.draw=true; TRACE.last=pos(e.touches[0]); dot(TRACE.last); };
    cv.ontouchmove=(e)=>{ e.preventDefault(); if(!TRACE.draw) return; line(pos(e.touches[0])); };
    cv.ontouchend=()=>{ TRACE.draw=false; };
  }
}
function drawTrace(){

/* ============================================================
   v15.0 云同步：把仓库当数据库（与 Simon 同款）
   - 每次 save() 后 ~90s 自动把完整学习档案写回 data/progress.json
   - 令牌只存本机 localStorage（绝不写入任何仓库文件）

function b64(str){ return btoa(unescape(encodeURIComponent(str))); }
function ub64(str){ try{ return decodeURIComponent(escape(atob(String(str).replace(/\s+/g,"")))); }catch(e){ return ""; } }
function syncHash(s){ let h=0x811c9dc5>>>0; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,0x01000193)>>>0; } return (h>>>0).toString(36); }
function hhmm(iso){ try{ var d=new Date(iso); return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); }catch(e){ return ""; } }

function buildSyncPayload(){
  var belt=beltFor(state.xp);
  var units=UNITS.map(function(u){
    var best=state.v15Best[u.id]||null, ratio=null, status="todo";
    if(best){ var p=best.split("/").map(Number), c=p[0], t=p[1]; ratio=t?c/t:1;
      status = ratio>=0.8 ? "mastered" : (ratio>=PASS ? "pass" : "review"); }
    return {id:u.id, subj:u.subj, title:u.title, en:u.en, icon:u.icon, best:best, ratio:ratio, status:status, total:trainCount(u)};
  });
  var byUnit={}; for(var i=0;i<state.mistakes.length;i++){ var m=state.mistakes[i]; (byUnit[m.u]=byUnit[m.u]||[]).push({q:m.q,x:m.x,r:m.r,tier:m.tier||0}); }
  return {
    version:"15.0", student:"Sailor", syncedAt:new Date().toISOString(),
    xp:state.xp,
    rank:{cn:belt.cn, en:belt.en, min:belt.min, color:belt.color},
    coverage:{done:state.v15Done.length, total:UNITS.length},
    units:units,
    mistakesByUnit:byUnit,
    reviewQueue:weakChars().map(function(e){ return {c:e[0], n:e[1]}; }),
    boxRemaining:state.box.length,
    writing:state.writing,
    packet:buildPacket()
  };
}

var SYNC={
  owner:"lilisun536-sudo", repo:"sailor-game", branch:"main", path:"data/progress.json", section:"study",
  tKey:"sailor_sync_token", hKey:"sailor_sync_hash", tsKey:"sailor_sync_ts", stKey:"sailor_sync_state",
  timer:null, busy:false,
  token:function(){ try{ return (localStorage.getItem(this.tKey)||"").trim(); }catch(e){ return ""; } },
  setToken:function(t){ try{ localStorage.setItem(this.tKey,(t||"").trim()); }catch(e){} },
  lget:function(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } },
  lset:function(k,v){ try{ localStorage.setItem(k,v); }catch(e){} },
  api:function(){ return "https://api.github.com/repos/"+this.owner+"/"+this.repo+"/contents/"+this.path; },
  badgeText:function(){
    if(!this.token()) return "🔌 未开启同步（点 ⚙ 同步设置）";
    var ts=this.lget(this.tsKey), stt=this.lget(this.stKey);
    if(stt==="fail") return "⚠️ 上次同步失败（下次自动重试）";
    if(ts) return "☁️ 已同步 "+hhmm(ts)+" · 家长可在看板刷新查看";
    return "☁️ 已开启，等待首次同步…";
  },
  setBadge:function(txt){ var el=document.getElementById("syncBadge"); if(el) el.textContent=(txt!==undefined?txt:this.badgeText()); },
  schedule:function(){ if(this.timer||!this.token()) return; var self=this;
    this.timer=setTimeout(function(){ self.timer=null; self.push(false); }, 90000); },
  push:async function(manual){
    var tok=this.token();
    if(!tok){ if(manual) toast("请先在 ⚙ 里粘贴同步令牌"); return false; }
    if(this.busy){ return false; }
    var payload=buildSyncPayload(), body=JSON.stringify(payload);
    var h=syncHash(body.replace(/"syncedAt":"[^"]*"/,'"syncedAt":""'));
    if(!manual && this.lget(this.hKey)===h){ return false; } // 无变化，不刷屏
    this.busy=true; this.setBadge("☁️ 同步中…");
    var api=this.api(), sec=this.section, br=this.branch, self=this;
    async function getFile(){
      var r=await fetch(api+"?ref="+br,{headers:{Authorization:"Bearer "+tok,Accept:"application/vnd.github+json"}});
      if(r.status===200){ var j=await r.json(); var full={}; try{ full=JSON.parse(ub64(j.content)); }catch(e){ full={}; }
        if(typeof full!=="object"||!full) full={}; return {full:full, sha:j.sha}; }
      if(r.status===404){ return {full:{}, sha:null}; }
      throw new Error("GET "+r.status);
    }
    async function putFile(full,sha){
      full[sec]=payload; full._meta={updatedAt:payload.syncedAt, updatedBy:sec};
      var r=await fetch(api,{method:"PUT",headers:{Authorization:"Bearer "+tok,Accept:"application/vnd.github+json","Content-Type":"application/json"},
        body:JSON.stringify({message:"sync "+sec+" "+payload.syncedAt, branch:br, sha:sha||undefined, content:b64(JSON.stringify(full,null,2))})});
      return r;
    }
    try{
      var g=await getFile();
      var r=await putFile(g.full, g.sha);
      if(r.status===409||r.status===422){ var g2=await getFile(); r=await putFile(g2.full, g2.sha); } // sha 竞争，重试一次
      if(!r.ok) throw new Error("PUT "+r.status);
      this.lset(this.hKey,h); this.lset(this.tsKey,payload.syncedAt); this.lset(this.stKey,"ok");
      this.setBadge(); if(manual) toast("同步成功 ✓ 家长看板刷新即可见");
      this.busy=false; return true;
    }catch(e){
      this.lset(this.stKey,"fail"); this.setBadge();
      if(manual) toast("同步失败："+(e&&e.message||e));
      this.busy=false; return false;
    }
  }
};

  var statusLine = !has ? '<b style="color:var(--no)">未开启</b>'
    : (stt==="fail" ? '<b style="color:var(--no)">上次同步失败</b>'
    : (ts ? '<b style="color:var(--ok)">已开启</b> · 上次同步 '+hhmm(ts) : '<b style="color:var(--ok)">已开启</b> · 等待首次同步'));
  var dash="https://"+SYNC.owner+".github.io/"+SYNC.repo+"/report/";
  document.getElementById("app").innerHTML=`<div class="panel">
    <div class="panel-h"><button class="st-back" onclick="renderHome()">‹</button><h2>⚙ 同步设置</h2></div>
    <div class="exp-note">开启后，Sailor 每次做完题约 <b>1 分半</b>会自动把进度写回云端；家长在<b>看板页</b>刷新即可看到最新学习情况，无需 Sailor 做任何操作。<br>
      当前状态：${statusLine}</div>
    <div class="exp-note" style="border-left-color:var(--xp)"><b>令牌（由家长在 GitHub 生成后，粘贴到这里一次即可）：</b><br>
      从家长的 GitHub → Settings → Developer settings → Fine-grained tokens 生成，仅授权 <b>${SYNC.repo}</b> 仓库的 Contents 读写。<br>
      <b style="color:var(--no)">令牌只保存在本机，切勿贴进任何仓库文件或公开发出去。</b></div>
    <textarea class="exp-ta" id="syncTok" placeholder="在此粘贴 github_pat_ 开头的令牌…" spellcheck="false">${esc(SYNC.token())}</textarea>
    <button class="copy-btn" onclick="syncTestSave()">✓ 测试并保存</button>
    <div class="actions" style="margin-top:10px">
      <button class="abtn" onclick="syncNow()">☁️ 立即同步一次</button>
      <button class="abtn" onclick="syncClear()">🗑 清除令牌</button>
    </div>
    <div class="exp-note" style="margin-top:12px">家长看板网址（收藏它，随时刷新）：<br><b style="word-break:break-all">${dash}</b><br>
      网络不好时，可在此页「导出数据包」，把 JSON 发给家长，用看板的「导入本地报告」照样看全量。</div>
  </div>`;
  window.scrollTo(0,0);
}

if(SYNC.token())SYNC.schedule();
renderHome();
</script>
</body>
</html>
