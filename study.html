<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sailor 航海学堂 · v12.1</title>
<style>
  :root{
    --bg1:#06192e; --bg2:#0b3a4f; --bg3:#0f5163;
    --ink:#0c1230; --paper:#ffffff; --paper2:#f4f7ff; --muted:#6b7396; --line:#e3e9f7;
    --cn:#ff5d5d; --math:#23a7ff; --sci:#a855f7; --en:#22c55e; --fr:#14b8a6;
    --cn-d:#e23c3c; --math-d:#0d86df;
    --xp:#ffb020; --xp-d:#f59e0b; --gold:#ffd24a;
    --ok:#16a34a; --okbg:#e7f9ee; --no:#e23c3c; --nobg:#fdecec;
    --t1:#22c55e; --t2:#23a7ff; --t3:#a855f7;
    --r:22px; --r2:16px;
    --shadow:0 12px 34px rgba(8,12,40,.2); --shadow2:0 6px 18px rgba(8,12,40,.12);
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",Roboto,sans-serif;
    --cjk:"PingFang SC","Hiragino Sans GB","Microsoft YaHei","Heiti SC","WenQuanYi Micro Hei",sans-serif;
    --fs:20px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:var(--font);color:var(--ink);font-size:var(--fs);
    background:radial-gradient(1200px 600px at 80% -10%,#0e6178 0%,transparent 55%),radial-gradient(900px 500px at -10% 10%,#0a4a60 0%,transparent 50%),linear-gradient(160deg,var(--bg1),var(--bg2) 60%,var(--bg3));
    background-attachment:fixed;min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.55}
  .wrap{max-width:800px;margin:0 auto;padding:18px 16px 64px}

  .hero{background:linear-gradient(135deg,#171f48,#202c63);border:1px solid rgba(255,255,255,.08);border-radius:var(--r);padding:20px;color:#fff;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .hero::after{content:"";position:absolute;right:-40px;top:-40px;width:180px;height:180px;background:radial-gradient(circle,rgba(255,178,32,.28),transparent 70%)}
  .hero-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .brand{display:flex;align-items:center;gap:12px}
  .logo{width:54px;height:54px;border-radius:50%;padding:2.5px;background:linear-gradient(135deg,#d8a93a,#b8860b);box-shadow:0 6px 16px rgba(184,134,11,.45);flex:0 0 auto;box-sizing:border-box}.logo img{width:100%;height:100%;border-radius:50%;object-fit:cover;display:block;border:2px solid #0b3a52}
  .brand h1{font-size:22px;margin:0;font-weight:800;letter-spacing:.3px}
  .brand .sub{font-size:13px;color:#aeb6e0;margin-top:1px}
  .ver{font-size:13px;font-weight:800;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18);padding:6px 13px;border-radius:999px;white-space:nowrap}
  .belt-row{display:flex;align-items:center;gap:15px;margin-top:18px;position:relative;z-index:1}
  .belt-emblem{flex:none;width:70px;height:70px;border-radius:17px;display:grid;place-items:center;position:relative;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12)}
  .belt-bar{width:46px;height:15px;border-radius:3px;box-shadow:inset 0 -2px 0 rgba(0,0,0,.25)}
  .belt-knot{position:absolute;width:10px;height:21px;border-radius:2px;transform:rotate(18deg);right:13px;bottom:15px}
  .belt-info{flex:1;min-width:0}
  .belt-name{font-size:17px;font-weight:800}
  .belt-name .next{font-weight:600;color:#aeb6e0;font-size:13px;margin-left:6px}
  .xpbar{height:15px;background:rgba(255,255,255,.12);border-radius:999px;margin-top:9px;overflow:hidden}
  .xpfill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--xp),var(--gold));width:0;transition:width 1.1s cubic-bezier(.2,.8,.2,1);box-shadow:0 0 12px rgba(255,178,32,.6)}
  .xpline{display:flex;justify-content:space-between;font-size:13px;color:#c7cdf0;margin-top:6px}
  .xpnow{font-weight:800;color:#ffd86b}

  .box-card{margin-top:16px;width:100%;border:none;border-radius:var(--r2);padding:15px 18px;font-family:inherit;cursor:pointer;
    display:flex;align-items:center;gap:13px;box-shadow:var(--shadow2);color:#fff;background:linear-gradient(135deg,#ff7a59,#ff5d5d)}
  .box-card.empty{background:rgba(255,255,255,.08);color:#c7cdf0;border:1px solid rgba(255,255,255,.14)}
  .box-card:active{transform:scale(.99)}
  .box-card .bi{font-size:26px}
  .box-card .bt{font-weight:800;font-size:16px} .box-card .bs{font-size:12.5px;opacity:.92;margin-top:1px}
  .box-card .bn{margin-left:auto;font-weight:900;font-size:20px;background:rgba(255,255,255,.22);border-radius:999px;padding:4px 13px}
  .box-card.empty .bn{background:rgba(255,255,255,.12)}

  .sec{margin-top:24px}
  .sec-h{display:flex;align-items:center;gap:9px;margin:0 4px 13px}
  .dot{width:12px;height:12px;border-radius:3px}
  .sec-h h2{font-size:17.5px;margin:0;color:#fff;font-weight:800}
  .sec-h .pct{margin-left:auto;font-size:13px;color:#aeb6e0;font-weight:700}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:520px){.grid{grid-template-columns:1fr}}
  .card{background:var(--paper);border-radius:var(--r2);padding:15px;cursor:pointer;box-shadow:var(--shadow2);border:1px solid var(--line);transition:transform .12s ease;display:flex;flex-direction:column;gap:9px;position:relative;overflow:hidden}
  .card:active{transform:scale(.975)}
  .card .stripe{position:absolute;left:0;top:0;bottom:0;width:6px}
  .card-top{display:flex;align-items:center;gap:11px;padding-left:5px}
  .card .ic{font-size:28px;flex:none}
  .card .t{font-weight:800;font-size:15.5px;line-height:1.25}
  .card .en{font-size:12px;color:var(--muted);font-weight:600}
  .card-bot{display:flex;align-items:center;gap:8px;padding-left:5px;flex-wrap:wrap}
  .tag{font-size:11px;font-weight:800;padding:3px 9px;border-radius:999px}
  .tag.fix{background:#fff0e6;color:#d2691e} .tag.level{background:#e7f3ff;color:#0d86df}
  .tag.trip{background:#f0e9ff;color:#7c3aed} .tag.core{background:#eef1ff;color:#4f5bd5}
  .tag.new{background:#ecfeff;color:#0891b2}
  .best{margin-left:auto;font-size:12.5px;font-weight:800;color:var(--muted)} .best.done{color:var(--ok)}

  .actions{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:26px}
  .abtn{border:none;border-radius:var(--r2);padding:15px;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer;color:#fff;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:var(--shadow2)}
  .abtn:active{transform:scale(.97)}
  .abtn.report{background:linear-gradient(135deg,#5b67e8,#7c3aed)} .abtn.export{background:linear-gradient(135deg,#0d86df,#23a7ff)}
  .reset{grid-column:1/-1;background:rgba(255,255,255,.08);color:#c7cdf0;border:1px solid rgba(255,255,255,.14);border-radius:var(--r2);padding:12px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer}
  .foot-note{text-align:center;color:#7782b8;font-size:12px;margin-top:20px}

  .stage{background:var(--paper);border-radius:var(--r);padding:20px;box-shadow:var(--shadow);min-height:62vh;display:flex;flex-direction:column}
  .st-head{display:flex;align-items:center;gap:11px;margin-bottom:14px}
  .st-back{background:var(--paper2);border:1px solid var(--line);border-radius:11px;width:42px;height:42px;font-size:20px;cursor:pointer;flex:none}
  .st-title{font-weight:800;font-size:16px;line-height:1.2}
  .st-title .en{font-size:12px;color:var(--muted);font-weight:600;display:block}
  .phase-pill{margin-left:auto;font-size:12px;font-weight:800;padding:5px 12px;border-radius:999px}
  .phase-pill.learn{background:#eef1ff;color:#4f5bd5} .phase-pill.box{background:#fff0e6;color:#d2691e}

  .concept{background:linear-gradient(135deg,var(--paper2),#eaf0ff);border:1px solid #d4ddf6;border-radius:var(--r2);padding:18px;margin-bottom:14px}
  .concept .ch{display:flex;align-items:center;gap:9px;font-weight:800;font-size:17px;color:#2a3360;margin-bottom:9px}
  .concept .cb{font-size:18.5px;line-height:1.85;color:#2a3360;white-space:pre-line}
  .spk{flex:none;border:none;background:#fff;border:1px solid var(--line);border-radius:10px;width:40px;height:40px;font-size:19px;cursor:pointer;color:var(--math-d);box-shadow:var(--shadow2)}
  .spk:active{transform:scale(.92)} .spk.sm{width:34px;height:34px;font-size:16px;border-radius:9px}

  .example{background:#fffdf5;border:1px dashed #f0d28a;border-radius:var(--r2);padding:18px;margin-bottom:14px}
  .example .eh{font-weight:800;font-size:17px;color:#9a6b00;margin-bottom:6px;display:flex;align-items:center;gap:8px}
  .example .prob{font-size:18px;font-weight:700;color:#2a3360;background:#fff;border:1px solid #f0e6c8;border-radius:12px;padding:12px 14px;margin-bottom:12px}
  .steps{display:flex;flex-direction:column;gap:10px}
  .step{background:#fff;border:1px solid #f0e6c8;border-radius:12px;padding:13px 15px;font-size:17px;line-height:1.7;color:#2a3360;display:flex;gap:11px;align-items:flex-start;animation:slidein .35s ease}
  @keyframes slidein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .step .sn{flex:none;width:28px;height:28px;border-radius:8px;background:var(--xp);color:#fff;font-weight:800;display:grid;place-items:center;font-size:14px}
  .reveal-btn{margin-top:12px;width:100%;border:none;border-radius:12px;padding:13px;font-family:inherit;font-size:16px;font-weight:800;color:#9a6b00;background:#fdeec2;cursor:pointer}
  .reveal-btn:active{transform:scale(.98)}

  /* 多媒体交互组件 */
  .media-wrap{background:linear-gradient(135deg,#f4f7ff,#eef2ff);border:1px solid #d4ddf6;border-radius:var(--r2);padding:16px;margin-bottom:14px}
  .media-h{font-weight:800;font-size:16.5px;color:#2a3360;margin-bottom:4px;display:flex;align-items:center;gap:8px}
  .media-cap{font-size:14px;color:var(--muted);text-align:center;margin-top:9px;line-height:1.5}
  .open-ta{width:100%;min-height:130px;border:2px solid var(--line);border-radius:14px;padding:13px;font-family:inherit;font-size:17px;line-height:1.6;color:var(--ink);background:#fbfcff;resize:vertical;margin:6px 0}
  .open-ta:focus{outline:none;border-color:var(--math)}
  .chain-row{display:flex;align-items:center;justify-content:center;gap:4px;flex-wrap:wrap;margin:6px 0}
  .chain-card{background:#fff;border:2px solid var(--line);border-radius:12px;padding:8px 6px;text-align:center;min-width:62px;transition:all .15s}
  .chain-card.on{border-color:var(--sci);background:#faf5ff;transform:translateY(-3px);box-shadow:0 6px 14px rgba(168,85,247,.25)}
  .chain-card .ce{font-size:28px} .chain-card .cn{font-size:11.5px;font-weight:800;color:#2a3360;margin-top:2px}
  .chain-arrow{font-size:14px;opacity:.65}
  .mreadout{text-align:center;font-weight:800;font-size:19px;color:#2a3360;margin-top:10px}
  .mctrl{display:flex;gap:10px;justify-content:center;align-items:center;margin-top:11px;flex-wrap:wrap}
  .mbtn{border:1px solid var(--line);background:#fff;border-radius:11px;padding:9px 15px;font-family:inherit;font-size:14.5px;font-weight:700;cursor:pointer;color:#2a3360}
  .mbtn.on{background:var(--math);color:#fff;border-color:var(--math)}
  .mbtn:active{transform:scale(.96)}
  input[type=range]{width:200px;accent-color:var(--math)}
  .fbar{display:flex;gap:4px;height:66px;margin:12px 0}
  .fseg{flex:1;border:2px solid #c9d4f0;border-radius:9px;background:#fff;cursor:pointer;transition:background .1s}
  .fseg.on{background:var(--math);border-color:var(--math)}
  .dgrid{display:grid;grid-template-columns:repeat(10,1fr);gap:2px;max-width:230px;margin:10px auto}
  .dcell{aspect-ratio:1;border:1px solid #d4ddf6;background:#fff;cursor:pointer;border-radius:2px}
  .dcell.on{background:var(--math);border-color:var(--math)}
  .fpics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:6px}
  @media(max-width:420px){.fpics{grid-template-columns:repeat(2,1fr)}}
  .fpic{background:#fff;border:2px solid var(--line);border-radius:14px;padding:12px 8px;text-align:center;cursor:pointer}
  .fpic:active{transform:scale(.97)} .fpic.on{border-color:var(--fr);background:#effdfa}
  .fpic .e{font-size:36px} .fpic .w{font-weight:800;color:var(--fr);margin-top:4px;font-size:15px} .fpic .m{font-size:12px;color:var(--muted)}
  .msvg{display:block;margin:4px auto;max-width:100%}
  .gear{transform-box:fill-box;transform-origin:center}
  .gear.spin1{animation:gspin 3.2s linear infinite} .gear.spin2{animation:gspinr 3.2s linear infinite}
  @keyframes gspin{to{transform:rotate(360deg)}} @keyframes gspinr{to{transform:rotate(-360deg)}}

  .checkblock{background:#fff;border:2px solid var(--line);border-radius:var(--r2);padding:16px;margin-bottom:13px}
  .checkblock .cl{font-size:13px;font-weight:800;color:var(--xp-d);margin-bottom:8px;display:flex;align-items:center;gap:7px}

  .qwrap{flex:1;display:flex;flex-direction:column}
  .tierbadge{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:800;padding:4px 11px;border-radius:999px;margin-bottom:8px;width:fit-content}
  .tierbadge.t1{background:#e7f9ee;color:var(--t1)} .tierbadge.t2{background:#e7f3ff;color:var(--t2)} .tierbadge.t3{background:#f6edff;color:var(--t3)}
  .qrow{display:flex;align-items:flex-start;gap:10px;margin:6px 0 4px}
  .q-prompt{font-size:23px;font-weight:800;line-height:1.45;color:var(--ink);flex:1}
  .q-prompt.big{font-size:50px;text-align:center;margin:8px 0;font-family:var(--cjk)}
  .passage{background:var(--paper2);border:1px solid var(--line);border-radius:var(--r2);padding:16px;font-size:17px;line-height:1.8;margin-bottom:14px;color:#2a3360;position:relative}
  .passage .pspk{position:absolute;right:12px;top:12px}
  .audio-row{display:flex;flex-direction:column;align-items:center;gap:9px;margin:8px 0 14px}
  .play{background:linear-gradient(135deg,#23a7ff,#5b67e8);color:#fff;border:none;border-radius:999px;padding:16px 30px;font-size:19px;font-weight:800;cursor:pointer;font-family:inherit;box-shadow:0 8px 20px rgba(35,167,255,.4);display:flex;align-items:center;gap:10px}
  .play:active{transform:scale(.96)}
  .pinyin{font-size:14px;color:var(--muted);font-weight:700;letter-spacing:.5px}
  .opts{display:flex;flex-direction:column;gap:11px;margin-top:10px}
  .opt{background:var(--paper);border:2px solid var(--line);border-radius:var(--r2);padding:16px 17px;font-size:19px;font-weight:700;cursor:pointer;text-align:left;font-family:inherit;color:var(--ink);transition:border-color .12s,background .12s,transform .08s;display:flex;align-items:center;gap:12px}
  .opt:active{transform:scale(.99)}
  .opt .k{width:28px;height:28px;border-radius:9px;background:var(--paper2);display:grid;place-items:center;font-size:14px;font-weight:800;color:var(--muted);flex:none;border:1px solid var(--line)}
  .opt .otext{flex:1}
  .opt .ospk{flex:none;width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:#fff;font-size:15px;color:var(--math-d);cursor:pointer;display:grid;place-items:center}
  .opt.ok{border-color:var(--ok);background:var(--okbg)} .opt.ok .k{background:var(--ok);color:#fff;border-color:var(--ok)}
  .opt.no{border-color:var(--no);background:var(--nobg)} .opt.no .k{background:var(--no);color:#fff;border-color:var(--no)}
  .opt.dim{opacity:.55} .opt[disabled]{cursor:default}
  .explain{margin-top:14px;background:var(--paper2);border-left:5px solid var(--math);border-radius:11px;padding:13px 15px;font-size:16px;line-height:1.65;color:#2a3360}
  .explain.ok{border-left-color:var(--ok)} .explain.no{border-left-color:var(--no)} .explain b{color:var(--ink)}
  .dots{display:flex;gap:5px;flex-wrap:wrap;max-width:150px;justify-content:flex-end}
  .pd{width:9px;height:9px;border-radius:999px;background:var(--line)}
  .pd.on{background:var(--xp)} .pd.ok{background:var(--ok)} .pd.no{background:var(--no)}
  .st-foot{margin-top:16px}
  .bigbtn{width:100%;border:none;border-radius:var(--r2);padding:16px;font-family:inherit;font-size:16.5px;font-weight:800;color:#fff;cursor:pointer}
  .bigbtn:active{transform:scale(.98)}
  .bigbtn.next{background:linear-gradient(135deg,var(--xp),var(--xp-d));box-shadow:0 8px 20px rgba(245,158,11,.35)}
  .bigbtn.go{background:linear-gradient(135deg,var(--ok),var(--en-d,#16a34a));box-shadow:0 8px 20px rgba(22,163,74,.35)}
  .bigbtn.train{background:linear-gradient(135deg,#ff7a59,#ff5d5d);box-shadow:0 8px 20px rgba(255,93,93,.35)}
  .bigbtn.retry{background:linear-gradient(135deg,#8b93f0,#5b67e8);box-shadow:0 8px 20px rgba(91,103,232,.3)}
  .foot2{display:flex;gap:10px} .foot2 .bigbtn{flex:1}

  .trace-wrap{background:var(--paper2);border:1px solid var(--line);border-radius:var(--r2);padding:16px;margin-bottom:14px;text-align:center}
  .trace-h{font-weight:800;font-size:16px;color:#2a3360;margin-bottom:10px;display:flex;align-items:center;gap:8px;justify-content:center}
  .trace-chips{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:12px}
  .tchip{width:48px;height:48px;border-radius:11px;border:2px solid var(--line);background:#fff;font-size:25px;font-weight:700;cursor:pointer;color:var(--ink);font-family:var(--cjk)}
  .tchip.on{border-color:var(--cn);background:#fff0f0;color:var(--cn-d)}
  #traceCanvas{border-radius:14px;background:#fff;border:2px solid var(--line);touch-action:none;display:block;margin:0 auto;max-width:88%}
  .trace-tools{display:flex;gap:10px;justify-content:center;margin-top:11px}
  .ttbtn{border:1px solid var(--line);background:#fff;border-radius:10px;padding:9px 16px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;color:#2a3360}
  .ttbtn.hear{color:var(--math-d)}

  .result{background:var(--paper);border-radius:var(--r);padding:28px 20px;box-shadow:var(--shadow);text-align:center}
  .result .emoji{font-size:72px;animation:pop .5s cubic-bezier(.2,1.4,.4,1)}
  @keyframes pop{0%{transform:scale(0)}100%{transform:scale(1)}}
  .result h2{margin:10px 0 4px;font-size:25px}
  .result .score{font-size:52px;font-weight:900;color:var(--math);margin:6px 0}
  .tierline{display:flex;gap:8px;justify-content:center;margin:6px 0 12px;flex-wrap:wrap}
  .tierscore{font-size:13px;font-weight:800;padding:5px 12px;border-radius:999px}
  .ts1{background:#e7f9ee;color:var(--t1)} .ts2{background:#e7f3ff;color:var(--t2)} .ts3{background:#f6edff;color:var(--t3)}
  .result .xpgain{display:inline-flex;align-items:center;gap:8px;background:var(--paper2);border:1px solid var(--line);border-radius:999px;padding:10px 20px;font-weight:800;font-size:17px;color:var(--xp-d);margin:6px 0 18px}
  .result .home-btn{width:100%;border:none;border-radius:var(--r2);padding:16px;font-family:inherit;font-size:16.5px;font-weight:800;color:#fff;cursor:pointer;background:linear-gradient(135deg,#5b67e8,#7c3aed)}
  .redo-btn{background:linear-gradient(135deg,#ff7a59,#ff5d5d)!important;margin-bottom:11px}

  .panel{background:var(--paper);border-radius:var(--r);padding:22px;box-shadow:var(--shadow)}
  .panel-h{display:flex;align-items:center;gap:11px;margin-bottom:6px}
  .panel-h h2{margin:0;font-size:19px;font-weight:800}
  .rep-ver{display:inline-block;font-size:13px;font-weight:800;color:#fff;background:linear-gradient(135deg,#5b67e8,#7c3aed);padding:5px 12px;border-radius:999px;margin:2px 0 14px}
  .rep-meta{font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.6}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;margin-bottom:18px}
  .stat{background:var(--paper2);border:1px solid var(--line);border-radius:var(--r2);padding:14px;text-align:center}
  .stat .n{font-size:25px;font-weight:900} .stat .l{font-size:12px;color:var(--muted);font-weight:700;margin-top:2px}
  .rep-sec{margin-top:18px}
  .rep-sec h3{font-size:15px;margin:0 0 9px;font-weight:800;display:flex;align-items:center;gap:7px}

  {q:"「这件事看起来一________简单，做起来却很难。」填一个字（表示「像那样」）。", t:"fill", a:["般"], tier:3, e:"一般=像那样；本题复习「般」。", hint:"一个字"},
  {q:"「他从________到现在都没变过。」横线处填一个字（表示「开头」）。", t:"fill", a:["始"], tier:3, e:"从始至今；复习「始」。", hint:"一个字"},
  {q:"「老师在________里给我们上课。」横线填两个字。", t:"fill", a:["教室"], tier:2, e:"教室。", hint:"两个字"},

{id:"ZH19", subj:"cn", icon:"📜", title:"阅读理解·画蛇添足", en:"Reading: Fable II", tag:"core",
 lesson:{ cards:[
   {t:"抓住关键转折", b:"读故事注意「结果的转折」：本来要赢的人，因为做了多余的事，最后输了。问自己：他为什么输？"},
   {t:"体会人物心理", b:"「得意」「夸口」这些词透露人物自满的心理；自满往往是失败的开始。"}],
  example:{t:"做推断", prob:"画脚的人「左手拿酒、右手画脚」，说明他当时——", steps:[
   "第一步 —— 他以为自己稳赢了。","第二步 —— 所以分心去画脚、还拿着酒。","第三步 —— 推断：他骄傲自满、掉以轻心。"]},
  check:[{q:"读寓言时最该想清楚的是——", o:["它要告诉的道理","人物叫什么","酒有多少","谁的字好看"], a:0, e:"寓言重道理。"}] },
 training:[
  {q:"几个人比赛画什么来决定谁喝酒？", passage:P_HUASHE, o:["蛇","马","船","龙"], a:0, tier:1, e:"画蛇。"},
  {q:"那个先画完的人为什么最后没喝到酒？", passage:P_HUASHE, o:["他多此一举去给蛇添脚，被别人赶上","他不爱喝酒","酒洒了","蛇跑了"], a:0, tier:2, e:"添足耽误，被超过。"},
  {q:"「他左手拿酒，右手又画起脚来」表现他——", passage:P_HUASHE, o:["骄傲自满、掉以轻心","非常紧张","很有礼貌","画得很慢"], a:0, tier:3, e:"自满轻敌。"},
  {q:"另一个人夺酒时说的理由是——", passage:P_HUASHE, o:["蛇本来就没有脚","酒是我的","你画得不好","时间到了"], a:0, tier:2, e:"蛇无脚，添足多余。"},
  {q:"这个故事告诉我们——", passage:P_HUASHE, o:["做事不要多此一举，恰到好处就行","画画要快","蛇会咬人","喝酒不好"], a:0, tier:2, e:"勿画蛇添足。"},
  {q:"下面哪些词能形容那个画脚的人？", passage:P_HUASHE, t:"multi", o:["自作聪明","骄傲","谦虚","谨慎"], a:[0,1], tier:3, e:"他自作聪明又骄傲。"},
  {q:"「到头来一口酒也没喝到」中「到头来」的意思是——", passage:P_HUASHE, o:["最后、结果","在路上","一开始","非常"], a:0, tier:2, e:"到头来=结果。"},
  {q:"如果用一个成语概括这个故事，最合适的是——", passage:P_HUASHE, o:["画蛇添足","守株待兔","亡羊补牢","熟能生巧"], a:0, tier:2, e:"本故事=画蛇添足出处。"},
  {q:"作者写「他得意地说」，是为了——", passage:P_HUASHE, o:["突出他的自满，为后面失败作铺垫","说明他很善良","表示天气好","凑字数"], a:0, tier:3, e:"铺垫失败。"},
  {q:"填空：蛇本来就没有________，所以不该添。", passage:P_HUASHE, t:"fill", a:["脚"], tier:2, e:"蛇无脚。", hint:"一个字"},
  {q:"从这个故事，我们可以推断作者更欣赏——", passage:P_HUASHE, o:["做事恰到好处的人","动作最快的人","话最多的人","拿酒的人"], a:0, tier:3, e:"恰到好处、不画蛇添足。"},
  {q:"「谁先把蛇画好，就归谁喝」这句话的作用是——", passage:P_HUASHE, o:["定下比赛规则，引出后面的故事","描写风景","介绍人物长相","抒发感情"], a:0, tier:2, e:"立规则、起情节。"},
  {q:"这个寓言和「自相矛盾」相比，共同点是——", passage:P_HUASHE, o:["都讽刺人做事不合情理","都讲打仗","都讲动物","都讲天气"], a:0, tier:3, e:"都讽刺不合理的言行。"}
 ]},

{id:"ZH20", subj:"cn", icon:"🩺", title:"病句·近义词·标点 + 识字 Day 22", en:"Editing II", tag:"fix",
 traceDay:22, trace:["象","像","等","觉","错","题"],
 lesson:{ cards:[
   {t:"更多病句类型", b:"①语序不当：「我们讨论并听取了报告」（应先听取再讨论）。\n②否定不当：「难道我们不应该不努力吗？」（多重否定绕晕）。\n③不合逻辑：「他是全校唯一的几个尖子生之一」（唯一与几个矛盾）。"},
   {t:"近义词辨析", b:"「常常」≈经常；「连忙」≈赶紧（动作快）；「居然/竟然」≈出乎意料。\n选词要看语境的轻重和搭配。"},
   {t:"今天的新字", b:"象 像 等 觉 错 题——「大象、好像、等于、觉得、错题」常用。下面描一描。"}],
  example:{t:"改病句", prob:"「我们班取得好成绩的原因是大家努力造成的。」哪里错？", steps:[
   "第一步 —— 「原因是…造成的」句式杂糅。","第二步 —— 删「造成的」或删「原因是」。","第三步 —— 改：…是因为大家努力。"]},
  check:[{q:"「连忙」最接近——", o:["赶紧","慢慢","也许","一直"], a:0, e:"连忙=赶紧。"}] },
 training:[
  {q:"下面哪一句语序不当（顺序错了）？", o:["他打开书包，拿出课本。","会上，我们讨论并听取了这份报告。","春天来了，花开了。","他认真地做作业。"], a:1, tier:3, e:"应「听取并讨论」——先听取后讨论，原句顺序颠倒。"},
  {q:"选出所有的病句。", t:"multi", o:["他是全班唯一的几个高个子之一。","难道我们不应该爱护环境吗？","经过努力，他的成绩提高了。","树上有许多只小鸟。"], a:[0], tier:3, e:"①「唯一」与「几个」矛盾；其余通顺。"},
  {q:"「妈妈连忙跑过来扶住我。」「连忙」表示——", o:["动作很快、赶紧","很慢","偶尔","故意"], a:0, tier:1, e:"连忙=赶紧。"},
  {q:"「他________得这道题很难。」横线填两个字（表示心里认为）。", t:"fill", a:["觉"], tier:3, e:"觉得；本题填「觉」。", hint:"一个字"},
  {q:"「大________的鼻子很长。」横线填一个字。", t:"fill", a:["象"], tier:2, e:"大象。", hint:"一个字"},
  {q:"「这朵云________一只小兔子。」横线填一个字（表示相似）。", t:"fill", a:["像"], tier:3, e:"好像、像。", hint:"一个字"},
  {q:"下面哪些句子有语病或标点错误？", t:"multi", o:["你吃饭了吗。","他高兴地说：太好了！","这本书很有意思、很好看。","我们要保护小动物。"], a:[0,2], tier:3, e:"①疑问句用问号；③顿号误用（应用「，」连接两个分句）。"},
  {q:"「3 加 4 ________ 7。」横线填一个字（表示「相同」）。", t:"fill", a:["等"], tier:2, e:"等于。", hint:"一个字"},
  {q:"把病句改对：「为了防止溺水事故不再发生，学校加强了教育。」应——", o:["删掉「不再」（否定不当）","加逗号","换问号","没有错"], a:0, tier:3, e:"「防止…不再发生」=否定不当。"},
  {q:"「他做完了所有的________，没有一道做错。」横线填一个字。", t:"fill", a:["题"], tier:2, e:"题目；填「题」。", hint:"一个字"},
  {q:"「常常」和「连忙」的区别是——", o:["「常常」指经常，「连忙」指动作快","完全一样","都表示慢","都表示频率"], a:0, tier:2, e:"频率 vs 速度。"},
  {q:"「这次他________考了满分，太让人意外了！」横线填两个字。", t:"fill", a:["竟然","居然"], tier:3, e:"出乎意料；复习「竟」。", hint:"两个字"},
  {q:"选出用词重复啰嗦的句子。", t:"multi", o:["他大约估计有五十人。","我看完了这本书。","他们彼此互相帮助。","操场上很热闹。"], a:[0,2], tier:3, e:"①「大约」「估计」重复；③「彼此」「互相」重复。"}
 ]},

{id:"MA20", subj:"math", icon:"🧮", title:"Order of Ops · Equations · Word Problems", en:"运算顺序·方程·应用题", tag:"core",

  {q:"48 candies are shared equally among 6 kids. Then each kid eats 3. How many does each kid have left?", t:"fill", kind:"num", a:["5"], tier:3, e:"48÷6=8, 8−3 = 5."},
  {q:"Solve: x − 9 = 6. x = ?", t:"fill", kind:"num", a:["15"], tier:3, e:"6 + 9 = 15."}
 ]},

{id:"SC9", subj:"sci", icon:"🪐", title:"The Solar System", en:"太阳系", tag:"new",
 lesson:{ media:[{type:"lightray", title:"The Sun's light", cap:"The Sun gives light and heat to the planets."}],
  cards:[
   {t:"The Sun and eight planets", b:"The Sun is a STAR at the centre. Eight planets ORBIT (travel around) it: Mercury, Venus, Earth, Mars (small and rocky), then Jupiter, Saturn, Uranus, Neptune (large gas giants). Jupiter is the largest planet."},
   {t:"Spin and orbit", b:"Earth SPINS on its axis once a day — that gives us day and night. Earth ORBITS the Sun once a year. GRAVITY is the force that keeps planets moving around the Sun and the Moon around Earth."},
   {t:"The Moon", b:"The Moon orbits Earth. It does not make its own light — it reflects sunlight. As it moves, we see different phases (new, crescent, full)."}],
  example:{t:"Why day and night?", prob:"What causes day and night on Earth?", steps:[
   "Step 1 — Day/night is NOT caused by the Sun moving.","Step 2 — Earth spins (rotates) on its axis.","Step 3 — The side facing the Sun has day; the other has night."]},
  check:[{q:"The Sun is a —", o:["star","planet","moon","comet"], a:0, e:"The Sun is a star."}] },
 training:[
  {q:"What is at the CENTRE of the solar system?", o:["the Sun","Earth","the Moon","Jupiter"], a:0, tier:1, e:"The Sun is at the centre."},
  {q:"What causes day and night on Earth?", o:["Earth spinning on its axis","the Sun orbiting Earth","the Moon's light","clouds"], a:0, tier:2, e:"Earth's rotation."},
  {q:"Which is the LARGEST planet?", o:["Jupiter","Earth","Mars","Mercury"], a:0, tier:2, e:"Jupiter is largest."},
  {q:"The force that keeps planets orbiting the Sun is —", o:["gravity","magnetism","wind","light"], a:0, tier:2, e:"Gravity."},
  {q:"Which planets are the small, ROCKY (inner) planets? (select all)", t:"multi", o:["Mercury","Venus","Earth","Jupiter"], a:[0,1,2], tier:3, e:"Jupiter is a gas giant."},
  {q:"The Moon shines because it —", o:["reflects sunlight","burns like the Sun","is made of light","has lamps"], a:0, tier:2, e:"It reflects the Sun's light."},
  {q:"Earth takes about ONE YEAR to —", o:["orbit the Sun once","spin once","reach the Moon","cross a country"], a:0, tier:2, e:"One revolution = one year."},
  {q:"Which statements about the Sun are TRUE? (select all)", t:"multi", o:["It gives light and heat.","It is a star.","It is the centre of the solar system.","It orbits the Earth."], a:[0,1,2], tier:3, e:"Planets orbit the Sun, not the reverse."},
  {q:"Which is the correct order STARTING from the Sun?", o:["Mercury, Venus, Earth, Mars","Earth, Mercury, Mars, Venus","Mars, Earth, Venus, Mercury","Venus, Earth, Mercury, Mars"], a:0, tier:3, e:"Mercury is closest."},
  {q:"A 'gas giant' is a planet that is —", o:["very large and made mostly of gas","small and rocky","made of water only","a kind of star"], a:0, tier:2, e:"E.g. Jupiter, Saturn."},
  {q:"Earth spinning once takes about —", o:["one day","one year","one month","one hour"], a:0, tier:1, e:"One rotation = one day."},
  {q:"Which of these ORBIT something? (select all)", t:"multi", o:["Earth orbits the Sun","the Moon orbits Earth","planets orbit the Sun","the Sun orbits Earth"], a:[0,1,2], tier:3, e:"The Sun does not orbit Earth."},
  {q:"Besides planets, the solar system also contains —", o:["asteroids and comets","oceans of air","other suns nearby","clouds of rain"], a:0, tier:2, e:"Asteroids, comets, moons."},
  {q:"The Moon's changing shapes in the sky are called its —", o:["phases","seasons","orbits","stars"], a:0, tier:2, e:"Moon phases."},
  {q:"Why is Mercury hotter on its Sun side than Neptune?", o:["it is much closer to the Sun","it is larger","it spins faster","it has more moons"], a:0, tier:3, e:"Closer to the Sun = more heat."},
  {q:"Which sentence is TRUE?", o:["The Sun is much bigger than Earth.","Earth is bigger than the Sun.","The Moon is bigger than the Sun.","All planets are the same size."], a:0, tier:1, e:"The Sun is far bigger than Earth."}
 ]},

{id:"SC10", subj:"sci", icon:"🌧️", title:"Weather & the Water Cycle", en:"天气与水循环", tag:"new",
 lesson:{ cards:[
   {t:"The water cycle", b:"Water moves in a never-ending cycle, powered by the SUN.\n1) EVAPORATION: the Sun heats water in oceans/lakes; it turns into invisible water vapour (gas) and rises.\n2) CONDENSATION: high up it cools and turns back into tiny droplets that form CLOUDS.\n3) PRECIPITATION: droplets join, get heavy, and fall as rain or snow.\n4) COLLECTION: water gathers in rivers, lakes, and oceans — and it starts again."},
   {t:"Three states of water", b:"In the cycle water changes state: liquid (water), gas (vapour), and solid (ice/snow)."},
   {t:"Weather vs climate", b:"WEATHER is what it's like today (sunny, rainy). CLIMATE is the usual weather of a place over many years."}],
  example:{t:"Where do puddles go?", prob:"After rain, a puddle slowly disappears on a sunny day. Why?", steps:[
   "Step 1 — The Sun heats the water.","Step 2 — The water evaporates into vapour.","Step 3 — So the puddle dries up."]},
  check:[{q:"What POWERS the water cycle?", o:["the Sun","the Moon","wind only","ice"], a:0, e:"The Sun's heat drives it."}] },
 training:[
  {q:"When the Sun heats water and it turns into vapour, this is —", o:["evaporation","condensation","precipitation","collection"], a:0, tier:1, e:"Evaporation."},
  {q:"When water vapour cools and forms clouds, this is —", o:["condensation","evaporation","precipitation","freezing"], a:0, tier:2, e:"Condensation."},
  {q:"Rain and snow falling from clouds is called —", o:["precipitation","evaporation","condensation","collection"], a:0, tier:2, e:"Precipitation."},
  {q:"What powers the whole water cycle?", o:["the Sun","the Moon","electricity","gravity only"], a:0, tier:1, e:"The Sun."},
  {q:"Put the water cycle in ORDER (which comes first)?", o:["evaporation → condensation → precipitation","precipitation → evaporation → condensation","condensation → precipitation → evaporation","collection → condensation → evaporation"], a:0, tier:3, e:"Evaporation first."},
  {q:"Which are forms of PRECIPITATION? (select all)", t:"multi", o:["rain","snow","hail","clouds"], a:[0,1,2], tier:3, e:"Clouds form by condensation, not precipitation."},
  {q:"Clouds are made of —", o:["tiny water droplets","smoke","cotton","dust only"], a:0, tier:2, e:"Condensed water droplets."},
  {q:"Which describes WEATHER (not climate)?", o:["It is raining right now.","Egypt is usually hot and dry.","This region has cold winters every year.","The desert gets little rain over many years."], a:0, tier:3, e:"Weather = today; climate = long-term."},
  {q:"In the water cycle, water can be in which states? (select all)", t:"multi", o:["liquid","gas (vapour)","solid (ice/snow)","plasma"], a:[0,1,2], tier:3, e:"Liquid, gas, solid."},
  {q:"Why does a wet towel dry in the sun?", o:["water evaporates","water condenses","it rains","it freezes"], a:0, tier:2, e:"Evaporation."},
  {q:"Water vapour is —", o:["water as a gas","water as ice","a kind of cloud you can hold","liquid rain"], a:0, tier:2, e:"Gas state of water."},
  {q:"Which statements about the water cycle are TRUE? (select all)", t:"multi", o:["It has no real end — it repeats.","The Sun drives it.","Water changes state during it.","Water is destroyed at the end."], a:[0,1,2], tier:3, e:"Water is recycled, never destroyed."},
  {q:"Most evaporation on Earth happens from the —", o:["oceans","deserts","mountains","caves"], a:0, tier:2, e:"Oceans hold most water."},
  {q:"Climate is —", o:["the usual weather over many years","today's weather","a single storm","a type of cloud"], a:0, tier:2, e:"Long-term pattern."},
  {q:"Dew forms on grass in the morning because water vapour —", o:["condenses as it cools","evaporates","freezes into hail","disappears"], a:0, tier:3, e:"Cooling → condensation."},
  {q:"When it gets cold enough, precipitation may fall as —", o:["snow","steam","vapour","wind"], a:0, tier:1, e:"Snow (solid)."}
 ]},

{id:"EN16", subj:"en", icon:"🗼", title:"Reading: Literary II", en:"文学阅读·灯塔", tag:"core",
 lesson:{ cards:[
   {t:"Inference & character", b:"Work out what the author hints. A character's CHOICES show who they are — someone who helps others at once is brave and caring."},
   {t:"Simile vs metaphor", b:"A SIMILE compares using 'like' or 'as' ('like a brave star').\nA METAPHOR says one thing IS another, with no 'like/as' ('a sea of darkness')."}],
  example:{t:"Spot the simile", prob:"'Her lights were like a single brave star.' This is a —", steps:[
   "Step 1 — It compares the lights to a star.","Step 2 — It uses the word 'like'.","Step 3 — So it is a simile."]},
  check:[{q:"A comparison using 'like' or 'as' is a —", o:["simile","metaphor","verb","question"], a:0, e:"Simile uses like/as."}] },
 training:[
  {q:"Why did Mara light the great lamp every evening?", passage:P_LIGHT, o:["so ships in the dark could find their way","to keep warm","to read books","to scare birds"], a:0, tier:1, e:"To guide ships home."},
  {q:"What problem happened on the stormy night?", passage:P_LIGHT, o:["the power failed and the lamp went black","the lighthouse fell","Mara got lost","the ships sank"], a:0, tier:2, e:"Power failed; lamp went dark."},
  {q:"What did Mara do about it?", passage:P_LIGHT, o:["she lit candles and lanterns at the window","she went to sleep","she called for help and waited","she left the lighthouse"], a:0, tier:2, e:"She lit every candle/lantern."},
  {q:"'Without a moment's hesitation' shows that Mara was —", passage:P_LIGHT, o:["quick and brave","slow and unsure","scared and frozen","lazy"], a:0, tier:3, e:"She acted at once."},
  {q:"Which words best describe Mara? (select all)", passage:P_LIGHT, t:"multi", o:["brave","caring","selfish","gives up easily"], a:[0,1], tier:3, e:"Brave and caring."},
  {q:"'a sea of darkness' is an example of a —", passage:P_LIGHT, o:["metaphor","simile","question","list"], a:0, tier:3, e:"Says darkness IS a sea (no like/as) → metaphor."},
  {q:"What was the EFFECT of Mara's small lights?", passage:P_LIGHT, o:["a fishing boat sailed safely into harbour","the storm stopped","the lamp came back on","nothing changed"], a:0, tier:2, e:"The boat got in safely."},
  {q:"'Grateful' in the passage most nearly means —", passage:P_LIGHT, o:["thankful","angry","tired","afraid"], a:0, tier:2, e:"Grateful = thankful."},
  {q:"Why does the writer say her lights were 'not as bright as the lamp, but enough'?", passage:P_LIGHT, o:["to show even a small effort can help a lot","to say she failed","to describe the weather","to end the story quickly"], a:0, tier:3, e:"Small effort, big difference."},
  {q:"The lighthouse stands where 'the wind never seemed to rest.' This suggests the place is —", passage:P_LIGHT, o:["windy and harsh","calm and warm","crowded with people","silent"], a:0, tier:2, e:"Constant wind = harsh coast."},
  {q:"Which phrase from the story is a SIMILE?", o:["like a single brave star","the spiral stairs","every evening","the rocky coast"], a:0, tier:2, e:"'like a...' = simile."},
  {q:"The BEST theme (message) of this story is —", passage:P_LIGHT, o:["one caring person can make a big difference","lighthouses are tall","storms are scary","fishing is hard"], a:0, tier:3, e:"Theme: caring action matters."},
  {q:"What is the mood at the END of the story?", passage:P_LIGHT, o:["hopeful and warm","frightening","sad","angry"], a:0, tier:3, e:"Safe arrival at dawn = hopeful."},
  {q:"Which sentence is an INFERENCE (not stated directly)?", passage:P_LIGHT, o:["Mara cares deeply about the sailors' safety.","Mara lives in a lighthouse.","The lamp went black.","A boat reached the harbour."], a:0, tier:3, e:"Her caring is inferred from actions."}
 ]},

{id:"EN17", subj:"en", icon:"🐠", title:"Reading: Informational II", en:"说明文·珊瑚礁", tag:"core",
 lesson:{ cards:[
   {t:"Main idea & details", b:"The MAIN IDEA is the one big point of the whole text; details and facts support it. Ask: 'What is this mostly about?'"},
   {t:"Cause & effect, vocabulary", b:"Look for what makes something happen ('warm water → bleaching'). Use nearby words to figure out hard words."}],
  example:{t:"Main idea", prob:"A text explains what coral reefs are, how they form, and why they matter. The main idea is —", steps:[
   "Step 1 — Every part is about coral reefs.","Step 2 — It explains what they are and why they're important.","Step 3 — Main idea: coral reefs and why they matter."]},
  check:[{q:"The main idea is —", o:["the one big point of the whole text","a tiny detail","the title only","a hard word"], a:0, e:"The big overall point."}] },
 training:[
  {q:"What is the MAIN idea of the passage?", passage:P_CORAL, o:["what coral reefs are, how they form, and why they matter","that fish are colourful","how to swim in the ocean","why the ocean is warm"], a:0, tier:2, e:"Whole text = about reefs."},
  {q:"Coral reefs are built by —", passage:P_CORAL, o:["tiny animals called coral polyps","large fish","plants only","ocean waves"], a:0, tier:1, e:"Coral polyps."},
  {q:"Each polyp builds a hard cup out of —", passage:P_CORAL, o:["limestone","wood","plastic","sand grains glued together"], a:0, tier:2, e:"Limestone cup."},
  {q:"About how much ocean life do reefs shelter?", passage:P_CORAL, o:["about a quarter of all ocean species","none","all of it","two species"], a:0, tier:2, e:"~1/4 of ocean species."},
  {q:"What CAUSES coral bleaching?", passage:P_CORAL, o:["the ocean getting too warm","too many fish","bright sunlight at night","cold rain"], a:0, tier:3, e:"Too-warm water."},
  {q:"Which are TRUE about coral reefs? (select all)", passage:P_CORAL, t:"multi", o:["they are built by living animals","they shelter many species","they can bleach when water is too warm","they are made of plastic"], a:[0,1,2], tier:3, e:"Not plastic."},
  {q:"In the passage, 'shelter' most nearly means —", passage:P_CORAL, o:["give protection / a safe place","destroy","colour","melt"], a:0, tier:2, e:"Shelter = protect."},
  {q:"The author's main purpose is to —", passage:P_CORAL, o:["inform readers about coral reefs","tell a funny story","sell a fish tank","scare readers"], a:0, tier:2, e:"Informational."},
  {q:"How does a reef get so BIG over time?", passage:P_CORAL, o:["stony cups pile up over hundreds of years","one polyp grows huge","waves push sand into a pile","fish build it"], a:0, tier:3, e:"Cups accumulate over centuries."},
  {q:"'Bleaching' in the text refers to coral turning —", passage:P_CORAL, o:["white and weak","bright and strong","green","into rock"], a:0, tier:2, e:"White and weak."},
  {q:"Why does the author say protecting reefs matters?", passage:P_CORAL, o:["so much ocean life depends on them","they are pretty","they are easy to build","they make the water warm"], a:0, tier:3, e:"Many species depend on reefs."},
  {q:"The hard cup around a polyp is mainly for —", passage:P_CORAL, o:["protection","decoration","swimming","food"], a:0, tier:2, e:"Protection."},
  {q:"The BEST one-sentence summary is —", passage:P_CORAL, o:["Reefs are built by tiny animals and shelter much ocean life, so they need protecting.","Coral is colourful.","Fish like to hide.","The ocean is large."], a:0, tier:3, e:"Captures the whole text."},
  {q:"Which is a DETAIL, not the main idea?", passage:P_CORAL, o:["Each polyp builds a limestone cup.","Coral reefs are important and built by living animals.","The text is about coral reefs.","Reefs matter to ocean life."], a:0, tier:3, e:"The limestone cup is a supporting detail."}
 ]},

{id:"EN18", subj:"en", icon:"✒️", title:"Grammar & Conventions III", en:"句型·术语·治流水句", tag:"fix",
 lesson:{ cards:[
   {t:"Four sentence types", b:"DECLARATIVE states (.). INTERROGATIVE asks a question (?). IMPERATIVE gives a command (.). EXCLAMATORY shows strong feeling (!).\nTip: only an INTERROGATIVE asks something and ends with '?'."},
   {t:"Know your terms", b:"A CONJUNCTION joins ideas: and, but, so, because.\nA SIMILE compares with like/as. A METAPHOR says one thing IS another.\nThese are different — don't mix them up!"},
   {t:"Fix run-ons", b:"Run-on: 'It was dark we went home.' Fix with a period or a comma + conjunction: 'It was dark, so we went home.'"}],
  example:{t:"Which type?", prob:"'Where are my shoes?' is which type of sentence?", steps:[
   "Step 1 — It asks something.","Step 2 — It ends with a question mark.","Step 3 — So it is interrogative."]},
  check:[{q:"A word like 'and', 'but', 'so' is a —", o:["conjunction","simile","noun","question"], a:0, e:"Conjunction joins ideas."}] },
 training:[
  {q:"Which sentence is INTERROGATIVE (a question)?", o:["When does the bus arrive?","I am hungry.","What a goal!","Please sit down."], a:0, tier:1, e:"Only this one asks something."},
  {q:"Which sentence is EXCLAMATORY (strong feeling)?", o:["What an amazing view!","Where is the dog?","Close the door.","The sky is grey."], a:0, tier:1, e:"Strong feeling + '!'."},
  {q:"'Please pass the salt.' is which type?", o:["imperative (a command/request)","interrogative","exclamatory","a question"], a:0, tier:2, e:"It gives a request → imperative."},
  {q:"A word like 'and', 'but', 'because' is called a —", o:["conjunction","simile","metaphor","adverb"], a:0, tier:2, e:"Conjunction (NOT a simile)."},
  {q:"'as busy as a bee' is a —", o:["simile","metaphor","conjunction","question"], a:0, tier:2, e:"'as...as' = simile."},
  {q:"'The classroom was a zoo' is a —", o:["metaphor","simile","conjunction","command"], a:0, tier:3, e:"Says it IS a zoo (no like/as) → metaphor."},
  {q:"Choose the BEST fix for the run-on: 'The rain stopped we went outside.'", o:["The rain stopped, so we went outside.","The rain stopped we, went outside.","The rain, stopped we went outside.","The rain stopped went we outside."], a:0, tier:2, e:"Comma + 'so' joins the two ideas."},
  {q:"Select ALL the COMPLETE sentences.", t:"multi", o:["The team practised hard.","Birds fly south in winter.","Running across the field quickly.","We scored a goal!"], a:[0,1,3], tier:3, e:"'Running across the field quickly.' is a fragment."},
  {q:"Which words need a CAPITAL letter? (select all)", t:"multi", o:["paris","friday","table","mara"], a:[0,1,3], tier:3, e:"Place, day, name need capitals; 'table' is common."},
  {q:"Which punctuation ends a QUESTION?", o:["?",".","!",","], a:0, tier:1, e:"Question mark."},
  {q:"Which sentences are CORRECTLY punctuated? (select all)", t:"multi", o:["After dinner, we walked home.","Do you like apples?","i went to school monday","Wow, that was fast!"], a:[0,1,3], tier:3, e:"'i went to school monday' needs capitals."},
  {q:"'She sang, and the crowd cheered.' The word 'and' is a —", o:["conjunction","simile","noun","verb"], a:0, tier:2, e:"It joins two ideas → conjunction."},
  {q:"Which is a DECLARATIVE sentence?", o:["The library opens at nine.","Are you ready?","What a day!","Sit down, please."], a:0, tier:2, e:"It states a fact (.)."},
  {q:"Best way to fix: 'I like tea I do not like coffee.'", o:["I like tea, but I do not like coffee.","I like tea but I do not, like coffee.","I like, tea I do not like coffee.","I like tea I do not like, coffee."], a:0, tier:3, e:"Comma + 'but' joins the two ideas."}
 ]},

{id:"EN19", subj:"en", icon:"🖋️", title:"Writing Studio IV", en:"写作工坊·更强脚手架 (English only)", tag:"level",
 lesson:{ cards:[
   {t:"Write in English only ✍️", b:"This unit is in ENGLISH ONLY. Plan first. Each sentence = ONE idea. Begin with a CAPITAL letter. End with '.', '?', or '!'. Re-read aloud: if you run out of breath, split it into two sentences."},
   {t:"Use a simple plan", b:"Follow the frame given in each task (the words in quotes). Use linking words: First, Next, Then, Finally. Join two ideas with a comma + and / but / so."}],
  example:{t:"Plan a sentence", prob:"How do you keep a sentence from becoming a run-on?", steps:[
   "Step 1 — Put ONE idea in each sentence.","Step 2 — End it with '.', '?', or '!'.","Step 3 — Or join two ideas with a comma + and/but/so."]},
  check:[{q:"In this unit you must write in —", o:["English only","Chinese","any language","numbers"], a:0, e:"English only."}] },
 training:[
  {q:"✍️ Narrative (English only). Write 4 sentences. Use this frame:\n1) 'One morning, I found a ____.'\n2) 'It could ____.'\n3) 'So I ____.'\n4) 'In the end, ____.'\nEach sentence must start with a CAPITAL and end with a period.", t:"open", min:90, hint:"Fill each blank, one idea per sentence. End every sentence with '.'"},
  {q:"✍️ Descriptive (English only). Describe the beach in 4 sentences. Sentence 1 = what you SEE. Sentence 2 = what you HEAR. Sentence 3 = what you SMELL. Sentence 4 = MUST include a simile using 'as ... as' or 'like'.", t:"open", min:90, hint:"Example simile: 'the sand was as warm as toast'. One idea per sentence."},
  {q:"✍️ Opinion (English only). Should children have a pet? Use this frame:\n'I think children ____ have a pet.'\n'First, ____.'\n'Second, ____.'\n'That is why ____.'", t:"open", min:90, hint:"Give your opinion, then two reasons in their own sentences."},
  {q:"✍️ How-to (English only). Explain how to plant a seed in 4 sentences. Start them with: 'First,' / 'Next,' / 'Then,' / 'Finally,'. One step per sentence.", t:"open", min:90, hint:"Use First / Next / Then / Finally. End each with a period."},
  {q:"✍️ Compound sentences (English only). Write 3 sentences about a school trip. At least ONE sentence must join two ideas with a comma + 'and', 'but', or 'so'.", t:"open", min:80, hint:"Example: 'We saw the boats, and then we ate lunch.'"}
 ]},

/* ========================= 法语 French (English-first 指令 · 进阶) ========================= */
{id:"FR9", subj:"fr", icon:"🐚", title:"Être / Avoir Review · Pluriel", en:"是/有·复数·数字", tag:"fix",
 lesson:{ media:[{type:"frenchpics", title:"Écoute! Listen", items:[
     {fr:"je suis",en:"I am",emoji:"🙋"},{fr:"j'ai",en:"I have",emoji:"✋"},{fr:"nous sommes",en:"we are",emoji:"👥"},{fr:"six",en:"six",emoji:"6️⃣"}]}],
  cards:[
   {t:"ÊTRE = to be · AVOIR = to have", b:"ÊTRE: je suis (I am), tu es (you are), il/elle est (he/she is), nous sommes (we are).\nAVOIR: j'ai (I have), tu as (you have), il/elle a (he/she has).\nUse AVOIR for what you HAVE: 'J'ai un chien' = I have a dog (NOT 'Je suis')."},
   {t:"Plural & numbers", b:"Add -s for most plurals: un livre → deux livres.\nNumbers: six (6), sept (7), huit (8), neuf (9), dix (10)."}],
  example:{t:"Être or Avoir?", prob:"How do you say 'I have two cats'?", steps:[
   "Step 1 — 'have' = avoir → j'ai.","Step 2 — plural cats = chats (add -s).","Step 3 — 'J'ai deux chats.'"]},
  check:[{q:"'j'ai' means —", o:["I have","I am","you are","he is"], a:0, e:"avoir: j'ai = I have."}] },
 training:[
  {q:"Which is correct for 'I have a dog'?", o:["J'ai un chien.","Je suis un chien.","J'ai un chein.","Je es un chien."], a:0, tier:2, e:"avoir + correct spelling 'chien'."},
  {q:"'je suis' means —", o:["I am","I have","you are","we are"], a:0, tier:1, e:"être: je suis = I am."},
  {q:"To say 'he is tall', you use —", o:["il est","il a","je suis","tu es"], a:0, tier:2, e:"être: il est."},
  {q:"The plural of 'un livre' is —", o:["deux livres","deux livre","un livres","livre deux"], a:0, tier:2, e:"Add -s → livres."},
  {q:"Which matches are CORRECT? (select all)", t:"multi", o:["je suis = I am","j'ai = I have","nous sommes = we are","il a = he is"], a:[0,1,2], tier:3, e:"'il a' = he HAS, not 'he is'."},

/* ---- 状态与存储 ---- */
const KEY="sailor_pack_v12", PASS=0.6;
function fresh(){ return {xp:SEED.xp, v12Best:{}, v12Done:[], mistakes:[], box:[], writing:{}, traceDays:[], started:SEED.xp}; }
let state=load()||fresh();
if(!state.box) state.box=[];
if(!state.writing) state.writing={};
if(!state.traceDays) state.traceDays=[];
function load(){ try{ return JSON.parse(localStorage.getItem(KEY)); }catch(e){ return null; } }
function save(){ try{ localStorage.setItem(KEY,JSON.stringify(state)); }catch(e){} }

function beltFor(xp){ let b=BELTS[0]; for(const x of BELTS){ if(xp>=x.min) b=x; } return b; }
function nextBelt(xp){ return BELTS.find(x=>x.min>xp)||null; }
function trainCount(u){ return (u.training||[]).length; }
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function jsq(s){ return String(s).replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/\r?\n/g," "); }
function lang(s){ return s==="cn"?"zh-CN":s==="fr"?"fr-FR":"en-US"; }
function qByRef(ref){ const p=ref.split("#"); const u=UNITS.find(x=>x.id===p[0]); return u?{unit:u,item:u.training[+p[1]]}:null; }
function boxAdd(ref){ if(state.box.indexOf(ref)<0) state.box.push(ref); }
function boxDel(ref){ const i=state.box.indexOf(ref); if(i>=0) state.box.splice(i,1); }

/* ---- 多语朗读（离线优先） ---- */
let VOICES=[];
function loadVoices(){ try{ VOICES=window.speechSynthesis?window.speechSynthesis.getVoices():[]; }catch(e){ VOICES=[]; } }
if(window.speechSynthesis){ loadVoices(); window.speechSynthesis.onvoiceschanged=loadVoices; }
function spk(text, lg){
  lg=lg||"zh-CN";
  try{
    if(!('speechSynthesis' in window)){ toast("此设备无语音，看文字也可以"); return; }
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang=lg; u.rate=lg.indexOf("zh")===0?0.82:lg.indexOf("fr")===0?0.85:0.9; u.pitch=1.04;
    const re=lg.indexOf("zh")===0?/zh|chinese|中文|普通话|mandarin/i:lg.indexOf("fr")===0?/fr|french|français/i:/en|english/i;
    const v=VOICES.find(x=>re.test((x.lang||"")+(x.name||""))); if(v) u.voice=v;
    window.speechSynthesis.speak(u);
  }catch(e){ toast("看文字也可以哦"); }
}
function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),2300); }

/* =================== 预习课 =================== */
let st=null;
function startUnit(id){
  const u=UNITS.find(x=>x.id===id);
  st={unit:u, phase:"lesson", order:[], pos:0, qstate:new Array(trainCount(u)).fill("u"),
      tier:{1:[0,0],2:[0,0],3:[0,0]}, answered:false, revealed:0, checkState:{}, redoRound:false, bonusGiven:false, clearBonus:false};
  renderLesson();
}
function renderLesson(){
  const app=document.getElementById("app"); const u=st.unit, L=u.lesson||{};
  const lg=lang(u.subj); let body=""; const inits=[];
  (L.cards||[]).forEach((c)=>{
    body+=`<div class="concept"><div class="ch"><button class="spk" onclick="spk('${jsq(c.b)}','${lg}')">🔊</button><span>${esc(c.t)}</span></div><div class="cb">${esc(c.b)}</div></div>`;
  });
  (L.media||[]).forEach((m,mi)=>{
    const cid="media"+mi;
    body+=`<div class="media-wrap"><div class="media-h">🎬 ${esc(m.title||"动手试试")}</div><div id="${cid}"></div>${m.cap?`<div class="media-cap">${esc(m.cap)}</div>`:""}</div>`;
    inits.push(()=>buildMedia(m,cid));
  });
  if(u.trace && u.trace.length){
    body+=`<div class="trace-wrap"><div class="trace-h">✍️ 米字格描红：先听读，再用手指描写</div>
      <div class="trace-chips" id="traceChips">${u.trace.map((ch,i)=>`<button class="tchip ${i===0?'on':''}" onclick="selTrace(${i})">${ch}</button>`).join("")}</div>
      <canvas id="traceCanvas" width="260" height="260"></canvas>
      <div class="trace-tools"><button class="ttbtn hear" onclick="spk(TRACE.cur)">🔊 读一读</button><button class="ttbtn" onclick="clearTrace()">🧽 清除重写</button></div></div>`;
    inits.push(()=>initTrace(u.trace));
  }
  if(L.example){ const e=L.example;
    body+=`<div class="example"><div class="eh">📝 例题：${esc(e.t)}</div><div class="prob">${esc(e.prob)}</div><div class="steps" id="steps"></div>
      <button class="reveal-btn" id="revealBtn" onclick="revealStep()">▶ 展开第一步</button></div>`;
  }
  (L.check||[]).forEach((c,i)=>{ body+=`<div class="checkblock"><div class="cl">✅ 课中小测 ${i+1}</div>${qInner(c,"chk"+i,u.subj)}</div>`; });
  app.innerHTML=`<div class="stage">
    <div class="st-head"><button class="st-back" onclick="renderHome()">‹</button>
      <div class="st-title">${esc(u.title)}<span class="en">${esc(u.en)}</span></div><div class="phase-pill learn">📘 预习课</div></div>
    <div style="flex:1">${body}</div>
    <div class="st-foot"><button class="bigbtn train" onclick="enterTraining()">⚓ 进入训练 ${trainCount(u)} 题 ›</button></div>
  </div>`;
  inits.forEach(fn=>{ try{ fn(); }catch(e){} });
  window.scrollTo(0,0);
}
function revealStep(){
  const e=st.unit.lesson.example; st.revealed++;
  const box=document.getElementById("steps"); const n=st.revealed;
  const div=document.createElement("div"); div.className="step"; div.innerHTML=`<span class="sn">${n}</span><span>${esc(e.steps[n-1])}</span>`; box.appendChild(div);
  const btn=document.getElementById("revealBtn");
  if(n>=e.steps.length){ btn.style.display="none"; } else { btn.textContent="▶ 展开第 "+(n+1)+" 步"; }
}

/* ----- 题目内层（小测/训练/错题本共用） ----- */
function qInner(item, qid, subj){
  const lg=lang(subj); let h="";
  if(item.t==="open"){
    h+=`<div class="qrow"><div class="q-prompt" style="font-size:21px;line-height:1.5">${esc(item.q)}</div></div>`;
    if(item.hint) h+=`<div style="font-size:14.5px;color:var(--muted);margin:-2px 0 8px">💡 ${esc(item.hint)}</div>`;
    h+=`<textarea class="open-ta" id="open_${qid}" placeholder="在这里写… write here…"></textarea>`;
    h+=`<div id="exp_${qid}"></div>`;
    return h;
  }
  if(item.passage){ h+=`<div class="passage"><button class="spk sm pspk" onclick="spk('${jsq(item.passage)}','${lg}')">🔊</button>${esc(item.passage)}</div>`; }
  if(item.audio){ h+=`<div class="audio-row"><button class="play" onclick="spk('${jsq(item.audio)}','${lg}')">🔊 播放 Listen</button>${item.py?`<div class="pinyin">提示：${esc(item.py)}</div>`:""}</div>`; }

/* ----- 确定性洗牌：按题面，稳定；训练/重做/错题本一致 ----- */
function hashStr(s){ let h=2166136261>>>0; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619); } return h>>>0; }

function setEq(a,b){ if(a.length!==b.length) return false; const s=new Set(a); for(const x of b){ if(!s.has(x)) return false; } return true; }

/* ----- 填空判分（规范化：大小写/空格/句号；数值与分数等价） ----- */
function normAns(s){ return (""+s).trim().toLowerCase().replace(/\s+/g,"").replace(/[。．.]+$/,""); }

const TRACE={chars:[],cur:"",draw:false,ctx:null,last:null};
function initTrace(chars){
  TRACE.chars=chars; TRACE.cur=chars[0];
  const cv=document.getElementById("traceCanvas"); if(!cv) return;
  cv.style.touchAction="none"; TRACE.ctx=cv.getContext("2d"); drawTrace();
  const pos=(e)=>{ const r=cv.getBoundingClientRect(); return {x:(e.clientX-r.left)*(cv.width/r.width), y:(e.clientY-r.top)*(cv.height/r.height)}; };
  const dot=(p)=>{ const c=TRACE.ctx; c.fillStyle="#ff5d5d"; c.beginPath(); c.arc(p.x,p.y,6,0,Math.PI*2); c.fill(); };
  const line=(p)=>{ const c=TRACE.ctx; c.strokeStyle="#ff5d5d"; c.lineWidth=13; c.lineCap="round"; c.lineJoin="round"; c.beginPath(); c.moveTo(TRACE.last.x,TRACE.last.y); c.lineTo(p.x,p.y); c.stroke(); TRACE.last=p; };
  if('PointerEvent' in window){
    cv.onpointerdown=(e)=>{ e.preventDefault(); try{cv.setPointerCapture(e.pointerId);}catch(_){} TRACE.draw=true; TRACE.last=pos(e); dot(TRACE.last); };
    cv.onpointermove=(e)=>{ if(!TRACE.draw) return; e.preventDefault(); line(pos(e)); };
    const stop=(e)=>{ if(TRACE.draw){ TRACE.draw=false; try{cv.releasePointerCapture(e.pointerId);}catch(_){} } };
    cv.onpointerup=stop; cv.onpointercancel=stop; cv.onpointerleave=stop;
  } else {
    cv.onmousedown=(e)=>{ TRACE.draw=true; TRACE.last=pos(e); dot(TRACE.last); };
    cv.onmousemove=(e)=>{ if(!TRACE.draw) return; line(pos(e)); };
    window.addEventListener("mouseup",()=>{ TRACE.draw=false; });
    cv.ontouchstart=(e)=>{ e.preventDefault(); TRACE.draw=true; TRACE.last=pos(e.touches[0]); dot(TRACE.last); };
    cv.ontouchmove=(e)=>{ e.preventDefault(); if(!TRACE.draw) return; line(pos(e.touches[0])); };
    cv.ontouchend=()=>{ TRACE.draw=false; };
  }
}
function drawTrace(){
  const c=TRACE.ctx; if(!c) return; const W=260;
  c.clearRect(0,0,W,W); c.fillStyle="#fff"; c.fillRect(0,0,W,W);
  c.strokeStyle="#f0c8c8"; c.lineWidth=1; c.setLineDash([6,5]);
  c.beginPath(); c.moveTo(W/2,0); c.lineTo(W/2,W); c.moveTo(0,W/2); c.lineTo(W,W/2); c.moveTo(0,0); c.lineTo(W,W); c.moveTo(W,0); c.lineTo(0,W); c.stroke(); c.setLineDash([]);
  c.strokeStyle="#e3a9a9"; c.strokeRect(4,4,W-8,W-8);
  c.fillStyle="rgba(40,50,90,.16)"; c.textAlign="center"; c.textBaseline="middle";
  c.font='190px "PingFang SC","Hiragino Sans GB","Microsoft YaHei","Heiti SC","WenQuanYi Micro Hei",sans-serif';
  c.fillText(TRACE.cur, W/2, W/2+8);
}

<b>✍️ 写作进步与新问题：</b>流水句明显改善（句号、句首大写到位、句子变短）；但出现<b>中英混写、连贯性偏弱、拼写</b>问题。v12 写作工坊全程 English only，并提供<b>更强的句子脚手架</b>（每题给出可直接套用的句框）。<br><br>
<b>📈 难度校准：</b>v11 是修复后首份「干净」读数，错题集中、重做回升，落在有效困难区，证实难度方向正确。<br><br><b>⚙️ 本版关键修正：</b>v10 单选题正确答案有 97.6% 落在选项 A（孩子可能靠「一律选 A」刷高分，掌握度被高估）。v11 已根治：所有选项按题面做<b>确定性洗牌</b>（每题位置不同、训练与错题本一致），各位置占比已压到 ≤35%。因此 v11 是首份「干净」的难度读数。<br><br>
      <b>中文（最高优先）：</b>v10 回传错题集中在「理解语义/语境」的抽象层——成语运用、关联词复句、病句辨析。v11 全部为新题：成语<b>历史典故</b>（守株待兔／井底之蛙／亡羊补牢／对牛弹琴／掩耳盗铃／举一反三，含褒贬辨析）、<b>复句进阶</b>（不但…反而／与其…宁可／既然…就／之所以…是因为）、《愚公移山》<b>推断阅读</b>、<b>病句·多音字·标点</b>综合；续识字 Day 19（却竟居般确实）＋ Day 20（越够始终由各），累计 112→124 字。新增多选与填空，强迫主动产出而非识别。<br><br>
      <b>数学（重点 · 难度上推安省 G5）：</b>对标 Northmount「数学领先一级」。本版主攻<b>异分母分数</b>加减/约分通分/带分数、<b>小数与百分数</b>（数位对齐·×÷10·折扣税）、<b>几何与体积</b>（面积/周长/长方体体积/角/坐标）与<b>四则混合·多步应用题</b>（先括号后乘除·真实情境）。大量改为<b>填空与应用题</b>，要求孩子真正动笔计算；建议每天清错题本 3–5 题。<br><br>
      <b>英文（写作结构为靶心）：</b>v10 写作样本显示创意与投入度好，但句子边界仍几乎失控（通篇流水句、句末缺标点、句首不大写），且疑似语音转文字。v11 以 <b>Grammar &amp; Conventions Pro</b>（四类句型·标点·大写·<b>治流水句</b>：合并/拆分）＋ <b>Writing Studio III</b>（5 道写作工坊，每题给「一句一意·句末标点·一处合并句」脚手架）双管齐下；另配两篇全新阅读（文学《图书馆》推断＋说明文《火山》主旨/因果/词汇）。建议家长重点看下方写作作答的句号与大写。<br><br>
      <b>科学（强项 · 保持挑战）：</b>进阶到两个安省 G5 新主题——<b>人体与器官系统</b>（消化/呼吸/循环及其协作）与<b>电与能量</b>（完整电路·导体绝缘体·能量转换·可再生能源）；以多选与因果题维持难度。<br><br>
      <b>法语（补 v10 未完成的 FR5）：</b>v10 中 Sailor 跳过了一个法语单元，本版 FR7 专门补上：<b>être / avoir</b>、名词复数、高频词与数字；FR8 以动词（manger／boire／lire／aller／habiter）与一篇全新阅读（Emma 的一天）巩固，非照搬旧题。
    </div></div>
    <div class="rep-sec"><h3>✍️ 写作练习（孩子的作答，供家长批阅）</h3>${wh}</div>
    <div class="actions"><button class="abtn export" style="grid-column:1/-1" onclick="renderExport()">📤 导出数据包（回传生成 v13）</button></div>
  </div>`;
  window.scrollTo(0,0);
}

/* =================== 导出数据包 =================== */
function buildPacket(){
  const lessonsDone=SEED.lessonsDone.concat(state.v12Done.filter(id=>SEED.lessonsDone.indexOf(id)<0));
  const unitBest=Object.assign({}, SEED.unitBest, state.v12Best);
  let ziDaysDone=SEED.ziDaysDone.slice(), ziLearned=SEED.ziLearned, ziChars=SEED.ziChars;
  for(const u of UNITS){ if(u.trace && u.traceDay && state.traceDays.indexOf(u.traceDay)>=0){ if(ziDaysDone.indexOf(u.traceDay)<0) ziDaysDone.push(u.traceDay); ziLearned+=[...u.trace].length; ziChars+=u.trace.join(""); } }
  const w=weakChars(); const ziWeak=w.length?w.map(([c,n])=>c+":"+n):SEED.ziWeak;
  return {ver:"12.1", date:"2026-06-30", xp:state.xp, diag:SEED.diag, lessonsDone, unitBest, ziDaysDone, ziLearned, ziChars, ziWeak, boxRemaining:state.box.length, writingCount:Object.keys(state.writing).length, writing:state.writing, mistakes:state.mistakes};
}
function renderExport(){
  const json=JSON.stringify(buildPacket());
  document.getElementById("app").innerHTML=`<div class="panel">
    <div class="panel-h"><button class="st-back" onclick="renderHome()">‹</button><h2>导出学习数据包</h2></div>
    <div class="exp-note">把下面整段文字<b>全部复制</b>，发给 Claude，就能生成下一版（v13）。<br>含：XP、各单元成绩、生字进度、错题（带难度档）、错题本剩余数。</div>
    <textarea class="exp-ta" id="expTA" readonly onclick="this.select()">====== Sailor 学习数据包（整段复制，发给 Claude）======
${json}
====== 数据包结束 · 生成于 2026-06-25 ======</textarea>
    <button class="copy-btn" id="copyBtn" onclick="copyPacket()">📋 复制数据包 Copy</button></div>`;
  window.scrollTo(0,0);
}
function copyPacket(){
  const ta=document.getElementById("expTA"); ta.select(); ta.setSelectionRange(0,ta.value.length);
  let ok=false; try{ ok=document.execCommand("copy"); }catch(e){}
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(ta.value).then(()=>{},()=>{}); ok=true; }
  const b=document.getElementById("copyBtn"); if(ok){ b.textContent="✓ 已复制 Copied"; b.classList.add("done"); toast("已复制，去粘贴给 Claude 吧"); } else { toast("请长按文本框手动复制"); }
}
function resetAll(){ if(confirm("确定重置本机进度吗？\nXP 会回到 "+SEED.xp.toLocaleString()+"，本轮成绩、错题、错题本清空。")){ state=fresh(); save(); renderHome(); toast("已重置"); } }

renderHome();
</script>
