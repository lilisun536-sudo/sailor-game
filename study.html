<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sailor 航海学堂 · v15.0</title>
<style>
  :root{
    --bg1:#06192e; --bg2:#0b3a4f; --bg3:#0f5163;
    --ink:#0c1230; --paper:#ffffff; --paper2:#f4f7ff; --muted:#6b7396; --line:#e3e9f7;
    --cn:#ff5d5d; --math:#23a7ff; --sci:#a855f7; --en:#22c55e; --fr:#14b8a6;
    --cn-d:#e23c3c; --math-d:#0d86df;
    --xp:#ffb020; --xp-d:#f59e0b; --gold:#ffd24a;
    --ok:#16a34a; --okbg:#e7f9ee; --no:#e23c3c; --nobg:#fdecec;
    --t1:#22c55e; --t2:#23a7ff; --t3:#a855f7;
    --r:22px; --r2:16px;
    --shadow:0 12px 34px rgba(8,12,40,.2); --shadow2:0 6px 18px rgba(8,12,40,.12);
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",Roboto,sans-serif;
    --cjk:"PingFang SC","Hiragino Sans GB","Microsoft YaHei","Heiti SC","WenQuanYi Micro Hei",sans-serif;
    --fs:20px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:var(--font);color:var(--ink);font-size:var(--fs);
    background:radial-gradient(1200px 600px at 80% -10%,#0e6178 0%,transparent 55%),radial-gradient(900px 500px at -10% 10%,#0a4a60 0%,transparent 50%),linear-gradient(160deg,var(--bg1),var(--bg2) 60%,var(--bg3));
    background-attachment:fixed;min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.55}
  .wrap{max-width:800px;margin:0 auto;padding:18px 16px 64px}

  .hero{background:linear-gradient(135deg,#171f48,#202c63);border:1px solid rgba(255,255,255,.08);border-radius:var(--r);padding:20px;color:#fff;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .hero::after{content:"";position:absolute;right:-40px;top:-40px;width:180px;height:180px;background:radial-gradient(circle,rgba(255,178,32,.28),transparent 70%)}
  .hero-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .brand{display:flex;align-items:center;gap:12px}
  .logo{width:54px;height:54px;border-radius:50%;padding:2.5px;background:linear-gradient(135deg,#d8a93a,#b8860b);box-shadow:0 6px 16px rgba(184,134,11,.45);flex:0 0 auto;box-sizing:border-box}.logo img{width:100%;height:100%;border-radius:50%;object-fit:cover;display:block;border:2px solid #0b3a52}
  .brand h1{font-size:22px;margin:0;font-weight:800;letter-spacing:.3px}
  .brand .sub{font-size:13px;color:#aeb6e0;margin-top:1px}
  .ver{font-size:13px;font-weight:800;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18);padding:6px 13px;border-radius:999px;white-space:nowrap}
  .belt-row{display:flex;align-items:center;gap:15px;margin-top:18px;position:relative;z-index:1}
  .belt-emblem{flex:none;width:70px;height:70px;border-radius:17px;display:grid;place-items:center;position:relative;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12)}
  .belt-bar{width:46px;height:15px;border-radius:3px;box-shadow:inset 0 -2px 0 rgba(0,0,0,.25)}
  .belt-knot{position:absolute;width:10px;height:21px;border-radius:2px;transform:rotate(18deg);right:13px;bottom:15px}
  .belt-info{flex:1;min-width:0}
  .belt-name{font-size:17px;font-weight:800}
  .belt-name .next{font-weight:600;color:#aeb6e0;font-size:13px;margin-left:6px}
  .xpbar{height:15px;background:rgba(255,255,255,.12);border-radius:999px;margin-top:9px;overflow:hidden}
  .xpfill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--xp),var(--gold));width:0;transition:width 1.1s cubic-bezier(.2,.8,.2,1);box-shadow:0 0 12px rgba(255,178,32,.6)}
  .xpline{display:flex;justify-content:space-between;font-size:13px;color:#c7cdf0;margin-top:6px}
  .xpnow{font-weight:800;color:#ffd86b}

  .box-card{margin-top:16px;width:100%;border:none;border-radius:var(--r2);padding:15px 18px;font-family:inherit;cursor:pointer;
    display:flex;align-items:center;gap:13px;box-shadow:var(--shadow2);color:#fff;background:linear-gradient(135deg,#ff7a59,#ff5d5d)}
  .box-card.empty{background:rgba(255,255,255,.08);color:#c7cdf0;border:1px solid rgba(255,255,255,.14)}
  .box-card:active{transform:scale(.99)}
  .box-card .bi{font-size:26px}
  .box-card .bt{font-weight:800;font-size:16px} .box-card .bs{font-size:12.5px;opacity:.92;margin-top:1px}
  .box-card .bn{margin-left:auto;font-weight:900;font-size:20px;background:rgba(255,255,255,.22);border-radius:999px;padding:4px 13px}
  .box-card.empty .bn{background:rgba(255,255,255,.12)}

  .sec{margin-top:24px}
  .sec-h{display:flex;align-items:center;gap:9px;margin:0 4px 13px}
  .dot{width:12px;height:12px;border-radius:3px}
  .sec-h h2{font-size:17.5px;margin:0;color:#fff;font-weight:800}
  .sec-h .pct{margin-left:auto;font-size:13px;color:#aeb6e0;font-weight:700}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:520px){.grid{grid-template-columns:1fr}}
  .card{background:var(--paper);border-radius:var(--r2);padding:15px;cursor:pointer;box-shadow:var(--shadow2);border:1px solid var(--line);transition:transform .12s ease;display:flex;flex-direction:column;gap:9px;position:relative;overflow:hidden}
  .card:active{transform:scale(.975)}
  .card .stripe{position:absolute;left:0;top:0;bottom:0;width:6px}
  .card-top{display:flex;align-items:center;gap:11px;padding-left:5px}
  .card .ic{font-size:28px;flex:none}
  .card .t{font-weight:800;font-size:15.5px;line-height:1.25}
  .card .en{font-size:12px;color:var(--muted);font-weight:600}
  .card-bot{display:flex;align-items:center;gap:8px;padding-left:5px;flex-wrap:wrap}
  .tag{font-size:11px;font-weight:800;padding:3px 9px;border-radius:999px}
  .tag.fix{background:#fff0e6;color:#d2691e} .tag.level{background:#e7f3ff;color:#0d86df}
  .tag.trip{background:#f0e9ff;color:#7c3aed} .tag.core{background:#eef1ff;color:#4f5bd5}
  .tag.new{background:#ecfeff;color:#0891b2}
  .best{margin-left:auto;font-size:12.5px;font-weight:800;color:var(--muted)} .best.done{color:var(--ok)}

  .actions{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:26px}
  .abtn{border:none;border-radius:var(--r2);padding:15px;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer;color:#fff;background:linear-gradient(135deg,#2a3360,#5265a8);display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:var(--shadow2)}
  .abtn:active{transform:scale(.97)}
  .abtn.report{background:linear-gradient(135deg,#5b67e8,#7c3aed)} .abtn.export{background:linear-gradient(135deg,#0d86df,#23a7ff)}
  .reset{grid-column:1/-1;background:rgba(255,255,255,.08);color:#c7cdf0;border:1px solid rgba(255,255,255,.14);border-radius:var(--r2);padding:12px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer}
  .foot-note{text-align:center;color:#7782b8;font-size:12px;margin-top:20px}

  .stage{background:var(--paper);border-radius:var(--r);padding:20px;box-shadow:var(--shadow);min-height:62vh;display:flex;flex-direction:column}
  .st-head{display:flex;align-items:center;gap:11px;margin-bottom:14px}
  .st-back{background:var(--paper2);border:1px solid var(--line);border-radius:11px;width:42px;height:42px;font-size:20px;cursor:pointer;flex:none}
  .st-title{font-weight:800;font-size:16px;line-height:1.2}
  .st-title .en{font-size:12px;color:var(--muted);font-weight:600;display:block}
  .phase-pill{margin-left:auto;font-size:12px;font-weight:800;padding:5px 12px;border-radius:999px}
  .phase-pill.learn{background:#eef1ff;color:#4f5bd5} .phase-pill.box{background:#fff0e6;color:#d2691e}

  .concept{background:linear-gradient(135deg,var(--paper2),#eaf0ff);border:1px solid #d4ddf6;border-radius:var(--r2);padding:18px;margin-bottom:14px}
  .concept .ch{display:flex;align-items:center;gap:9px;font-weight:800;font-size:17px;color:#2a3360;margin-bottom:9px}
  .concept .cb{font-size:18.5px;line-height:1.85;color:#2a3360;white-space:pre-line}
  .spk{flex:none;border:none;background:#fff;border:1px solid var(--line);border-radius:10px;width:40px;height:40px;font-size:19px;cursor:pointer;color:var(--math-d);box-shadow:var(--shadow2)}
  .spk:active{transform:scale(.92)} .spk.sm{width:34px;height:34px;font-size:16px;border-radius:9px}

  .example{background:#fffdf5;border:1px dashed #f0d28a;border-radius:var(--r2);padding:18px;margin-bottom:14px}
  .example .eh{font-weight:800;font-size:17px;color:#9a6b00;margin-bottom:6px;display:flex;align-items:center;gap:8px}
  .example .prob{font-size:18px;font-weight:700;color:#2a3360;background:#fff;border:1px solid #f0e6c8;border-radius:12px;padding:12px 14px;margin-bottom:12px}
  .steps{display:flex;flex-direction:column;gap:10px}
  .step{background:#fff;border:1px solid #f0e6c8;border-radius:12px;padding:13px 15px;font-size:17px;line-height:1.7;color:#2a3360;display:flex;gap:11px;align-items:flex-start;animation:slidein .35s ease}
  @keyframes slidein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .step .sn{flex:none;width:28px;height:28px;border-radius:8px;background:var(--xp);color:#fff;font-weight:800;display:grid;place-items:center;font-size:14px}
  .reveal-btn{margin-top:12px;width:100%;border:none;border-radius:12px;padding:13px;font-family:inherit;font-size:16px;font-weight:800;color:#9a6b00;background:#fdeec2;cursor:pointer}
  .reveal-btn:active{transform:scale(.98)}

  /* 多媒体交互组件 */
  .media-wrap{background:linear-gradient(135deg,#f4f7ff,#eef2ff);border:1px solid #d4ddf6;border-radius:var(--r2);padding:16px;margin-bottom:14px}
  .media-h{font-weight:800;font-size:16.5px;color:#2a3360;margin-bottom:4px;display:flex;align-items:center;gap:8px}
  .media-cap{font-size:14px;color:var(--muted);text-align:center;margin-top:9px;line-height:1.5}
  .open-ta{width:100%;min-height:130px;border:2px solid var(--line);border-radius:14px;padding:13px;font-family:inherit;font-size:17px;line-height:1.6;color:var(--ink);background:#fbfcff;resize:vertical;margin:6px 0}
  .open-ta:focus{outline:none;border-color:var(--math)}
  .open-ta.shake{animation:shakeX .35s ease;border-color:var(--no)!important}
  .chain-row{display:flex;align-items:center;justify-content:center;gap:4px;flex-wrap:wrap;margin:6px 0}
  .chain-card{background:#fff;border:2px solid var(--line);border-radius:12px;padding:8px 6px;text-align:center;min-width:62px;transition:all .15s}
  .chain-card.on{border-color:var(--sci);background:#faf5ff;transform:translateY(-3px);box-shadow:0 6px 14px rgba(168,85,247,.25)}
  .chain-card .ce{font-size:28px} .chain-card .cn{font-size:11.5px;font-weight:800;color:#2a3360;margin-top:2px}
  .chain-arrow{font-size:14px;opacity:.65}
  .mreadout{text-align:center;font-weight:800;font-size:19px;color:#2a3360;margin-top:10px}
  .mctrl{display:flex;gap:10px;justify-content:center;align-items:center;margin-top:11px;flex-wrap:wrap}
  .mbtn{border:1px solid var(--line);background:#fff;border-radius:11px;padding:9px 15px;font-family:inherit;font-size:14.5px;font-weight:700;cursor:pointer;color:#2a3360}
  .mbtn.on{background:var(--math);color:#fff;border-color:var(--math)}
  .mbtn:active{transform:scale(.96)}
  input[type=range]{width:200px;accent-color:var(--math)}
  .fbar{display:flex;gap:4px;height:66px;margin:12px 0}
  .fseg{flex:1;border:2px solid #c9d4f0;border-radius:9px;background:#fff;cursor:pointer;transition:background .1s}
  .fseg.on{background:var(--math);border-color:var(--math)}
  .dgrid{display:grid;grid-template-columns:repeat(10,1fr);gap:2px;max-width:230px;margin:10px auto}
  .dcell{aspect-ratio:1;border:1px solid #d4ddf6;background:#fff;cursor:pointer;border-radius:2px}
  .dcell.on{background:var(--math);border-color:var(--math)}
  .fpics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:6px}
  @media(max-width:420px){.fpics{grid-template-columns:repeat(2,1fr)}}
  .fpic{background:#fff;border:2px solid var(--line);border-radius:14px;padding:12px 8px;text-align:center;cursor:pointer}
  .fpic:active{transform:scale(.97)} .fpic.on{border-color:var(--fr);background:#effdfa}
  .fpic .e{font-size:36px} .fpic .w{font-weight:800;color:var(--fr);margin-top:4px;font-size:15px} .fpic .m{font-size:12px;color:var(--muted)}
  .msvg{display:block;margin:4px auto;max-width:100%}
  .gear{transform-box:fill-box;transform-origin:center}
  .gear.spin1{animation:gspin 3.2s linear infinite} .gear.spin2{animation:gspinr 3.2s linear infinite}
  @keyframes gspin{to{transform:rotate(360deg)}} @keyframes gspinr{to{transform:rotate(-360deg)}}

  .checkblock{background:#fff;border:2px solid var(--line);border-radius:var(--r2);padding:16px;margin-bottom:13px}
  .checkblock .cl{font-size:13px;font-weight:800;color:var(--xp-d);margin-bottom:8px;display:flex;align-items:center;gap:7px}

  .qwrap{flex:1;display:flex;flex-direction:column}
  .tierbadge{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:800;padding:4px 11px;border-radius:999px;margin-bottom:8px;width:fit-content}
  .tierbadge.t1{background:#e7f9ee;color:var(--t1)} .tierbadge.t2{background:#e7f3ff;color:var(--t2)} .tierbadge.t3{background:#f6edff;color:var(--t3)}
  .qrow{display:flex;align-items:flex-start;gap:10px;margin:6px 0 4px}
  .q-prompt{font-size:23px;font-weight:800;line-height:1.45;color:var(--ink);flex:1}
  .q-prompt.big{font-size:50px;text-align:center;margin:8px 0;font-family:var(--cjk)}
  .passage{background:var(--paper2);border:1px solid var(--line);border-radius:var(--r2);padding:16px;font-size:17px;line-height:1.8;margin-bottom:14px;color:#2a3360;position:relative;white-space:pre-line}
  .passage .pspk{position:absolute;right:12px;top:12px}
  .audio-row{display:flex;flex-direction:column;align-items:center;gap:9px;margin:8px 0 14px}
  .play{background:linear-gradient(135deg,#23a7ff,#5b67e8);color:#fff;border:none;border-radius:999px;padding:16px 30px;font-size:19px;font-weight:800;cursor:pointer;font-family:inherit;box-shadow:0 8px 20px rgba(35,167,255,.4);display:flex;align-items:center;gap:10px}
  .play:active{transform:scale(.96)}
  .pinyin{font-size:14px;color:var(--muted);font-weight:700;letter-spacing:.5px}
  .opts{display:flex;flex-direction:column;gap:11px;margin-top:10px}
  .opt{background:var(--paper);border:2px solid var(--line);border-radius:var(--r2);padding:16px 17px;font-size:19px;font-weight:700;cursor:pointer;text-align:left;font-family:inherit;color:var(--ink);transition:border-color .12s,background .12s,transform .08s;display:flex;align-items:center;gap:12px}
  .opt:active{transform:scale(.99)}
  .opt .k{width:28px;height:28px;border-radius:9px;background:var(--paper2);display:grid;place-items:center;font-size:14px;font-weight:800;color:var(--muted);flex:none;border:1px solid var(--line)}
  .opt .otext{flex:1}
  .opt .ospk{flex:none;width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:#fff;font-size:15px;color:var(--math-d);cursor:pointer;display:grid;place-items:center}
  .opt.ok{border-color:var(--ok);background:var(--okbg)} .opt.ok .k{background:var(--ok);color:#fff;border-color:var(--ok)}
  .opt.no{border-color:var(--no);background:var(--nobg)} .opt.no .k{background:var(--no);color:#fff;border-color:var(--no)}
  .opt.dim{opacity:.55} .opt[disabled]{cursor:default}
  .explain{margin-top:14px;background:var(--paper2);border-left:5px solid var(--math);border-radius:11px;padding:13px 15px;font-size:16px;line-height:1.65;color:#2a3360}
  .explain.ok{border-left-color:var(--ok)} .explain.no{border-left-color:var(--no)} .explain b{color:var(--ink)}
  .dots{display:flex;gap:5px;flex-wrap:wrap;max-width:150px;justify-content:flex-end}
  .pd{width:9px;height:9px;border-radius:999px;background:var(--line)}
  .pd.on{background:var(--xp)} .pd.ok{background:var(--ok)} .pd.no{background:var(--no)}
  .st-foot{margin-top:16px}
  .bigbtn{width:100%;border:none;border-radius:var(--r2);padding:16px;font-family:inherit;font-size:16.5px;font-weight:800;color:#fff;cursor:pointer}
  .bigbtn:active{transform:scale(.98)}
  .bigbtn.next{background:linear-gradient(135deg,var(--xp),var(--xp-d));box-shadow:0 8px 20px rgba(245,158,11,.35)}
  .bigbtn.go{background:linear-gradient(135deg,var(--ok),var(--en-d,#16a34a));box-shadow:0 8px 20px rgba(22,163,74,.35)}
  .bigbtn.train{background:linear-gradient(135deg,#ff7a59,#ff5d5d);box-shadow:0 8px 20px rgba(255,93,93,.35)}
  .bigbtn.retry{background:linear-gradient(135deg,#8b93f0,#5b67e8);box-shadow:0 8px 20px rgba(91,103,232,.3)}
  .foot2{display:flex;gap:10px} .foot2 .bigbtn{flex:1}

  .trace-wrap{background:var(--paper2);border:1px solid var(--line);border-radius:var(--r2);padding:16px;margin-bottom:14px;text-align:center}
  .trace-h{font-weight:800;font-size:16px;color:#2a3360;margin-bottom:10px;display:flex;align-items:center;gap:8px;justify-content:center}
  .trace-chips{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:12px}
  .tchip{width:48px;height:48px;border-radius:11px;border:2px solid var(--line);background:#fff;font-size:25px;font-weight:700;cursor:pointer;color:var(--ink);font-family:var(--cjk)}
  .tchip.on{border-color:var(--cn);background:#fff0f0;color:var(--cn-d)}
  #traceCanvas{border-radius:14px;background:#fff;border:2px solid var(--line);touch-action:none;display:block;margin:0 auto;max-width:88%}
  .trace-tools{display:flex;gap:10px;justify-content:center;margin-top:11px}
  .ttbtn{border:1px solid var(--line);background:#fff;border-radius:10px;padding:9px 16px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;color:#2a3360}
  .ttbtn.hear{color:var(--math-d)}

  .result{background:var(--paper);border-radius:var(--r);padding:28px 20px;box-shadow:var(--shadow);text-align:center}
  .result .emoji{font-size:72px;animation:pop .5s cubic-bezier(.2,1.4,.4,1)}
  @keyframes pop{0%{transform:scale(0)}100%{transform:scale(1)}}
  .result h2{margin:10px 0 4px;font-size:25px}
  .result .score{font-size:52px;font-weight:900;color:var(--math);margin:6px 0}
  .tierline{display:flex;gap:8px;justify-content:center;margin:6px 0 12px;flex-wrap:wrap}
  .tierscore{font-size:13px;font-weight:800;padding:5px 12px;border-radius:999px}
  .ts1{background:#e7f9ee;color:var(--t1)} .ts2{background:#e7f3ff;color:var(--t2)} .ts3{background:#f6edff;color:var(--t3)}
  .result .xpgain{display:inline-flex;align-items:center;gap:8px;background:var(--paper2);border:1px solid var(--line);border-radius:999px;padding:10px 20px;font-weight:800;font-size:17px;color:var(--xp-d);margin:6px 0 18px}
  .result .home-btn{width:100%;border:none;border-radius:var(--r2);padding:16px;font-family:inherit;font-size:16.5px;font-weight:800;color:#fff;cursor:pointer;background:linear-gradient(135deg,#5b67e8,#7c3aed)}
  .redo-btn{background:linear-gradient(135deg,#ff7a59,#ff5d5d)!important;margin-bottom:11px}

  .panel{background:var(--paper);border-radius:var(--r);padding:22px;box-shadow:var(--shadow)}
  .panel-h{display:flex;align-items:center;gap:11px;margin-bottom:6px}
  .panel-h h2{margin:0;font-size:19px;font-weight:800}
  .rep-ver{display:inline-block;font-size:13px;font-weight:800;color:#fff;background:linear-gradient(135deg,#5b67e8,#7c3aed);padding:5px 12px;border-radius:999px;margin:2px 0 14px}
  .rep-meta{font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.6}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;margin-bottom:18px}
  .stat{background:var(--paper2);border:1px solid var(--line);border-radius:var(--r2);padding:14px;text-align:center}
  .stat .n{font-size:25px;font-weight:900} .stat .l{font-size:12px;color:var(--muted);font-weight:700;margin-top:2px}
  .rep-sec{margin-top:18px}

{id:"ZH30", subj:"cn", icon:"⛵", title:"阅读·第一次掌舵", en:"Reading: First at the Helm", tag:"core",
 lesson:{ cards:[
   {t:"读记叙文抓两条线", b:"事情线：发生了什么，按什么顺序。\n心情线：人物的心情怎样一步步变化。\n找心情别只看「高兴」「害怕」这种词，\n更要看动作和身体反应：手心出汗＝紧张。"},
   {t:"什么是伏笔", b:"伏笔＝前面悄悄埋下的线索，到结尾才让你恍然大悟。\n读到结尾时回头想一想：\n前面哪句话，其实早就在暗示这个结局？"}],
  example:{t:"从身体反应读心情", prob:"「我的心一下子跳到了嗓子眼，手心全是汗。」写出了什么心情？", steps:[
   "心跳得厉害、手心出汗，都是身体的反应。",
   "这些反应对应的心情是：非常紧张。",
   "作者不直接说「我很紧张」，而是让身体替他说话——这叫细节描写。"]},
  check:[{q:"这篇文章写的是「我」第一次做什么？", o:["掌舵","钓鱼","游泳","修船"], a:0, e:"题目就是《第一次掌舵》。"}] },
 training:[
  {q:"「我的心一下子跳到了嗓子眼」写出了「我」——", o:["非常紧张","非常高兴","非常生气","非常困倦"], a:0, tier:2, e:"心跳到嗓子眼＋手心全是汗＝紧张到了极点。", passage:P_DUO},
  {q:"船身晃了一下之后，爸爸提醒「我」——", o:["看远处，别只盯着船头","赶快松开舵轮","闭上眼睛","大声呼救"], a:0, tier:1, e:"原文：「看远处，别只盯着船头。」", passage:P_DUO},
  {q:"「我」照爸爸说的看向远处的灯塔后——", o:["手上反而稳了","船开得更快了","风突然停了","更紧张了"], a:0, tier:2, e:"「奇怪的是，手上反而稳了。」", passage:P_DUO},
  {q:"「船像一条听话的大鱼，稳稳地向前游」用了什么修辞？", o:["比喻","夸张","排比","设问"], a:0, tier:2, e:"把船比作大鱼——比喻。", passage:P_DUO},
  {q:"「连大气都不敢出」的意思是——", o:["紧张得不敢大声呼吸","海上的空气很少","生气得不想说话","跑得喘不过气"], a:0, tier:2, e:"形容非常紧张、小心翼翼。", passage:P_DUO},
  {q:"全文「我」的心情变化顺序是——", o:["紧张→平稳→温暖感动","高兴→伤心→生气","平静→愤怒→平静","害怕→放弃→后悔"], a:0, tier:3, e:"先紧张出汗，看远处后手稳了，最后发现爸爸一直护着——温暖感动。", passage:P_DUO},
  {q:"快回港时，「我」发现了什么？", o:["爸爸的手一直搭在舵轮下面的横杆上","船底漏水了","灯塔的灯灭了","一条大鱼跟着船"], a:0, tier:2, e:"「爸爸的手一直轻轻搭在舵轮下面的横杆上。」", passage:P_DUO},
  {q:"文中哪一处是「伏笔」，悄悄为结尾做了铺垫？", o:["爸爸说「今天你来掌舵」时，平静得像在说一件小事","风从耳边吹过","我手心全是汗","清晨的港口很安静"], a:0, tier:3, e:"他那么平静，是因为早就准备好随时保护「我」——结尾揭晓答案。", passage:P_DUO},
  {q:"结尾「勇气不是不害怕，而是害怕的时候，仍然握紧舵轮」的意思是——", o:["真正的勇气是带着害怕也坚持去做","勇敢的人从来不会害怕","只要握住舵轮就算勇敢","感到害怕就应该放手"], a:0, tier:3, e:"勇气不等于没有恐惧，而是不被恐惧打倒。", passage:P_DUO},
  {q:"爸爸把手搭在横杆上却一直不说，是因为——", o:["想让「我」自己练习，又能随时保护「我」","他划船划累了","怕被别的渔民看见","舵轮太烫手"], a:0, tier:3, e:"推断题：既放手让孩子试，又暗中护着——这是爸爸的用心。", passage:P_DUO},
  {q:"「我更紧张了」是因为——", o:["船头偏了，船身晃了一下","天空下起了大雨","爸爸大声批评了我","灯塔突然不亮了"], a:0, tier:2, e:"「船身晃了一下，我更紧张了。」", passage:P_DUO},
  {q:"这篇文章主要写的是——", o:["「我」第一次掌舵的经历和感悟","渔船的内部构造","灯塔是怎样工作的","一条大鱼的故事"], a:0, tier:2, e:"记叙文＝一件事＋一份感悟。", passage:P_DUO},
  {q:"下面哪些说法与文章相符？（多选）", t:"multi", o:["爸爸一直在暗中保护「我」","把目光放远比只盯着船头更稳","「我」从头到尾一点也不紧张","文章结尾写出了对勇气的感悟","渔船在半路上抛锚了"], a:[0,1,3], tier:3, e:"「我」一开始非常紧张；船一路平安回港。", passage:P_DUO},
  {q:"文中用了哪些描写方法？（多选）", t:"multi", o:["心理描写（心跳到嗓子眼）","动作描写（握住舵轮）","语言描写（看远处，别只盯着船头）","列数字","天气预报"], a:[0,1,2], tier:3, e:"心理＋动作＋语言三种描写都有。", passage:P_DUO},
  {q:"哪些词句写出了「我」的紧张？（多选）", t:"multi", o:["手心全是汗","连大气都不敢出","胳膊绷得紧紧的","稳稳地向前游","轻轻搭在横杆上"], a:[0,1,2], tier:3, e:"后两处写的是平稳和爸爸的守护。", passage:P_DUO}
 ]},

{id:"ZH31", subj:"cn", icon:"🔗", title:"关联词综合 + 识字 Day 27", en:"Connectives Review", tag:"fix",
 traceDay:27, trace:["东","南","西","北","中","边"],
 lesson:{ cards:[
   {t:"四大家族对对碰", b:"递进：不但…而且… ／ 不仅…还…（更进一层）\n转折：虽然…但是… ／ 尽管…还是… ／ 却（反着来）\n因果：因为…所以… ／ 之所以…是因为…（讲原因）\n条件：只要…就…（条件够就行）／ 只有…才…（非它不可）"},
   {t:"判断三步法", b:"① 遮住关联词，读前后两半句。\n② 问：后半句是顺着加码？反着拐弯？在讲原因？还是在提条件？\n③ 再选词。上次错的题，多半是第①步没做。"}],
  example:{t:"同一个句子，换词变味", prob:"「＿＿风浪很大，船长＿＿决定按时出发。」为什么不能填「因为…所以…」？", steps:[
   "前半句：风浪大——按常理应该不出发。",
   "后半句：偏偏按时出发——方向反了，这是转折。",
   "所以填「尽管…还是…」；「因为…所以…」是顺着讲原因，方向不对。"]},
  check:[{q:"「________肯坚持练习，________一定会进步。」填——", o:["只要…就…","虽然…但是…","尽管…还是…","不是…就是…"], a:0, e:"条件够了结果就来——条件关系。"}] },
 training:[
  {q:"「这艘船________样子普通，________特别结实。」填——", o:["虽然…但是…","不但…而且…","因为…所以…","只要…就…"], a:0, tier:2, e:"样子普通↔特别结实，方向相反＝转折。"},
  {q:"「他________会游泳，________会潜水。」填——", o:["不但…而且…","虽然…但是…","尽管…还是…","不是…就是…"], a:0, tier:2, e:"会游泳→更会潜水，同方向加码＝递进。"},
  {q:"「________风浪很大，船长________决定按时出发。」填——", o:["尽管…还是…","不仅…还…","因为…所以…","只要…就…"], a:0, tier:2, e:"风浪大本不该出发却出发了——转折。"},
  {q:"「________明天天晴，我们________去海边写生。」填——", o:["只要…就…","虽然…但是…","不但…而且…","与其…不如…"], a:0, tier:3, e:"天晴是条件，去海边是结果——条件关系。"},
  {q:"「________他坚持每天练字，________进步得这么快。」填——", o:["因为…所以…","虽然…但是…","尽管…还是…","不管…都…"], a:0, tier:2, e:"前因后果——因果关系。"},
  {q:"「他个子不高，却跳得比谁都远。」这句话的关系是——", o:["转折","递进","因果","条件"], a:0, tier:2, e:"「却」是转折的信号灯。"},
  {q:"哪些关联词表示「因果」？（多选）", t:"multi", o:["因为…所以…","之所以…是因为…","既然…就…","虽然…但是…","不但…而且…"], a:[0,1,2], tier:3, e:"「既然…就…」也是顺着原因往下推；后两组是转折和递进。"},
  {q:"哪些句子的关联词使用正确？（多选）", t:"multi", o:["因为风浪太大，所以渔船提前回港了。","只要肯练习，就一定会进步。","因为他喜欢大海，但是他常去海边。","他不仅会划船，还会掌舵。","只有不怕困难，就能成功。"], a:[0,1,3], tier:3, e:"「因为…但是…」「只有…就…」都是搭配错误——应为「因为…所以…」「只有…才…」。"},
  {q:"哪些句子表示「转折」？（多选）", t:"multi", o:["风很大，船却开得很稳。","虽然是第一次掌舵，但是他没有慌。","因为天黑了，所以我们回家了。","尽管很累，他还是坚持到了终点。","一到夏天，我们就去游泳。"], a:[0,1,3], tier:3, e:"第三句是因果，第五句是承接。"},
  {q:"「太阳从________边升起。」点选一个字。", t:"fill", kind:"zi", a:"东", tiles:"东车冻栋练轿", tier:2, e:"太阳东升西落。", hint:"点字块作答"},
  {q:"「傍晚，太阳落到了________边的山后。」点选一个字。", t:"fill", kind:"zi", a:"西", tiles:"西四要晒栖票", tier:2, e:"太阳从西边落下。"},
  {q:"「大雁秋天飞往温暖的________方。」点选一个字。", t:"fill", kind:"zi", a:"南", tiles:"南难楠男喃两", tier:2, e:"南方温暖。"},
  {q:"「指南针的一头，永远指着________方。」点选一个字。", t:"fill", kind:"zi", a:"北", tiles:"北比背此兆化", tier:2, e:"指南针一头指南，一头指北。"},
  {q:"「船正行驶在大海________央。」点选一个字。", t:"fill", kind:"zi", a:"中", tiles:"中钟种忠仲口", tier:2, e:"中央＝正当中。"},
  {q:"「我们坐在河________钓鱼。」点选一个字。", t:"fill", kind:"zi", a:"边", tiles:"边过这远迈达", tier:3, e:"河边＝河的旁边。"}
 ]},

{id:"ZH32", subj:"cn", icon:"🔢", title:"数字成语·病句IV + 识字 Day 28", en:"Number Idioms", tag:"level",
 traceDay:28, trace:["手","头","口","耳","目","足"],
 lesson:{ cards:[
   {t:"六个带数字的成语", b:"一心一意：专心，只想一件事。\n三心二意：不专心，想东想西。（和上面正相反！）\n五颜六色：颜色又多又好看。\n四面八方：各个方向。\n七上八下：心里慌乱不安。\n成千上万：数量非常多。"},
   {t:"病句复诊两味药", b:"语序不当：先后顺序反了。「改正并发现错误」→ 应先「发现」再「改正」。\n搭配不当：词语配错了对象。「写作水平有了很大的改正」→「水平」要配「提高」。"}],
  example:{t:"一对反义成语", prob:"「一心一意」和「三心二意」怎么用？", steps:[
   "一心一意＝一颗心只想一件事——专心。",
   "三心二意＝三颗心两个主意——不专心。",
   "「他一心一意地练习」对；「他三心二意地专心读书」错——前后自相矛盾。"]},
  check:[{q:"「消息传开，人们从________赶来看龙舟赛。」填——", o:["四面八方","七上八下","一心一意","五颜六色"], a:0, e:"从各个方向赶来＝四面八方。"}] },
 training:[
  {q:"「他做作业总是________，一会儿看窗外，一会儿玩橡皮。」填——", o:["三心二意","一心一意","五颜六色","四面八方"], a:0, tier:2, e:"不专心＝三心二意。"},
  {q:"「花园里开满了________的花。」填——", o:["五颜六色","七上八下","成千上万","一心一意"], a:0, tier:2, e:"颜色多而好看＝五颜六色。"},
  {q:"「上台领奖之前，他心里________，手心都出汗了。」填——", o:["七上八下","四面八方","五颜六色","三心二意"], a:0, tier:3, e:"心里慌乱不安＝七上八下。"},
  {q:"「广场上聚集了________的观众。」填——", o:["成千上万","一心一意","七上八下","五颜六色"], a:0, tier:2, e:"数量极多＝成千上万。"},
  {q:"下面哪句有「语序不当」的毛病？", o:["我们要改正并发现学习中的错误。","他把甲板擦得干干净净。","大家安静地听老师讲课。","我们要发现并改正学习中的错误。"], a:0, tier:3, e:"应先「发现」再「改正」——第四句才是正确顺序。"},
  {q:"「他的写作水平有了很大的改正。」应把「改正」改为——", o:["提高","增加","长大","放大"], a:0, tier:3, e:"「水平」搭配「提高」；「改正」搭配「错误」。"},
  {q:"哪些句子的成语用对了？（多选）", t:"multi", o:["他一心一意地练习划船。","货架上摆着五颜六色的商品。","等成绩的时候，他心里七上八下。","他三心二意地专心读书。","操场上成千上万地跑了两圈。"], a:[0,1,2], tier:3, e:"第四句前后自相矛盾；第五句「成千上万」形容数量，不能这样用。"},
  {q:"哪些句子有语病？（多选）", t:"multi", o:["通过这次训练，使我掌握了掌舵的技巧。","他大约花了估计半个小时。","我们要改正并发现问题。","清晨的港口十分安静。","他把绳子系得结结实实。"], a:[0,1,2], tier:3, e:"①缺主语（删「通过」或「使」）②重复啰嗦③语序不当。"},
  {q:"哪些句子的标点完全正确？（多选）", t:"multi", o:["船上有帆、桨和罗盘。","「开船啦！」大家欢呼起来。","今天的风真大啊？","我们买了苹果、香蕉、和梨。","妈妈轻声说：「路上小心。」"], a:[0,1,4], tier:3, e:"第三句感叹应用「！」；第四句「和」前不加顿号。"},
  {q:"「他高高举起________来回答问题。」点选一个字。", t:"fill", kind:"zi", a:"手", tiles:"手毛升千看拜", tier:2, e:"举手的「手」。", hint:"点字块作答"},
  {q:"「他点了点________，表示同意。」点选一个字。", t:"fill", kind:"zi", a:"头", tiles:"头买实卖读斗", tier:2, e:"点头的「头」。"},
  {q:"「我们一家五________人坐上了渡船。」点选一个字。", t:"fill", kind:"zi", a:"口", tiles:"口日目回中白", tier:2, e:"五口人——「口」用来数家里的人。"},
  {q:"「小兔子的________朵长长的。」点选一个字。", t:"fill", kind:"zi", a:"耳", tiles:"耳目见闻茸取", tier:2, e:"耳朵的「耳」。"},
  {q:"「他________不转睛地盯着浮标。」点选一个字。", t:"fill", kind:"zi", a:"目", tiles:"目日月耳自白", tier:3, e:"目不转睛——「目」就是眼睛，正是上次学过的成语！"},
  {q:"「学校组织我们去海边远________。」点选一个字。", t:"fill", kind:"zi", a:"足", tiles:"足是走促定跑", tier:3, e:"远足＝徒步郊游——「足」是脚。"}
 ]},

{id:"MA29", subj:"math", icon:"🧨", title:"Exponent Clinic IV: Expand First", en:"乘方诊所·两段式", tag:"fix",
 lesson:{ cards:[
   {t:"The two-step rule", b:"See a power? FIRST write it out, THEN multiply.\n2⁴ → write: 2 × 2 × 2 × 2 → then: 16.\nThe small number COUNTS the copies. It never multiplies, never divides."},
   {t:"Three traps from last time", b:"Trap 1: 3² is NOT 3 × 2 = 6. It is 3 × 3 = 9.\nTrap 2: 2³ is NOT 2 × 3 × 3. It is 2 × 2 × 2 = 8.\nTrap 3: (2+3)² is NOT (2×3)². Brackets first: 5² = 25.\nIn 2 × 5², the ² belongs ONLY to the 5: 2 × 25 = 50."}],
  example:{t:"Expand, then compute", prob:"Work out 2 × 5² the safe way.", steps:[
   "The exponent touches only the 5: 5² = 5 × 5 = 25.",
   "Now the 2: 2 × 25 = 50.",
   "If you had squared 2 × 5 first you would get 100 — the classic trap."]},
  check:[{q:"3² = ?", o:["9","6","5","33"], a:0, e:"3 × 3 = 9. Never 3 × 2."}] },
 training:[
  {q:"2⁴ means —", o:["2 × 2 × 2 × 2","2 × 4","4 × 4","2 + 2 + 2 + 2"], a:0, tier:2, e:"The 4 counts the 2s."},
  {q:"2⁴ = ?", t:"fill", kind:"num", a:["16"], tier:3, e:"2×2=4, ×2=8, ×2=16.", hint:"expand first, then multiply"},
  {q:"3³ means —", o:["3 × 3 × 3","3 × 3","9 × 9","3 + 3 + 3"], a:0, tier:2, e:"Three copies of 3 multiplied."},
  {q:"3³ = ?", t:"fill", kind:"num", a:["27"], tier:3, e:"3×3=9, ×3=27."},
  {q:"2 × 5² means —", o:["2 × 5 × 5","(2 × 5) × (2 × 5)","2 × 5 × 2","2 × 2 × 5 × 5"], a:0, tier:3, e:"The ² belongs only to the 5."},
  {q:"2 × 5² = ?", t:"fill", kind:"num", a:["50"], tier:3, e:"5² = 25, then 2 × 25 = 50. Not 100!"},
  {q:"(4 + 1)² means —", o:["(4 + 1) × (4 + 1)","4² + 1²","4 + 1 × 1","4 × 1 × 4 × 1"], a:0, tier:3, e:"Brackets make ONE number first: 5 × 5."},
  {q:"(4 + 1)² = ?", t:"fill", kind:"num", a:["25"], tier:3, e:"5² = 25. Not 16 + 1 = 17!"},
  {q:"Leo computed 20 − 2³ and got 2, because he worked out 2³ as 18. What did Leo multiply by mistake?", o:["2 × 3 × 3","2 × 2 × 2","3 × 3 × 3","2 + 3 + 3"], a:0, tier:3, e:"2×3×3 = 18 — he copied the exponent into the multiplication. 2³ = 8, so the answer is 12."},
  {q:"Mia says (2 + 3)² = 36. What did she really calculate?", o:["(2 × 3)²","(2 + 3) × (2 + 3)","2² + 3²","2 + 3²"], a:0, tier:3, e:"She multiplied first: (2×3)² = 6² = 36. Correct path: 5² = 25."},
  {q:"30 − 3³ = ?", t:"fill", kind:"num", a:["3"], tier:3, e:"3³ = 27, then 30 − 27 = 3."},
  {q:"2³ + 2² = ?", t:"fill", kind:"num", a:["12"], tier:2, e:"8 + 4 = 12."},
  {q:"Which equations are TRUE? (select all)", t:"multi", o:["3³ = 27","2⁴ = 8","10 − 3² = 1","(1 + 3)² = 16","5² = 10"], a:[0,2,3], tier:3, e:"2⁴ = 16; 5² = 25. Expand before you judge."},
  {q:"Which expressions equal 36? (select all)", t:"multi", o:["6²","4 × 9","30 + 6","2 × 3²","3² + 3²"], a:[0,1,2], tier:3, e:"2 × 3² = 18 and 3² + 3² = 18 — the ² only touches one 3."},
  {q:"When solving 50 − (2 + 3)², which steps happen BEFORE any subtracting? (select all)", t:"multi", o:["add 2 + 3 inside the brackets","square the bracket result","get 25 from the squaring","subtract from 50 right away","ignore the exponent"], a:[0,1,2], tier:3, e:"Brackets → exponent → only then subtract: 50 − 25 = 25."}
 ]},

{id:"MA30", subj:"math", icon:"🧭", title:"Integers II: The Number Line", en:"负数巩固·数轴", tag:"fix",
 lesson:{ media:[{type:"numberline", title:"Walk the line", cap:"Left of 0 = negative. Adding moves RIGHT, subtracting moves LEFT — even across zero."}],
  cards:[
   {t:"Every answer lives on the line", b:"3 − 8: start at 3, walk LEFT 8 steps → pass 0 → land on −5.\n−4 − 2: already left of zero, go further left → −6.\n−2 + 8: walk RIGHT, cross zero → 6.\nAlways ask: which direction, how many steps?"},
   {t:"Two traps from last time", b:"Trap 1: the OPPOSITE of −4 is 4 — same distance, other side of 0. It is NOT 0.\nTrap 2: basement floor B3 is −3, three whole floors below ground. It is NOT 0.3.\nA decimal like 0.3 is a tiny bit above zero — wrong side and wrong size!"}],
  example:{t:"Crossing zero", prob:"The temperature is −2°C in the morning. By noon it rises 8°C. What is it now?", steps:[
   "Rising = moving RIGHT: start at −2.",
   "2 steps reach 0; there are 6 steps left.",
   "−2 + 8 = 6. The answer is positive because we crossed zero."]},
  check:[{q:"Which is the coldest?", o:["−7°C","−1°C","0°C","2°C"], a:0, e:"Furthest left on the line."}] },
 training:[
  {q:"3 − 8 = ?", t:"fill", kind:"num", a:["-5"], tier:3, e:"Left past zero: −5. Use the − key.", hint:"cross zero going left"},
  {q:"−4 − 2 = ?", t:"fill", kind:"num", a:["-6"], tier:3, e:"Already negative, going further left: −6."},
  {q:"0 − 9 = ?", t:"fill", kind:"num", a:["-9"], tier:2, e:"Nine steps left of zero."},
  {q:"−7 + 3 = ?", t:"fill", kind:"num", a:["-4"], tier:3, e:"Right 3 steps from −7, still left of zero."},
  {q:"−5 + 5 = ?", t:"fill", kind:"num", a:["0"], tier:1, e:"Opposites cancel to 0."},
  {q:"The temperature is −2°C. It rises 8°C. What is it now? (number only)", t:"fill", kind:"num", a:["6"], tier:3, e:"−2 + 8 = 6 — you crossed zero, so the answer is positive!", hint:"which side of zero do you land on?"},
  {q:"A diver is at −20 m and RISES 8 m. Where is she now? (number only)", t:"fill", kind:"num", a:["-12"], tier:3, e:"Rising = adding: −20 + 8 = −12. Still under water."},
  {q:"An elevator is at floor −1 and goes DOWN 2 floors. Which floor now? (number only)", t:"fill", kind:"num", a:["-3"], tier:2, e:"−1 − 2 = −3."},
  {q:"The OPPOSITE of −6 is —", o:["6","0","−6","1/6"], a:0, tier:3, e:"Same distance from 0, other side. Last time the zero trap won — not today!"},
  {q:"Parking level B3 written as a number is —", o:["−3","0.3","3","30"], a:0, tier:2, e:"Three floors BELOW ground = −3. 0.3 is a tiny bit above zero — wrong side, wrong size."},
  {q:"Which is SMALLER: −9 or −2?", o:["−9","−2","they are equal","cannot tell"], a:0, tier:2, e:"−9 sits further left."},
  {q:"Order from LEAST to GREATEST: −3, 1, −7, 0", o:["−7, −3, 0, 1","−3, −7, 0, 1","0, 1, −3, −7","1, 0, −3, −7"], a:0, tier:3, e:"Most negative first: −7, then −3, then 0, then 1."},
  {q:"Which numbers are LESS than −3? (select all)", t:"multi", o:["−5","−10","−3.5","−1","0"], a:[0,1,2], tier:3, e:"Less than −3 means further LEFT than −3; −1 and 0 are to its right."},
  {q:"Which comparisons are TRUE? (select all)", t:"multi", o:["−8 < −1","0 > −4","−1 > −6","−2 > 3","−5 > 0"], a:[0,1,2], tier:3, e:"Negative numbers are never greater than positives."},
  {q:"Which situations describe a NEGATIVE number? (select all)", t:"multi", o:["7 m below the surface","losing 5 points in a game","3 floors underground","saving 20 dollars","growing 2 cm taller"], a:[0,1,2], tier:3, e:"Saving money and growing taller are positive changes."}
 ]},

{id:"MA31", subj:"math", icon:"🔁", title:"Working Backwards: One Part First", en:"逆向配对训练", tag:"fix",
 lesson:{ cards:[
   {t:"The one-part method (two steps!)", b:"Backwards problems ALWAYS take two steps:\nStep 1 — find ONE part.  Step 2 — scale up to the whole.\n'2/5 of a number is 10' → one fifth = 10 ÷ 2 = 5 → number = 5 × 5 = 25.\nLast time, most answers stopped after Step 1. Not this time."},
   {t:"Forward vs backward, side by side", b:"FORWARD: 2/3 of 18 → 18 ÷ 3 × 2 = 12. (The whole is GIVEN.)\nBACKWARD: 2/3 of ? = 12 → 12 ÷ 2 = 6 → 6 × 3 = 18. (The whole is HIDING.)\nRead the question first: given, or hiding?"}],
  example:{t:"Hunt the whole", prob:"3/5 of a number is 15. What is the number?", steps:[
   "Step 1 — one fifth: 15 ÷ 3 = 5.",
   "Step 2 — five fifths: 5 × 5 = 25.",
   "Check forward: 3/5 of 25 = 15 ✓. Two steps, then submit."]},
  check:[{q:"1/4 of a number is 6. The number is —", o:["24","6","10","2"], a:0, e:"One quarter is 6, so four quarters = 24."}] },
 training:[
  {q:"2/5 of a number is 10. STEP 1: one fifth of the number = ?", t:"fill", kind:"num", a:["5"], tier:2, e:"Two fifths = 10, so one fifth = 10 ÷ 2 = 5.", hint:"step 1 of 2"},
  {q:"2/5 of a number is 10. STEP 2: the whole number = ?", t:"fill", kind:"num", a:["25"], tier:3, e:"One fifth = 5, so five fifths = 5 × 5 = 25.", hint:"now finish the job"},
  {q:"3/4 of a rope is 18 m. STEP 1: one quarter of the rope = ? (m)", t:"fill", kind:"num", a:["6"], tier:2, e:"18 ÷ 3 = 6 m per quarter."},
  {q:"3/4 of a rope is 18 m. STEP 2: the WHOLE rope = ? (m)", t:"fill", kind:"num", a:["24"], tier:3, e:"6 × 4 = 24 m. Check: 3/4 of 24 = 18 ✓."},
  {q:"25% of a number is 9. Which fraction is 25%?", o:["1/4","1/2","1/3","2/5"], a:0, tier:2, e:"25% = a quarter — that's why ×4 finds the whole."},
  {q:"25% of a number is 9. The whole number = ?", t:"fill", kind:"num", a:["36"], tier:3, e:"A quarter is 9, so the whole is 9 × 4 = 36."},
  {q:"Red to blue flags are in the ratio 2:7. There are 8 red flags. STEP 1: one part = ?", t:"fill", kind:"num", a:["4"], tier:2, e:"2 parts = 8, so 1 part = 4."},
  {q:"Red to blue flags are in the ratio 2:7. There are 8 red flags. STEP 2: how many BLUE flags?", t:"fill", kind:"num", a:["28"], tier:3, e:"Blue = 7 parts = 7 × 4 = 28."},
  {q:"$20 for 4 notebooks. Price for ONE notebook = ?", t:"fill", kind:"num", a:["5"], tier:1, e:"20 ÷ 4 = 5 — a unit rate is one part too."},
  {q:"A ferry travels 84 km in 4 hours. How many km per hour?", t:"fill", kind:"num", a:["21"], tier:3, e:"84 ÷ 4 = 21 km/h."},
  {q:"20% of 45 = ? (forward this time!)", t:"fill", kind:"num", a:["9"], tier:3, e:"20% = one fifth: 45 ÷ 5 = 9. Here the whole was GIVEN.", hint:"is the whole given or hiding?"},
  {q:"5/6 − 1/2 = ? (simplest form)", t:"fill", kind:"num", a:["1/3"], tier:3, e:"1/2 = 3/6, so 5/6 − 3/6 = 2/6 = 1/3.", hint:"common denominator 6"},
  {q:"Which ratios are equivalent to 3:4? (select all)", t:"multi", o:["6:8","9:12","4:3","12:16","30:44"], a:[0,1,3], tier:3, e:"4:3 flips the order; 30:44 simplifies to 15:22, not 3:4."},
  {q:"Which are equal to 2/5? (select all)", t:"multi", o:["40%","0.4","4/10","0.25","5/2"], a:[0,1,2], tier:3, e:"0.25 is a quarter; 5/2 is upside-down."},
  {q:"'3/8 of a number is 12.' Which steps solve it? (select all)", t:"multi", o:["divide 12 by 3 to get one eighth","multiply that part by 8","the answer is 32","just divide 12 by 8","stop after finding one part"], a:[0,1,2], tier:3, e:"12 ÷ 3 = 4, then 4 × 8 = 32. Stopping early was last time's trap."}
 ]},

{id:"MA32", subj:"math", icon:"🧱", title:"Geometry & Multi-step II", en:"几何多步复赛·反抢答", tag:"fix",
 lesson:{ cards:[
   {t:"Plan before you press", b:"Multi-step problems: write the battle plan first.\nStep 1 — what do I compute? Step 2 — what next? What is ASKED?\nOnly then touch the keypad."},
   {t:"The answer is never a number you can see", b:"In this unit, no answer equals a number printed in the question.\nIf you are about to type a number you can SEE in the problem — stop.\nYou have skipped a step."}],
  example:{t:"Battle plan demo", prob:"A captain buys 4 packs of flags. Each pack holds 6 flags. She gives 9 away. How many are LEFT?", steps:[
   "Step 1 — total: 4 × 6 = 24.",
   "Step 2 — left: 24 − 9 = 15.",
   "15 is not 4, not 6, not 9 — a computed answer, not a copied one."]},
  check:[{q:"2 boxes of 7 shells. How many shells in total?", o:["14","9","27","72"], a:0, e:"2 × 7 = 14."}] },
 training:[
  {q:"A parallelogram has base 7 and height 6. What is its AREA?", t:"fill", kind:"num", a:["42"], tier:2, e:"7 × 6 = 42."},
  {q:"An L-shaped deck is a 9 by 7 rectangle with a 3 by 2 corner cut out. What is its AREA?", t:"fill", kind:"num", a:["57"], tier:3, e:"Big: 9×7 = 63. Notch: 3×2 = 6. 63 − 6 = 57. Last time the notch alone got submitted — finish the job!", hint:"two steps: big minus notch"},
  {q:"A triangle has base 10 and height 7. What is its AREA?", t:"fill", kind:"num", a:["35"], tier:3, e:"10 × 7 ÷ 2 = 35. Don't forget the ÷ 2."},
  {q:"A box has volume 84. Its length is 6 and width is 2. What is its HEIGHT?", t:"fill", kind:"num", a:["7"], tier:3, e:"84 ÷ (6 × 2) = 84 ÷ 12 = 7.", hint:"V ÷ (l × w)"},
  {q:"A box is 3 by 5 by 6. What is its VOLUME?", t:"fill", kind:"num", a:["90"], tier:2, e:"3 × 5 × 6 = 90."},
  {q:"Solve: 2(x + 5) = 18. x = ?", t:"fill", kind:"num", a:["4"], tier:3, e:"x + 5 = 9, so x = 4. Dividing by 2 is only STEP ONE.", hint:"divide, then subtract"},
  {q:"A captain buys 4 packs of flags. Each pack holds 6 flags. She gives 9 away. How many flags are LEFT?", t:"fill", kind:"num", a:["15"], tier:3, e:"4 × 6 = 24, then 24 − 9 = 15."},
  {q:"Which is the HEIGHT of a parallelogram?", o:["the straight-up distance between the two bases","the slanted side","the longest side","half the base"], a:0, tier:2, e:"Height is perpendicular — the slanted side is the trap."},
  {q:"To find an L-shape's area, the BEST first move is —", o:["split it into rectangles or subtract the notch","multiply every number you can see","measure the diagonal","count the corners"], a:0, tier:2, e:"Then rectangle rules do the rest."},
  {q:"Which situation needs PERIMETER?", o:["how much rope fences a garden","how much water fills a tank","how much paint covers a wall","how heavy a box is"], a:0, tier:3, e:"Around the edge = perimeter; filling = volume; covering = area."},
  {q:"A ship carries 32 crates per trip. After 3 trips, 11 crates still wait on the dock. How many crates in total?", o:["107","96","43","85"], a:0, tier:3, e:"32 × 3 = 96 carried, plus 11 waiting = 107."},
  {q:"In 2(x + 5) = 18, what does the 2 multiply?", o:["the whole bracket (x + 5)","only the x","only the 5","the 18"], a:0, tier:3, e:"The bracket is one package — that's why we divide both sides by 2 first."},
  {q:"Which units measure VOLUME? (select all)", t:"multi", o:["cm³","m³","litres","cm²","kg"], a:[0,1,2], tier:3, e:"Cubed units and litres fill space; cm² is area, kg is weight."},
  {q:"Which statements are TRUE? (select all)", t:"multi", o:["Triangle area = base × height ÷ 2","Perimeter of a square = side × 4","Volume of a box = l × w × h","Area of a square = side × 4","A parallelogram's area uses the slanted side"], a:[0,1,2], tier:3, e:"Square AREA is side × side; parallelograms use the perpendicular height."},
  {q:"A sailor buys 3 coils of rope at $8 each and pays with $30. Which steps find her CHANGE? (select all)", t:"multi", o:["multiply 3 × 8","start from 24","subtract the total from 30","add 3 + 8","submit 8 as the answer"], a:[0,1,2], tier:3, e:"3×8 = 24, then 30 − 24 = 6. Copying a visible number is the trap."}
 ]},

{id:"SC16", subj:"sci", icon:"🔦", title:"光与声II·反射与折射", en:"Light & Sound II", tag:"fix",
 lesson:{ cards:[
   {t:"Reflection vs refraction", b:"REFLECTION = light BOUNCES back from a surface.\nMirror, still lake, shiny spoon — you see a copy.\nREFRACTION = light BENDS when it crosses into water or glass.\nBent straw, 'shallow' pool, magnifying glass — things look moved or changed."},
   {t:"Pitch vs volume — don't mix them", b:"PITCH = how HIGH or LOW a sound is.\nTighter, shorter, thinner → higher pitch.\nVOLUME = how LOUD or QUIET it is.\nMore force = bigger vibration = louder.\nAnd remember: sound needs a medium — no air, no sound."}],
  example:{t:"Mirror or bent straw?", prob:"A straw in a glass of water looks broken at the waterline. Bouncing or bending?", steps:[
   "Light from the straw's bottom half travels through WATER, then AIR.",
   "Changing material makes light BEND — that is refraction.",
   "A mirror image would be light BOUNCING — reflection. Bent straw = refraction."]},
  check:[{q:"You see your face in a calm harbour pool. The light is —", o:["reflecting","refracting","stopping","speeding up"], a:0, e:"Bouncing off the water surface back to your eyes = reflection."}] },
 training:[
  {q:"You see yourself in the ship's polished mirror. This is —", o:["reflection","refraction","an echo","a shadow"], a:0, tier:1, e:"Light BOUNCES off the mirror back to you — reflection."},
  {q:"A chopstick in a glass of water looks bent at the surface. This is —", o:["refraction","reflection","evaporation","vibration"], a:0, tier:2, e:"Light BENDS as it crosses between water and air — refraction."},
  {q:"The harbour pool looks shallower than it really is. Why?", o:["light bends as it leaves the water","light bounces straight back to the sky","the water shrinks at noon","your eyes make deep things small"], a:0, tier:3, e:"Refraction lifts the image of the bottom — pools are always deeper than they look!"},
  {q:"A mountain appears upside-down on the still lake. This is —", o:["reflection","refraction","condensation","magnetism"], a:0, tier:2, e:"Flat, calm water works like a mirror — light bounces off it."},
  {q:"Kai tightens a guitar string. The sound becomes —", o:["higher","louder","quieter","slower"], a:0, tier:2, e:"Tighter string = faster vibration = HIGHER pitch. Not louder!"},
  {q:"Mia plucks the same string much harder. The sound becomes —", o:["louder","higher","lower","faster"], a:0, tier:1, e:"More force = bigger vibration = LOUDER. The pitch stays the same."},
  {q:"Is the Moon a light source?", o:["No — it only reflects sunlight","Yes — it burns like a small sun","Yes — but only in winter","No — it refracts starlight"], a:0, tier:3, e:"The Moon makes no light of its own. Moonlight is reflected SUNlight."},
  {q:"In a storm you SEE the lightning before you HEAR the thunder because —", o:["light travels much faster than sound","thunder always happens later","ears react slower than eyes","clouds soak up sound first"], a:0, tier:3, e:"Flash and boom start together — light just races far ahead of sound."},
  {q:"Two astronauts float OUTSIDE their spaceship. Why can't they simply talk?", o:["space has nothing to carry the sound","space is too cold for sound","their voices are too quiet","light blocks the sound waves"], a:0, tier:3, e:"Sound needs a medium — solid, liquid or gas. Space is a vacuum: nothing to vibrate."},
  {q:"Mia presses her ear on the wooden dock and hears footsteps clearly. Why?", o:["solids carry sound very well","wood makes every sound louder","ears work better sideways","the dock is hollow like a drum"], a:0, tier:3, e:"Sound travels faster and clearer through solids than through air."},
  {q:"Kai shouts at a cliff and hears his own voice come back. The echo is sound —", o:["bouncing off the rock","bending around the rock","soaking into the rock","speeding up inside the rock"], a:0, tier:3, e:"An echo is sound REFLECTING — just like light off a mirror."},
  {q:"Mia cuts her straw whistle shorter. The new note is —", o:["higher","louder","quieter","exactly the same"], a:0, tier:3, e:"Shorter tube = faster vibration = higher pitch. Shorter, tighter, thinner → high!"},
  {q:"Which of these are REFRACTION? (select all)", t:"multi", o:["a straw looks bent in a glass of water","the pool floor looks closer than it is","a magnifying glass bends sunlight to a bright spot","seeing your face in a polished kettle","hearing your voice bounce back in a tunnel"], a:[0,1,2], tier:3, e:"The kettle is reflection of light; the tunnel is reflection of SOUND. Bending = refraction."},
  {q:"Which statements about sound are TRUE? (select all)", t:"multi", o:["sound cannot travel through empty space","sound travels well through solids","hitting a drum harder makes it louder","hitting a drum harder raises its pitch","sound travels faster than light"], a:[0,1,2], tier:3, e:"Force changes VOLUME, not pitch — and light always wins the race."},
  {q:"Which of these make their OWN light? (select all)", t:"multi", o:["the Sun","a lit candle","a firefly","a flash of lightning","the full Moon"], a:[0,1,2,3], tier:3, e:"Four real light sources. The Moon only reflects sunlight — the classic trap."},
  {q:"Which changes give a HIGHER pitch? (select all)", t:"multi", o:["tightening the string","making the tube shorter","using a thinner string","plucking with more force","standing further away"], a:[0,1,2], tier:3, e:"Tighter, shorter, thinner = higher. More force = louder; distance = quieter."}
 ]},

{id:"SC17", subj:"sci", icon:"⚡", title:"电与电路II·静电与安全", en:"Circuits II", tag:"fix",
 lesson:{ cards:[
   {t:"Static vs current", b:"STATIC electricity = charge that BUILDS UP and stays — then jumps!\nSweater crackles, hair rising after the slide, a balloon stuck on the wall.\nCURRENT electricity = charge FLOWING round a closed loop.\nBattery → wire → bulb → back to battery. Any break, and it all stops."},
   {t:"Conductor, insulator, and you", b:"CONDUCTORS let charge flow: metals (copper, iron, steel) — and water!\nINSULATORS block it: plastic, rubber, glass, dry wood.\nThat is the whole safety rulebook:\ndry hands, plastic covers, never poke metal into sockets."}],
  example:{t:"Why did the whole string die?", prob:"Ten fairy lights are joined in ONE loop. One bulb burns out — and all ten go dark. Why?", steps:[
   "In a series loop, the SAME path runs through every bulb.",
   "One dead bulb = a gap in the path — the loop is now open.",
   "No closed loop, no flow: every light goes out, wherever the gap is."]},
  check:[{q:"A bulb lights only when the circuit is a —", o:["closed loop","straight line","tall tower","wet path"], a:0, e:"Closed loop = one unbroken path. Any gap stops the flow."}] },
 training:[
  {q:"Kai pulls off his wool sweater in the dark and hears tiny crackles. This is —", o:["static electricity","current electricity","magnetism","refraction"], a:0, tier:2, e:"Rubbing builds up charge — tiny sparks jump and crackle. Static!"},
  {q:"After the big slide, Mia's hair stands straight up. Why?", o:["her hair picked up electric charge","the wind pushed it up","the slide magnetised her hair","sound waves lifted it"], a:0, tier:2, e:"Rubbing on the slide charged her hair — the charged strands push apart."},
  {q:"A torch bulb won't light. The switch is ON and every wire is joined. The MOST likely problem is —", o:["the battery is dead","the plastic case is too thick","the bulb is too small","the wires are too long"], a:0, tier:3, e:"The loop looks complete but nothing flows — no push left. Check the battery first."},
  {q:"In a one-loop circuit, a wire breaks BEHIND the battery. What happens to the bulbs in FRONT?", o:["they all go out too","they stay lit","they get brighter","only the nearest one dies"], a:0, tier:3, e:"Position doesn't matter — ANY break anywhere opens the whole loop."},
  {q:"Which of these would let electricity flow through it?", o:["an iron nail","a rubber band","a plastic spoon","a glass marble"], a:0, tier:2, e:"Iron is a metal = conductor. The other three are insulators."},
  {q:"A GLASS cup is clear, almost like water. Does electricity pass through it?", o:["no — glass is an insulator","yes — clear things conduct","yes — glass is a kind of metal","only when it is cold"], a:0, tier:3, e:"Looks fool you: glass blocks charge. Clear does not mean conducting."},
  {q:"For a bulb to light, the parts must form a —", o:["closed loop","one-way straight road","pile of touching wires","tall antenna"], a:0, tier:1, e:"One unbroken ring: battery to bulb and all the way BACK."},
  {q:"What does flicking a switch OFF really do?", o:["it opens a gap in the loop","it drinks the spare electricity","it cools the wires down","it turns the battery around"], a:0, tier:3, e:"A switch is a drawbridge for the loop: OFF = open gap = no flow."},
  {q:"Two bulbs share one series loop. Mia unscrews the first bulb. The second bulb —", o:["goes out","stays on","gets brighter","blinks slowly"], a:0, tier:2, e:"Unscrewing makes a gap in the shared loop. Both go dark."},
  {q:"Why must your hands be DRY before touching a plug?", o:["water conducts electricity","wet fingers slip off the switch","water melts the plastic","dry hands feel the current first"], a:0, tier:3, e:"Water carries charge — wet skin invites electricity to travel through YOU."},
  {q:"You spot a wire with its plastic cover split open. You should —", o:["tell an adult and keep away","wrap it in paper yourself","test it with one quick touch","pour water on it"], a:0, tier:1, e:"Never touch or fix it yourself — report it and stay clear."},
  {q:"Why are copper wires wrapped in plastic?", o:["plastic keeps the charge on its safe path","plastic makes electricity faster","plastic feeds the current","copper rusts without plastic"], a:0, tier:3, e:"Conductor inside, insulator outside — the flow stays where it belongs."},
  {q:"Which of these are CONDUCTORS? (select all)", t:"multi", o:["an iron nail","a copper coin","a strip of aluminium foil","a wooden ruler","a rubber eraser"], a:[0,1,2], tier:3, e:"Three metals conduct. Dry wood and rubber block the flow."},
  {q:"Which of these are INSULATORS? (select all)", t:"multi", o:["a plastic comb","a glass bottle","a rubber boot","a dry wooden chopstick","a steel spoon"], a:[0,1,2,3], tier:3, e:"Only the steel spoon conducts — the metal is the odd one out."},
  {q:"Which safety rules are RIGHT? (select all)", t:"multi", o:["pull the PLUG, never the wire","dry your hands before touching any switch","keep metal pins away from sockets","a frayed wire is fine if you are quick","many heaters in one socket is no problem"], a:[0,1,2], tier:3, e:"The last two are exactly how accidents happen."},
  {q:"Which actions will STOP the bulb from shining? (select all)", t:"multi", o:["opening the switch","taking the battery out","cutting any one wire","moving the closed switch to the other side","using a shorter copper wire"], a:[0,1,2], tier:3, e:"A loop needs a battery plus an unbroken path. WHERE the parts sit doesn't matter."}
 ]},

{id:"SC18", subj:"sci", icon:"🌊", title:"科学混合复赛·海洋食物链", en:"Science Mixed Round", tag:"level",
 lesson:{ media:[{type:"foodchain", title:"An ocean food chain", cap:"Sun → seaweed → small fish → penguin → seal. The arrow always points at the eater.", items:[
   {e:"☀️",n:"Sun",cap:"Every chain starts with the Sun's energy."},
   {e:"🌿",n:"Seaweed",cap:"Seaweed is the PRODUCER — it makes food from sunlight."},
   {e:"🐟",n:"Small fish",cap:"The small fish eats seaweed — a first consumer."},
   {e:"🐧",n:"Penguin",cap:"The penguin eats the small fish — a second consumer."},
   {e:"🦭",n:"Seal",cap:"The seal eats the penguin — the top of this chain."}]}],
  cards:[
   {t:"Read the arrows out loud", b:"seaweed → small fish → penguin → seal\nThe arrow means 'IS EATEN BY'. It points AT the eater.\nSay it: 'seaweed is eaten by the small fish.'\nEnergy rides the arrows: Sun → producer → consumers, one meal at a time."},
   {t:"Three subjects, one brain", b:"Today mixes ALL THREE science topics:\nfood chains, light & sound, electricity.\nBefore each question, ask: which topic is this?\nName the topic first — the right rule arrives with it."}],
  example:{t:"Which way does the arrow point?", prob:"In 'small fish → penguin', who is doing the eating?", steps:[
   "The arrow points AT the penguin.",
   "Arrow = 'is eaten by' — so the small fish IS EATEN BY the penguin.",
   "The eater sits at the arrow's tip. Last time the tail got picked — not today."]},
  check:[{q:"In this chain, which living thing is the PRODUCER?", o:["the seaweed","the small fish","the penguin","the seal"], a:0, e:"Seaweed makes its own food from sunlight — every chain starts with a producer."}] },
 training:[
  {q:"In the chain seaweed → small fish → penguin → seal, the arrow between penguin and seal means —", o:["the penguin is eaten by the seal","the seal is eaten by the penguin","they share their food","they never meet"], a:0, tier:3, e:"The arrow points AT the eater. penguin → seal: the seal eats the penguin."},
  {q:"In the same chain, which animal eats the seaweed?", o:["the small fish","the penguin","the seal","nobody — seaweed is not food"], a:0, tier:1, e:"seaweed → small fish: the arrow points at its eater."},
  {q:"Which arrow is drawn CORRECTLY?", o:["seaweed → small fish","small fish → seaweed","penguin → small fish","seal → penguin"], a:0, tier:3, e:"Point at the eater: the small fish eats seaweed. The other three feed backwards!"},
  {q:"What job do mushrooms and bacteria do in nature?", o:["break down dead things and recycle them","make food from sunlight","hunt small animals at night","store sunlight for the winter"], a:0, tier:2, e:"Decomposers clean up and return the nutrients to the soil and the sea."},
  {q:"A dead fish washes up on the beach. Which living things will break it down?", o:["bacteria and moulds","penguins and seals","seaweed and grass","sunlight and waves"], a:0, tier:3, e:"Decomposers do the recycling. Sunlight and waves are not alive!"},
  {q:"If the small fish all disappeared, what would happen FIRST to the penguins?", o:["they would lose their main food","they would eat seaweed instead","nothing would change for them","they would become producers"], a:0, tier:3, e:"Break one link and the next eater goes hungry — chains are fragile."},
  {q:"Where does the ENERGY in this whole chain start?", o:["the Sun","the seaweed","the seawater","the seal"], a:0, tier:1, e:"Sunlight powers the seaweed; the seaweed powers everyone else."},
  {q:"The seal at the END of this chain is called —", o:["a top predator","a producer","a decomposer","a herbivore"], a:0, tier:2, e:"Nothing in this chain eats the seal — it sits at the top."},
  {q:"A penguin sees its own image on the still, glassy sea. That image is made by light —", o:["reflecting off the water","refracting into the deep","being soaked up by the sea","slowing down and stopping"], a:0, tier:2, e:"Still water = mirror. Bouncing light = reflection."},
  {q:"A seal slaps the water. A diver BELOW the surface hears it clearly, because sound —", o:["travels well through water","cannot leave the air","only moves through solids","turns into light underwater"], a:0, tier:3, e:"Sound needs a medium — and liquids carry it even faster than air."},
  {q:"The research boat's lamp circuit uses a steel paperclip as its switch. Why does steel work?", o:["steel is a conductor","steel is an insulator","steel is magnetic","steel is shiny"], a:0, tier:3, e:"Closing the loop needs a material that charge can flow through — a metal."},
  {q:"A balloon rubbed on a wool hat sticks to the cabin wall. This is —", o:["static electricity","current electricity","gravity","refraction"], a:0, tier:3, e:"Rubbing builds up charge; the charged balloon clings. No loop, no flow — static."},
  {q:"Which statements about light and sound are TRUE? (select all)", t:"multi", o:["sound cannot cross empty space","light travels faster than sound","a tighter drum skin gives a higher note","the Moon shines with its own light","an echo is light bouncing off rock"], a:[0,1,2], tier:3, e:"Moonlight is reflected sunlight; an echo is SOUND bouncing."},
  {q:"Which statements about circuits and food chains are TRUE? (select all)", t:"multi", o:["a bulb needs a closed loop to light","food-chain arrows point at the eater","decomposers recycle dead material","plastic is a good conductor","seaweed gets its energy by eating small fish"], a:[0,1,2], tier:3, e:"Plastic INSULATES; seaweed makes its food from sunlight — it eats nobody."},
  {q:"Which of these are DECOMPOSERS? (select all)", t:"multi", o:["mushrooms","bacteria","mould on old bread","penguins","seaweed"], a:[0,1,2], tier:3, e:"Penguins are consumers; seaweed is a producer."},
  {q:"Which sentences about the chain seaweed → small fish → penguin → seal are CORRECT? (select all)", t:"multi", o:["seaweed is the producer","the seal eats the penguin","energy moves along the arrows","the small fish is eaten by the penguin","the seal is eaten by the small fish"], a:[0,1,2,3], tier:3, e:"Four true readings of the arrows. The last one swims backwards."}
 ]},

{id:"EN28", subj:"en", icon:"⛈️", title:"阅读·风暴前的赛跑", en:"Reading: Storm Race", tag:"core",
 lesson:{ cards:[
   {t:"Reading a story with dialogue", b:"Quotation marks fence off the exact spoken words.\nWatch the little tags: said Mia, shouted Kai — they name the speaker.\nOne more secret: the comma before the tag lives INSIDE the quotes.\n\"Look at those clouds,\" said Mia."},
   {t:"Order words are the story's rope", b:"First… Next… Then… — these words tie the events in a line.\nFirst: sail down, rolled tight.\nNext: ropes and fish to the shed; boat tied with a double knot.\nThen: the fat rain arrives.\nWhen a question asks 'what happened before X?' — climb the rope."}],
  example:{t:"Who says it?", prob:"\"Look at those clouds,\" said Mia. — What exactly did Mia say, and where does the comma sit?", steps:[
   "The spoken words are only what sits inside the quotation marks.",
   "The comma after 'clouds' sits INSIDE the closing quote — that is the rule.",
   "'said Mia' is the tag outside — it names the speaker; nobody speaks it."]},
  check:[{q:"Who noticed the storm clouds first?", o:["Mia","Kai","the captain","a fisherman"], a:0, e:"\"Look at those clouds,\" said Mia, pointing west."}] },
 training:[
  {q:"Where were Kai and Mia when the sky began to change?", o:["fishing off the small dock","sailing far from shore","inside the shed","swimming in the bay"], a:0, tier:1, e:"Line one: they were fishing off the small dock.", passage:P_STORM},
  {q:"The clouds rolled over the hills 'like a grey blanket'. This is —", o:["a simile","a metaphor","personification","alliteration"], a:0, tier:2, e:"'LIKE a grey blanket' — an open comparison with 'like' = simile.", passage:P_STORM},
  {q:"How much time did Kai think they had?", o:["ten minutes, maybe less","about one hour","until sunset","half a day"], a:0, tier:1, e:"'We have ten minutes,' he said. 'Maybe less.'", passage:P_STORM},
  {q:"What did they do FIRST?", o:["pulled down the sail and rolled it tight","carried the fish to the shed","tied the boat with a double knot","ran up the path"], a:0, tier:2, e:"'First, they pulled down the sail and rolled it tight.'", passage:P_STORM},
  {q:"While Mia carried the ropes and the bucket, Kai —", o:["tied the boat to the strongest post","pulled down the sail","shouted for help","locked the shed door"], a:0, tier:2, e:"Two jobs at the same time — 'while' links them together.", passage:P_STORM},
  {q:"Why did Kai tie the boat with a DOUBLE knot?", o:["so the storm could not pull the boat loose","because one rope was too short","to win a knot-tying game","because the post was broken"], a:0, tier:3, e:"Inference: a double knot holds extra tight — storm-proof.", passage:P_STORM},
  {q:"'Fat drops of rain began to slap the wooden dock.' The word 'slap' makes the rain act like —", o:["a person hitting with a hand","a soft whisper","a distant bell","a sleeping cat"], a:0, tier:3, e:"Rain doing a human action = personification.", passage:P_STORM},
  {q:"In \"Look at those clouds,\" said Mia — where does the comma sit?", o:["inside the closing quotation mark","after the word 'said'","outside the quotation marks","a comma is not allowed there"], a:0, tier:3, e:"The comma belongs INSIDE the quotes — check the line again.", passage:P_STORM},
  {q:"When did the thunder boom across the bay?", o:["just as they ran up the path","before they pulled the sail down","while they were still fishing","the next morning"], a:0, tier:2, e:"'They ran up the path just as thunder boomed across the bay.'", passage:P_STORM},
  {q:"'They had won the race against the storm' means —", o:["they finished the work before the storm hit","they sailed faster than the wind","they won a real boat race","the storm never arrived"], a:0, tier:3, e:"The 'race' is a picture: their jobs against the storm's arrival. They finished first.", passage:P_STORM},
  {q:"The last words — 'but only just' — tell us —", o:["they barely made it in time","they had lots of time to spare","they lost the race","they were far too late"], a:0, tier:3, e:"'Only just' = by the smallest possible amount. A very close race!", passage:P_STORM},
  {q:"'Good work, sailor,' Mia laughed. Her mood here is —", o:["proud and playful","angry and tired","frightened and cold","bored and sleepy"], a:0, tier:3, e:"Laughing plus a friendly nickname = warm, playful praise.", passage:P_STORM},
  {q:"Which statements about the story are TRUE? (select all)", t:"multi", o:["Mia pointed west at the clouds","Kai checked the sailboat tied below","thunder boomed across the bay","the little boat sank in the storm","they watched the storm from the water"], a:[0,1,2], tier:3, e:"The boat rocked SAFELY, and they watched from the shed doorway.", passage:P_STORM},
  {q:"Which of these happened BEFORE the rain began? (select all)", t:"multi", o:["they pulled down the sail","Mia carried the ropes and the bucket up","Kai tied the boat with a double knot","they rolled the sail tight","Mia shook water from her hair"], a:[0,1,2,3], tier:3, e:"All the boat-work beat the rain. Wet hair comes at the very end.", passage:P_STORM},
  {q:"Which lines were spoken by KAI? (select all)", t:"multi", o:["\"We have ten minutes.\"","\"Help me bring everything in.\"","\"Hurry!\"","\"Look at those clouds.\"","\"Good work, sailor.\""], a:[0,1,2], tier:3, e:"Mia opens the story and closes it — Kai commands the middle.", passage:P_STORM},
  {q:"Which are ORDER words that organise this story? (select all)", t:"multi", o:["First","Next","Then","Hurry","Good"], a:[0,1,2], tier:3, e:"First–Next–Then tie the events in time order. 'Hurry!' is just shouting.", passage:P_STORM}
 ]},

{id:"EN29", subj:"en", icon:"✒️", title:"撇号与引号·复赛", en:"Apostrophes & Quotes Rematch", tag:"fix",
 lesson:{ cards:[
   {t:"The apostrophe's three jobs (and one fake)", b:"1) Missing letters: don't, didn't, it's (= it is).\n2) Belonging: the boat's sail (one boat) · the sailors' ropes (many sailors).\n3) Odd plurals: the children's boots, the men's caps.\nThe FAKE: its' — this word does not exist. Ever.\nAnd plain plurals never take one: two boats, five apples."},
   {t:"Quotes and whole sentences", b:"Speech first: \"Pull the rope,\" said Ben. — comma INSIDE the quotes.\nTag first: Ben said, \"The tide is in.\" — comma after said, capital inside.\nA sentence needs a subject AND a finished verb.\n'Running down the path.' — who ran? No subject = only a fragment."}],
  example:{t:"its or it's — the two-second test", prob:"The ship lost ___ anchor. Which one fits?", steps:[
   "Try to say 'it is': 'The ship lost IT IS anchor' — nonsense.",
   "So no apostrophe: its = belonging. it's ONLY ever means 'it is'.",
   "And its' is a made-up word — wherever you see it, it is wrong."]},
  check:[{q:"___ starting to rain — bring the sail in!", o:["It's","Its","Its'","Is"], a:0, e:"It's = it is. 'IT IS starting to rain' works, so the apostrophe stays."}] },
 training:[
  {q:"The old ship finally dropped ___ anchor.", o:["its","it's","its'","their"], a:0, tier:2, e:"Belonging, no apostrophe. Test: 'it is anchor' = nonsense, so its."},
  {q:"___ too windy to sail today.", o:["It's","Its","Its'","Their"], a:0, tier:2, e:"'IT IS too windy' — the apostrophe marks the missing i."},
  {q:"Which of these is NEVER a real English word?", o:["its'","it's","its","sailors'"], a:0, tier:3, e:"its' does not exist — no exceptions, no special cases."},
  {q:"The ___ boots stood in a row by the door. (the boots of the children)", o:["children's","childrens'","childrens","children"], a:0, tier:3, e:"Children is already plural — just add 's: children's."},
  {q:"Two ___ sailed into the harbour at noon.", o:["boats","boat's","boats'","boates"], a:0, tier:1, e:"A plain plural — more than one boat. No apostrophe at all."},
  {q:"One gull stole the ___ sandwich. (the sandwich of the captain)", o:["captain's","captains","captains'","captain"], a:0, tier:1, e:"One captain owns it: captain's."},
  {q:"The two ___ cabins were side by side. (the cabins of the brothers)", o:["brothers'","brother's","brothers","brotheres'"], a:0, tier:3, e:"A plural owner ending in s takes the apostrophe AFTER the s: brothers'."},
  {q:"Which sentence is punctuated correctly? (speech FIRST)", o:["\"Pull the rope,\" said Ben.","\"Pull the rope\" said Ben.","\"Pull the rope,\" Said Ben.","\"Pull the rope.\" said Ben."], a:0, tier:3, e:"Comma inside the quotes, small s on said."},
  {q:"Which sentence is punctuated correctly? (tag FIRST)", o:["Ben said, \"The tide is coming in.\"","Ben said \"The tide is coming in.\"","Ben said, \"the tide is coming in.\"","Ben, said \"The tide is coming in.\""], a:0, tier:3, e:"Tag first: comma after said, capital T starting the speech."},
  {q:"Which of these is a FRAGMENT (not a full sentence)?", o:["Running down the sandy path.","The gulls cried.","Kai tied the rope.","The tide rose fast."], a:0, tier:3, e:"Who was running? No subject + finished verb = a fragment."},
  {q:"Which of these IS a complete sentence?", o:["The waves crashed.","Because the wind blew.","After the storm passed.","The tall grey lighthouse on the cliff."], a:0, tier:3, e:"Short but whole: subject (waves) + verb (crashed). The others leave you hanging."},
  {q:"The apostrophe in \"didn't\" stands for —", o:["a missing letter","the letter s","a pause for breath","the past tense"], a:0, tier:2, e:"did not → didn't: the o dropped out and the apostrophe took its seat."},
  {q:"Which sentences are punctuated CORRECTLY? (select all)", t:"multi", o:["\"It's low tide,\" said Mia.","The children's kites flew high.","The ship lost its anchor.","Fresh fish's for sale here.","Both sailor's went ashore."], a:[0,1,2], tier:3, e:"'fish's' and 'sailor's' are plain plurals wearing stolen apostrophes."},
  {q:"Which of these are COMPLETE sentences? (select all)", t:"multi", o:["The gulls cried.","We sailed home before dark.","Under the old wooden dock.","When the fog rolled in.","The bright red buoy near the rocks."], a:[0,1], tier:3, e:"Only two have subject + verb. The rest trail off unfinished."},
  {q:"In which sentences is the apostrophe used CORRECTLY? (select all)", t:"multi", o:["The boat's sail is patched.","It's nearly sunset.","The sailors' mess hall was loud.","The shop sells apple's.","Its' rope snapped."], a:[0,1,2], tier:3, e:"apple's = a plural with a fake apostrophe; its' = not a word at all."}
 ]},

{id:"EN30", subj:"en", icon:"🗼", title:"诗歌II·灯塔守夜人", en:"Poetry II: ABAB", tag:"core",
 lesson:{ cards:[
   {t:"Finding the rhyme scheme", b:"Label the END sound of each line: A, then B, then…\nstair(A) slow(B) air(A) know(B) → ABAB.\nThe last poem was AABB — pairs holding hands.\nThis one ALTERNATES — the rhymes leapfrog each other."},
   {t:"Metaphor vs simile vs personification", b:"SIMILE announces itself: growls LIKE some great bear.\nMETAPHOR just claims it: the beam BECOMES a golden rope.\nPERSONIFICATION gives things human acts: the light KEEPS ITS PROMISE.\nSame poem, three different spells."}],
  example:{t:"Rope or bear?", prob:"'The beam becomes a golden rope' vs 'growl like some great bear' — which one is the metaphor?", steps:[
   "'Like some great bear' uses LIKE — that is a simile, comparing openly.",
   "'Becomes a golden rope' has no like or as — the beam simply IS a rope: metaphor.",
   "Quick test: find like/as → simile. A bold claim without them → metaphor."]},
  check:[{q:"Who is this poem about?", o:["a lighthouse keeper","a fisherman","a great bear","a lost sailor"], a:0, e:"All night the KEEPER climbs the stair with his lantern."}] },
 training:[
  {q:"In stanza 1, which word rhymes with 'stair'?", o:["air","slow","know","lantern"], a:0, tier:1, e:"stair / air — the A-rhymes of the first stanza.", passage:P_POEM2},
  {q:"The rhyme pattern of this poem is —", o:["ABAB","AABB","AAAA","ABBA"], a:0, tier:3, e:"stair(A) slow(B) air(A) know(B) — the rhymes alternate. The last poem was AABB; not this one!", passage:P_POEM2},
  {q:"'The beam becomes a golden rope' is —", o:["a metaphor","a simile","personification","alliteration"], a:0, tier:3, e:"No like or as — the beam simply IS a rope. A bold claim = metaphor.", passage:P_POEM2},
  {q:"'The storm may growl like some great bear' is —", o:["a simile","a metaphor","a fact about bears","an ending rhyme"], a:0, tier:2, e:"LIKE gives it away — an open comparison is a simile.", passage:P_POEM2},
  {q:"'The wind may pound the door.' This gives the wind —", o:["a human action","a bear's voice","a golden colour","a quiet song"], a:0, tier:3, e:"Pounding on doors is people's work — personification.", passage:P_POEM2},
  {q:"When does the keeper climb the stair?", o:["all night","every morning","once a week","only in storms"], a:0, tier:1, e:"Line one: 'All night the keeper climbs the stair.'", passage:P_POEM2},
  {q:"What message does the light's 'song of hope' carry?", o:["\"This way, sailors, home.\"","\"Stay away from the shore.\"","\"The storm is coming fast.\"","\"Good night, little boats.\""], a:0, tier:2, e:"The beam hums one steady promise: this way, home.", passage:P_POEM2},
  {q:"'To ships he'll never know' tells us the keeper —", o:["helps strangers he will never meet","forgets the ships he sees","only guides his friends","never learns his own job"], a:0, tier:3, e:"He serves people he'll never meet — quiet, invisible kindness.", passage:P_POEM2},
  {q:"In stanza 2, what is 'thrown far across the foam'?", o:["the golden rope of light","a real rescue rope","the keeper's lantern","a fishing net"], a:0, tier:2, e:"The beam-as-rope — the metaphor stretches across the waves.", passage:P_POEM2},
  {q:"The little light 'keeping its promise to the shore' means —", o:["the light shines steadily no matter what","the shore made the light sign a paper","the light goes out when it is tired","the keeper promised to leave"], a:0, tier:3, e:"Storm or wind, the beam keeps doing its duty — a promise kept nightly.", passage:P_POEM2},
  {q:"What makes 'becomes a golden rope' a metaphor and NOT a simile?", o:["it claims the beam IS a rope, without like or as","it uses the word like","it is about an animal","it rhymes with hope"], a:0, tier:3, e:"The missing like/as is the whole difference.", passage:P_POEM2},
  {q:"'It hums a steady song of hope' — what is 'It'?", o:["the beam of light","the storm","the great bear","the wooden door"], a:0, tier:2, e:"Follow the stanza back: the beam-rope hums as it guides.", passage:P_POEM2},
  {q:"Which pairs of words RHYME in this poem? (select all)", t:"multi", o:["stair — air","slow — know","rope — hope","foam — home","bear — door"], a:[0,1,2,3], tier:3, e:"Four true pairs, one impostor: bear/door don't chime.", passage:P_POEM2},
  {q:"Which lines use PERSONIFICATION? (select all)", t:"multi", o:["It hums a steady song of hope","The wind may pound the door","Keeping its promise to the shore","His lantern swinging slow","All night the keeper climbs the stair"], a:[0,1,2], tier:3, e:"Humming, pounding, promising — human acts by non-humans. The last two are literal.", passage:P_POEM2},
  {q:"Which statements about the poem's craft are TRUE? (select all)", t:"multi", o:["'a golden rope' is a metaphor","'like some great bear' is a simile","the rhyme scheme is ABAB","the rhyme scheme is AABB","'a golden rope' is a simile"], a:[0,1,2], tier:3, e:"Know your spells — and your letters. ABAB, metaphor, simile.", passage:P_POEM2},
  {q:"Which statements about the lighthouse keeper are TRUE? (select all)", t:"multi", o:["the keeper works through the night","the light guides sailors home","the storm is compared to a bear","the keeper knows every ship by name","the light gives up when the wind pounds"], a:[0,1,2], tier:3, e:"'Ships he'll NEVER know' — and the little light will STILL be there.", passage:P_POEM2}
 ]},

{id:"EN31", subj:"en", icon:"⌨️", title:"写作VII·打字版", en:"Writing VII: Typed", tag:"core",
 lesson:{ cards:[
   {t:"New this round: TYPE your answer", b:"The microphone is retired — this time you TYPE. ⌨️\nType slowly and look at each word after you write it.\nSpelling now counts as part of the job:\nread your paragraph once more before you press Done."},
   {t:"The hamburger still rules", b:"1) Topic sentence — say your main idea.\n2)–4) THREE detail sentences — reasons, examples, pictures in words.\n5) Closing sentence — wrap it up in fresh words.\nStay on topic: every sentence serves the title."}],
  example:{t:"A typed paragraph, checked", prob:"How do you turn 'summer is fun' into a real opening sentence — typed without typos?", steps:[
   "Weak: 'summer is fun.' Strong: 'The best thing about summer is the free, sunny mornings.'",
   "Type it, then re-read it letter by letter: summer, not summmer; because, not becuase.",
   "One typo found while checking = one point saved. Checking IS writing."]},
  check:[{q:"Before pressing Done ✓ you should —", o:["re-read and fix your spelling","add random capital letters","delete all the commas","type as fast as you can"], a:0, e:"Typed work gets a once-over: spelling, capitals, full stops."}] },
 training:[
  {q:"✍️ Opinion paragraph (English only). Topic: The best thing about summer.\nBuild a hamburger: 1) topic sentence 2)–4) three detail sentences 5) closing sentence.\nWord bank: holiday, beach, morning, ice cream, family, sunshine, free, travel.\nRule: use 'because' in at least TWO different sentences.\n⌨️ Type carefully and check your spelling before Done.", t:"open", min:100, hint:"5 sentences · two becauses · spelling check at the end."},
  {q:"✍️ Science writing (English only). Topic: How a circuit makes a bulb light.\nExplain it step by step, like a young engineer: battery → wire → switch → bulb → back to the battery.\nWord bank: battery, wire, switch, bulb, closed loop, conductor, break, flow.\nRule: use the words 'closed loop' — and say what happens if the loop breaks.\n⌨️ Type carefully and check your spelling before Done.", t:"open", min:100, hint:"Teach it in order. End with the broken-loop warning."},
  {q:"✍️ Descriptive paragraph (English only). Topic: The sea in a storm.\nPaint the picture in 5 sentences — sounds, colours, movement.\nWord bank: waves, roar, giant, grey, wind, howl, crash, foam.\nRule: include ONE simile (like / as) and ONE personification (the sea or the wind doing a human action).\n⌨️ Type carefully and check your spelling before Done.", t:"open", min:100, hint:"One like/as picture + one human act by the sea or wind."},

  cards:[
   {t:"-er verbs: the shirt changes with the person", b:"parler → je parle · tu parles · il/elle parle · nous parlons · ils parlent.\nSame music for habiter, jouer, regarder, aimer.\nNegation is a sandwich: ne + verb + pas.\nJe NE parle PAS chinois. Before a vowel, ne → n': je N'AIME pas."},
   {t:"AVOIR — the 'have' verb France runs on", b:"j'ai · tu as · il/elle a · nous avons · ils ont.\nFrench HAS what English IS:\nJ'ai faim = I am hungry (literally: I HAVE hunger).\nSame trick for soif (thirst), peur (fear) — and your age: J'ai onze ans."}],
  example:{t:"Build the negative", prob:"Turn 'Elle aime les tempêtes' (she likes storms) into 'she does NOT like storms'.", steps:[
   "The sandwich: ne + aime + pas.",
   "aime starts with a vowel → ne squeezes into n'.",
   "Elle n'aime pas les tempêtes. The n' hugs the verb."]},
  check:[{q:"'J'ai faim' really means —", o:["I am hungry","I have a farm","I am afraid","I like bread"], a:0, e:"Literally 'I HAVE hunger' — French uses avoir where English uses am."}] },

  {q:"'J'ai' means —", o:["I have","I am","I go","I see"], a:0, tier:1, e:"avoir = to have. j'ai = je + ai squeezed together."},

  {q:"Elle ___ à Osaka.", o:["habite","habites","habitons","habiter"], a:0, tier:2, e:"il/elle → -e: elle habite. Same shirt as je."},
  {q:"Nous ___ un film le vendredi soir.", o:["regardons","regarde","regardes","regarder"], a:0, tier:3, e:"nous → -ons, always: nous regardons."},

  {q:"Elle ___ pas les tempêtes.", o:["n'aime","ne aime","naime","n'aimes"], a:0, tier:3, e:"aime starts with a vowel → ne becomes n' and glues on: n'aime."},
  {q:"Why does 'ne' become n' in 'Je n'aime pas' ?", o:["aime starts with a vowel","aime is a long word","the sentence is extra negative","French drops every e"], a:0, tier:3, e:"Vowel meets vowel → squeeze: ne + aime = n'aime. Easier to say!"},

const KEY="sailor_pack_v15", PASS=0.6;
function fresh(){ return {xp:SEED.xp, v15Best:{}, v15Done:[], mistakes:[], box:[], writing:{}, traceDays:[], started:SEED.xp}; }
let state=load()||fresh();
if(!state.box) state.box=[];
if(!state.writing) state.writing={};
if(!state.traceDays) state.traceDays=[];
function load(){ try{ return JSON.parse(localStorage.getItem(KEY)); }catch(e){ return null; } }
