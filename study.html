<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sailor 航海学堂 · v14.0</title>
<style>
  :root{
    --bg1:#06192e; --bg2:#0b3a4f; --bg3:#0f5163;
    --ink:#0c1230; --paper:#ffffff; --paper2:#f4f7ff; --muted:#6b7396; --line:#e3e9f7;
    --cn:#ff5d5d; --math:#23a7ff; --sci:#a855f7; --en:#22c55e; --fr:#14b8a6;
    --cn-d:#e23c3c; --math-d:#0d86df;
    --xp:#ffb020; --xp-d:#f59e0b; --gold:#ffd24a;
    --ok:#16a34a; --okbg:#e7f9ee; --no:#e23c3c; --nobg:#fdecec;
    --t1:#22c55e; --t2:#23a7ff; --t3:#a855f7;
    --r:22px; --r2:16px;
    --shadow:0 12px 34px rgba(8,12,40,.2); --shadow2:0 6px 18px rgba(8,12,40,.12);
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",Roboto,sans-serif;
    --cjk:"PingFang SC","Hiragino Sans GB","Microsoft YaHei","Heiti SC","WenQuanYi Micro Hei",sans-serif;
    --fs:20px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:var(--font);color:var(--ink);font-size:var(--fs);
    background:radial-gradient(1200px 600px at 80% -10%,#0e6178 0%,transparent 55%),radial-gradient(900px 500px at -10% 10%,#0a4a60 0%,transparent 50%),linear-gradient(160deg,var(--bg1),var(--bg2) 60%,var(--bg3));
    background-attachment:fixed;min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.55}
  .wrap{max-width:800px;margin:0 auto;padding:18px 16px 64px}

  .hero{background:linear-gradient(135deg,#171f48,#202c63);border:1px solid rgba(255,255,255,.08);border-radius:var(--r);padding:20px;color:#fff;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .hero::after{content:"";position:absolute;right:-40px;top:-40px;width:180px;height:180px;background:radial-gradient(circle,rgba(255,178,32,.28),transparent 70%)}
  .hero-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .brand{display:flex;align-items:center;gap:12px}
  .logo{width:54px;height:54px;border-radius:50%;padding:2.5px;background:linear-gradient(135deg,#d8a93a,#b8860b);box-shadow:0 6px 16px rgba(184,134,11,.45);flex:0 0 auto;box-sizing:border-box}.logo img{width:100%;height:100%;border-radius:50%;object-fit:cover;display:block;border:2px solid #0b3a52}
  .brand h1{font-size:22px;margin:0;font-weight:800;letter-spacing:.3px}
  .brand .sub{font-size:13px;color:#aeb6e0;margin-top:1px}
  .ver{font-size:13px;font-weight:800;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18);padding:6px 13px;border-radius:999px;white-space:nowrap}
  .belt-row{display:flex;align-items:center;gap:15px;margin-top:18px;position:relative;z-index:1}
  .belt-emblem{flex:none;width:70px;height:70px;border-radius:17px;display:grid;place-items:center;position:relative;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12)}
  .belt-bar{width:46px;height:15px;border-radius:3px;box-shadow:inset 0 -2px 0 rgba(0,0,0,.25)}
  .belt-knot{position:absolute;width:10px;height:21px;border-radius:2px;transform:rotate(18deg);right:13px;bottom:15px}
  .belt-info{flex:1;min-width:0}
  .belt-name{font-size:17px;font-weight:800}
  .belt-name .next{font-weight:600;color:#aeb6e0;font-size:13px;margin-left:6px}
  .xpbar{height:15px;background:rgba(255,255,255,.12);border-radius:999px;margin-top:9px;overflow:hidden}
  .xpfill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--xp),var(--gold));width:0;transition:width 1.1s cubic-bezier(.2,.8,.2,1);box-shadow:0 0 12px rgba(255,178,32,.6)}
  .xpline{display:flex;justify-content:space-between;font-size:13px;color:#c7cdf0;margin-top:6px}
  .xpnow{font-weight:800;color:#ffd86b}

  .box-card{margin-top:16px;width:100%;border:none;border-radius:var(--r2);padding:15px 18px;font-family:inherit;cursor:pointer;
    display:flex;align-items:center;gap:13px;box-shadow:var(--shadow2);color:#fff;background:linear-gradient(135deg,#ff7a59,#ff5d5d)}
  .box-card.empty{background:rgba(255,255,255,.08);color:#c7cdf0;border:1px solid rgba(255,255,255,.14)}
  .box-card:active{transform:scale(.99)}
  .box-card .bi{font-size:26px}
  .box-card .bt{font-weight:800;font-size:16px} .box-card .bs{font-size:12.5px;opacity:.92;margin-top:1px}
  .box-card .bn{margin-left:auto;font-weight:900;font-size:20px;background:rgba(255,255,255,.22);border-radius:999px;padding:4px 13px}
  .box-card.empty .bn{background:rgba(255,255,255,.12)}

  .sec{margin-top:24px}
  .sec-h{display:flex;align-items:center;gap:9px;margin:0 4px 13px}
  .dot{width:12px;height:12px;border-radius:3px}
  .sec-h h2{font-size:17.5px;margin:0;color:#fff;font-weight:800}
  .sec-h .pct{margin-left:auto;font-size:13px;color:#aeb6e0;font-weight:700}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:520px){.grid{grid-template-columns:1fr}}
  .card{background:var(--paper);border-radius:var(--r2);padding:15px;cursor:pointer;box-shadow:var(--shadow2);border:1px solid var(--line);transition:transform .12s ease;display:flex;flex-direction:column;gap:9px;position:relative;overflow:hidden}
  .card:active{transform:scale(.975)}
  .card .stripe{position:absolute;left:0;top:0;bottom:0;width:6px}
  .card-top{display:flex;align-items:center;gap:11px;padding-left:5px}
  .card .ic{font-size:28px;flex:none}
  .card .t{font-weight:800;font-size:15.5px;line-height:1.25}
  .card .en{font-size:12px;color:var(--muted);font-weight:600}
  .card-bot{display:flex;align-items:center;gap:8px;padding-left:5px;flex-wrap:wrap}
  .tag{font-size:11px;font-weight:800;padding:3px 9px;border-radius:999px}
  .tag.fix{background:#fff0e6;color:#d2691e} .tag.level{background:#e7f3ff;color:#0d86df}
  .tag.trip{background:#f0e9ff;color:#7c3aed} .tag.core{background:#eef1ff;color:#4f5bd5}
  .tag.new{background:#ecfeff;color:#0891b2}
  .best{margin-left:auto;font-size:12.5px;font-weight:800;color:var(--muted)} .best.done{color:var(--ok)}

  .actions{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:26px}
  .abtn{border:none;border-radius:var(--r2);padding:15px;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer;color:#fff;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:var(--shadow2)}
  .abtn:active{transform:scale(.97)}
  .abtn.report{background:linear-gradient(135deg,#5b67e8,#7c3aed)} .abtn.export{background:linear-gradient(135deg,#0d86df,#23a7ff)}
  .reset{grid-column:1/-1;background:rgba(255,255,255,.08);color:#c7cdf0;border:1px solid rgba(255,255,255,.14);border-radius:var(--r2);padding:12px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer}
  .foot-note{text-align:center;color:#7782b8;font-size:12px;margin-top:20px}

  .stage{background:var(--paper);border-radius:var(--r);padding:20px;box-shadow:var(--shadow);min-height:62vh;display:flex;flex-direction:column}
  .st-head{display:flex;align-items:center;gap:11px;margin-bottom:14px}
  .st-back{background:var(--paper2);border:1px solid var(--line);border-radius:11px;width:42px;height:42px;font-size:20px;cursor:pointer;flex:none}
  .st-title{font-weight:800;font-size:16px;line-height:1.2}
  .st-title .en{font-size:12px;color:var(--muted);font-weight:600;display:block}
  .phase-pill{margin-left:auto;font-size:12px;font-weight:800;padding:5px 12px;border-radius:999px}
  .phase-pill.learn{background:#eef1ff;color:#4f5bd5} .phase-pill.box{background:#fff0e6;color:#d2691e}

  .concept{background:linear-gradient(135deg,var(--paper2),#eaf0ff);border:1px solid #d4ddf6;border-radius:var(--r2);padding:18px;margin-bottom:14px}
  .concept .ch{display:flex;align-items:center;gap:9px;font-weight:800;font-size:17px;color:#2a3360;margin-bottom:9px}
  .concept .cb{font-size:18.5px;line-height:1.85;color:#2a3360;white-space:pre-line}
  .spk{flex:none;border:none;background:#fff;border:1px solid var(--line);border-radius:10px;width:40px;height:40px;font-size:19px;cursor:pointer;color:var(--math-d);box-shadow:var(--shadow2)}
  .spk:active{transform:scale(.92)} .spk.sm{width:34px;height:34px;font-size:16px;border-radius:9px}

  .example{background:#fffdf5;border:1px dashed #f0d28a;border-radius:var(--r2);padding:18px;margin-bottom:14px}
  .example .eh{font-weight:800;font-size:17px;color:#9a6b00;margin-bottom:6px;display:flex;align-items:center;gap:8px}
  .example .prob{font-size:18px;font-weight:700;color:#2a3360;background:#fff;border:1px solid #f0e6c8;border-radius:12px;padding:12px 14px;margin-bottom:12px}
  .steps{display:flex;flex-direction:column;gap:10px}
  .step{background:#fff;border:1px solid #f0e6c8;border-radius:12px;padding:13px 15px;font-size:17px;line-height:1.7;color:#2a3360;display:flex;gap:11px;align-items:flex-start;animation:slidein .35s ease}
  @keyframes slidein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .step .sn{flex:none;width:28px;height:28px;border-radius:8px;background:var(--xp);color:#fff;font-weight:800;display:grid;place-items:center;font-size:14px}
  .reveal-btn{margin-top:12px;width:100%;border:none;border-radius:12px;padding:13px;font-family:inherit;font-size:16px;font-weight:800;color:#9a6b00;background:#fdeec2;cursor:pointer}
  .reveal-btn:active{transform:scale(.98)}

  /* 多媒体交互组件 */
  .media-wrap{background:linear-gradient(135deg,#f4f7ff,#eef2ff);border:1px solid #d4ddf6;border-radius:var(--r2);padding:16px;margin-bottom:14px}
  .media-h{font-weight:800;font-size:16.5px;color:#2a3360;margin-bottom:4px;display:flex;align-items:center;gap:8px}
  .media-cap{font-size:14px;color:var(--muted);text-align:center;margin-top:9px;line-height:1.5}
  .open-ta{width:100%;min-height:130px;border:2px solid var(--line);border-radius:14px;padding:13px;font-family:inherit;font-size:17px;line-height:1.6;color:var(--ink);background:#fbfcff;resize:vertical;margin:6px 0}
  .open-ta:focus{outline:none;border-color:var(--math)}
  .open-ta.shake{animation:shakeX .35s ease;border-color:var(--no)!important}
  .chain-row{display:flex;align-items:center;justify-content:center;gap:4px;flex-wrap:wrap;margin:6px 0}
  .chain-card{background:#fff;border:2px solid var(--line);border-radius:12px;padding:8px 6px;text-align:center;min-width:62px;transition:all .15s}
  .chain-card.on{border-color:var(--sci);background:#faf5ff;transform:translateY(-3px);box-shadow:0 6px 14px rgba(168,85,247,.25)}
  .chain-card .ce{font-size:28px} .chain-card .cn{font-size:11.5px;font-weight:800;color:#2a3360;margin-top:2px}
  .chain-arrow{font-size:14px;opacity:.65}
  .mreadout{text-align:center;font-weight:800;font-size:19px;color:#2a3360;margin-top:10px}
  .mctrl{display:flex;gap:10px;justify-content:center;align-items:center;margin-top:11px;flex-wrap:wrap}
  .mbtn{border:1px solid var(--line);background:#fff;border-radius:11px;padding:9px 15px;font-family:inherit;font-size:14.5px;font-weight:700;cursor:pointer;color:#2a3360}
  .mbtn.on{background:var(--math);color:#fff;border-color:var(--math)}
  .mbtn:active{transform:scale(.96)}
  input[type=range]{width:200px;accent-color:var(--math)}
  .fbar{display:flex;gap:4px;height:66px;margin:12px 0}
  .fseg{flex:1;border:2px solid #c9d4f0;border-radius:9px;background:#fff;cursor:pointer;transition:background .1s}
  .fseg.on{background:var(--math);border-color:var(--math)}
  .dgrid{display:grid;grid-template-columns:repeat(10,1fr);gap:2px;max-width:230px;margin:10px auto}
  .dcell{aspect-ratio:1;border:1px solid #d4ddf6;background:#fff;cursor:pointer;border-radius:2px}
  .dcell.on{background:var(--math);border-color:var(--math)}
  .fpics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:6px}
  @media(max-width:420px){.fpics{grid-template-columns:repeat(2,1fr)}}
  .fpic{background:#fff;border:2px solid var(--line);border-radius:14px;padding:12px 8px;text-align:center;cursor:pointer}
  .fpic:active{transform:scale(.97)} .fpic.on{border-color:var(--fr);background:#effdfa}
  .fpic .e{font-size:36px} .fpic .w{font-weight:800;color:var(--fr);margin-top:4px;font-size:15px} .fpic .m{font-size:12px;color:var(--muted)}
  .msvg{display:block;margin:4px auto;max-width:100%}
  .gear{transform-box:fill-box;transform-origin:center}
  .gear.spin1{animation:gspin 3.2s linear infinite} .gear.spin2{animation:gspinr 3.2s linear infinite}
  @keyframes gspin{to{transform:rotate(360deg)}} @keyframes gspinr{to{transform:rotate(-360deg)}}

  .checkblock{background:#fff;border:2px solid var(--line);border-radius:var(--r2);padding:16px;margin-bottom:13px}
  .checkblock .cl{font-size:13px;font-weight:800;color:var(--xp-d);margin-bottom:8px;display:flex;align-items:center;gap:7px}

  .qwrap{flex:1;display:flex;flex-direction:column}
  .tierbadge{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:800;padding:4px 11px;border-radius:999px;margin-bottom:8px;width:fit-content}
  .tierbadge.t1{background:#e7f9ee;color:var(--t1)} .tierbadge.t2{background:#e7f3ff;color:var(--t2)} .tierbadge.t3{background:#f6edff;color:var(--t3)}
  .qrow{display:flex;align-items:flex-start;gap:10px;margin:6px 0 4px}
  .q-prompt{font-size:23px;font-weight:800;line-height:1.45;color:var(--ink);flex:1}
  .q-prompt.big{font-size:50px;text-align:center;margin:8px 0;font-family:var(--cjk)}
  .passage{background:var(--paper2);border:1px solid var(--line);border-radius:var(--r2);padding:16px;font-size:17px;line-height:1.8;margin-bottom:14px;color:#2a3360;position:relative;white-space:pre-line}
  .passage .pspk{position:absolute;right:12px;top:12px}
  .audio-row{display:flex;flex-direction:column;align-items:center;gap:9px;margin:8px 0 14px}
  .play{background:linear-gradient(135deg,#23a7ff,#5b67e8);color:#fff;border:none;border-radius:999px;padding:16px 30px;font-size:19px;font-weight:800;cursor:pointer;font-family:inherit;box-shadow:0 8px 20px rgba(35,167,255,.4);display:flex;align-items:center;gap:10px}
  .play:active{transform:scale(.96)}
  .pinyin{font-size:14px;color:var(--muted);font-weight:700;letter-spacing:.5px}
  .opts{display:flex;flex-direction:column;gap:11px;margin-top:10px}
  .opt{background:var(--paper);border:2px solid var(--line);border-radius:var(--r2);padding:16px 17px;font-size:19px;font-weight:700;cursor:pointer;text-align:left;font-family:inherit;color:var(--ink);transition:border-color .12s,background .12s,transform .08s;display:flex;align-items:center;gap:12px}
  .opt:active{transform:scale(.99)}
  .opt .k{width:28px;height:28px;border-radius:9px;background:var(--paper2);display:grid;place-items:center;font-size:14px;font-weight:800;color:var(--muted);flex:none;border:1px solid var(--line)}
  .opt .otext{flex:1}
  .opt .ospk{flex:none;width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:#fff;font-size:15px;color:var(--math-d);cursor:pointer;display:grid;place-items:center}
  .opt.ok{border-color:var(--ok);background:var(--okbg)} .opt.ok .k{background:var(--ok);color:#fff;border-color:var(--ok)}
  .opt.no{border-color:var(--no);background:var(--nobg)} .opt.no .k{background:var(--no);color:#fff;border-color:var(--no)}
  .opt.dim{opacity:.55} .opt[disabled]{cursor:default}
  .explain{margin-top:14px;background:var(--paper2);border-left:5px solid var(--math);border-radius:11px;padding:13px 15px;font-size:16px;line-height:1.65;color:#2a3360}
  .explain.ok{border-left-color:var(--ok)} .explain.no{border-left-color:var(--no)} .explain b{color:var(--ink)}
  .dots{display:flex;gap:5px;flex-wrap:wrap;max-width:150px;justify-content:flex-end}
  .pd{width:9px;height:9px;border-radius:999px;background:var(--line)}
  .pd.on{background:var(--xp)} .pd.ok{background:var(--ok)} .pd.no{background:var(--no)}
  .st-foot{margin-top:16px}
  .bigbtn{width:100%;border:none;border-radius:var(--r2);padding:16px;font-family:inherit;font-size:16.5px;font-weight:800;color:#fff;cursor:pointer}
  .bigbtn:active{transform:scale(.98)}
  .bigbtn.next{background:linear-gradient(135deg,var(--xp),var(--xp-d));box-shadow:0 8px 20px rgba(245,158,11,.35)}
  .bigbtn.go{background:linear-gradient(135deg,var(--ok),var(--en-d,#16a34a));box-shadow:0 8px 20px rgba(22,163,74,.35)}
  .bigbtn.train{background:linear-gradient(135deg,#ff7a59,#ff5d5d);box-shadow:0 8px 20px rgba(255,93,93,.35)}
  .bigbtn.retry{background:linear-gradient(135deg,#8b93f0,#5b67e8);box-shadow:0 8px 20px rgba(91,103,232,.3)}
  .foot2{display:flex;gap:10px} .foot2 .bigbtn{flex:1}

  .trace-wrap{background:var(--paper2);border:1px solid var(--line);border-radius:var(--r2);padding:16px;margin-bottom:14px;text-align:center}
  .trace-h{font-weight:800;font-size:16px;color:#2a3360;margin-bottom:10px;display:flex;align-items:center;gap:8px;justify-content:center}
  .trace-chips{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:12px}
  .tchip{width:48px;height:48px;border-radius:11px;border:2px solid var(--line);background:#fff;font-size:25px;font-weight:700;cursor:pointer;color:var(--ink);font-family:var(--cjk)}
  .tchip.on{border-color:var(--cn);background:#fff0f0;color:var(--cn-d)}
  #traceCanvas{border-radius:14px;background:#fff;border:2px solid var(--line);touch-action:none;display:block;margin:0 auto;max-width:88%}
  .trace-tools{display:flex;gap:10px;justify-content:center;margin-top:11px}
  .ttbtn{border:1px solid var(--line);background:#fff;border-radius:10px;padding:9px 16px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;color:#2a3360}
  .ttbtn.hear{color:var(--math-d)}

  .result{background:var(--paper);border-radius:var(--r);padding:28px 20px;box-shadow:var(--shadow);text-align:center}
  .result .emoji{font-size:72px;animation:pop .5s cubic-bezier(.2,1.4,.4,1)}
  @keyframes pop{0%{transform:scale(0)}100%{transform:scale(1)}}
  .result h2{margin:10px 0 4px;font-size:25px}
  .result .score{font-size:52px;font-weight:900;color:var(--math);margin:6px 0}
  .tierline{display:flex;gap:8px;justify-content:center;margin:6px 0 12px;flex-wrap:wrap}
  .tierscore{font-size:13px;font-weight:800;padding:5px 12px;border-radius:999px}
  .ts1{background:#e7f9ee;color:var(--t1)} .ts2{background:#e7f3ff;color:var(--t2)} .ts3{background:#f6edff;color:var(--t3)}
  .result .xpgain{display:inline-flex;align-items:center;gap:8px;background:var(--paper2);border:1px solid var(--line);border-radius:999px;padding:10px 20px;font-weight:800;font-size:17px;color:var(--xp-d);margin:6px 0 18px}
  .result .home-btn{width:100%;border:none;border-radius:var(--r2);padding:16px;font-family:inherit;font-size:16.5px;font-weight:800;color:#fff;cursor:pointer;background:linear-gradient(135deg,#5b67e8,#7c3aed)}
  .redo-btn{background:linear-gradient(135deg,#ff7a59,#ff5d5d)!important;margin-bottom:11px}

  .panel{background:var(--paper);border-radius:var(--r);padding:22px;box-shadow:var(--shadow)}
  .panel-h{display:flex;align-items:center;gap:11px;margin-bottom:6px}
  .panel-h h2{margin:0;font-size:19px;font-weight:800}
  .rep-ver{display:inline-block;font-size:13px;font-weight:800;color:#fff;background:linear-gradient(135deg,#5b67e8,#7c3aed);padding:5px 12px;border-radius:999px;margin:2px 0 14px}
  .rep-meta{font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.6}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;margin-bottom:18px}
  .stat{background:var(--paper2);border:1px solid var(--line);border-radius:var(--r2);padding:14px;text-align:center}
  .stat .n{font-size:25px;font-weight:900} .stat .l{font-size:12px;color:var(--muted);font-weight:700;margin-top:2px}
  .rep-sec{margin-top:18px}

  {q:"哪些句子的成语使用正确？（多选）", t:"multi", o:["他废寝忘食地准备比赛。","展览馆里参观的人络绎不绝。","他目不转睛地听广播。","坚持锻炼要持之以恒。","他日积月累地跑了一百米。"], a:[0,1,3], tier:3, e:"「目不转睛」不能用于听；「日积月累」指长期积累，不能形容跑一次步。"},
  {q:"哪些搭配是正确的？（多选）", t:"multi", o:["字写得一丝不苟","知识靠日积月累","做事持之以恒","目不转睛地听讲","异口同声地点头"], a:[0,1,2], tier:3, e:"「目不转睛」只能用于看；「异口同声」形容大家说同样的话，不能形容点头。"},
  {q:"「都等不及了」——「迫不________待」。点选正确的字。", t:"fill", kind:"zi", a:"及", tiles:"及极级急汲吸", tier:3, e:"迫不及待——「及」是来得及的及。上次选了「极」，专门再考一次！", hint:"注意和「极」区分"},

{id:"ZH26", subj:"cn", icon:"⚖️", title:"递进与转折专项 + 识字 Day 25", en:"Progression vs Contrast", tag:"level",
 traceDay:25, trace:["早","晚","午","点","分","半"],
 lesson:{ cards:[
   {t:"递进：更进一步", b:"不但…而且…／不仅…还…\n后半句比前半句「更进一层」。\n例：他不但会划船，而且会掌舵。（会划船 → 还更厉害）"},
   {t:"转折：情况反着来", b:"虽然…但是…／尽管…还是…\n后半句和前半句「方向相反」。\n例：尽管风浪很大，他还是坚持出海。（按理不该出海 → 偏偏出了）\n判断口诀：同方向加码＝递进；反方向拐弯＝转折。"}],
  example:{t:"同一件事，两种说法", prob:"比较：「他不但功课好，而且体育也好。」和「他虽然功课好，但是体育不好。」", steps:[
   "第一句：功课好 → 体育也好，同方向加码＝递进。",
   "第二句：功课好 → 体育不好，方向相反＝转折。",
   "看后半句和前半句是「顺着说」还是「反着说」。"]},
  check:[{q:"「________天已经黑了，渔船________没有回港。」填——", o:["虽然…但是…","不但…而且…","不仅…还…","一…就…"], a:0, e:"天黑了本该回港却没回——转折。"}] },
 training:[
  {q:"「这条船________跑得快，________特别省油。」填——", o:["不但…而且…","虽然…但是…","尽管…还是…","只有…才…"], a:0, tier:2, e:"跑得快 → 还更省油，同方向加码＝递进。"},
  {q:"「________下着大雨，运动会________照常举行。」填——", o:["尽管…还是…","不但…而且…","不仅…还…","不是…就是…"], a:0, tier:2, e:"下雨本该取消却照常——转折。"},
  {q:"「妹妹________会背这首诗，________能讲出诗的意思。」填——", o:["不仅…还…","虽然…但是…","尽管…还是…","不管…都…"], a:0, tier:3, e:"会背 → 更能讲意思，递进。"},
  {q:"「他________个子不高，________跳得比谁都远。」填——", o:["虽然…但是…","不但…而且…","不仅…还…","一…就…"], a:0, tier:2, e:"个子不高按理跳不远，结果相反——转折。"},
  {q:"「爷爷不但会修船，而且会造船。」这句话的关系是——", o:["递进","转折","选择","因果"], a:0, tier:2, e:"会修 → 更会造，同方向加码。"},
  {q:"「这道题看起来很难，做起来却很简单。」这句话的关系是——", o:["转折","递进","条件","承接"], a:0, tier:3, e:"「却」是转折的标志——看起来难，实际相反。"},
  {q:"哪些关联词表示「递进」？（多选）", t:"multi", o:["不但…而且…","不仅…还…","甚至","虽然…但是…","尽管…还是…"], a:[0,1,2], tier:3, e:"「甚至」也表递进；后两组是转折。"},
  {q:"哪些句子用了「转折」关系？（多选）", t:"multi", o:["虽然他很累，但是他坚持跑完了。","天气尽管很冷，大家还是来了。","他不但会唱歌，而且会跳舞。","这本书很旧，却很有意思。","一到周末，我们就去图书馆。"], a:[0,1,3], tier:3, e:"「却」也是转折词；第三句递进，第五句承接。"},
  {q:"哪些句子的关联词使用正确？（多选）", t:"multi", o:["他不但学习好，而且乐于助人。","虽然下雨了，但是比赛照常进行。","尽管他不会游泳，还是他喜欢大海。","不仅风停了，还雨也停了。","妈妈虽然工作忙，但是每天陪我读书。"], a:[0,1,4], tier:3, e:"第三句语序错（应为「他还是喜欢大海」）；第四句应为「不仅风停了，雨也停了」。"},
  {q:"「他每天很________就起床读书。」点选一个字。", t:"fill", kind:"zi", a:"早", tiles:"早草日旦晨旱", tier:2, e:"清晨起床用「早」。", hint:"点字块作答"},
  {q:"「天黑了，已经是________上九点了。」点选一个字。", t:"fill", kind:"zi", a:"晚", tiles:"晚免碗玩完晾", tier:2, e:"天黑是「晚上」。"},
  {q:"「中________十二点，太阳最高。」点选一个字。", t:"fill", kind:"zi", a:"午", tiles:"午牛年干许件", tier:2, e:"中午的「午」，别和「牛」混。"},
  {q:"「下午两________整，船准时开。」点选一个字。", t:"fill", kind:"zi", a:"点", tiles:"点店占黑站沾", tier:2, e:"两点整的「点」。"},
  {q:"「一小时有六十________钟。」点选一个字。", t:"fill", kind:"zi", a:"分", tiles:"分份芬纷盆今", tier:2, e:"六十分钟的「分」。"},
  {q:"「三点三十分，也叫三点________。」点选一个字。", t:"fill", kind:"zi", a:"半", tiles:"半伴拌判胖平", tier:3, e:"三十分＝半小时，「半」。"}
 ]},

{id:"ZH27", subj:"cn", icon:"🐜", title:"长文阅读·蚂蚁的城市", en:"Reading: Ant City", tag:"core",
 lesson:{ cards:[
   {t:"读说明文抓三样", b:"① 说明对象：文章在介绍什么？\n② 每段要点：各段分别讲了它的哪一面？\n③ 说明方法：列数字（用数据）、打比方（像什么）。"},
   {t:"长文不慌的办法", b:"先读题再回文中「定位」，找到相关句子再作答。\n引号有时表示「特殊含义」：「城市」不是真的城市，\n是把蚁巢比作城市——这也是打比方。"}],
  example:{t:"认识说明方法", prob:"「一个大蚁巢常常住着几万只蚂蚁，最深的通道能挖到两米多深。」用了什么说明方法？", steps:[
   "「几万只」「两米多」都是具体数字。",
   "用数字把事物说清楚＝列数字。",
   "如果说「像一栋倒着建的高楼」，那就是打比方。"]},
  check:[{q:"这篇文章主要介绍的是——", o:["蚂蚁的地下王国","草地上的花","高楼的建法","城市的交通"], a:0, e:"全文围绕蚁巢这座「城市」展开。"}] },
 training:[
  {q:"文中把最深的蚁巢通道比作——", o:["一栋倒着建的高楼","一条地下河","一座迷宫","一列火车"], a:0, tier:1, e:"原文：「就像一栋倒着建的高楼。」", passage:P_MAYI},
  {q:"蚁后在王国里负责——", o:["产卵","找食物","守门口","挖通道"], a:0, tier:1, e:"「蚁后负责产卵，是整个王国的『心脏』。」", passage:P_MAYI},
  {q:"最忙的是哪种蚂蚁？它们不做下面哪件事？", o:["工蚁；守在入口","工蚁；找食物","兵蚁；产卵","蚁后；挖通道"], a:0, tier:3, e:"工蚁最忙，负责找食物、挖通道、照顾幼虫；守入口的是兵蚁。", passage:P_MAYI},
  {q:"文中说兵蚁「像门口的卫兵」，这是——", o:["打比方","列数字","作比较","下定义"], a:0, tier:2, e:"把兵蚁比作卫兵＝打比方。", passage:P_MAYI},
  {q:"蚂蚁传递消息不靠说话，靠的是——", o:["触角碰一碰和留下气味","大声喊叫","跳舞","发光"], a:0, tier:2, e:"「靠触角互相碰一碰，还会在路上留下特殊的气味。」", passage:P_MAYI},
  {q:"同伴能准确找到食物，是因为——", o:["顺着前面蚂蚁留下的气味走","眼睛特别好","记住了地图","听到了声音"], a:0, tier:2, e:"「同伴闻着这条『气味路』，就能准确地找到食物。」", passage:P_MAYI},
  {q:"用手指在蚂蚁队伍中间划一下，蚂蚁会乱成一团，原因是——", o:["气味路被擦掉了，它们失去了方向","它们害怕手指","风太大了","食物被拿走了"], a:0, tier:3, e:"推断题：蚂蚁靠气味认路，气味没了自然迷路。", passage:P_MAYI},
  {q:"「一个大蚁巢常常住着几万只蚂蚁」用的说明方法是——", o:["列数字","打比方","讲故事","提问题"], a:0, tier:2, e:"「几万只」是具体数字＝列数字。", passage:P_MAYI},
  {q:"题目里的「城市」加了引号，是因为——", o:["蚁巢并不是真的城市，是一种比喻","作者写错了","表示引用别人的话","表示强调声音"], a:0, tier:3, e:"引号表示特殊含义：把蚁巢比作城市。", passage:P_MAYI},
  {q:"文章说蚁后是王国的「心脏」，意思是——", o:["她对整个蚁巢最重要","她长得像心脏","她会跳动","她住在最中间"], a:0, tier:3, e:"「心脏」比喻最关键、最重要的角色。", passage:P_MAYI},
  {q:"这篇文章的结构是——", o:["先总说蚁巢像城市，再分说分工和传递消息，最后总结","先写结尾，再写开头","只按时间顺序写一天","全文都在提问"], a:0, tier:3, e:"总—分—总：开头引出「城市」，中间分说，结尾点出「分工与合作」。", passage:P_MAYI},
  {q:"最后一句「把地下的家管理得井井有条」中，「井井有条」的意思是——", o:["有条理、很整齐","有很多水井","一条一条排队","非常热闹"], a:0, tier:2, e:"井井有条＝有条理——这正是上一版学过的成语！", passage:P_MAYI},
  {q:"下面哪些说法与文章相符？（多选）", t:"multi", o:["蚁巢通道最深能到两米多","兵蚁负责照顾幼虫","蚂蚁靠气味和触角传递消息","擦掉气味后蚂蚁会迷路","蚁后每天出门找食物"], a:[0,2,3], tier:3, e:"照顾幼虫的是工蚁；蚁后负责产卵，不出门找食物。", passage:P_MAYI},
  {q:"文中哪些地方用了「打比方」？（多选）", t:"multi", o:["蚁巢像一栋倒着建的高楼","蚁后是王国的「心脏」","兵蚁像门口的卫兵","一个蚁巢住着几万只蚂蚁","通道能挖到两米多深"], a:[0,1,2], tier:3, e:"后两项是列数字。", passage:P_MAYI},
  {q:"如果给文章换个题目，下面哪些合适？（多选）", t:"multi", o:["《地下的蚂蚁王国》","《分工合作的小蚂蚁》","《怎样消灭蚂蚁》","《神奇的「气味路」和蚂蚁的家》","《高楼是怎样建成的》"], a:[0,1,3], tier:3, e:"题目要扣住「蚁巢、分工、气味传信」这些内容；三、五两项与文章无关。", passage:P_MAYI}
 ]},

{id:"ZH28", subj:"cn", icon:"🩺", title:"病句门诊 III + 识字 Day 26", en:"Sentence Clinic III", tag:"level",
 traceDay:26, trace:["把","给","让","找","放","拿"],
 lesson:{ cards:[
   {t:"两种新病症", b:"语序不当：词语顺序乱了。\n例：「我们讨论并听取了他的意见。」→ 应先「听取」再「讨论」。\n成分残缺：句子缺了主语。\n例：「通过这次训练，使我学会了坚持。」→ 删「通过」或删「使」。"},
   {t:"多音字再来两组", b:"还：还有 hái ／ 还书 huán\n觉：觉得 jué ／ 睡觉 jiào\n先想意思，再定读音——「觉」你已经会写了，现在要会读！"}],
  example:{t:"给句子看病", prob:"「通过大扫除，使教室变得干干净净。」病在哪？", steps:[
   "「通过……」和「使……」把主语都占掉了——这句话没有主语。",
   "药方一：删掉「通过」→「大扫除使教室变得干干净净。」",
   "药方二：删掉「使」→「通过大扫除，教室变得干干净净。」"]},
  check:[{q:"「我还没把借的书还给图书馆。」两个「还」的读音是——", o:["hái、huán","huán、hái","都读 hái","都读 huán"], a:0, e:"还没＝hái；还书＝huán。"}] },
 training:[
  {q:"下面哪句有「语序不当」的毛病？", o:["我们改正并检查了作业。","他打开书，认真地读了起来。","我们检查并改正了作业。","他把船划到了对岸。"], a:0, tier:3, e:"应先「检查」再「改正」——「改正并检查」把先后顺序弄反了；第三句才是正确顺序。"},
  {q:"「通过这次比赛，使我明白了团结的力量。」怎样修改最恰当？", o:["删去「通过」或「使」","把「明白」改成「知道」","在句末加感叹号","把「团结」改成「团洁」"], a:0, tier:3, e:"两个都留着句子就没有主语——删一个即可。"},
  {q:"「他睡觉前总觉得口渴。」两个「觉」的读音是——", o:["jiào、jué","jué、jiào","都读 jué","都读 jiào"], a:0, tier:3, e:"睡觉 jiào；觉得 jué。"},
  {q:"下面哪句话没有语病？", o:["我们要发扬优点，改正缺点。","春天的码头是一年中最美的季节。","他穿上救生衣和帽子。","听了老师的话，受到了很大教育。"], a:0, tier:3, e:"②「码头是季节」搭配不当；③「穿帽子」应为「戴」；④缺少主语。"},
  {q:"「他大概用了估计十分钟。」这句话的毛病是——", o:["重复啰嗦","缺少主语","语序不当","标点错误"], a:0, tier:2, e:"「大概」和「估计」意思重复，删一个。"},
  {q:"下面哪些句子有语病？（多选）", t:"multi", o:["我们讨论并听取了船长的建议。","通过学习游泳，使我变得更勇敢。","他把甲板打扫得干干净净。","我的作文水平写得很好。","大家互相帮助，共同进步。"], a:[0,1,3], tier:3, e:"①语序不当（先听取后讨论）②缺主语④「水平」不能「写」——搭配不当。"},
  {q:"下面哪些句子的标点完全正确？（多选）", t:"multi", o:["船上有帆、桨和救生圈。","他问我：「你去过灯塔吗？」","今天真热啊？","我们带了水果、面包、和牛奶。","「开船啦！」船长大声喊。"], a:[0,1,4], tier:3, e:"③感叹句应用「！」；④「和」前不加顿号。"},
  {q:"哪些词语搭配是正确的？（多选）", t:"multi", o:["改正错误","发扬精神","提高水平","穿帽子","爱护时间"], a:[0,1,2], tier:3, e:"帽子要「戴」；时间要「珍惜」，「爱护」用于物品和环境。"},
  {q:"「请________门关上，风太大了。」点选一个字。", t:"fill", kind:"zi", a:"把", tiles:"把巴爸吧扒色", tier:2, e:"把字句的「把」。", hint:"点字块作答"},
  {q:"「哥哥________了我一支新铅笔。」点选一个字。", t:"fill", kind:"zi", a:"给", tiles:"给合拾哈领结", tier:2, e:"给东西的「给」。"},
  {q:"「老师________我们自己想办法。」点选一个字。", t:"fill", kind:"zi", a:"让", tiles:"让认讲设识计", tier:2, e:"让我们＝允许、叫我们。"},
  {q:"「我到处________不到我的橡皮了。」点选一个字。", t:"fill", kind:"zi", a:"找", tiles:"找我戏划托打", tier:2, e:"寻找的「找」，提手旁。"},
  {q:"「用完的东西要________回原来的地方。」点选一个字。", t:"fill", kind:"zi", a:"放", tiles:"放收方访防房", tier:2, e:"放回原处的「放」。"},
  {q:"「请帮我把桌上的书________过来。」点选一个字。", t:"fill", kind:"zi", a:"拿", tiles:"拿合拾提搬带", tier:3, e:"用手取过来＝「拿」。"},
  {q:"「作业写完要________好，别弄丢。」点选两个字。", t:"fill", kind:"zi", a:"放好", tiles:"放好收方访守", tier:3, e:"「放好」＝放到合适的地方——两个字按顺序点。", hint:"按顺序点两个字"}
 ]},

{id:"MA25", subj:"math", icon:"🚀", title:"Exponents & Order of Ops III", en:"乘方专项·混合运算", tag:"core",
 lesson:{ cards:[
   {t:"What 2³ really means", b:"2³ = 2 × 2 × 2 = 8.\nThe small 3 is a COUNT of multiplications.\n2³ is NOT 2 × 3, NOT 2/3, NOT 23.\n3² = 3 × 3 = 9.  2⁴ = 2 × 2 × 2 × 2 = 16 (stretch!)."},
   {t:"BEDMAS with exponents", b:"Brackets → Exponents → ×÷ → +−.\n2 × 3² = 2 × 9 = 18 (NOT 6² = 36!)\n20 − 2³ = 20 − 8 = 12.\n(2 + 3)² = 5² = 25 — brackets first, then the exponent."}],
  example:{t:"Spot the classic mistake", prob:"Leo says 4² = 8. What did Leo do wrong, and what is the real answer?", steps:[
   "Leo multiplied 4 × 2 — he treated the exponent like a factor.",
   "4² means 4 × 4.",
   "So 4² = 16. Exponent = how many times to multiply the base by itself."]},
  check:[{q:"3² + 1 = ?", o:["10","7","19","6"], a:0, e:"9 + 1 = 10. (Not 3×2+1.)"}] },
 training:[
  {q:"2³ = ?", t:"fill", kind:"num", a:["8"], tier:3, e:"2 × 2 × 2 = 8. Not 2×3, not 2/3!", hint:"multiply 2 three times"},
  {q:"5² = ?", t:"fill", kind:"num", a:["25"], tier:2, e:"5 × 5 = 25."},
  {q:"3² + 4² = ?", t:"fill", kind:"num", a:["25"], tier:3, e:"9 + 16 = 25."},
  {q:"2 × 3² = ?", t:"fill", kind:"num", a:["18"], tier:3, e:"Exponent first: 2 × 9 = 18. Not (2×3)²!", hint:"exponent before ×"},
  {q:"20 − 2³ = ?", t:"fill", kind:"num", a:["12"], tier:3, e:"20 − 8 = 12."},
  {q:"(2 + 3)² = ?", t:"fill", kind:"num", a:["25"], tier:3, e:"Brackets first: 5² = 25."},
  {q:"4³ = ?", t:"fill", kind:"num", a:["64"], tier:3, e:"4 × 4 × 4 = 64."},
  {q:"18 − 12 ÷ 3 + 2² = ?", t:"fill", kind:"num", a:["18"], tier:3, e:"Exponent: 4. Divide: 12÷3=4. Then 18 − 4 + 4 = 18.", hint:"E → ÷ → then left to right"},
  {q:"Which shows what 2³ means?", o:["2 × 2 × 2","2 × 3","2 + 2 + 2","3 × 3"], a:0, tier:2, e:"The exponent counts the 2s being multiplied."},
  {q:"Which is LARGER: 2⁵ or 5²?", o:["2⁵ (= 32)","5² (= 25)","they are equal","cannot tell"], a:0, tier:3, e:"2⁵ = 32, 5² = 25. Stretch: exponents grow fast!"},
  {q:"Mia says 2 × 4² = 64. What did she do wrong?", o:["she multiplied 2 × 4 first, then squared","she forgot to add","she divided instead","nothing — 64 is correct"], a:0, tier:3, e:"Exponent first: 2 × 16 = 32. She did (2×4)²."},
  {q:"Which expression matches: 'the square of the sum of 4 and 1'?", o:["(4 + 1)²","4² + 1","4 + 1²","4² + 1²"], a:0, tier:3, e:"Sum first (brackets), then square."},
  {q:"Which equations are TRUE? (select all)", t:"multi", o:["3² = 9","2³ = 6","10 − 2² = 6","(1 + 2)² = 9","4² = 8"], a:[0,2,3], tier:3, e:"2³ = 8, not 6; 4² = 16, not 8."},
  {q:"Which expressions equal 16? (select all)", t:"multi", o:["4²","2⁴","8 + 8","12 + 2","4 × 4"], a:[0,1,2,4], tier:3, e:"Four ways to make 16 — only 12 + 2 = 14 fails."},
  {q:"Which steps come FIRST when solving 5 + (6 − 2)² ÷ 4? (select all that are done before any adding)", t:"multi", o:["work out the bracket (6 − 2)","square the bracket result","divide by 4","add 5 first","ignore the exponent"], a:[0,1,2], tier:3, e:"B → E → ÷ all happen before the final + 5."}
 ]},

{id:"MA26", subj:"math", icon:"🌡️", title:"Integers & the Number Line", en:"负数初步（G6 新内容）", tag:"new",
 lesson:{ cards:[
   {t:"Numbers below zero", b:"Integers: … −3, −2, −1, 0, 1, 2, 3 …\nNegative numbers sit LEFT of 0 on the number line.\n−7 is SMALLER than −4 (further left!).\nReal life: −5°C, 3 m below sea level = −3 m, basement floor B2 = −2."},
   {t:"Adding & subtracting with the line", b:"Add = move RIGHT. Subtract = move LEFT.\n−3 + 5: start at −3, go right 5 → 2.\n4 − 9: start at 4, go left 9 → −5.\n−2 − 3: start at −2, go left 3 → −5.\nType negatives with the − key on the pad."}],
  example:{t:"Submarine math", prob:"A submarine is at −45 m (45 m below the surface). It rises 20 m. Where is it now?", steps:[
   "Rising = moving toward 0 = adding.",
   "−45 + 20 = −25.",
   "The submarine is at −25 m — still 25 m below the surface."]},
  check:[{q:"Which is the coldest temperature?", o:["−9°C","−2°C","0°C","3°C"], a:0, e:"−9 is furthest below zero."}] },
 training:[
  {q:"−3 + 5 = ?", t:"fill", kind:"num", a:["2"], tier:2, e:"Start at −3, move right 5 → 2.", hint:"number line: right = add"},
  {q:"4 − 9 = ?", t:"fill", kind:"num", a:["-5"], tier:3, e:"Move left past zero: 4 − 9 = −5. Use the − key.", hint:"answer is negative"},
  {q:"−2 − 3 = ?", t:"fill", kind:"num", a:["-5"], tier:3, e:"Already below zero, going further left: −5."},
  {q:"−6 + 6 = ?", t:"fill", kind:"num", a:["0"], tier:2, e:"Opposites cancel out to 0."},
  {q:"0 − 7 = ?", t:"fill", kind:"num", a:["-7"], tier:2, e:"Seven steps left of zero."},
  {q:"−4 + 10 = ?", t:"fill", kind:"num", a:["6"], tier:3, e:"−4 + 4 gets to 0, then 6 more → 6."},
  {q:"The temperature is −8°C. It rises 5°C. What is it now? (number only)", t:"fill", kind:"num", a:["-3"], tier:3, e:"−8 + 5 = −3. Still below zero.", hint:"still negative"},
  {q:"A diver is at −12 m and goes DOWN 6 m more. Where is she? (number only)", t:"fill", kind:"num", a:["-18"], tier:3, e:"Down = subtract: −12 − 6 = −18."},
  {q:"Which is SMALLER: −7 or −4?", o:["−7","−4","they are equal","cannot compare"], a:0, tier:2, e:"−7 is further left on the line."},
  {q:"Order from LEAST to GREATEST: 2, −5, 0, −1", o:["−5, −1, 0, 2","−1, −5, 0, 2","0, −1, −5, 2","2, 0, −1, −5"], a:0, tier:3, e:"Most negative first."},
  {q:"The opposite of −3 is —", o:["3","−3","0","1/3"], a:0, tier:2, e:"Same distance from 0, other side."},
  {q:"Basement floor B2 in an elevator is best written as —", o:["−2","2","0.2","20"], a:0, tier:1, e:"Two floors below ground = −2."},
  {q:"Which numbers are LESS than 0? (select all)", t:"multi", o:["−1","−15","0","4","−0.5"], a:[0,1,4], tier:3, e:"0 is neither positive nor negative; −0.5 is also below zero."},
  {q:"Which comparisons are TRUE? (select all)", t:"multi", o:["−5 < −2","0 > −9","−3 > 1","−10 < −1","−4 > −4"], a:[0,1,3], tier:3, e:"−3 is less than 1; a number is not greater than itself."},
  {q:"Which situations describe a NEGATIVE number? (select all)", t:"multi", o:["6 m below sea level","the temperature falls to 5 degrees below zero","you earn 10 dollars","parking level B3","climbing 8 m up a mast"], a:[0,1,3], tier:3, e:"Earning money and climbing up are positive changes."}
 ]},

{id:"MA27", subj:"math", icon:"🧮", title:"Ratios, Rates & Working Backwards", en:"比与比率·逆向求整体", tag:"new",
 lesson:{ cards:[
   {t:"Ratio & unit rate", b:"A ratio compares two amounts: 2 boats to 3 sails = 2:3.\nEquivalent ratios: multiply BOTH sides — 2:3 = 4:6 = 8:12.\nUnit rate = how much for ONE: $12 for 3 books → 12 ÷ 3 = $4 per book."},
   {t:"Working BACKWARDS", b:"Forward: 2/3 of 18 = 12.\nBackwards: 2/3 of ? = 12 → one third is 12 ÷ 2 = 6 → the number is 6 × 3 = 18.\nPercent backwards: 25% of ? = 8 → 1% is 8 ÷ 25 … easier: 25% is a quarter, so ? = 8 × 4 = 32."}],
  example:{t:"Find the whole", prob:"3/4 of a rope is 21 m. How long is the WHOLE rope?", steps:[
   "3 parts = 21 m, so 1 part = 21 ÷ 3 = 7 m.",
   "The whole rope has 4 parts: 7 × 4 = 28 m.",
   "Check forward: 3/4 of 28 = 21 ✓."]},
  check:[{q:"$15 for 5 kg of apples. What is the price per kg?", o:["$3","$5","$10","$75"], a:0, e:"15 ÷ 5 = 3 dollars per kg."}] },
 training:[
  {q:"$12 for 3 notebooks. How much for ONE notebook? (number only)", t:"fill", kind:"num", a:["4"], tier:2, e:"12 ÷ 3 = 4."},
  {q:"A boat travels 45 km in 3 hours. How many km per hour?", t:"fill", kind:"num", a:["15"], tier:2, e:"45 ÷ 3 = 15 km/h — that's a rate."},
  {q:"2/3 of a number is 12. What is the number?", t:"fill", kind:"num", a:["18"], tier:3, e:"1/3 is 12 ÷ 2 = 6, so the number is 6 × 3 = 18.", hint:"find one part first"},
  {q:"3/4 of a number is 21. What is the number?", t:"fill", kind:"num", a:["28"], tier:3, e:"1/4 = 21 ÷ 3 = 7 → 7 × 4 = 28."},
  {q:"25% of a number is 8. What is the number?", t:"fill", kind:"num", a:["32"], tier:3, e:"25% is a quarter → 8 × 4 = 32.", hint:"25% = 1/4"},
  {q:"15% of 80 = ?", t:"fill", kind:"num", a:["12"], tier:3, e:"80 × 15 ÷ 100 = 12."},
  {q:"The ratio of boys to girls is 2:3. There are 8 boys. How many girls?", t:"fill", kind:"num", a:["12"], tier:3, e:"2 parts = 8 → 1 part = 4 → girls = 3 × 4 = 12."},
  {q:"5/8 − 1/4 = ? (simplest form)", t:"fill", kind:"num", a:["3/8"], tier:3, e:"1/4 = 2/8, so 5/8 − 2/8 = 3/8. Subtract — don't add!", hint:"common denominator 8"},
  {q:"Simplify the ratio 12:18.", o:["2:3","3:2","6:9 is simplest","12:18 cannot simplify"], a:0, tier:3, e:"Divide both by 6 → 2:3."},
  {q:"In a fruit bowl the ratio of apples to pears is 3:1. This means —", o:["for every 3 apples there is 1 pear","there are exactly 3 apples","apples weigh 3 kg","there are 31 fruits"], a:0, tier:2, e:"A ratio compares amounts, not exact totals."},
  {q:"Which of these is a RATE?", o:["60 km per hour","3:4","one half","the number 12"], a:0, tier:2, e:"A rate compares two DIFFERENT units (km and hours)."},
  {q:"Which ratio is EQUIVALENT to 3:5?", o:["6:10","5:3","3:10","9:12"], a:0, tier:2, e:"Multiply both sides by 2 → 6:10."},
  {q:"Which ratios are equivalent to 2:5? (select all)", t:"multi", o:["4:10","6:15","5:2","8:20","20:8"], a:[0,1,3], tier:3, e:"5:2 and 20:8 flip the order — that's a different ratio."},
  {q:"Which are equal to 3/4? (select all)", t:"multi", o:["75%","0.75","6/8","9/12","0.34"], a:[0,1,2,3], tier:3, e:"Four disguises of the same number; 0.34 is not one of them."},
  {q:"A recipe uses flour and sugar in the ratio 4:1. Which statements are TRUE? (select all)", t:"multi", o:["8 cups flour needs 2 cups sugar","flour is 4 times the sugar","1 cup flour needs 4 cups sugar","12 cups flour needs 3 cups sugar","sugar is more than flour"], a:[0,1,3], tier:3, e:"Keep the order: flour:sugar = 4:1, so sugar is the smaller amount."}
 ]},

{id:"MA28", subj:"math", icon:"🏗️", title:"Geometry IV & Multi-step Problems", en:"复合图形·三步应用题", tag:"core",
 lesson:{ cards:[
   {t:"Parallelogram & the L-shape trick", b:"Parallelogram area = base × height (the SLANTED side is not the height!).\nL-shaped figure: CUT it into two rectangles,\nfind each area, then ADD. Or: big rectangle MINUS the missing corner."},
   {t:"Working backwards in 3D & equations", b:"Volume = l × w × h. If V = 60, l = 5, w = 3 → h = 60 ÷ (5×3) = 4.\nEquation with brackets: 2(x + 3) = 14 → x + 3 = 7 → x = 4.\nWord problems: plan the steps BEFORE you press keys."}],
  example:{t:"Three steps, one answer", prob:"Kai buys 3 T-shirts at $12 each. He pays with a $50 bill. How much change does he get?", steps:[
   "Step 1 — Cost: 3 × 12 = 36.",
   "Step 2 — Change: 50 − 36 = 14.",
   "Answer what is ASKED: $14 change (not the cost!)."]},
  check:[{q:"A parallelogram has base 6 and height 4. Its area is —", o:["24","10","48","20"], a:0, e:"6 × 4 = 24. Base × height."}] },
 training:[
  {q:"A parallelogram has base 8 and height 5. What is its AREA?", t:"fill", kind:"num", a:["40"], tier:2, e:"8 × 5 = 40."},
  {q:"An L-shaped deck is a 10 by 6 rectangle with a 4 by 2 corner cut out. What is its AREA?", t:"fill", kind:"num", a:["52"], tier:3, e:"Big: 10×6 = 60. Cut: 4×2 = 8. 60 − 8 = 52.", hint:"big rectangle minus the notch"},
  {q:"A triangle has base 12 and height 5. What is its AREA?", t:"fill", kind:"num", a:["30"], tier:3, e:"12 × 5 ÷ 2 = 30. Don't forget ÷ 2!"},
  {q:"A box has volume 60. Its length is 5 and width is 3. What is its HEIGHT?", t:"fill", kind:"num", a:["4"], tier:3, e:"60 ÷ (5 × 3) = 4. Working backwards!", hint:"V ÷ (l × w)"},
  {q:"A box is 4 by 4 by 7. What is its VOLUME?", t:"fill", kind:"num", a:["112"], tier:3, e:"4 × 4 × 7 = 112."},
  {q:"Solve: 2(x + 3) = 14. x = ?", t:"fill", kind:"num", a:["4"], tier:3, e:"x + 3 = 7, so x = 4.", hint:"divide both sides by 2 first"},
  {q:"Solve: 3(x − 2) = 15. x = ?", t:"fill", kind:"num", a:["7"], tier:3, e:"x − 2 = 5, so x = 7."},
  {q:"Kai buys 3 T-shirts at $12 each and pays with $50. How much CHANGE does he get?", t:"fill", kind:"num", a:["14"], tier:3, e:"3×12 = 36; 50 − 36 = 14."},
  {q:"Which is the HEIGHT of a parallelogram?", o:["the straight-up distance between the two bases","the slanted side","the longest side","half the base"], a:0, tier:3, e:"Height is perpendicular — the slanted side is a trap."},
  {q:"To find the area of an L-shape, the BEST first move is —", o:["split it into rectangles","measure the diagonal","multiply all the numbers you see","count the corners"], a:0, tier:2, e:"Split (or subtract the notch) — then use rectangle rules."},
  {q:"Which situation needs VOLUME?", o:["how much water fills an aquarium","how much rope goes around a field","how much paint covers a door","how far the school is"], a:0, tier:2, e:"Filling a 3-D space = volume."},
  {q:"A ferry carries 28 cars per trip. It makes 4 trips, then 15 cars are still waiting. How many cars in total wanted to cross?", o:["127","112","43","97"], a:0, tier:3, e:"28 × 4 = 112 carried, plus 15 waiting = 127."},
  {q:"Which units measure AREA? (select all)", t:"multi", o:["cm²","m²","km²","cm³","litres"], a:[0,1,2], tier:3, e:"Squared units only; cm³ and litres are volume."},
  {q:"Which statements are TRUE? (select all)", t:"multi", o:["Triangle area = base × height ÷ 2","Parallelogram area = base × height","Volume of a box = l × w × h","Perimeter of a square = side × side","An L-shape's area can be found by subtracting the notch"], a:[0,1,2,4], tier:3, e:"Square PERIMETER is side × 4; side × side is its AREA."},
  {q:"A captain buys 5 boxes of flags. Each box holds 8 flags. She gives away 12. Which steps find how many are LEFT? (select all)", t:"multi", o:["multiply 5 × 8","subtract 12 from the total","add 5 + 8","divide 40 by 12","start from 40"], a:[0,1,4], tier:3, e:"5×8 = 40, then 40 − 12 = 28. Adding or dividing doesn't fit."}
 ]},

{id:"SC13", subj:"sci", icon:"🦊", title:"Ecosystems & Food Chains", en:"生态系统与食物链", tag:"new",
 lesson:{ media:[{type:"foodchain", title:"Energy on the move", cap:"Sun → producer → consumer → consumer. Decomposers recycle it all."}],
  cards:[
   {t:"Who is who in an ecosystem", b:"PRODUCERS make their own food using sunlight (plants, algae).\nCONSUMERS eat others: herbivores eat plants, carnivores eat animals, omnivores eat both.\nDECOMPOSERS (fungi, bacteria, worms) break down dead things and recycle nutrients into the soil."},
   {t:"Chains, webs, and arrows", b:"A food CHAIN shows one path: grass → rabbit → fox.\nThe arrow means 'energy flows TO' — it points at the eater!\nA food WEB is many chains joined together.\nALL the energy starts with the Sun."}],
  example:{t:"Read the arrow", prob:"In 'grass → rabbit → fox', what does the second arrow tell us?", steps:[
   "The arrow points from rabbit to fox.",
   "Energy flows TO the fox — the fox eats the rabbit.",
   "Arrows always point at the eater, never the food."]},
  check:[{q:"Which is a PRODUCER?", o:["seaweed","shark","crab","seagull"], a:0, e:"Seaweed makes food from sunlight."}] },
 training:[
  {q:"Where does the energy in almost every food chain START?", o:["the Sun","the soil","the fox","the water"], a:0, tier:1, e:"Producers capture sunlight first."},
  {q:"A producer is a living thing that —", o:["makes its own food using sunlight","eats other animals","only eats plants","breaks down dead things"], a:0, tier:1, e:"Plants and algae are producers."},
  {q:"An animal that eats ONLY plants is a —", o:["herbivore","carnivore","omnivore","decomposer"], a:0, tier:2, e:"Herb = plant. A rabbit is a herbivore."},
  {q:"An animal that eats BOTH plants and animals is an —", o:["omnivore","herbivore","carnivore","producer"], a:0, tier:2, e:"Omni = all. Most humans are omnivores."},
  {q:"In the chain 'algae → small fish → seal', the seal is —", o:["a consumer","a producer","a decomposer","a plant"], a:0, tier:2, e:"It eats others — a consumer (and a carnivore)."},
  {q:"In a food chain, the arrow points —", o:["at the eater (where the energy goes)","at the food","always at the Sun","downward"], a:0, tier:3, e:"grass → rabbit: the rabbit gets the energy."},
  {q:"Mushrooms, bacteria and worms are important because they —", o:["break down dead things and recycle nutrients","make food from sunlight","hunt small animals","produce oxygen at night"], a:0, tier:2, e:"Decomposers are nature's recyclers."},
  {q:"A food WEB is —", o:["many food chains linked together","one straight line of eating","a spider's home","a list of plants"], a:0, tier:2, e:"Real ecosystems have many overlapping chains."},
  {q:"If all the rabbits in a meadow disappeared, the foxes would MOST LIKELY —", o:["have less food and some would go hungry","have more food than before","turn into herbivores instantly","not be affected at all"], a:0, tier:3, e:"Removing one link affects the next — that's why webs matter."},
  {q:"If the grass died out, what would happen FIRST?", o:["plant-eaters would run short of food","foxes would eat more grass","decomposers would disappear","the Sun would dim"], a:0, tier:3, e:"The producers feed the herbivores first."},
  {q:"Which chain is in the CORRECT order?", o:["grass → grasshopper → bird → hawk","hawk → bird → grasshopper → grass","grasshopper → grass → hawk → bird","bird → hawk → grass → grasshopper"], a:0, tier:3, e:"Producer first, top predator last."},
  {q:"A polar bear's thick fur is an example of —", o:["an adaptation to its cold habitat","a food chain","a decomposer","a producer"], a:0, tier:2, e:"Adaptations help living things survive where they live."},
  {q:"Which of these are PRODUCERS? (select all)", t:"multi", o:["seaweed","grass","an oak tree","a mushroom","a crab"], a:[0,1,2], tier:3, e:"Mushrooms are decomposers; crabs are consumers."},
  {q:"Which of these are DECOMPOSERS? (select all)", t:"multi", o:["mushrooms","bacteria","earthworms","rabbits","sharks"], a:[0,1,2], tier:3, e:"Rabbits and sharks are consumers."},
  {q:"If the small fish in a lake all died, which effects are LIKELY? (select all)", t:"multi", o:["big fish would have less to eat","birds that eat small fish would leave or go hungry","the tiny water plants they ate might grow more","the Sun would stop shining","nothing in the lake would change"], a:[0,1,2], tier:3, e:"Effects ripple up (less food) and down (fewer grazers) the web."},
  {q:"Which statements about ecosystems are TRUE? (select all)", t:"multi", o:["Energy enters most ecosystems as sunlight.","Decomposers return nutrients to the soil.","A food web is many chains connected.","Producers eat consumers.","Arrows in a chain point at the food."], a:[0,1,2], tier:3, e:"Producers are eaten BY consumers; arrows point at the eater."}
 ]},

{id:"SC14", subj:"sci", icon:"🔦", title:"Light & Sound", en:"光与声", tag:"new",
 lesson:{ media:[{type:"lightray", title:"Light travels straight", cap:"Rays bounce off mirrors (reflection) and bend in water (refraction)."},{type:"soundwave", title:"Sound is vibration", cap:"Fast vibration = high pitch. Big vibration = loud volume."}],
  cards:[
   {t:"How light behaves", b:"Light travels in STRAIGHT lines — that's why shadows form behind blockers.\nREFLECTION: light bounces off (mirrors, calm water).\nREFRACTION: light BENDS when it passes into water or glass — a straw in water looks broken!\nTransparent = light passes (glass) · translucent = some passes (frosted glass) · opaque = none (wood)."},
   {t:"How sound behaves", b:"Sound is made by VIBRATIONS and needs something to travel through — air, water, or solids. No air in space = no sound!\nPITCH: fast vibrations = high sound; slow = low.\nVOLUME: big vibrations = loud; small = quiet.\nLight travels much FASTER than sound — you see lightning before you hear thunder."}],
  example:{t:"Lightning first, thunder later", prob:"In a storm you SEE the flash, then HEAR the boom a few seconds later. Why?", steps:[
   "Both start at the same moment in the cloud.",
   "Light travels much faster than sound.",
   "So the flash reaches your eyes almost instantly; the sound arrives late."]},
  check:[{q:"Sound is made when something —", o:["vibrates","glows","melts","reflects"], a:0, e:"All sound starts with vibration."}] },
 training:[
  {q:"Light travels in —", o:["straight lines","zigzags","circles","spirals"], a:0, tier:1, e:"That's why light rays are drawn straight."},
  {q:"A shadow forms because —", o:["light is blocked by an opaque object","light bends around corners","the object glows","sound pushes light away"], a:0, tier:2, e:"Blocked light leaves a dark shape behind."},
  {q:"Light bouncing off a mirror is called —", o:["reflection","refraction","vibration","evaporation"], a:0, tier:2, e:"Re-FLECT = bounce back."},
  {q:"A straw in a glass of water looks bent because of —", o:["refraction","reflection","shadows","echoes"], a:0, tier:3, e:"Light BENDS when it moves between air and water."},
  {q:"Which material is TRANSPARENT?", o:["clear glass","wood","a brick","aluminium foil"], a:0, tier:1, e:"Transparent = light passes right through."},
  {q:"Frosted glass lets SOME light through but you cannot see clearly. It is —", o:["translucent","transparent","opaque","reflective only"], a:0, tier:2, e:"Trans-LUCENT = partly lets light pass."},
  {q:"Sound is caused by —", o:["vibrations","light rays","shadows","gravity"], a:0, tier:1, e:"A drum skin, a guitar string — all vibrate."},
  {q:"Astronauts outside a spaceship cannot hear each other shout because —", o:["there is no air for sound to travel through","it is too cold","light is too bright","their helmets are too thick"], a:0, tier:3, e:"Sound needs a medium: air, water, or solids. Space is empty."},
  {q:"A guitar string vibrating very FAST makes a sound that is —", o:["high-pitched","low-pitched","quiet","invisible"], a:0, tier:2, e:"Fast vibration = high pitch."},
  {q:"To make a drum LOUDER, you should —", o:["hit it harder (bigger vibrations)","hit it faster only","warm it up","move it into water"], a:0, tier:2, e:"Bigger vibrations = bigger volume."},
  {q:"You see lightning before you hear thunder because —", o:["light travels much faster than sound","the thunder happens later","your ears are slower than your eyes","sound travels faster than light"], a:0, tier:3, e:"Both start together; light wins the race."},
  {q:"Whales can 'talk' across long distances because sound —", o:["travels well through water","cannot travel in water","is a kind of light","only exists in air"], a:0, tier:3, e:"Sound travels through water — even faster than in air."},
  {q:"Which of these are LIGHT SOURCES (they make their own light)? (select all)", t:"multi", o:["the Sun","a candle flame","a firefly","the Moon","a mirror"], a:[0,1,2], tier:3, e:"The Moon and mirrors only REFLECT light — they don't make it."},
  {q:"Which materials are OPAQUE? (select all)", t:"multi", o:["a wooden door","a brick wall","clear glass","frosted glass","a metal sheet"], a:[0,1,4], tier:3, e:"Clear glass is transparent; frosted glass is translucent."},
  {q:"Which statements about SOUND are TRUE? (select all)", t:"multi", o:["Sound is made by vibrations.","Sound cannot travel through empty space.","Fast vibrations make higher sounds.","Sound travels faster than light.","Sound can travel through solids."], a:[0,1,2,4], tier:3, e:"Light is far faster than sound — the storm proves it."},
  {q:"Which statements about LIGHT are TRUE? (select all)", t:"multi", o:["Light travels in straight lines.","A mirror reflects light.","Light bends when entering water.","An opaque object lets all light through.","Shadows form behind opaque objects."], a:[0,1,2,4], tier:3, e:"Opaque means NO light passes."}
 ]},

{id:"SC15", subj:"sci", icon:"🔋", title:"Electricity & Circuits", en:"电与电路", tag:"new",
 lesson:{ cards:[
   {t:"Two kinds of electricity", b:"STATIC electricity: charge that builds up and jumps — a balloon rubbed on hair, a tiny shock from a doorknob, lightning!\nCURRENT electricity: charge that FLOWS through wires in a loop.\nA battery is the energy source that pushes the current."},
   {t:"The circuit loop", b:"A circuit needs a COMPLETE loop: battery → wire → bulb → wire → back to battery.\nCLOSED circuit = loop complete = bulb lights. OPEN circuit = a gap = nothing flows.\nA SWITCH just opens or closes the gap.\nCONDUCTORS let current pass (metals: copper, iron). INSULATORS block it (plastic, rubber, wood, glass)."}],
  example:{t:"Why won't the bulb light?", prob:"Mia connects a battery to a bulb with ONE wire. The bulb stays dark. Why?", steps:[
   "Current must flow in a complete loop — out of the battery, through the bulb, and BACK.",
   "One wire only makes half a path: the loop is open.",
   "Add the second wire to close the loop — now the bulb lights."]},
  check:[{q:"For a bulb to light, the circuit must be —", o:["closed (a complete loop)","open","very long","made of rubber"], a:0, e:"Closed loop = current flows."}] },
 training:[
  {q:"Electricity that FLOWS through wires is called —", o:["current electricity","static electricity","magnetism","gravity"], a:0, tier:1, e:"Current = flowing charge."},
  {q:"A balloon rubbed on your hair sticking to a wall shows —", o:["static electricity","current electricity","a closed circuit","a conductor"], a:0, tier:2, e:"Built-up charge = static."},
  {q:"Lightning is a giant spark of —", o:["static electricity","current from a battery","sound energy","moonlight"], a:0, tier:2, e:"Charge builds in clouds, then jumps — static on a huge scale."},
  {q:"In a circuit, the battery's job is to —", o:["be the energy source that pushes the current","light up","block the current","cool the wires"], a:0, tier:2, e:"No battery (or other source), no push."},
  {q:"A switch turns a light OFF by —", o:["opening a gap in the circuit","adding more current","changing the wire to rubber","reversing the battery"], a:0, tier:3, e:"Open = gap = current stops."},
  {q:"Which material is a CONDUCTOR?", o:["copper wire","a rubber band","a plastic ruler","a glass rod"], a:0, tier:2, e:"Metals conduct; the others insulate."},
  {q:"Which material is an INSULATOR?", o:["a plastic spoon","an iron nail","a copper coin","aluminium foil"], a:0, tier:2, e:"Plastic blocks current — that's why plugs have plastic covers."},
  {q:"Wires are covered in plastic because —", o:["plastic is an insulator that keeps the current inside and us safe","plastic conducts electricity","it makes the current faster","it looks nice only"], a:0, tier:3, e:"Insulation protects fingers from the conductor inside."},
  {q:"A circuit has a battery, two wires and a bulb, but the bulb is unscrewed a little. The bulb —", o:["stays dark, because the loop is broken","glows brighter","glows normally","flashes on and off"], a:0, tier:3, e:"Any gap anywhere opens the whole loop."},
  {q:"In a SERIES circuit with two bulbs on one loop, if one bulb burns out —", o:["both go dark, because the only path is broken","the other stays lit","the battery recharges","the switch closes"], a:0, tier:3, e:"One path only — a break stops everything. (Stretch!)"},
  {q:"Why should you NEVER touch a switch with wet hands?", o:["water can help electricity flow into your body","water cleans the switch","wet hands are too cold","switches melt in water"], a:0, tier:2, e:"Water + your body can become a path for current — dangerous."},
  {q:"Which of these needs CURRENT electricity to work?", o:["a table lamp","a candle","a hand fan you wave","a sundial"], a:0, tier:1, e:"The lamp needs flowing current; the others don't."},
  {q:"Which of these are CONDUCTORS? (select all)", t:"multi", o:["a copper wire","an iron nail","aluminium foil","a rubber eraser","a wooden ruler"], a:[0,1,2], tier:3, e:"Metals conduct; rubber and wood insulate."},
  {q:"Which of these are INSULATORS? (select all)", t:"multi", o:["a plastic ruler","a glass rod","a rubber glove","a copper coin","a steel spoon"], a:[0,1,2], tier:3, e:"The coin and spoon are metal — conductors."},
  {q:"In which cases will the bulb LIGHT? (select all)", t:"multi", o:["battery + two wires + bulb in a complete loop","the same loop with a CLOSED switch","a loop with an OPEN switch","one wire from battery to bulb only","a complete loop using copper wires"], a:[0,1,4], tier:3, e:"Open switch or a missing wire = open circuit = dark."},
  {q:"Which safety rules about electricity are CORRECT? (select all)", t:"multi", o:["Never touch switches or plugs with wet hands.","Never poke metal objects into a power outlet.","It is safe to use a hair dryer in the bathtub.","Tell an adult if a wire looks broken or burnt.","Climbing a pole to grab a kite near power lines is fine."], a:[0,1,3], tier:3, e:"Water + electricity and power lines are serious dangers."}
 ]},

{id:"EN24", subj:"en", icon:"🌙", title:"Reading Poetry: The Harbour at Night", en:"诗歌阅读（新体裁）", tag:"new",
 lesson:{ cards:[
   {t:"The shape of a poem", b:"A poem is built from LINES, grouped into STANZAS (like paragraphs).\nRHYME: words with the same ending sound — rest / nest.\nThis poem rhymes in pairs: AABB (line 1 rhymes with 2, line 3 with 4)."},
   {t:"Three tools poets love", b:"SIMILE: compares with 'like' or 'as' — 'Like tired birds'.\nMETAPHOR: says one thing IS another — 'The lighthouse is a patient eye'.\nPERSONIFICATION: gives human actions to non-human things — 'The harbour hums a tune'."}],
  example:{t:"Which tool is it?", prob:"'Its golden beam ... A broom that sweeps the floor of night.' Simile, metaphor, or personification?", steps:[
   "Is there 'like' or 'as'? No — so not a simile.",
   "The beam is called a broom — one thing IS another.",
   "That's a METAPHOR: the beam = a broom sweeping the dark."]},
  check:[{q:"A group of lines in a poem is called a —", o:["stanza","chapter","sentence","title"], a:0, e:"Stanzas are the 'paragraphs' of poetry."}] },
 training:[
  {q:"How many STANZAS does this poem have?", o:["three","four","twelve","two"], a:0, tier:1, e:"Three groups of four lines.", passage:P_POEM},
  {q:"How many LINES are in each stanza?", o:["four","three","six","twelve"], a:0, tier:1, e:"4 lines × 3 stanzas = 12 lines.", passage:P_POEM},
  {q:"Which word rhymes with 'rest' in stanza 1?", o:["nest","tune","moon","boats"], a:0, tier:1, e:"rest / nest — the AABB pattern begins.", passage:P_POEM},
  {q:"The rhyme pattern of each stanza is —", o:["AABB (pairs)","ABAB (alternating)","no rhyme at all","AAAA"], a:0, tier:3, e:"1–2 rhyme, 3–4 rhyme: pairs.", passage:P_POEM},
  {q:"'Like tired birds that seek their nest' is a —", o:["simile","metaphor","personification","rhyme only"], a:0, tier:2, e:"'Like' signals a simile.", passage:P_POEM},
  {q:"'The lighthouse is a patient eye' is a —", o:["metaphor","simile","fact","question"], a:0, tier:3, e:"No like/as — the lighthouse IS an eye.", passage:P_POEM},
  {q:"'The harbour hums a quiet tune' is an example of —", o:["personification","simile","rhyme","alliteration"], a:0, tier:3, e:"A harbour can't really hum — human action given to a place.", passage:P_POEM},
  {q:"What is the lighthouse beam compared to?", o:["a broom sweeping the floor of night","a golden fish","a silver moon","a wooden door"], a:0, tier:2, e:"'A broom that sweeps the floor of night.'", passage:P_POEM},
  {q:"Calling the lighthouse 'a patient eye' suggests that it —", o:["keeps calm, steady watch over the ships","blinks very fast","is tired of watching","cannot see at night"], a:0, tier:3, e:"'Patient' = calm and steady; an eye = it watches.", passage:P_POEM},
  {q:"The waves' 'tap-tap' is compared to —", o:["soft knocks on a wooden door","loud thunder","a ringing bell","a barking dog"], a:0, tier:2, e:"'Like soft knocks on a wooden door' — a gentle simile.", passage:P_POEM},
  {q:"The MOOD of this poem is —", o:["calm and peaceful","scary and stormy","funny and silly","angry"], a:0, tier:3, e:"Quiet tune, soft knocks, sleep well — everything whispers calm.", passage:P_POEM},
  {q:"'Morning light unties the ribbons of the night' most likely means —", o:["dawn slowly ends the darkness","someone forgot their ribbons","the boats wear ribbons","the night gets darker"], a:0, tier:3, e:"An image for sunrise loosening the dark — interpretation!", passage:P_POEM},
  {q:"Which lines contain SIMILES? (select all)", t:"multi", o:["Like tired birds that seek their nest","Like soft knocks on a wooden door","The lighthouse is a patient eye","The harbour hums a quiet tune","A broom that sweeps the floor of night"], a:[0,1], tier:3, e:"Only the 'like' lines are similes — the rest are metaphor/personification.", passage:P_POEM},
  {q:"Which poetic tools appear in this poem? (select all)", t:"multi", o:["simile","metaphor","personification","rhyme","a knock-knock joke"], a:[0,1,2,3], tier:3, e:"All four tools — no jokes, though.", passage:P_POEM},
  {q:"Which statements about the poem are TRUE? (select all)", t:"multi", o:["The poem is set at night.","The boats are compared to tired birds.","The poem describes a violent storm.","The lighthouse beam moves left and right.","The poem ends at sunrise — morning light appears."], a:[0,1,3,4], tier:3, e:"No storm anywhere — the sea is gentle throughout.", passage:P_POEM},
  {q:"Which pairs of words RHYME in this poem? (select all)", t:"multi", o:["tune / moon","shore / door","light / night","rest / boats","eye / by"], a:[0,1,2,4], tier:3, e:"'rest' rhymes with 'nest', not 'boats'.", passage:P_POEM}
 ]},

{id:"EN25", subj:"en", icon:"🧊", title:"Reading: Icebergs", en:"说明文阅读·冰山", tag:"core",
 lesson:{ cards:[
   {t:"Cause and effect", b:"Ask: WHAT happened (effect) and WHY (cause).\nSignal words: because, so, that is why, since.\n'Because glaciers are packed snow → iceberg ice is FRESH water.'"},
   {t:"Idioms grow from facts", b:"'The tip of the iceberg' = the small visible part of something much bigger.\nThe idiom works because 90% of a real iceberg hides underwater.\nGood readers connect facts to the sayings they explain."}],
  example:{t:"Find the cause", prob:"Why is iceberg ice FRESH water and not salty?", steps:[
   "Find the signal word 'Because' in the text.",
   "'Because glaciers are made of tightly packed snow...'",
   "Snow = fresh water → so the iceberg is fresh, even in a salty sea."]},
  check:[{q:"This text was written mainly to —", o:["inform","entertain with a story","persuade you to sail","sell tickets"], a:0, e:"It teaches facts about icebergs."}] },
 training:[
  {q:"An iceberg is made of —", o:["freshwater ice","frozen salt water","packed sand","cold air"], a:0, tier:1, e:"'a giant piece of freshwater ice'.", passage:P_ICE},
  {q:"When a huge chunk of ice breaks off a glacier, scientists call it —", o:["calving","melting","drifting","freezing"], a:0, tier:2, e:"'Scientists call this dramatic moment calving.'", passage:P_ICE},
  {q:"About how much of an iceberg sits BELOW the surface?", o:["ninety percent","half","ten percent","almost none"], a:0, tier:2, e:"'about ninety percent... below the surface'.", passage:P_ICE},
  {q:"People say 'the tip of the iceberg' to mean —", o:["a small visible part of a much bigger thing","the coldest part of the sea","the top of a mountain","a kind of ship"], a:0, tier:3, e:"The idiom comes straight from the 90% fact.", passage:P_ICE},
  {q:"Iceberg ice is FRESH water because —", o:["glaciers are made of tightly packed snow","the sea washes the salt away","ships clean the ice","icebergs boil the water"], a:0, tier:3, e:"Cause and effect with the signal word 'Because'.", passage:P_ICE},
  {q:"Which words from the text SIGNAL cause and effect? (select all)", t:"multi", o:["because","that is why","until","cold","today"], a:[0,1], tier:3, e:"'Because glaciers are...' and 'That is why people say...' both explain WHY.", passage:P_ICE},
  {q:"What happened in 1912?", o:["the Titanic sank after hitting an iceberg","the first iceberg was discovered","satellites were launched","all icebergs melted"], a:0, tier:2, e:"The famous historical example of the danger.", passage:P_ICE},
  {q:"According to the text, what do scientists USE to track icebergs today? (select all)", t:"multi", o:["satellites","patrol planes","fishing nets","underwater trains","hot-air balloons"], a:[0,1], tier:3, e:"'satellites and patrol planes' — nothing else is in the text.", passage:P_ICE},
  {q:"In this text, 'drifting' means —", o:["moving slowly with the current","sinking quickly","freezing harder","making noise"], a:0, tier:2, e:"Icebergs drift = float along slowly.", passage:P_ICE},
  {q:"The MAIN idea of this text is —", o:["icebergs are huge, hidden, drifting giants that we now track for safety","the Titanic was a famous ship","snow is cold","satellites are expensive"], a:0, tier:3, e:"The other options are single details.", passage:P_ICE},
  {q:"Which sentence is a DETAIL, not the main idea?", o:["About ninety percent of an iceberg sits below the surface.","Icebergs are giant hidden travellers of the sea.","The text explains what icebergs are and why they matter.","Icebergs are powerful and mostly hidden."], a:0, tier:3, e:"One specific fact = a detail.", passage:P_ICE},
  {q:"Why does the author mention the Titanic?", o:["to show how dangerous drifting icebergs can be","to tell a funny story","to explain how glaciers form","to describe satellites"], a:0, tier:3, e:"A real example that proves the danger.", passage:P_ICE},
  {q:"Which statements are TRUE about icebergs? (select all)", t:"multi", o:["They are born when ice breaks off glaciers.","Most of an iceberg hides underwater.","Iceberg ice is salty like the sea.","Currents can carry them for years.","Scientists warn ships about them today."], a:[0,1,3,4], tier:3, e:"Iceberg ice is FRESH — that's the surprise fact.", passage:P_ICE},
  {q:"Which are reasons icebergs can be DANGEROUS to ships? (select all)", t:"multi", o:["most of their size is hidden below the water","they drift into shipping routes","they are hard to see at night","they attack ships on purpose","they make the sea boil"], a:[0,1,2], tier:3, e:"Hidden size + drifting + darkness — the Titanic met all three.", passage:P_ICE},
  {q:"The BEST heading for the last part of the text would be —", o:["Keeping Ships Safe Today","How Snow Falls","Famous Ocean Animals","The Story of a Sailor"], a:0, tier:3, e:"The ending is about tracking and warning — safety.", passage:P_ICE},
  {q:"Compared with the sea around it, an iceberg is —", o:["fresh water while the sea is salty","salty while the sea is fresh","exactly the same as the sea","warmer than the sea"], a:0, tier:2, e:"A compare-and-contrast fact from the text.", passage:P_ICE}
 ]},

{id:"EN26", subj:"en", icon:"🖊️", title:"Grammar & Conventions V", en:"撇号·引号·段落改错", tag:"level",
 lesson:{ cards:[
   {t:"The apostrophe's two jobs", b:"① OWNERSHIP: the dog's bone (one dog) · the sailors' boat (many sailors).\n② SHORTENING: it's = it is · don't = do not.\nTRAP: its (belonging to it) has NO apostrophe. 'The ship lost its anchor.'\nPlain plurals never take one: two dogs, three boats."},
   {t:"Quotation marks for speech", b:"Put the spoken words inside quotes; punctuation stays INSIDE.\n\"Let's sail at dawn,\" said the captain.\nKai asked, \"Is the tide high?\"\nNew speaker = new line (in stories)."}],
  example:{t:"its or it's?", prob:"Choose: 'The boat lost (its / it's) sail, and now (its / it's) drifting.'", steps:[
   "First blank: the sail belongs to the boat → its (no apostrophe).",
   "Second blank: 'it is drifting' → it's.",
   "Test: if you can say 'it is', use it's."]},
  check:[{q:"Which is correct?", o:["the captain's hat","the captains hat'","the captain hat's","the captain's' hat"], a:0, e:"One captain owns the hat: captain's."}] },
 training:[
  {q:"Which sentence uses the apostrophe CORRECTLY?", o:["The dog's tail wagged.","The dogs's tail wagged.","The dog tail's wagged.","The dogs tail wagged."], a:0, tier:2, e:"One dog + ownership = dog's."},
  {q:"Which shows something belonging to MANY sailors?", o:["the sailors' boat","the sailor's boat","the sailors boat","the sailor boats'"], a:0, tier:3, e:"Plural owner: apostrophe AFTER the s."},
  {q:"'It's going to rain.' Here 'it's' means —", o:["it is","belonging to it","its","it was"], a:0, tier:2, e:"it's = it is. The ownership word 'its' has no apostrophe."},
  {q:"Choose the correct sentence.", o:["The ship lost its anchor.","The ship lost it's anchor.","The ship lost its' anchor.","The ship lost anchor it's."], a:0, tier:3, e:"Ownership 'its' never takes an apostrophe — the classic trap!"},
  {q:"Which sentence is punctuated CORRECTLY?", o:["\"Let's sail at dawn,\" said the captain.","\"Lets sail at dawn\" said the captain,","Let's sail at dawn, \"said the captain.\"","\"Let's sail at dawn.\" said, the captain"], a:0, tier:3, e:"Speech inside quotes; comma inside; then 'said the captain'."},
  {q:"Which word is a CONTRACTION (a shortened form)?", o:["don't","dogs","boats","captains"], a:0, tier:1, e:"don't = do not. The others are plain plurals."},
  {q:"'The childrens toys were everywhere.' The correct fix is —", o:["children's","childrens'","childrens","children"], a:0, tier:3, e:"'Children' is already plural — add 's."},
  {q:"Which sentence has NO errors?", o:["After the storm, the crew checked the ship's sails.","after the storm the crew checked the ships sail's.","After the storm the crew, checked the ships sails.","After the storm. The crew checked the ship's sails"], a:0, tier:3, e:"Capital, comma after the opener, ship's = ownership."},
  {q:"This sentence has TWO errors: 'the waves crashed against the rocks and the wind howled'. They are —", o:["missing capital at the start and missing end period","wrong spelling of 'waves' and 'wind'","too many commas and too long","'crashed' should be 'crash' and 'howled' should be 'howl'"], a:0, tier:3, e:"Content is fine — the frame (capital + period) is missing."},
  {q:"Combine smoothly: 'We stayed home. The storm was fierce.'", o:["We stayed home because the storm was fierce.","We stayed home the storm was fierce.","We stayed home, the storm was fierce.","Because we stayed home, the storm was fierce."], a:0, tier:3, e:"'Because' shows the reason; option 3 is a comma splice; option 4 flips the logic."},
  {q:"Which is a FRAGMENT?", o:["Waiting for the tide to turn.","The tide turned at noon.","We waited on the dock.","The dock creaked."], a:0, tier:2, e:"No subject doing a full action — just a piece."},
  {q:"Choose the correct end for: Kai asked, ___", o:["\"Is the tide high?\"","\"Is the tide high\"?","\"is the tide high?\"","Is the tide high?"], a:0, tier:3, e:"Quotes around the words, capital inside, question mark INSIDE."},
  {q:"Which sentences use apostrophes CORRECTLY? (select all)", t:"multi", o:["The captain's map is old.","Its sail is torn.","The three boat's raced.","Don't touch the wet paint.","The birds' nest sat in the pine."], a:[0,1,3,4], tier:3, e:"'Three boat's' is just a plural — no apostrophe needed."},
  {q:"Which sentences are punctuated CORRECTLY? (select all)", t:"multi", o:["\"Drop the anchor,\" said Mia.","We packed rope, food, and water.","its time to go.","The storm passed, and the sea calmed.","\"Look out\" shouted Kai!"], a:[0,1,3], tier:3, e:"③ needs It's + capital; ⑤ needs the mark inside the quotes: \"Look out!\" shouted Kai."},
  {q:"Which are COMPLETE sentences? (select all)", t:"multi", o:["The lighthouse blinked twice.","Under the rolling waves.","We tied the ropes tightly.","Because the wind was strong.","Gulls circled the mast."], a:[0,2,4], tier:3, e:"'Under...' and 'Because...' are fragments — they leave you waiting."}
 ]},

{id:"EN27", subj:"en", icon:"🍔", title:"Writing Studio VI: Paragraphs", en:"汉堡段落写作", tag:"core",
 lesson:{ cards:[
   {t:"The hamburger paragraph", b:"TOP BUN — Topic sentence: say your main idea.\nFILLING — 3 detail sentences: examples, reasons, facts.\nBOTTOM BUN — Closing sentence: wrap it up (say the idea again in new words).\n5 sentences = 1 solid paragraph."},
   {t:"Rules that never change", b:"English ONLY — the box will warn you if Chinese sneaks in.\nEvery sentence: capital start, end mark.\nEvery sentence must feed the topic — no wandering!\nUse at least 3 words from the word bank."}],
  example:{t:"Spot the weak filling", prob:"Topic: winter is fun. Filling sentence: 'My cousin has a blue car.' Keep or cut?", steps:[
   "Ask: does this detail feed the topic 'winter is fun'?",
   "A blue car has nothing to do with winter.",
   "Cut it — replace with a winter detail: 'We build snow forts after school.'"]},
  check:[{q:"The FIRST sentence of a hamburger paragraph should —", o:["state the main idea","be the closing","list random facts","be a question only"], a:0, e:"Top bun = topic sentence."}] },
 training:[
  {q:"✍️ Opinion paragraph (English only). Topic: My favourite season.\nBuild a hamburger:\n1) Topic sentence: 'My favourite season is ____.'\n2)–4) THREE detail sentences (reasons or examples).\n5) Closing sentence: wrap it up in new words.\nWord bank: weather, holiday, outside, family, favourite, because.\nRule: every sentence must be about that one season.", t:"open", min:100, hint:"5 sentences. Top bun → 3 fillings → bottom bun."},
  {q:"✍️ Opinion paragraph (English only). Topic: Why reading is important.\nBuild a hamburger:\n1) Topic sentence.\n2)–4) THREE reasons (one per sentence).\n5) Closing sentence.\nWord bank: learn, words, imagination, stories, brain, grow.\nRule: every sentence must be about reading.", t:"open", min:100, hint:"Three DIFFERENT reasons — not the same one twice."},
  {q:"✍️ Narrative paragraph (English only). Topic: The night the lights went out.\nWrite 5 sentences in time order about one evening when the electricity stopped.\nStart with a topic sentence, then what happened FIRST, NEXT, THEN, and how it ENDED.\nWord bank: dark, candle, quiet, flashlight, suddenly, finally.\nRule: stay in the same evening — no jumping to other days.", t:"open", min:100, hint:"One evening, told in order. (You just learned about circuits!)"},
  {q:"✍️ Informational paragraph (English only). Topic: How an iceberg is born.\nExplain in your OWN words (do not copy the reading):\n1) Topic sentence.\n2)–4) Three steps or facts (glacier → breaking off → floating and hiding most of its size).\n5) Closing sentence.\nWord bank: glacier, breaks, floats, hidden, fresh, ocean.\nRule: every sentence must be about icebergs.", t:"open", min:100, hint:"Teach it like a little scientist — own words only."},
  {q:"✍️ Descriptive paragraph (English only). Topic: The harbour at night.\nWrite 5 sentences that paint the picture.\nInclude AT LEAST one simile (like / as ... as) and one personification (the harbour or waves doing a human action).\nWord bank: moon, waves, lighthouse, quiet, glow, whisper.\nRule: keep every sentence at the harbour, at night.", t:"open", min:100, hint:"Borrow the poem's mood — but use YOUR own images."}
 ]},

/* ========================= 法语 Français ========================= */
{id:"FR13", subj:"fr", icon:"🗣️", title:"Verbes en -er · La négation", en:"-er 动词变位·否定句", tag:"new",
 lesson:{ media:[{type:"frenchpics", title:"Les verbes", items:[["🗣️","parler = to speak"],["❤️","aimer = to like/love"],["⚽","jouer = to play"],["🍽️","manger = to eat"],["🏠","habiter = to live"]]}],
  cards:[
   {t:"-er verbs change their endings", b:"parler (to speak):\nje parle · tu parles · il/elle parle · nous parlons\nSame music for aimer, jouer, habiter:\nj'aime · tu aimes · elle aime · nous aimons\nHear it: je/il/elle sound the same — the spelling changes!"},
   {t:"Saying NO: ne ... pas", b:"Wrap the verb in a sandwich: ne + verb + pas.\nJe ne parle pas. = I do not speak.\nIl ne joue pas. = He does not play.\nBefore a vowel: ne → n' : Je n'aime pas les épinards.\nAsking: Est-ce que tu aimes le foot ? = Do you like football?"}],
  example:{t:"Build the negative", prob:"Turn 'Je mange une pomme.' into 'I am NOT eating an apple.'", steps:[
   "Find the verb: mange.",
   "Sandwich it: ne mange pas.",
   "Je ne mange pas de pomme. (After the negative, une/des often becomes de.)"]},
  check:[{q:"'nous jouons' means —", o:["we play","I play","they slept","you speak"], a:0, e:"nous + -ons = we form."}] },
 training:[
  {q:"Complete: 'Je ____ français.' (to speak)", o:["parle","parles","parlons","parler"], a:0, tier:2, e:"je → parle (no s!)."},
  {q:"Complete: 'Tu ____ au football.' (to play)", o:["joues","joue","jouons","jouer"], a:0, tier:2, e:"tu → -es: tu joues."},
  {q:"Complete: 'Nous ____ la mer.' (to like)", o:["aimons","aime","aimes","aimer"], a:0, tier:2, e:"nous → -ons: nous aimons."},
  {q:"Complete: 'Elle ____ à Toronto.' (to live)", o:["habite","habites","habitons","habiter"], a:0, tier:2, e:"il/elle → -e: elle habite."},
  {q:"'Je ne parle pas anglais.' means —", o:["I do not speak English.","I speak English well.","You do not speak English.","I want to speak English."], a:0, tier:2, e:"ne ... pas wraps the verb = not."},

/* ---- 状态与存储 ---- */
const KEY="sailor_pack_v14", PASS=0.6;
function fresh(){ return {xp:SEED.xp, v14Best:{}, v14Done:[], mistakes:[], box:[], writing:{}, traceDays:[], started:SEED.xp}; }
let state=load()||fresh();
if(!state.box) state.box=[];
if(!state.writing) state.writing={};
if(!state.traceDays) state.traceDays=[];
function load(){ try{ return JSON.parse(localStorage.getItem(KEY)); }catch(e){ return null; } }
function save(){ try{ localStorage.setItem(KEY,JSON.stringify(state)); }catch(e){} if(typeof SYNC!=="undefined"&&SYNC.schedule)SYNC.schedule(); }

function beltFor(xp){ let b=BELTS[0]; for(const x of BELTS){ if(xp>=x.min) b=x; } return b; }
function nextBelt(xp){ return BELTS.find(x=>x.min>xp)||null; }
function trainCount(u){ return (u.training||[]).length; }
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function jsq(s){ return String(s).replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/\r?\n/g," "); }
function lang(s){ return s==="cn"?"zh-CN":s==="fr"?"fr-FR":"en-US"; }
function qByRef(ref){ const p=ref.split("#"); const u=UNITS.find(x=>x.id===p[0]); return u?{unit:u,item:u.training[+p[1]]}:null; }
function boxAdd(ref){ if(state.box.indexOf(ref)<0) state.box.push(ref); }
function boxDel(ref){ const i=state.box.indexOf(ref); if(i>=0) state.box.splice(i,1); }

/* ---- 多语朗读（离线优先） ---- */
let VOICES=[];
function loadVoices(){ try{ VOICES=window.speechSynthesis?window.speechSynthesis.getVoices():[]; }catch(e){ VOICES=[]; } }
if(window.speechSynthesis){ loadVoices(); window.speechSynthesis.onvoiceschanged=loadVoices; }
function spk(text, lg){
  lg=lg||"zh-CN";
  try{
    if(!('speechSynthesis' in window)){ toast("此设备无语音，看文字也可以"); return; }
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang=lg; u.rate=lg.indexOf("zh")===0?0.82:lg.indexOf("fr")===0?0.85:0.9; u.pitch=1.04;
    const re=lg.indexOf("zh")===0?/zh|chinese|中文|普通话|mandarin/i:lg.indexOf("fr")===0?/fr|french|français/i:/en|english/i;
    const v=VOICES.find(x=>re.test((x.lang||"")+(x.name||""))); if(v) u.voice=v;
    window.speechSynthesis.speak(u);
  }catch(e){ toast("看文字也可以哦"); }
}
function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),2300); }
