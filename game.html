  resetAll(); S.worn=sv.worn||{}; S.fish=sv.fish||0; S.levelIndex=Math.min(sv.level||0,LEVELS.length-1);
  loadLevel(S.levelIndex); S.scene="play";
  document.getElementById("introOv").classList.add("hidden");
  document.getElementById("winOv").classList.add("hidden");
  document.getElementById("doneOv").classList.add("hidden");
  setMsg("继续游戏 · 第"+(S.levelIndex+1)+"层 "+S.cur.name); }
function setupIntro(){ var sv=loadSave(); if(sv&&typeof sv.level==="number"){
  var nm=(LEVELS[sv.level]&&LEVELS[sv.level].name)||"";
  var bc=document.getElementById("btnContinue");
  bc.textContent="继续 (第"+(sv.level+1)+"层 "+nm+")"; bc.classList.remove("hidden");
  document.getElementById("btnStart").textContent="重新开始"; } }

var keys={left:false,right:false};
function pressJump(){ S.cat.jumpBuf=9; }
function bindBtn(id,name,isJump,isFish){ var el=document.getElementById(id);
  function dn(e){e.preventDefault();ensureAudio(); if(isFish){throwFish();return;} if(isJump){pressJump();return;}
    if(name==="left")keys.left=true; else if(name==="right")keys.right=true;}
  function up(e){e.preventDefault(); if(name==="left")keys.left=false; else if(name==="right")keys.right=false;}
  el.addEventListener("touchstart",dn,{passive:false});el.addEventListener("touchend",up,{passive:false});
  el.addEventListener("touchcancel",up,{passive:false});el.addEventListener("mousedown",dn);
  el.addEventListener("mouseup",up);el.addEventListener("mouseleave",up); }
bindBtn("btnLeft","left",false,false);bindBtn("btnRight","right",false,false);
bindBtn("btnJump","jump",true,false);bindBtn("btnFish","fish",false,true);
document.addEventListener("keydown",function(e){ ensureAudio();var k=e.key.toLowerCase();
  if(k==="arrowleft"||k==="a")keys.left=true; else if(k==="arrowright"||k==="d")keys.right=true;
  else if(k==="arrowup"||k==="w"||k===" "){pressJump();e.preventDefault();}
  else if(k==="e"||k==="f")throwFish(); else if(k==="m")toggleMap(); });
document.addEventListener("keyup",function(e){var k=e.key.toLowerCase();
  if(k==="arrowleft"||k==="a")keys.left=false; else if(k==="arrowright"||k==="d")keys.right=false; });
document.getElementById("btnStart").addEventListener("click",startGame);
document.getElementById("btnReplay").addEventListener("click",startGame);
document.getElementById("btnContinue").addEventListener("click",continueGame);
document.getElementById("btnSave").addEventListener("click",function(){ensureAudio();saveGame(false);});
document.getElementById("btnMap").addEventListener("click",toggleMap);
document.getElementById("btnSound").addEventListener("click",function(){soundOn=!soundOn;document.getElementById("btnSound").textContent=soundOn?"🔊":"🔇";});
document.getElementById("btnEngrave").addEventListener("click",function(){
  var nm=(document.getElementById("nameInput").value||"二狗").trim()||"二狗";
  document.getElementById("medalName").textContent=nm;
  document.getElementById("winOv").classList.add("hidden");document.getElementById("doneOv").classList.remove("hidden");});
var mapOpen=false;
function toggleMap(){ if(S.scene!=="play"&&!mapOpen)return; mapOpen=!mapOpen; }
function throwFish(){ if(S.scene!=="play"||mapOpen)return; if(S.fish<=0)return; S.fish--;
  var fx=Math.max(30,Math.min(W-30,S.cat.x+S.cat.facing*120));
  S.lure={x:fx,y:S.cat.y};S.lureT=380;sfx("throw");setMsg("扔出鱼干！🐟 狗去吃鱼，就不咬你啦～"); }

function hazard(msg){ if(S.invulnT>0)return;
  if(S.worn.scarf){ S.worn.scarf=false;S.shieldFlashT=40;S.invulnT=45;sfx("shield");setMsg("围巾帮你挡了一下！🧣");return; }
  meow();S.hurtT=40;S.invulnT=35;
  S.cat.x=S.respawn.x;S.cat.y=S.respawn.y;S.cat.vx=0;S.cat.vy=0;S.cat.onGround=true;S.cat.jumps=0;
  setMsg(msg||"哎呀！回到存档点 🚩"); }
function camY(){ var c=S.cat.y-H*0.6,m=S.cur.worldH-H; if(c<0)c=0; if(c>m)c=m; return c; }

function update(){ S.t++;
  if(S.msgT>0)S.msgT--; if(S.hurtT>0)S.hurtT--; if(S.invulnT>0)S.invulnT--; if(S.shieldFlashT>0)S.shieldFlashT--;
  if(S.scene==="trans"){ S.transT--; if(S.transT<=0){S.scene="play";setMsg("第"+(S.levelIndex+1)+"层 · "+S.cur.name+"！");} return; }
  if(S.scene!=="play"||mapOpen)return;
  var c=S.cat,lv=S.cur;
  if(S.springT>0)S.springT--; if(S.lureT>0){S.lureT--; if(S.lureT<=0)S.lure=null;}
  var em=S.worn.glasses?MOVE_FAST:MOVE;
  if(keys.left&&!keys.right){c.vx=-em;c.facing=-1;} else if(keys.right&&!keys.left){c.vx=em;c.facing=1;} else c.vx*=0.55;
  if(Math.abs(c.vx)>0.3)c.walk+=0.3; else c.walk=0;

  if(c.jumpBuf>0)c.jumpBuf--; if(c.coyote>0)c.coyote--;
  var maxJ=S.worn.hat?2:1;
  if(c.jumpBuf>0){
    var first=(c.jumps===0&&(c.onGround||c.coyote>0));
    var extra=(S.worn.hat&&c.jumps>=1&&c.jumps<maxJ);
    if(first||extra){
      if(first&&S.springT>0)c.vy=SPRING_JUMP_V; else if(extra)c.vy=JUMP_V*0.95; else c.vy=JUMP_V;
      c.onGround=false;c.coyote=0;c.jumps++;c.jumpBuf=0;sfx("jump");
    }
  }
  c.vy+=GRAV; if(c.vy>17)c.vy=17;
  var fp=c.y; c.x+=c.vx; c.y+=c.vy;
  if(c.x<CHALF)c.x=CHALF; if(c.x>W-CHALF)c.x=W-CHALF;

  c.onGround=false;
  if(c.y>=lv.worldH){c.y=lv.worldH;c.vy=0;c.onGround=true;}
  for(var p=0;p<lv.platforms.length;p++){ var pl=lv.platforms[p];
    if(c.vy>=0&&fp<=pl.y+2&&c.y>=pl.y&&c.x+CHALF-6>pl.x&&c.x-CHALF+6<pl.x+pl.w){c.y=pl.y;c.vy=0;c.onGround=true;} }
  if(c.onGround){c.coyote=9;c.jumps=0;}

  if(c.onGround){
    for(var si=0;si<lv.springs.length;si++){ var sp=lv.springs[si];
      if(Math.abs(c.x-sp.x)<28&&Math.abs(c.y-sp.y)<8){ if(S.springT<12){sfx("spring");setMsg("踩到弹簧脚 🦘！按「跳」能跳超高");} S.springT=300; break; } }
    for(var ci=0;ci<lv.checkpoints.length;ci++){ var cp=lv.checkpoints[ci];
      if(Math.abs(c.x-cp.x)<46&&Math.abs(c.y-cp.y)<14){ S.respawn={x:cp.x,y:cp.y}; if(!cp.reached){cp.reached=true;sfx("ckpt");} break; } }
    for(var wi=0;wi<lv.water.length;wi++){ var wt=lv.water[wi];
      if(Math.abs(c.y-wt.y)<3&&c.x>wt.x-4&&c.x<wt.x+wt.w+4){ hazard("二狗怕水！回到存档点 🚩"); break; } }
  }

  for(var di=0;di<lv.dogs.length;di++){ var d=lv.dogs[di];
    var lo=d.hx-d.r,hi=d.hx+d.r,nearG=Math.abs(c.y-d.y)<26,tgt;
    var fed=(S.lure&&S.lure.x>=lo-30&&S.lure.x<=hi+30&&Math.abs(S.lure.y-d.y)<60);d.fed=fed;
    if(fed)tgt=S.lure.x;
    else if(nearG&&c.x>=lo-14&&c.x<=hi+14)tgt=c.x;
    else{ if(d.dx<=lo+1)d.dir=1; if(d.dx>=hi-1)d.dir=-1; tgt=d.dx+d.dir*30; }
    var spd=(tgt===c.x)?2.8:1.7;
    if(d.dx<tgt)d.dx=Math.min(tgt,d.dx+spd); else d.dx=Math.max(tgt,d.dx-spd);
    if(d.dx<lo)d.dx=lo; if(d.dx>hi)d.dx=hi;
    if(!fed&&nearG&&Math.abs(c.x-d.dx)<32&&c.y>d.y-30)hazard("被狗狗抓到啦！回到存档点 🚩");
  }
  for(var bi=0;bi<lv.bugs.length;bi++){ var bg=lv.bugs[bi],blo=bg.hx-bg.r,bhi=bg.hx+bg.r;
    if(bg.dx<=blo)bg.dir=1; if(bg.dx>=bhi)bg.dir=-1; bg.dx+=bg.dir*0.85;
    if(Math.abs(c.y-bg.y)<24&&Math.abs(c.x-bg.dx)<22&&c.y>bg.y-24)hazard("被毛毛虫碰到啦！回到存档点 🚩"); }
  for(var ri=0;ri<lv.birds.length;ri++){ var bd=lv.birds[ri],rlo=bd.hx-bd.r,rhi=bd.hx+bd.r;
    if(bd.dx<=rlo)bd.dir=1; if(bd.dx>=rhi)bd.dir=-1; bd.dx+=bd.dir*bd.sp;
    if(Math.abs(c.x-bd.dx)<24&&bd.y>c.y-44&&bd.y<c.y+6)hazard("被小鸟撞到啦！回到存档点 🚩"); }

  for(var it=0;it<lv.items.length;it++){ var item=lv.items[it]; if(item.collected)continue;
    if(Math.abs(c.x-item.x)<30&&Math.abs(c.y-item.y)<42){
      if(item.kind==="quest"){c.carrying=item.type;item.collected=true;setMsg("拿到了"+nameFor(item.type)+" "+emojiFor(item.type)+"！送给上面的人～");sfx("collect");}
      else if(item.kind==="deco"){S.worn[item.type]=true;item.collected=true;setMsg(decoMsg(item.type));sfx("collect");}
      else if(item.kind==="skill"&&item.type==="fish"){S.fish++;item.collected=true;setMsg("捡到鱼干 🐟！扔给狗，它去吃鱼就不咬你了");sfx("collect");}
    } }

  if(lv.npc){ var n=lv.npc;
    if(Math.abs(c.x-n.x)<42&&Math.abs(c.y-n.y)<28){
      if(c.carrying===n.want&&!n.delivered){n.delivered=true;c.carrying=null;S.stairsActive=true;setMsg(n.thanks);sfx("deliver");}
      else if(!n.delivered&&S.msgT<=0){setMsg(n.req);n.talked=true;} } }

  if(lv.reach){ if(Math.abs(c.x-lv.owner.x)<46&&Math.abs(c.y-lv.owner.y)<46){doWin();return;} }
  else if(S.stairsActive){ if(Math.abs(c.x-lv.exitX)<36&&Math.abs(c.y-lv.exitY)<44){nextLevel();return;} }
}

function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function circle(x,y,r){ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.closePath();}
function ellip(x,y,rx,ry){ctx.beginPath();ctx.ellipse(x,y,rx,ry,0,0,Math.PI*2);ctx.closePath();}
function tri(ax,ay,bx,by,cx,cy){ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);ctx.lineTo(cx,cy);ctx.closePath();}
function emojiAt(em,x,y,s){ctx.font=(s||26)+"px 'Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji',serif";ctx.textAlign="center";ctx.textBaseline="alphabetic";ctx.fillText(em,x,y);}
function bob(){return Math.sin(S.t*0.12)*3;}

function cloud(x,y,s){ctx.fillStyle="#ffffff";ellip(x,y,26*s,16*s);ctx.fill();ellip(x+22*s,y-8*s,20*s,15*s);ctx.fill();ellip(x-20*s,y+4*s,18*s,12*s);ctx.fill();ellip(x+6*s,y+8*s,30*s,14*s);ctx.fill();}
function drawSky(lv){ var g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,lv.skyTop);g.addColorStop(1,lv.skyBot);ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  if(lv.theme==="night"){ ctx.fillStyle="#fdf6c9";circle(440,80,30);ctx.fill();ctx.fillStyle="#e9e3b0";circle(452,74,26);ctx.fill();
    ctx.fillStyle="#ffffff";var st=[[60,60],[120,120],[200,50],[300,90],[360,150],[480,180],[90,200],[420,40],[260,160],[160,90]];
    for(var i=0;i<st.length;i++){var tw=0.5+0.5*Math.sin(S.t*0.05+i);ctx.globalAlpha=tw;circle(st[i][0],st[i][1],1.6);ctx.fill();}ctx.globalAlpha=1; }
  else { ctx.fillStyle="#fff0bf";circle(456,84,38);ctx.fill();ctx.fillStyle="#ffe07a";circle(456,84,28);ctx.fill();cloud(110,120,1);cloud(360,80,0.8); } }
function drawTree(x,baseY,s){ s=s||1;
  ctx.fillStyle="#7a5230";ctx.fillRect(x-4*s,baseY-30*s,8*s,30*s);
  ctx.fillStyle="#4f9b4a";circle(x-14*s,baseY-38*s,15*s);ctx.fill();circle(x+14*s,baseY-38*s,15*s);ctx.fill();
  ctx.fillStyle="#5cab55";circle(x,baseY-46*s,20*s);ctx.fill();
  ctx.fillStyle="#6fc267";circle(x,baseY-58*s,13*s);ctx.fill(); }
function drawGroundSkyline(lv){ var wH=lv.worldH;
  ctx.fillStyle=lv.ground;ctx.fillRect(0,wH,W,260);
  ctx.fillStyle="rgba(0,0,0,.12)";ctx.fillRect(0,wH,W,6);
  if(lv.theme==="park"){ var tx=24,ti=0; while(tx<W){ drawTree(tx,wH,0.85+(ti%3)*0.22); tx+=66+(ti%2)*22; ti++; } return; }
  var night=lv.theme==="night";
  var pal=night?["#3a4366","#46406a","#3d5560"]:["#ef8f8f","#6cccbf","#f4c95b","#b6a3e0","#f0a868"];
  var bx=0,i=0; while(bx<W){ var bw=70+(i%3)*14,bh=120+((i*53)%160),top=wH-bh;
    ctx.fillStyle=pal[i%pal.length];ctx.fillRect(bx,top,bw,bh);
    ctx.fillStyle=night?"#ffe9a8":"rgba(255,255,255,.5)";
    for(var ry=top+16;ry<wH-14;ry+=30)for(var rx=bx+10;rx<bx+bw-12;rx+=24)ctx.fillRect(rx,ry,10,14);
    bx+=bw+6;i++; }
  if(night){ for(var L2=80;L2<W;L2+=180){ ctx.strokeStyle="#6b6b80";ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(L2,wH);ctx.lineTo(L2,wH-60);ctx.stroke();
    ctx.fillStyle="rgba(255,228,150,.5)";circle(L2,wH-62,12);ctx.fill();ctx.fillStyle="#ffe49a";circle(L2,wH-62,5);ctx.fill(); } } }
function worldClouds(lv){ if(lv.theme==="night")return; ctx.globalAlpha=0.85;

function drawCat(cx,cy,facing){ var c=S.cat,night=S.cur&&S.cur.theme==="night",BLK="#26262f";
  if(night){ ctx.fillStyle="rgba(255,245,210,.14)";circle(cx,cy-28,48);ctx.fill(); }

  ctx.save();ctx.translate(cx,cy);if(facing<0)ctx.scale(-1,1);

  ctx.strokeStyle=BLK;ctx.lineWidth=9;ctx.lineCap="round";ctx.beginPath();ctx.moveTo(-15,-20);ctx.quadraticCurveTo(-34,-26+Math.sin(S.t*0.1)*3,-30,-50+Math.sin(S.t*0.1)*4);ctx.stroke();
  ctx.fillStyle=BLK;
  if(jumping){rr(-10,-12,8,12,4);ctx.fill();rr(6,-12,8,12,4);ctx.fill();} else {rr(-9,-12+(swing>0?2:0),8,14,4);ctx.fill();rr(7,-12+(swing<0?2:0),8,14,4);ctx.fill();}
  ctx.fillStyle=BLK;ellip(0,-22,20,17);ctx.fill();
  ctx.fillStyle="#34343f";ellip(5,-20,11,10);ctx.fill();
  ctx.fillStyle=BLK;circle(14,-40,15);ctx.fill();
  tri(4,-50,6,-66,18,-52);ctx.fill();tri(15,-52,26,-65,28,-50);ctx.fill();
  if(night){ ctx.strokeStyle="rgba(190,205,235,.5)";ctx.lineWidth=1.6;ellip(0,-22,20,17);ctx.stroke();circle(14,-40,15);ctx.stroke(); }
  if(!S.worn.glasses){ ctx.fillStyle="#36d77c";ellip(19,-41,5.2,6.4);ctx.fill();ctx.fillStyle="#0c2016";ellip(19.5,-40,2.4,3.6);ctx.fill();ctx.fillStyle="#fff";circle(17.4,-43,1.4);ctx.fill(); }
  ctx.fillStyle="#ef9bb3";circle(28,-37,2.2);ctx.fill();
  ctx.strokeStyle="#14141c";ctx.lineWidth=1.4;ctx.beginPath();ctx.moveTo(28,-35);ctx.quadraticCurveTo(25,-31,21,-33);ctx.stroke();
  if(S.worn.scarf){ctx.fillStyle="#e23b3b";rr(2,-32,17,8,4);ctx.fill();tri(4,-25,11,-25,7,-15);ctx.fill();}
  if(S.worn.glasses){ctx.fillStyle="#20232a";rr(11,-45,20,4,2);ctx.fill();ctx.fillStyle="#1a1d24";circle(16,-41,4.5);ctx.fill();circle(26,-41,4.5);ctx.fill();ctx.fillStyle="#7fd4ff";circle(16,-41,2.6);ctx.fill();circle(26,-41,2.6);ctx.fill();}
  if(S.worn.hat){ctx.fillStyle="#33333f";ellip(14,-55,15,4);ctx.fill();ctx.fillStyle="#33333f";rr(7,-72,15,17,3);ctx.fill();ctx.fillStyle="#e23b3b";rr(7,-60,15,5,2);ctx.fill();}
  ctx.restore();
  if(S.springT>0){emojiAt("✨",cx-22,cy-30,16);emojiAt("✨",cx+22,cy-50,14);}
  if(c.carrying)emojiAt(emojiFor(c.carrying),cx,cy-70,22);
}

function drawBug(x,y){ ctx.fillStyle="#6fbf4a"; for(var i=0;i<4;i++){circle(x-12+i*8,y-7,7);ctx.fill();}
  ctx.fillStyle="#8ad06a";circle(x+13,y-8,8);ctx.fill();

function drawBird(x,y,dir){ ctx.save();ctx.translate(x,y);if(dir<0)ctx.scale(-1,1);
  var fl=Math.sin(S.t*0.4)*6;
  ctx.fillStyle="#6aa9e0";ellip(0,0,12,8);ctx.fill();
  ctx.fillStyle="#5a98d0";tri(-1,-1,-16,-7-fl,-15,1-fl);ctx.fill();tri(-1,1,-16,7+fl,-15,-1+fl);ctx.fill();
  ctx.fillStyle="#f0a030";tri(11,-2,18,0,11,3);ctx.fill();
  ctx.fillStyle="#fff";circle(6,-2,2.2);ctx.fill();ctx.fillStyle="#222";circle(6.6,-2,1.1);ctx.fill();
  ctx.restore(); }
function drawPerson(cx,cy,kind,facing,wave){ var skin="#f1c79c";
  var shirt={kid:"#5aa9e6",oldman:"#8a8f99",aunt:"#d873b0",owner:"#3fb27a"}[kind]||"#888";
  var s=(kind==="kid")?0.85:1;
  ctx.save();ctx.translate(cx,cy);if(facing<0)ctx.scale(-1,1);ctx.scale(s,s);
  ctx.fillStyle="#3a4256";rr(-8,-22,6,22,3);ctx.fill();rr(3,-22,6,22,3);ctx.fill();
  ctx.fillStyle=shirt;rr(-11,-50,22,30,8);ctx.fill();
  ctx.strokeStyle=shirt;ctx.lineWidth=6;ctx.lineCap="round";
  ctx.beginPath();ctx.moveTo(8,-46);if(wave)ctx.lineTo(20,-60);else ctx.lineTo(16,-30);ctx.stroke();
  ctx.beginPath();ctx.moveTo(-8,-46);ctx.lineTo(-14,-30);ctx.stroke();
  ctx.fillStyle=skin;circle(0,-62,12);ctx.fill();
  if(kind==="oldman"){ctx.fillStyle="#e8e8ec";ctx.beginPath();ctx.arc(0,-56,11,0,Math.PI);ctx.fill();ctx.strokeStyle="#7a5a3a";ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(14,-44);ctx.lineTo(18,-6);ctx.stroke();}
  else if(kind==="aunt"){ctx.fillStyle="#7a4a32";circle(0,-72,8);ctx.fill();circle(-9,-66,5);ctx.fill();circle(9,-66,5);ctx.fill();}
  else {ctx.fillStyle="#6b4a32";ctx.beginPath();ctx.arc(0,-66,11,Math.PI,Math.PI*2);ctx.fill();}
  ctx.fillStyle="#2a2a2a";circle(-4,-63,1.4);ctx.fill();circle(4,-63,1.4);ctx.fill();
  ctx.restore(); }
function drawExitDoor(x,y){ var gl=0.5+Math.sin(S.t*0.15)*0.35;
  ctx.fillStyle="#caa46a";rr(x-22,y-30,44,46,6);ctx.fill();
  ctx.fillStyle="#8a6a44";rr(x-16,y-24,32,40,4);ctx.fill();
  ctx.globalAlpha=gl;emojiAt("⬆️",x,y-2,22);ctx.globalAlpha=1;
  ctx.fillStyle="#fff";ctx.font="bold 14px sans-serif";ctx.textAlign="center";ctx.fillText("上楼",x,y-40); }
function drawMarker(x,y,em){ emojiAt(em,x,y+bob(),22); }

function tarrow(tx,ty,em,cam){ var sy=ty-cam,sx=Math.max(30,Math.min(W-30,tx));
  if(sy<6){ ctx.fillStyle="rgba(20,28,52,.6)";rr(sx-28,16,56,26,12);ctx.fill();emojiAt(em,sx-8,36,18);
    ctx.fillStyle="#fff";ctx.font="bold 15px sans-serif";ctx.textAlign="center";ctx.fillText("↑",sx+13,37); }
  else if(sy>H-6){ ctx.fillStyle="rgba(20,28,52,.6)";rr(sx-28,H-44,56,26,12);ctx.fill();emojiAt(em,sx-8,H-24,18);
    ctx.fillStyle="#fff";ctx.font="bold 15px sans-serif";ctx.textAlign="center";ctx.fillText("↓",sx+13,H-23); } }
function drawArrows(cam){ var lv=S.cur;
  if(lv.reach){ if(lv.owner)tarrow(lv.owner.x,lv.owner.y,"🏅",cam); return; }
  for(var i=0;i<lv.items.length;i++){ var it=lv.items[i]; if(it.kind==="quest"&&!it.collected)tarrow(it.x,it.y,emojiFor(it.type),cam); }
  if(lv.npc&&!lv.npc.delivered&&S.cat.carrying===lv.npc.want)tarrow(lv.npc.x,lv.npc.y,"💬",cam);
  if(S.stairsActive)tarrow(lv.exitX,lv.exitY,"⬆️",cam); }

function drawBubble(text){ ctx.font="16px 'PingFang SC','Microsoft YaHei',sans-serif";
  var ch=text.split(""),lines=[],cur="",maxw=460;
  for(var i=0;i<ch.length;i++){ if(ctx.measureText(cur+ch[i]).width>maxw){lines.push(cur);cur=ch[i];} else cur+=ch[i]; }
  lines.push(cur);
  var lh=22,bw=0; for(var l=0;l<lines.length;l++)bw=Math.max(bw,ctx.measureText(lines[l]).width);
  bw+=28; var bh=lines.length*lh+16,bx=W/2-bw/2,by=12;
  ctx.fillStyle="rgba(255,255,255,.95)";rr(bx,by,bw,bh,12);ctx.fill();
  ctx.strokeStyle="#5ad1ff";ctx.lineWidth=2;rr(bx,by,bw,bh,12);ctx.stroke();
  ctx.fillStyle="#1a2740";ctx.textAlign="center";ctx.textBaseline="alphabetic";
  for(var k=0;k<lines.length;k++)ctx.fillText(lines[k],W/2,by+24+k*lh); }

function drawWorld(){ var lv=S.cur,cam=camY(); drawSky(lv);
  ctx.save();ctx.translate(0,-cam);
  drawGroundSkyline(lv); worldClouds(lv);
  for(var p=0;p<lv.platforms.length;p++)drawPlatform(lv.platforms[p]);
  if(lv.theme==="park"){for(var tp2=0;tp2<lv.platforms.length;tp2++){var tpl=lv.platforms[tp2];if(tpl.w>=300){drawTree(tpl.x+30,tpl.y,0.75);drawTree(tpl.x+tpl.w-30,tpl.y,0.7);}}}
  for(var s=0;s<lv.springs.length;s++)drawSpring(lv.springs[s]);
  for(var w=0;w<lv.water.length;w++)drawWater(lv.water[w]);
  for(var k=0;k<lv.checkpoints.length;k++)drawFlag(lv.checkpoints[k]);
  for(var it=0;it<lv.items.length;it++){ var item=lv.items[it]; if(item.collected)continue;
    emojiAt(emojiFor(item.type),item.x,item.y-12+bob()*0.4,26);
    if(item.kind==="quest")drawMarker(item.x,item.y-44,"❗"); }
  for(var di=0;di<lv.dogs.length;di++){ var d=lv.dogs[di]; drawDangerBand(d); drawDog(d.dx,d.y,d.dx>S.cat.x?-1:1); if(d.fed)emojiAt("😋",d.dx,d.y-44+bob()*0.4,18); }
  if(lv.npc){ drawPerson(lv.npc.x,lv.npc.y,lv.npc.kind,1,false); if(!lv.npc.delivered)drawMarker(lv.npc.x,lv.npc.y-96,S.cat.carrying===lv.npc.want?"🎁":"💬"); }
  if(lv.owner){ drawPerson(lv.owner.x,lv.owner.y,"owner",-1,true);emojiAt("🏅",lv.owner.x+22,lv.owner.y-50,24);
    ctx.fillStyle="#fff";ctx.font="bold 14px sans-serif";ctx.textAlign="center";ctx.fillText("终点!",lv.owner.x,lv.owner.y-80); }
  if(S.stairsActive&&!lv.reach)drawExitDoor(lv.exitX,lv.exitY);
  for(var bi=0;bi<lv.bugs.length;bi++)drawBug(lv.bugs[bi].dx,lv.bugs[bi].y);
  for(var ri=0;ri<lv.birds.length;ri++)drawBird(lv.birds[ri].dx,lv.birds[ri].y,lv.birds[ri].dir);
  drawCat(S.cat.x,S.cat.y,S.cat.facing);
  ctx.restore();
  drawArrows(cam);
  if(S.hurtT>0){ctx.fillStyle="rgba(232,60,60,"+(S.hurtT/40*0.32)+")";ctx.fillRect(0,0,W,H);}
  if(S.msgT>0&&S.msg)drawBubble(S.msg); }

function drawMap(){ ctx.fillStyle="rgba(8,12,26,.9)";ctx.fillRect(0,0,W,H);
  ctx.fillStyle="#eaf2ff";ctx.font="bold 21px sans-serif";ctx.textAlign="center";ctx.fillText("📍 第"+(S.levelIndex+1)+"层 "+S.cur.name+" 地图",W/2,46);
  var ox=34,oy=72,mw=W-68,mh=H-184,lv=S.cur,sx=mw/W,sy=mh/lv.worldH;
  ctx.fillStyle="rgba(255,255,255,.06)";rr(ox,oy,mw,mh,12);ctx.fill();ctx.strokeStyle="#3a4a6a";ctx.lineWidth=2;rr(ox,oy,mw,mh,12);ctx.stroke();
  function MX(x){return ox+x*sx;} function MY(y){return oy+y*sy;}
  ctx.fillStyle="#6b7da0";ctx.fillRect(ox,MY(lv.worldH)-2,mw,3);
  for(var p=0;p<lv.platforms.length;p++){var pl=lv.platforms[p];ctx.fillStyle="#a07a52";ctx.fillRect(MX(pl.x),MY(pl.y),pl.w*sx,3);}
  for(var w=0;w<lv.water.length;w++)emojiAt("💧",MX(lv.water[w].x+lv.water[w].w/2),MY(lv.water[w].y),13);
  for(var d=0;d<lv.dogs.length;d++){var dg=lv.dogs[d];ctx.fillStyle="rgba(232,60,60,.3)";ctx.fillRect(MX(dg.hx-dg.r),MY(dg.y)-8,dg.r*2*sx,8);emojiAt("🐶",MX(dg.dx),MY(dg.y),13);}
  for(var s=0;s<lv.springs.length;s++)emojiAt("🦘",MX(lv.springs[s].x),MY(lv.springs[s].y),13);
  for(var bi=0;bi<lv.bugs.length;bi++)emojiAt("🐛",MX(lv.bugs[bi].dx),MY(lv.bugs[bi].y),13);
  for(var ri=0;ri<lv.birds.length;ri++)emojiAt("🐦",MX(lv.birds[ri].dx),MY(lv.birds[ri].y),13);
  for(var it=0;it<lv.items.length;it++){if(lv.items[it].collected)continue;emojiAt(emojiFor(lv.items[it].type),MX(lv.items[it].x),MY(lv.items[it].y),13);}
  for(var c=0;c<lv.checkpoints.length;c++){var cp=lv.checkpoints[c];ctx.fillStyle=cp.reached?"#46c46f":"#9aa6bf";circle(MX(cp.x),MY(cp.y)-3,3);ctx.fill();}
  if(lv.npc)emojiAt(lv.npc.kind==="kid"?"🧒":lv.npc.kind==="oldman"?"👴":"👩",MX(lv.npc.x),MY(lv.npc.y),14);
  if(lv.owner)emojiAt("🏅",MX(lv.owner.x),MY(lv.owner.y),14);
  if(S.stairsActive&&!lv.reach)emojiAt("⬆️",MX(lv.exitX),MY(lv.exitY),13);
  emojiAt("🐈‍⬛",MX(S.cat.x),MY(S.cat.y),16);
  ctx.fillStyle="#cfe0f5";ctx.font="14px sans-serif";ctx.textAlign="center";
  ctx.fillText("🐈‍⬛你 · 🚩存档 · 💧🐶危险 · ⬆️上楼",W/2,oy+mh+30);
  ctx.fillStyle="#ffd66b";ctx.font="bold 15px sans-serif";ctx.fillText("再按 📍 关闭",W/2,oy+mh+58); }

function drawTransition(){ drawSky(S.cur);ctx.fillStyle="rgba(8,12,26,.5)";ctx.fillRect(0,0,W,H);
  ctx.fillStyle="#eaf2ff";ctx.textAlign="center";ctx.font="bold 20px sans-serif";ctx.fillText("⬆️ 上楼啦！",W/2,H/2-40);
  ctx.font="bold 38px 'PingFang SC',sans-serif";ctx.fillText("第"+(S.levelIndex+1)+"层 · "+S.cur.name,W/2,H/2+8); }

function updateHud(){ var pw=""; if(S.worn.glasses)pw+="🕶️";if(S.worn.scarf)pw+="🛡️";if(S.worn.hat)pw+="🎩";if(S.springT>0)pw+="🦘";if(!pw)pw="🎒";
  document.getElementById("hudLevel").textContent="第"+(S.levelIndex+1)+"层 "+(S.cur?S.cur.name:"");
  document.getElementById("hudPow").textContent=pw;
  document.getElementById("hudFish").textContent="🐟 "+S.fish; }

function spawnConfetti(){ var ems=["🎉","⭐","🎊","🏅","✨","🎈"];
  for(var i=0;i<16;i++){var d=document.createElement("div");d.className="conf";d.textContent=ems[i%ems.length];
    d.style.left=(Math.random()*96+2)+"%";d.style.animationDelay=(Math.random()*2)+"s";d.style.animationDuration=(2+Math.random()*1.6)+"s";
    document.getElementById("winOv").appendChild(d);} }

var last=performance.now(),acc=0,STEP=1000/60;
function frame(now){ var dt=now-last;last=now;if(dt>100)dt=100;acc+=dt;var g=0;
  while(acc>=STEP&&g<5){update();acc-=STEP;g++;}
  ctx.setTransform(scale,0,0,scale,0,0);ctx.clearRect(0,0,W,H);
  if(S.scene==="intro"||!S.cur)drawSky(LEVELS[0]);
  else if(S.scene==="trans")drawTransition();
  else { drawWorld(); if(mapOpen)drawMap(); }
  if(S.cur)updateHud();
  requestAnimationFrame(frame); }
resetAll();resize();requestAnimationFrame(frame);
setupIntro();
})();
</script>
